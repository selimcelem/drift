name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/drift-github-actions
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="bucket=drift-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=drift/terraform.tfstate" \
            -backend-config="region=eu-west-1"

      - name: Terraform Plan
        working-directory: infrastructure
        run: terraform plan -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}"
