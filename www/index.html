  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  // --- Core radial gradient.
  const core = ctx.createRadialGradient(x, y, r * 0.1, x, y, r);
  core.addColorStop(0,    '#fff7e6');
  core.addColorStop(0.45, '#ff6600');
  core.addColorStop(0.85, '#cc2200');
  core.addColorStop(1,    '#8b0000');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fill();

  // --- Surface texture: 8-10 darker sunspots rotating slowly around center
  // and drifting. Clipped to the sun disc so they can't leak off the limb.
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.clip();
  const spotCount = 9;
  for (let i = 0; i < spotCount; i++) {
    const baseAngle = (i / spotCount) * 6.28 + tSec * 0.06 + i * 0.3;
    const baseRad = r * (0.25 + 0.45 * ((i * 37) % 100) / 100);
    const driftX = Math.cos(tSec * 0.4 + i * 1.7) * r * 0.06;
    const driftY = Math.sin(tSec * 0.37 + i * 2.3) * r * 0.06;
    const sx = x + Math.cos(baseAngle) * baseRad + driftX;
    const sy = y + Math.sin(baseAngle) * baseRad + driftY;
    const spotR = 10 + ((i * 13) % 10);
    const darker = i % 2 === 0 ? '#cc2200' : '#880000';
    const spotGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, spotR);
    spotGrad.addColorStop(0,   darker);
    spotGrad.addColorStop(0.7, 'rgba(120,20,0,0.55)');
    spotGrad.addColorStop(1,   'rgba(120,20,0,0)');
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = spotGrad;
    ctx.beginPath(); ctx.arc(sx, sy, spotR, 0, 6.28); ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha = 1;

  // --- Solar flares: bezier curves arcing off the surface. Each has its own
  // phase offset so they animate independently. Width tapers base→tip via
  // segmented strokes with decreasing lineWidth.
  const flareCount = 7;
  for (let i = 0; i < flareCount; i++) {
    const phase = i * 0.9;
    const a = (i / flareCount) * 6.28 + tSec * 0.12 + Math.sin(tSec * 0.3 + phase) * 0.25;
    const lenFrac = 0.3 + 0.3 * (0.5 + 0.5 * Math.sin(tSec * 0.7 + phase));
    const flareLen = r * lenFrac;
    const bx = x + Math.cos(a) * r * 0.98;
    const by = y + Math.sin(a) * r * 0.98;

    // Control points curve sideways, wobbling over time.
    const outwardX = Math.cos(a);
    const outwardY = Math.sin(a);
    const tangX = -outwardY;
    const tangY = outwardX;
    const curveBias = Math.sin(tSec * 0.9 + phase) * 0.5;
    const c1x = bx + outwardX * flareLen * 0.35 + tangX * flareLen * (0.18 + curveBias * 0.15);
    const c1y = by + outwardY * flareLen * 0.35 + tangY * flareLen * (0.18 + curveBias * 0.15);
    const c2x = bx + outwardX * flareLen * 0.75 + tangX * flareLen * (0.35 + curveBias * 0.2);
    const c2y = by + outwardY * flareLen * 0.75 + tangY * flareLen * (0.35 + curveBias * 0.2);
    const tipX = bx + outwardX * flareLen + tangX * flareLen * 0.4 * curveBias;
    const tipY = by + outwardY * flareLen + tangY * flareLen * 0.4 * curveBias;

    // Stroke the bezier as a series of short segments so lineWidth can taper
    // from thick base to 0 at the tip; paint them over a base→tip gradient.
    const steps = 10;
    const baseW = 10 + ((i * 7) % 3);
    for (let s = 0; s < steps; s++) {
      const u0 = s / steps;
      const u1 = (s + 1) / steps;
      const p0 = bezierPoint(bx, by, c1x, c1y, c2x, c2y, tipX, tipY, u0);
      const p1 = bezierPoint(bx, by, c1x, c1y, c2x, c2y, tipX, tipY, u1);
      // Color: #ff4500 at base → transparent at tip.
      const fadeAtBase = 0.85;
      const a0 = fadeAtBase * (1 - u0);
      ctx.globalAlpha = a0;
      ctx.strokeStyle = 'rgba(255,69,0,1)';
      ctx.lineWidth = baseW * (1 - u0);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// Cubic bezier point at parameter u∈[0,1].
function bezierPoint(x0, y0, x1, y1, x2, y2, x3, y3, u) {
  const iu = 1 - u;
  const b0 = iu * iu * iu;
  const b1 = 3 * iu * iu * u;
  const b2 = 3 * iu * u * u;
  const b3 = u * u * u;
  return {
    x: b0 * x0 + b1 * x1 + b2 * x2 + b3 * x3,
    y: b0 * y0 + b1 * y1 + b2 * y2 + b3 * y3,
  };
}

function drawApocalypseOverlay() {
  if (state !== 'apocalypse') return;
  const t = apocalypseElapsed();

  // Red screen tint builds through phase 2, peaks as sun descends.
  let tintAlpha = 0;
  if (t >= 3 && t < 8) tintAlpha = 0.15 * ((t - 3) / 5);
  else if (t >= 8) tintAlpha = 0.15 + 0.25 * Math.min(1, (t - 8) / 20);
  if (tintAlpha > 0) {
    ctx.fillStyle = `rgba(130,0,0,${tintAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Sun.
  drawApocalypseSun();

  // Impact flashes and fade.
  if (apocalypseImpactTriggered) {
    const impactT = (Date.now() - apocalypseImpactStart) / 1000;
    // Small white ring at player position (0 → 0.1s: expand 30 → 100).
    if (impactT <= 0.2) {
      const k = Math.min(1, impactT / 0.1);
      const rr = 30 + 70 * k;
      ctx.globalAlpha = Math.max(0, 1 - k);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath(); ctx.arc(player.x, player.y, rr, 0, 6.28); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Big white flash 0.2 → 0.5s: alpha 0→1 over 0.3s.
    if (impactT > 0.2 && impactT <= 0.5) {
      const k = (impactT - 0.2) / 0.3;
      ctx.fillStyle = `rgba(255,255,255,${k})`;
      ctx.fillRect(0, 0, W, H);
    }
    // Hold white 0.5 → 0.7.
    if (impactT > 0.5 && impactT <= 0.7) {
      ctx.fillStyle = 'rgba(255,255,255,1)';
      ctx.fillRect(0, 0, W, H);
    }
    // Fade white → black 0.7 → 1.2.
    if (impactT > 0.7 && impactT <= 1.2) {
      const k = (impactT - 0.7) / 0.5;
      ctx.fillStyle = `rgba(255,255,255,${1 - k})`;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = `rgba(0,0,0,${k})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

function resetApocalypse() {
  apocalypseStart = 0;
  apocalypseDeathFlag = false;
  apocalypseSun = null;
  apocalypseImpactStart = 0;
  apocalypseImpactTriggered = false;
  apocalypsePlayerStart = null;
  if (apocalypseRumbleNodes) {
    try { apocalypseRumbleNodes.stop(); } catch {}
    apocalypseRumbleNodes = null;
  }
}

function triggerDeath() {
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'death', message: 'died at score ' + score, level: 'info' });
  state = 'dead';
  if (typeof syncUpdateBanner === 'function') syncUpdateBanner();
  pauseBtn.classList.remove('visible');
  SFX.death();
  // Crossfade gameplay → results over 0.3s.
  SFX.playTrack('results', 0.3);
  clearPendingNovaTimeouts();

  // Time bonus: every 30s survived = score * 0.1 bonus, capped at 15 intervals.
  const elapsedAtDeath = elapsedRunSeconds();
  const survivedIntervals = Math.min(20, Math.floor(elapsedAtDeath / 30));
  const timeBonus = Math.floor(score * 0.1 * survivedIntervals);
  const baseScore = score;
  score += timeBonus;

  const scores = saveScore(score, difficulty);

  // Crystal earning: floor(final score * difficulty multiplier)
  const crystalMult = DIFFICULTIES[difficulty].crystalMult || 1;
  const crystalsEarned = Math.max(0, Math.floor(score * crystalMult));
  totalCrystals = Math.max(0, totalCrystals + crystalsEarned);
  saveCrystals();

  // Orb shatter: 6-8 irregular shards fly outward from the player position
  // before the existing particle burst fires. Each shard has a random
  // velocity, rotation speed, and a small cyan polygon shape.
  spawnDeathShards(player.x, player.y);
  // Freeze-frame: white flash for 1 frame at the player's location.
  deathFlashFrames = 1;

  // Particle burst comes after the shards have faded (~1.2s).
  if (pendingDeathBurstTimer) { clearTimeout(pendingDeathBurstTimer); }
  pendingDeathBurstTimer = setTimeout(() => {
    pendingDeathBurstTimer = null;
    // Bail out if the player already moved on (restart, menu, etc.)
    if (state !== 'dead') return;
    deathParticles = [];
    const deathCount = Math.min(50, DEATH_PART_CAP);
    const nowDpSpawn = Date.now();
    for (let i = 0; i < deathCount; i++) {
      const a = Math.random()*Math.PI*2, s = Math.random()*3.5+0.8;
      pushCapped(deathParticles, { x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, startTime: nowDpSpawn, maxLifeMs: DEATH_PART_LIFE_MS, size: Math.random()*2.5+0.8 }, DEATH_PART_CAP);
    }
  }, 1200);
  // Submit score online (fire and forget)
  const uname = getUsername();
  if (uname) submitScoreOnline(uname, score, difficulty);

  // Save run stats snapshot for the death screen
  const deathDifficulty = difficulty;
  const deathUsername = uname;
  const deathScore = score;
  const deathPlanetsPassed = planetsPassed;
  const deathStats = { ...runStats };
  const deathElapsedSeconds = elapsedAtDeath;
  let lbViewDifficulty = deathDifficulty;

  // Fetch global leaderboard for current difficulty
  const globalEl = document.getElementById('globalScores');
  function fetchAndRenderGlobal(diff) {
    globalEl.innerHTML = '<div class="gs-status">connecting...</div>';
    fetchLeaderboard(diff, (err, entries) => {
      if (err) {
        globalEl.innerHTML = '<div class="gs-status">unavailable</div>';
      } else if (entries.length === 0) {
        globalEl.innerHTML = '<div class="gs-status">no scores yet</div>';
      } else {
        globalEl.innerHTML = entries.map((e, i) => {
          const isSelf = deathUsername && e.username.toLowerCase() === deathUsername.toLowerCase();
          return `<div class="gs-row${isSelf ? ' self' : ''}"><span class="gs-rank">${e.rank || i+1}</span><span class="gs-name">${e.username}</span><span class="gs-val">${e.score}</span><span class="gs-diff ${e.difficulty || ''}">${e.difficulty || ''}</span></div>`;
        }).join('');
      }
    });
  }
  setTimeout(() => fetchAndRenderGlobal(deathDifficulty), 1000);

  function renderLocalScores(diff) {
    const hsel = document.getElementById('highscores');
    const allScores = getScores();
    console.log('[drift] renderLocalScores diff=' + diff, 'allScores:', JSON.stringify(allScores));
    const filtered = allScores.filter(s => s.difficulty === diff);
    if (filtered.length === 0) {
      hsel.innerHTML = '<div class="gs-status">no local scores</div>';

      ).join('');

  }

  // Store handlers so tab switching works
  window._deathLbHandlers = {
    fetchGlobal: fetchAndRenderGlobal,
    renderLocal: renderLocalScores,
    getDifficulty: () => lbViewDifficulty,
    setDifficulty: (d) => { lbViewDifficulty = d; },
  };

  setTimeout(() => {
    const overlay = document.getElementById('overlay');

    const apocalypseBanner = apocalypseDeathFlag

      : '';
    rs.innerHTML = `
      ${apocalypseBanner}
      <div class="rs-title">${deathScore}</div>
      <div class="rs-row"><span class="rs-label">PLANETS PASSED</span><span class="rs-val">${deathPlanetsPassed}</span><span class="rs-pts">${deathStats.pointsFromPassing} pts</span></div>
      <div class="rs-row"><span class="rs-label">PLANETS DESTROYED</span><span class="rs-val">${deathStats.totalDestroyed}</span><span class="rs-pts">${deathStats.pointsFromDestroying} pts</span></div>
      <div class="rs-row"><span class="rs-label">LONGEST STREAK</span><span class="rs-val">${deathStats.longestStreak}</span><span class="rs-pts"></span></div>
      <div class="rs-row"><span class="rs-label">POWERUPS USED</span><span class="rs-val">${deathStats.powerupsUsed}</span><span class="rs-pts"></span></div>
      <div class="rs-row"><span class="rs-label">TIME SURVIVED</span><span class="rs-val">${formatRunTime(deathElapsedSeconds)}</span><span class="rs-pts"></span></div>
      ${timeBonusRow}
      <hr class="rs-sep">
      <div class="rs-total"><span>TOTAL</span><span>${deathScore} pts <span class="rs-diff ${deathDifficulty}">${deathDifficulty}</span></span></div>
      <div style="text-align:right; font-size:8px; letter-spacing:1px; color:rgba(255,255,255,0.35); padding-top:2px;">× ${crystalMult} difficulty multiplier</div>
    `;
    rs.style.display = 'block';

    // Crystal display: earned this run (gold) + running total
    const dc = document.getElementById('deathCrystals');
    const dct = document.getElementById('deathCrystalTotal');
    dc.textContent = '+ ' + formatCrystals(crystalsEarned) + ' 💎';
    dc.style.display = 'block';
    dct.textContent = '💎 TOTAL: ' + formatCrystals(totalCrystals);

    // Hide orb browser on death screen, show SHOP button next to DRIFT AGAIN.
    document.getElementById('orbBrowser').style.display = 'none';
    document.getElementById('deathActions').style.display = 'flex';

    // Render local scores filtered by difficulty

    document.getElementById('highscores').style.display = 'block';

    // Show leaderboard tabs, default to local

    lbTabs.style.display = 'flex';
    lbTabs.querySelectorAll('.lb-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'local'));

      t.classList.toggle('active', t.dataset.diff === deathDifficulty);

    overlay.classList.remove('hidden');

}

// --- Draw ---
function renderNebulaOffscreen() {
  nebulaCtx.clearRect(0, 0, W, H);
  nebulaCtx.globalAlpha = 0.055;
  const t = frame * 0.0018;
  const layers = [
    ['rgba(70,30,160', 0,   2.1],
    ['rgba(15,70,170', 2.1, 1.7],
    ['rgba(140,30,70', 4.2, 2.3],
  ];
  for (const [c, o, f] of layers) {
    const nx2 = W*0.2 + Math.sin(t+o) * W*0.32;
    const ny2 = H*0.3 + Math.cos(t*f+o) * H*0.28;
    const ng = nebulaCtx.createRadialGradient(nx2, ny2, 0, nx2, ny2, W*0.48);
    ng.addColorStop(0, c + ',0.55)');
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    nebulaCtx.fillStyle = ng;
    nebulaCtx.fillRect(0, 0, W, H);
  }
  nebulaCtx.globalAlpha = 1;
}

// --- Dynamic background images ---
// Real space photos drift slowly down the screen as distant scenery. Each
// object is drawn into a circular mask with a dark radial vignette so it
// fades into the deep-space background. Spawning is paced by planetsPassed
// and alternates screen sides; no two consecutive spawns share an image.
const BG_IMAGE_KEYS = [
  'nebula', 'dyingStar', 'galaxy', 'supernova',
  'redNebula', 'pulsar',
  'blackhole', 'remnant',
  'void', 'darkMatter',
];
const bgImages = {
  nebula:     new Image(),
  dyingStar:  new Image(),
  galaxy:     new Image(),
  supernova:  new Image(),
  redNebula:  new Image(),
  pulsar:     new Image(),
  blackhole:  new Image(),
  remnant:    new Image(),
  void:       new Image(),
  darkMatter: new Image(),
};
bgImages.nebula.src     = './assets/bg-nebula.jpg?v=' + Date.now();
bgImages.dyingStar.src  = './assets/bg-dying-star.jpg?v=' + Date.now();
bgImages.galaxy.src     = './assets/bg-galaxy.jpg?v=' + Date.now();
bgImages.supernova.src  = './assets/bg-supernova.jpg?v=' + Date.now();
bgImages.redNebula.src  = './assets/bg-red-nebula.jpg?v=' + Date.now();
bgImages.pulsar.src     = './assets/bg-pulsar.jpg?v=' + Date.now();
bgImages.blackhole.src  = './assets/bg-blackhole.jpg?v=' + Date.now();
bgImages.remnant.src    = './assets/bg-remnant.jpg?v=' + Date.now();
bgImages.void.src       = './assets/bg-void.jpg?v=' + Date.now();
bgImages.darkMatter.src = './assets/bg-darkmatter.jpg?v=' + Date.now();

// Phase-scoped image pools: each run phase draws from a different slice of
// the imagery set so the backdrop evolves with the difficulty curve. Phase
// boundaries match phaseForElapsed(). Already-spawned objects from the old
// phase keep scrolling off naturally; only new spawns pick from the new pool.
const BG_IMAGE_POOLS = {
  1: ['nebula', 'dyingStar', 'galaxy', 'supernova'],
  2: ['redNebula', 'pulsar'],
  3: ['blackhole', 'remnant'],
  4: ['void', 'darkMatter'],
};

let bgObjects = [];
let lastBgSpawnFrame = -99999;  // frame index of most recent spawn
let nextBgSpawnDelay = 45 * 60; // frames until the next scheduled spawn
let lastBgImageKey = null;      // prevents same image twice in a row
let nextBgSide = 'left';        // alternates 'left' / 'right'

function nextBgSpawnStep() {
  // 60-90 seconds between subsequent spawns at 60fps.
  return 3600 + Math.floor(Math.random() * 1801);
}

function resetBgObjects() {
  bgObjects = [];
  lastBgSpawnFrame = -99999;    // ensures first spawn triggers at 45s in
  nextBgSpawnDelay = 45 * 60;   // 2700 frames = 45s at 60fps
  lastBgImageKey = null;
  nextBgSide = Math.random() < 0.5 ? 'left' : 'right';
}
resetBgObjects();

function spawnBgObject() {
  // Current-phase pool only — old objects already in flight keep their own
  // imagery as they scroll off. If the phase pool has only one image, repeats
  // are unavoidable; otherwise we still avoid two-in-a-row of the same key.
  const phase = phaseForElapsed(elapsedRunSeconds());
  const phasePool = BG_IMAGE_POOLS[phase] || BG_IMAGE_POOLS[1];
  const filtered = phasePool.length > 1 ? phasePool.filter(k => k !== lastBgImageKey) : phasePool;
  const pool = filtered.length ? filtered : phasePool;
  const key = pool[Math.floor(Math.random() * pool.length)];
  const x = nextBgSide === 'left'
    ? 40 + Math.random() * 100            // 40..140
    : (W - 140) + Math.random() * 100;    // W-140..W-40
  // Nebula and dying-star read better bigger; supernova/galaxy stay tighter
  // so their bright cores don't dominate the screen. Phase-2+ imagery uses
  // the tighter 220..320 range to match supernova/galaxy's read.
  const size = (key === 'nebula' || key === 'dyingStar')
    ? 280 + Math.random() * 120   // 280..400
    : 220 + Math.random() * 100;  // 220..320
  const opacity = 0.2 + Math.random() * 0.1;   // 0.2..0.3
  bgObjects.push({ key, x, y: -300, size, opacity, seed: Math.random() * 1e9 | 0 });
  lastBgImageKey = key;
  nextBgSide = nextBgSide === 'left' ? 'right' : 'left';
  lastBgSpawnFrame = frame;
  nextBgSpawnDelay = nextBgSpawnStep();
}

// Scale a frame-count interval by current scrollSpeed so fast runs see
// proportionally more imagery. Floor at 20s so spawns never pile up.
function scaledBgInterval(baseFrames) {
  const spd = scrollSpeed();
  const factor = Math.max(0.0001, spd / 1.5);
  const scaled = baseFrames / factor;
  const minFrames = 20 * 60; // 20 seconds @60fps
  return Math.max(minFrames, scaled);
}

function maybeSpawnBgObject() {
  if (bgObjects.length >= 2) return;
  const sinceLast = frame - lastBgSpawnFrame;
  // Normal schedule: wait nextBgSpawnDelay frames since last spawn, with the
  // wait shortened by current scrollSpeed (floored at 20s).
  const scheduledReady = sinceLast >= scaledBgInterval(nextBgSpawnDelay);
  // Hyperspeed shortcut: counts as distance travelled — while stacks >= 3,
  // allow an extra spawn if it's been at least 30s since the last one.
  const hyperspeedReady = hyperSpeedStacks >= 3 && sinceLast >= 30 * 60;
  if (!scheduledReady && !hyperspeedReady) return;
  spawnBgObject();
}

function updateBgObjects() {
  if (state === 'playing') {
    maybeSpawnBgObject();
    const ds = scrollSpeed() * 0.12;
    for (const o of bgObjects) o.y += ds;
  }
  bgObjects = bgObjects.filter(o => o.y <= H + 300);
}

function drawBgObjects() {
  for (const o of bgObjects) {
    const img = bgImages[o.key];
    if (!img || !img.complete || img.naturalWidth === 0) continue;
    const r = o.size / 2;
    const left = o.x - r, top = o.y - r;
    ctx.save();
    // Draw the image semi-transparent with screen blend — black pixels
    // vanish, colored light glows into the space background.
    ctx.globalAlpha = o.opacity;
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(img, left, top, o.size, o.size);
    // Vignette painted at full alpha so the fully opaque ring completely
    // hides the square image boundary. The fill rect covers the whole image
    // square; the radial gradient's last stop (1.0 alpha) extends to the
    // corners via color-stop clamping, so nothing past the opaque ring
    // leaks through.
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    const clearStop  = o.key === 'galaxy' ? 0.08 : 0.25;
    const opaqueStop = o.key === 'galaxy' ? 0.85 : 0.90;
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
    g.addColorStop(0,          'rgba(0,0,10,0)');
    g.addColorStop(clearStop,  'rgba(0,0,10,0)');
    g.addColorStop(opaqueStop, 'rgba(0,0,10,1)');
    g.addColorStop(1,          'rgba(0,0,10,1)');
    ctx.fillStyle = g;
    ctx.fillRect(left, top, o.size, o.size);
    ctx.restore();
  }
}

// Deterministic PRNG — used to keep per-object blob shapes and similar
// one-time randomizations stable across frames.
function seededRand(seed) {
  let s = (seed | 0) || 1;
  return () => {
    s = (s * 1664525 + 1013904223) | 0;
    return ((s >>> 0) % 100000) / 100000;
  };
}

function drawBg() {
  // Solid background (simplified from createLinearGradient)
  ctx.fillStyle = '#00000a';
  ctx.fillRect(0, 0, W, H);
  // Background space imagery drifts down behind everything.
  updateBgObjects();
  drawBgObjects();
  // Nebula: repaint to offscreen only every NEBULA_UPDATE_INTERVAL frames.
  // Negative delta = frame was reset (game restart), so repaint too.
  const nebDelta = frame - nebulaRenderedFrame;
  if (nebulaRenderedFrame < 0 || nebDelta < 0 || nebDelta >= NEBULA_UPDATE_INTERVAL) {
    renderNebulaOffscreen();
    nebulaRenderedFrame = frame;
  }
  ctx.drawImage(nebulaCanvas, 0, 0);
  // Stars animate on main canvas every frame
  for (const s of bgStars) {
    ctx.globalAlpha = (0.35+0.5*Math.sin(frame*0.05+s.phase));
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBodies() {
  for (const b of bodies) {
    const isTarget = b === closestBody && state === 'playing';
    const pulse = Math.sin(b.pulse)*0.3+0.7;
    const glowR = b.radius * (2.6+Math.sin(b.pulse)*0.35);

    // Glow: use cached gradient built at local origin (0,0) with max glow
    // radius. Arc radius still varies with pulse to preserve the breathing
    // look — the gradient just caps at the outer stop.
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.globalAlpha = 0.32 * pulse;
    ctx.fillStyle = b.cachedGlow;
    ctx.beginPath(); ctx.arc(0, 0, glowR, 0, 6.28); ctx.fill();
    ctx.restore();

    // Body
    ctx.globalAlpha=1;
    if (b.type === 'blackhole') {
      drawBlackhole(b);
    } else if (b.type === 'star' || b.type === 'planet') {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.fillStyle = b.cachedFill;
      ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, 6.28); ctx.fill();
      ctx.restore();
    } else if (b.type === 'toothed')   drawToothed(b);
    else if (b.type === 'eye')         drawEye(b);
    else if (b.type === 'cracked')     drawCracked(b);
    else if (b.type === 'tentacle')    drawTentacle(b);
    else if (b.type === 'screaming')   drawScreaming(b);
    else if (b.type === 'void')        drawVoid(b);
    else if (b.type === 'heart')       drawHeart(b);
    else if (b.type === 'mirror')      drawMirror(b);
    else if (b.type === 'skull')       drawSkull(b);

    // Target indicator: bright ring + line to player when active
    if (isTarget) {
      const orbRgb = getOrbBonus().color;
      const lineColor = leftDown ? 'rgba(80,200,255,' : rightDown ? 'rgba(255,120,80,' : `rgba(${orbRgb},`;
      ctx.globalAlpha = 0.55 + 0.25*Math.sin(frame*0.18);
      ctx.strokeStyle = lineColor+'0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.radius+5+Math.sin(frame*0.18)*2,0,6.28); ctx.stroke();

      if (leftDown || rightDown) {
        // Void proximity warps attract/repel — signal that by overriding the
        // dashed-line color with a dark purple tint.
        const dashColor = playerInVoidRange ? 'rgba(140,60,200,' : lineColor;
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = dashColor+'0.8)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // Subtle rings always
    ctx.globalAlpha = 0.05+0.03*Math.sin(b.pulse*1.4);
    ctx.strokeStyle = b.type==='blackhole'?'rgba(160,70,255,1)':b.glowColor;
    ctx.lineWidth=1;
    [b.radius*2, b.radius*3.5].forEach(r=>{ ctx.beginPath(); ctx.arc(b.x,b.y,r,0,6.28); ctx.stroke(); });
    ctx.globalAlpha=1;
  }
}

function drawBlackhole(b) {
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = 'rgba(170,70,255,1)';
  ctx.scale(1, 0.3);
  ctx.beginPath(); ctx.arc(b.x, b.y/0.3, b.radius*2.2, 0, 6.28); ctx.fill();
  ctx.restore();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,6.28); ctx.fill();
  ctx.strokeStyle='rgba(160,70,255,0.65)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(b.x,b.y,b.radius+1.5,0,6.28); ctx.stroke();
}

function drawToothed(b) {
  ctx.save();
  // Slow pulsing red glow between spikes.
  const glowPulse = 0.45 + 0.35 * Math.abs(Math.sin(Date.now() * 0.002));
  const glowR = b.radius * 1.75;
  const gg = ctx.createRadialGradient(b.x, b.y, b.radius * 0.9, b.x, b.y, glowR);
  gg.addColorStop(0, `rgba(180,20,20,${0.5 * glowPulse})`);
  gg.addColorStop(1, 'rgba(90,0,0,0)');
  ctx.fillStyle = gg;
  ctx.beginPath(); ctx.arc(b.x, b.y, glowR, 0, 6.28); ctx.fill();

  // Inner ring of smaller spikes (4) between the main 8.
  for (let i = 0; i < 4; i++) {
    const a = b.toothAngle * 0.85 + i * (Math.PI / 2) + Math.PI / 8;
    const ext = b.innerSpikeLen * (0.5 + 0.5 * Math.abs(Math.sin(a * 1.3)));
    const baseX = b.x + Math.cos(a) * b.radius * 0.96;
    const baseY = b.y + Math.sin(a) * b.radius * 0.96;
    const tipX  = b.x + Math.cos(a) * (b.radius + ext);
    const tipY  = b.y + Math.sin(a) * (b.radius + ext);
    const tangX = -Math.sin(a), tangY = Math.cos(a);
    const baseW = 5;
    ctx.fillStyle = '#7a0000';
    ctx.beginPath();
    ctx.moveTo(baseX + tangX * baseW, baseY + tangY * baseW);
    ctx.lineTo(tipX, tipY);
    ctx.lineTo(baseX - tangX * baseW, baseY - tangY * baseW);
    ctx.closePath();
    ctx.fill();
  }

  // 8 main rotating spikes: sharp triangles, wide base → 0px tip.
  for (let i = 0; i < 8; i++) {
    const a = b.toothAngle + i * (Math.PI / 4);
    const ext = b.spikeLen * Math.abs(Math.sin(a));
    const baseX = b.x + Math.cos(a) * b.radius;
    const baseY = b.y + Math.sin(a) * b.radius;
    const tipX = b.x + Math.cos(a) * (b.radius + ext);
    const tipY = b.y + Math.sin(a) * (b.radius + ext);
    const tangX = -Math.sin(a), tangY = Math.cos(a);
    const baseW = 6; // half-width at base → total 12px
    // Dark shadow pass (slightly offset inward — base darkening).
    const shadeX0 = baseX + tangX * baseW;
    const shadeY0 = baseY + tangY * baseW;
    const shadeX1 = baseX - tangX * baseW;
    const shadeY1 = baseY - tangY * baseW;
    const spikeGrad = ctx.createLinearGradient(baseX, baseY, tipX, tipY);
    spikeGrad.addColorStop(0, '#3a0000');
    spikeGrad.addColorStop(0.35, '#8b0000');
    spikeGrad.addColorStop(1, '#cc0000');
    ctx.fillStyle = spikeGrad;
    ctx.beginPath();
    ctx.moveTo(shadeX0, shadeY0);
    ctx.lineTo(tipX, tipY);
    ctx.lineTo(shadeX1, shadeY1);
    ctx.closePath();
    ctx.fill();
  }

  // Base circle — deeper crimson gradient.
  const grad = ctx.createRadialGradient(b.x - b.radius*0.28, b.y - b.radius*0.28, 0, b.x, b.y, b.radius);
  grad.addColorStop(0, '#d02020');
  grad.addColorStop(0.45, '#8b0000');
  grad.addColorStop(1, '#2a0000');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.fill();

  // Dark veins/cracks between spike bases — faint jagged lines.
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.clip();
  ctx.strokeStyle = 'rgba(20,0,0,0.75)';
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 8; i++) {
    const a = b.toothAngle + i * (Math.PI / 4) + Math.PI / 8;
    ctx.beginPath();
    const x0 = b.x + Math.cos(a) * b.radius * 0.95;
    const y0 = b.y + Math.sin(a) * b.radius * 0.95;
    ctx.moveTo(x0, y0);
    // Jag toward center with a kink.
    const midA = a + Math.PI - 0.4;
    const mx = b.x + Math.cos(midA) * b.radius * 0.4;
    const my = b.y + Math.sin(midA) * b.radius * 0.4;
    const ex = b.x + Math.cos(a + Math.PI) * b.radius * 0.1;
    const ey = b.y + Math.sin(a + Math.PI) * b.radius * 0.1;
    ctx.lineTo(mx, my); ctx.lineTo(ex, ey);
    ctx.stroke();
  }
  ctx.restore();
  ctx.restore();
}

function drawEye(b) {
  ctx.save();
  // Eyeball base.
  const pulseR = b.radius + Math.sin(b.eyePulse) * 3;
  const grad = ctx.createRadialGradient(b.x - pulseR*0.3, b.y - pulseR*0.3, 0, b.x, b.y, pulseR);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.6, '#f6efd6');
  grad.addColorStop(1, '#c4b78a');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(b.x, b.y, pulseR, 0, 6.28); ctx.fill();
  // Bloodshot veins: 10-12 primary, thicker + brighter, each with secondary
  // branches for a more prominent, unsettling look.
  const rng = mulberry32(b.veinSeed);
  const veinCount = 11;
  for (let i = 0; i < veinCount; i++) {
    const a = rng() * Math.PI * 2;
    const curveAmt = (rng() - 0.5) * 0.7;
    const startX = b.x + Math.cos(a) * pulseR * 0.96;
    const startY = b.y + Math.sin(a) * pulseR * 0.96;
    const midA = a + curveAmt;
    const midX = b.x + Math.cos(midA) * (pulseR * 0.55);
    const midY = b.y + Math.sin(midA) * (pulseR * 0.55);
    const endA = a + curveAmt * 2;
    const endX = b.x + Math.cos(endA) * (pulseR * 0.25);
    const endY = b.y + Math.sin(endA) * (pulseR * 0.25);
    // Primary vein.
    ctx.strokeStyle = 'rgba(200,30,30,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(midX, midY, endX, endY);
    ctx.stroke();
    // Secondary branches — two thinner veins off the midpoint.
    ctx.strokeStyle = 'rgba(200,30,30,0.55)';
    ctx.lineWidth = 1;
    for (let j = 0; j < 2; j++) {
      const branchA = midA + (rng() - 0.5) * 1.4;
      const branchLen = pulseR * (0.15 + rng() * 0.2);
      const bx = midX + Math.cos(branchA) * branchLen;
      const by = midY + Math.sin(branchA) * branchLen;
      ctx.beginPath();
      ctx.moveTo(midX, midY); ctx.lineTo(bx, by);
      ctx.stroke();
    }
  }
  // Iris: hue cycles through blue→green→red over 10s. Slightly larger now.
  const hueT = (Date.now() % 10000) / 10000;
  const hue = Math.floor(hueT * 360);
  const irisR = pulseR * 0.62;
  const irisX = b.x + b.pupilDx;
  const irisY = b.y + b.pupilDy;
  const irisGrad = ctx.createRadialGradient(irisX, irisY, 0, irisX, irisY, irisR);
  irisGrad.addColorStop(0, `hsl(${hue},85%,60%)`);
  irisGrad.addColorStop(0.7, `hsl(${hue},70%,35%)`);
  irisGrad.addColorStop(1, `hsl(${hue},60%,20%)`);
  ctx.fillStyle = irisGrad;
  ctx.beginPath(); ctx.arc(irisX, irisY, irisR, 0, 6.28); ctx.fill();
  // Pupil.
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(irisX, irisY, pulseR * 0.25, 0, 6.28); ctx.fill();
  ctx.restore();
}

function drawCracked(b) {
  ctx.save();
  // Base planet (darker).
  const grad = ctx.createRadialGradient(b.x - b.radius*0.28, b.y - b.radius*0.28, 0, b.x, b.y, b.radius);
  grad.addColorStop(0, '#b85c30');
  grad.addColorStop(0.4, '#5a2b16');
  grad.addColorStop(1, '#2a1000');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.fill();

  // Crack glow pulse.
  const pulseAlpha = 0.6 + 0.4 * Math.abs(Math.sin(Date.now() * 0.0012 + b.crackSeed));
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.clip();
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(255,120,40,0.9)';
  ctx.strokeStyle = `rgba(255,140,40,${pulseAlpha})`;
  ctx.lineWidth = 1.6;
  const rng = mulberry32(b.crackSeed);
  const crackCount = 4;
  for (let c = 0; c < crackCount; c++) {
    const startA = rng() * Math.PI * 2;
    ctx.beginPath();
    let x = b.x + Math.cos(startA) * b.radius * 0.9;
    let y = b.y + Math.sin(startA) * b.radius * 0.9;
    ctx.moveTo(x, y);
    const segs = 4 + Math.floor(rng() * 3);
    for (let s = 0; s < segs; s++) {
      const ta = startA + Math.PI + (rng() - 0.5) * 1.5;
      const step = b.radius * (0.3 + rng() * 0.4);
      x += Math.cos(ta) * step;
      y += Math.sin(ta) * step;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();

  // Eruption flash.
  if (b.eruptFlash > 0) {
    const k = b.eruptFlash / 10;
    ctx.globalAlpha = k * 0.75;
    const fg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius * 1.6);
    fg.addColorStop(0, 'rgba(255,220,140,1)');
    fg.addColorStop(1, 'rgba(255,120,40,0)');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * 1.6, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

function drawTentacle(b) {
  ctx.save();
  const count = b.tentacleCount;
  const STEPS = 10; // segments per tentacle

  // Tentacles (draw first, behind body).
  for (let i = 0; i < count; i++) {
    const phase = b.tentaclePhases[i];
    const ext = tentacleExtension(phase);
    if (ext < 0.05) continue;
    // Retraction bonus: amplitude swells as tentacle retracts so it curls.
    const retract = phase > 2.5 ? (phase - 2.5) / 1 : 0;
    const ampBoost = 1 + retract * 1.5;
    const angle = (i / count) * Math.PI * 2;
    const maxLen = b.radius + b.radius * 1.2 * ext;
    const baseX = b.x + Math.cos(angle) * b.radius;
    const baseY = b.y + Math.sin(angle) * b.radius;
    const outX  = Math.cos(angle), outY  = Math.sin(angle);
    const tangX = -outY, tangY = outX;

    // Build per-segment wiggle and render as tapering strokes.
    let prevX = baseX, prevY = baseY;
    for (let s = 1; s <= STEPS; s++) {
      const u = s / STEPS;
      // Organic wiggle: sum of sines at different frequencies.
      const wig = (
        Math.sin(frame * 0.05 + s * 0.3 + i * 1.2) * 8 +
        Math.sin(frame * 0.09 + s * 0.7 + i * 0.4) * 4
      ) * u * ampBoost;
      const cx = baseX + outX * (maxLen - b.radius) * u + tangX * wig;
      const cy = baseY + outY * (maxLen - b.radius) * u + tangY * wig;
      const w = 8 * (1 - u) + 4 * u; // taper: 8px → 4px (bulbous tip)
      // Gradient from dark base to lighter tip per spec.
      const rCol = Math.round(26 + u * 81);
      const gCol = Math.round(0  + u * 33);
      const bCol = Math.round(48 + u * 120);
      ctx.strokeStyle = `rgba(${rCol},${gCol},${bCol},0.92)`;
      ctx.lineWidth = w;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(prevX, prevY); ctx.lineTo(cx, cy);
      ctx.stroke();
      // Sucker dots along the length (every ~15px equivalent: every other step).
      if (s > 1 && s % 2 === 0) {
        ctx.fillStyle = 'rgba(180,140,220,0.75)';
        ctx.beginPath(); ctx.arc(cx, cy, 1.8, 0, 6.28); ctx.fill();
      }
      // Bulbous tip.
      if (s === STEPS) {
        ctx.fillStyle = `rgba(${rCol + 20},${gCol + 20},${bCol + 20},0.95)`;
        ctx.beginPath(); ctx.arc(cx, cy, 4.5, 0, 6.28); ctx.fill();
      }
      prevX = cx; prevY = cy;
    }
  }

  // Slightly irregular body silhouette — darker navy/black. Use 8-vertex path
  // with jittered radii for an organic blob.
  const rng = mulberry32(b.tentacleSeed);
  ctx.save();
  ctx.beginPath();
  const verts = 10;
  for (let i = 0; i < verts; i++) {
    const a = (i / verts) * Math.PI * 2;
    const rr = b.radius * (0.92 + rng() * 0.15);
    const px = b.x + Math.cos(a) * rr;
    const py = b.y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.clip();
  const grad = ctx.createRadialGradient(b.x - b.radius*0.3, b.y - b.radius*0.3, 0, b.x, b.y, b.radius);
  grad.addColorStop(0, '#1a0030');
  grad.addColorStop(0.6, '#0d0018');
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(b.x - b.radius * 1.2, b.y - b.radius * 1.2, b.radius * 2.4, b.radius * 2.4);

  // Bioluminescent dots scattered on body surface (cyan/blue glow).
  const dotRng = mulberry32(b.tentacleSeed ^ 0xa5a5);
  const biolumPulse = 0.5 + 0.5 * Math.sin(frame * 0.04);
  for (let i = 0; i < 9; i++) {
    const a = dotRng() * Math.PI * 2;
    const r = b.radius * (0.2 + dotRng() * 0.75);
    const px = b.x + Math.cos(a) * r;
    const py = b.y + Math.sin(a) * r;
    const dotR = 1.2 + dotRng() * 1.4;
    ctx.globalAlpha = 0.5 + 0.4 * biolumPulse;
    ctx.fillStyle = 'rgba(120,220,255,1)';
    ctx.beginPath(); ctx.arc(px, py, dotR, 0, 6.28); ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}

function quadPt(x0, y0, x1, y1, x2, y2, u) {
  const iu = 1 - u;
  return {
    x: iu * iu * x0 + 2 * iu * u * x1 + u * u * x2,
    y: iu * iu * y0 + 2 * iu * u * y1 + u * u * y2,
  };
}

function drawScreaming(b) {
  ctx.save();
  const p = b.screamPhase;
  // mouthT = 0 closed, 1 fully open.
  let mouthT = 0;
  if (p < 4) mouthT = 0;
  else if (p < 4.5) mouthT = (p - 4) / 0.5;
  else if (p < 5.5) mouthT = 1;
  else if (p < 6)   mouthT = 1 - (p - 5.5) / 0.5;

  // Subtle outer blood-glow so the dark planet reads against space.
  const outerR = b.radius * 1.8;
  const outerGlow = ctx.createRadialGradient(b.x, b.y, b.radius, b.x, b.y, outerR);
  outerGlow.addColorStop(0, 'rgba(80,20,20,0.3)');
  outerGlow.addColorStop(1, 'rgba(80,20,20,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath(); ctx.arc(b.x, b.y, outerR, 0, 6.28); ctx.fill();

  // Shockwaves emanating outward when screaming.
  if (b.shockwaves.length) {
    for (const sw of b.shockwaves) {
      const k = sw.age / sw.maxLife;
      const r = b.radius * (1 + k * 2.5);
      ctx.globalAlpha = (1 - k) * 0.55;
      ctx.strokeStyle = 'rgba(220,60,60,1)';
      ctx.lineWidth = 2 * (1 - k) + 0.5;
      ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, 6.28); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Contracting "suck" rings — 3 rings shrinking inward during the surge,
  // visually signalling the gravity pull toward the planet.
  if (b.contractRings && b.contractRings.length) {
    ctx.strokeStyle = 'rgba(255,50,50,1)';
    ctx.lineWidth = 1.5;
    for (const cr of b.contractRings) {
      if (cr.age < 0) continue;
      const k = cr.age / cr.maxLife;
      const rr = b.radius * (3 - k * 2.5);
      ctx.globalAlpha = (1 - k) * 0.25;
      ctx.beginPath(); ctx.arc(b.x, b.y, rr, 0, 6.28); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Base: dark grey with brown/rust undertones — use a slight radial gradient.
  const baseGrad = ctx.createRadialGradient(b.x - b.radius*0.3, b.y - b.radius*0.3, 0, b.x, b.y, b.radius);
  const hotTint = mouthT * 40;
  baseGrad.addColorStop(0, `rgb(${96 + hotTint},78,70)`);
  baseGrad.addColorStop(0.6, `rgb(${74 + hotTint},64,58)`);
  baseGrad.addColorStop(1, '#3a2e28');
  ctx.fillStyle = baseGrad;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.fill();

  // Cratered surface: scattered darker circles clipped to the disc.
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.clip();
  const rng = mulberry32(b.screamSeed);
  for (let i = 0; i < 9; i++) {
    const cr = b.radius * (0.08 + rng() * 0.2);
    const ang = rng() * Math.PI * 2;
    const dist = rng() * b.radius * 0.8;
    const cx = b.x + Math.cos(ang) * dist;
    const cy = b.y + Math.sin(ang) * dist;
    ctx.fillStyle = `rgba(20,12,8,${0.3 + rng() * 0.4})`;
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, 6.28); ctx.fill();
  }
  // Hairline cracks appear on the surface during scream.
  if (mouthT > 0.2) {
    const crackRng = mulberry32(b.screamSeed ^ 0x1234);
    ctx.strokeStyle = `rgba(140,20,20,${mouthT * 0.75})`;
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 5; i++) {
      const a = crackRng() * Math.PI * 2;
      let x = b.x, y = b.y;
      ctx.beginPath(); ctx.moveTo(x, y);
      const steps = 3 + Math.floor(crackRng() * 3);
      let curA = a;
      for (let s = 0; s < steps; s++) {
        const seg = b.radius * (0.25 + crackRng() * 0.3);
        curA += (crackRng() - 0.5) * 1.2;
        x += Math.cos(curA) * seg;
        y += Math.sin(curA) * seg;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  ctx.restore();

  // Brow ridge: two dark curves above the eyes angling inward (menacing).
  const browY = b.y - b.radius * 0.45;
  ctx.strokeStyle = '#0a0604';
  ctx.lineWidth = b.radius * 0.12;
  ctx.lineCap = 'round';
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(b.x + side * b.radius * 0.1,  browY + b.radius * 0.12);
    ctx.lineTo(b.x + side * b.radius * 0.55, browY - b.radius * 0.05);
    ctx.stroke();
  }

  // Hollow eye sockets — irregular oval cavities (skull-like).
  const eyeOffX = b.radius * 0.32;
  const eyeOffY = -b.radius * 0.18;
  for (const side of [-1, 1]) {
    const ex = b.x + side * eyeOffX;
    const ey = b.y + eyeOffY;
    // Deep black cavity with irregular shape.
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(side * 0.22);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius * 0.24, b.radius * 0.2, 0, 0, 6.28);
    ctx.fill();
    // Slight red glow deep inside the socket during scream.
    if (mouthT > 0.2) {
      const inner = ctx.createRadialGradient(0, 0, 0, 0, 0, b.radius * 0.22);
      inner.addColorStop(0, `rgba(180,30,30,${mouthT * 0.65})`);
      inner.addColorStop(1, 'rgba(80,0,0,0)');
      ctx.fillStyle = inner;
      ctx.beginPath();
      ctx.ellipse(0, 0, b.radius * 0.22, b.radius * 0.18, 0, 0, 6.28);
      ctx.fill();
    }
    ctx.restore();
  }

  // Mouth: grows with mouthT. Black cavity with jagged teeth when open.
  const mouthCY = b.y + b.radius * 0.32;
  const mouthRX = b.radius * (0.18 + 0.45 * mouthT);
  const mouthRY = b.radius * (0.05 + 0.4 * mouthT);
  // Cavity.
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(b.x, mouthCY, mouthRX, mouthRY, 0, 0, 6.28);
  ctx.fill();
  // Red glow deep in the throat during scream.
  if (mouthT > 0.3) {
    const throat = ctx.createRadialGradient(b.x, mouthCY, 0, b.x, mouthCY, mouthRX * 0.8);
    throat.addColorStop(0, `rgba(160,20,20,${mouthT * 0.55})`);
    throat.addColorStop(1, 'rgba(60,0,0,0)');
    ctx.fillStyle = throat;
    ctx.beginPath();
    ctx.ellipse(b.x, mouthCY, mouthRX * 0.8, mouthRY * 0.6, 0, 0, 6.28);
    ctx.fill();
  }
  // Jagged teeth — triangles top and bottom, irregular sizes.
  if (mouthT > 0.25) {
    const toothAlpha = Math.min(1, (mouthT - 0.25) / 0.35);
    ctx.fillStyle = `rgba(220,215,200,${toothAlpha})`;
    const toothRng = mulberry32(b.screamSeed ^ 0xface);
    const toothCount = 8;
    for (let i = 0; i < toothCount; i++) {
      const tu = (i + 0.5) / toothCount;
      const tx = b.x - mouthRX + tu * mouthRX * 2;
      const baseW = mouthRX / toothCount * (0.9 + toothRng() * 0.4);
      // Top row (points down).
      const topLen = mouthRY * (0.55 + toothRng() * 0.5);
      ctx.beginPath();
      ctx.moveTo(tx - baseW * 0.5, mouthCY - mouthRY);
      ctx.lineTo(tx + baseW * 0.5, mouthCY - mouthRY);
      ctx.lineTo(tx, mouthCY - mouthRY + topLen);
      ctx.closePath(); ctx.fill();
      // Bottom row (points up).
      const botLen = mouthRY * (0.5 + toothRng() * 0.5);
      ctx.beginPath();
      ctx.moveTo(tx - baseW * 0.5, mouthCY + mouthRY);
      ctx.lineTo(tx + baseW * 0.5, mouthCY + mouthRY);
      ctx.lineTo(tx, mouthCY + mouthRY - botLen);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.restore();
}

function drawVoid(b) {
  ctx.save();
  // Dashed boundary at the exact repel-zone edge (radius*5). Rotates slowly
  // so the edge reads as an active force field.
  ctx.save();
  ctx.strokeStyle = 'rgba(100,0,180,0.3)';
  ctx.lineWidth = 1.4;
  ctx.setLineDash([8, 8]);
  ctx.lineDashOffset = -b.voidPulse * 10; // voidPulse advances each frame
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * 5, 0, 6.28); ctx.stroke();
  ctx.restore();
  // Expanding sonar-style pulse rings inside the boundary. 3 concentric
  // rings at 120deg phase offsets, oscillating between radius*1.5 and *3.5.
  ctx.strokeStyle = 'rgba(100,0,180,0.15)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const phase = b.voidPulse + i * 2.0944;
    const t = (Math.sin(phase) + 1) * 0.5;
    const rr = b.radius * (1.5 + 2 * t);
    ctx.beginPath(); ctx.arc(b.x, b.y, rr, 0, 6.28); ctx.stroke();
  }
  // Dark aura.
  const auraR = b.radius * 2;
  const aura = ctx.createRadialGradient(b.x, b.y, b.radius, b.x, b.y, auraR);
  aura.addColorStop(0, 'rgba(0,0,0,0.4)');
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(b.x, b.y, auraR, 0, 6.28); ctx.fill();
  // Pure black disc.
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.fill();
  // Cyan/white ring.
  ctx.strokeStyle = 'rgba(180,240,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.stroke();
  // Repel force arrows — short outward-pointing lines between void and player.
  if (b.voidRepellingPlayer) {
    const dx = player.x - b.x, dy = player.y - b.y;
    const d = Math.hypot(dx, dy) || 1;
    const nx = dx / d, ny = dy / d;
    // Place 5 arrows along the void→player segment, inside the repel zone.
    const inner = b.radius * 1.3;
    const outer = Math.min(d - 4, b.radius * 4.7);
    if (outer > inner) {
      ctx.save();
      ctx.strokeStyle = 'rgba(150,0,255,0.4)';
      ctx.fillStyle = 'rgba(150,0,255,0.4)';
      ctx.lineWidth = 1.4;
      const arrowCount = 5;
      const arrowLen = 12;
      for (let i = 0; i < arrowCount; i++) {
        const u = (i + 0.5) / arrowCount;
        const cx = b.x + nx * (inner + (outer - inner) * u);
        const cy = b.y + ny * (inner + (outer - inner) * u);
        const ex = cx + nx * arrowLen;
        const ey = cy + ny * arrowLen;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        // Arrowhead.
        const perpX = -ny, perpY = nx;
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex - nx * 4 + perpX * 2.5, ey - ny * 4 + perpY * 2.5);
        ctx.lineTo(ex - nx * 4 - perpX * 2.5, ey - ny * 4 - perpY * 2.5);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawHeart(b) {
  ctx.save();
  const s = b.heartScale || 1;
  // Asymmetric squeeze: top contracts while bottom expands (systolic feel).
  const squeeze = (s - 1) / 0.25; // 0-1 range
  const topScale = 1 - squeeze * 0.12;
  const botScale = 1 + squeeze * 0.18;
  const w = b.radius;

  // Glow behind.
  const glow = ctx.createRadialGradient(b.x, b.y, w * 0.3, b.x, b.y, w * 2.2);
  glow.addColorStop(0, `rgba(200,0,0,${0.25 + squeeze * 0.25})`);
  glow.addColorStop(1, 'rgba(120,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(b.x, b.y, w * 2.2, 0, 6.28); ctx.fill();

  // Aorta/artery tubes extending from top. 3 curved tubes.
  const arteryColor = '#6b0000';
  ctx.strokeStyle = arteryColor;
  ctx.lineCap = 'round';
  const arteries = [
    { offX: -w * 0.35, tipX: -w * 0.55, tipY: -w * 1.25, width: 6 },
    { offX:  0,        tipX:  w * 0.05, tipY: -w * 1.45, width: 8 },
    { offX:  w * 0.4,  tipX:  w * 0.6,  tipY: -w * 1.2,  width: 5 },
  ];
  for (const a of arteries) {
    ctx.lineWidth = a.width;
    ctx.beginPath();
    ctx.moveTo(b.x + a.offX, b.y - w * 0.7 * topScale);
    ctx.quadraticCurveTo(
      b.x + a.offX * 0.5, b.y - w * (1.0 + squeeze * 0.05),
      b.x + a.tipX, b.y + a.tipY * topScale
    );
    ctx.stroke();
  }

  // Irregular anatomical blob — draw via a closed path with jittered points.
  const rng = mulberry32(b.heartSeed);
  const points = 16;
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i < points; i++) {
    const u = i / points;
    const a = u * Math.PI * 2 - Math.PI / 2; // start at top
    // Asymmetric radius: contract top (sin(a) < 0), expand bottom.
    const verticalLean = -Math.sin(a); // +1 at top, -1 at bottom
    const asymScale = verticalLean > 0 ? topScale : botScale;
    // Slight lumpy irregularity, stable per body via seeded rng.
    const rng2 = mulberry32(b.heartSeed + i * 31);
    const lump = 0.88 + rng2() * 0.25;
    const rr = w * 1.05 * lump * asymScale;
    const px = b.x + Math.cos(a) * rr;
    const py = b.y + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.clip();
  // Fill: dark crimson gradient.
  const fill = ctx.createRadialGradient(b.x - w * 0.35, b.y - w * 0.3, 0, b.x, b.y, w * 1.2);
  fill.addColorStop(0, '#cc0000');
  fill.addColorStop(0.5, '#8b0000');
  fill.addColorStop(1, '#3d0000');
  ctx.fillStyle = fill;
  ctx.fillRect(b.x - w * 1.5, b.y - w * 1.5, w * 3, w * 3);

  // Branching surface veins.
  ctx.strokeStyle = 'rgba(60,0,0,0.85)';
  ctx.lineWidth = 1.3;
  const veinRng = mulberry32(b.heartSeed ^ 0xbeef);
  for (let i = 0; i < 7; i++) {
    const startA = veinRng() * Math.PI * 2;
    let x = b.x + Math.cos(startA) * w * 0.95;
    let y = b.y + Math.sin(startA) * w * 0.95;
    ctx.beginPath();
    ctx.moveTo(x, y);
    const segs = 3 + Math.floor(veinRng() * 3);
    let ang = startA + Math.PI + (veinRng() - 0.5) * 1.2;
    for (let s2 = 0; s2 < segs; s2++) {
      ang += (veinRng() - 0.5) * 1.4;
      const step = w * (0.25 + veinRng() * 0.35);
      x += Math.cos(ang) * step;
      y += Math.sin(ang) * step;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Small branch off.
    ctx.beginPath();
    ctx.moveTo(x, y);
    const brAng = ang + (veinRng() - 0.5) * 1.8;
    ctx.lineTo(x + Math.cos(brAng) * w * 0.25, y + Math.sin(brAng) * w * 0.25);
    ctx.stroke();
  }

  // Wet/glossy sheen on upper portion.
  ctx.globalAlpha = 0.45;
  const sheen = ctx.createRadialGradient(b.x - w * 0.3, b.y - w * 0.5, 0, b.x - w * 0.3, b.y - w * 0.5, w * 0.55);
  sheen.addColorStop(0, 'rgba(255,150,150,0.8)');
  sheen.addColorStop(0.6, 'rgba(255,120,120,0.25)');
  sheen.addColorStop(1, 'rgba(255,120,120,0)');
  ctx.fillStyle = sheen;
  ctx.fillRect(b.x - w * 1.5, b.y - w * 1.5, w * 3, w * 3);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Blood drops falling.
  for (const d of b.bloodDrops) {
    const t = d.age / d.maxAge;
    const dropY = b.y + w * 1.1 + t * w * 2.2;
    ctx.globalAlpha = 1 - t * 0.7;
    ctx.fillStyle = '#5a0000';
    ctx.beginPath();
    ctx.ellipse(b.x + d.offX, dropY, d.size, d.size * 1.6, 0, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawMirror(b) {
  ctx.save();
  // Chrome sphere: radial gradient from white highlight through silver to
  // dark edge, giving a metallic ball look.
  const chrome = ctx.createRadialGradient(
    b.x - b.radius * 0.35, b.y - b.radius * 0.35, 0,
    b.x, b.y, b.radius
  );
  chrome.addColorStop(0,    '#ffffff');
  chrome.addColorStop(0.25, '#d8d8d8');
  chrome.addColorStop(0.65, '#c0c0c0');
  chrome.addColorStop(0.9,  '#404040');
  chrome.addColorStop(1,    '#0a0a0a');
  ctx.fillStyle = chrome;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, 6.28); ctx.fill();

  // Reflected stars on the surface (clipped to disc).
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * 0.95, 0, 6.28); ctx.clip();
  const rng = mulberry32(b.mirrorSeed);
  for (let i = 0; i < 7; i++) {
    const rx = b.x + (rng() - 0.5) * b.radius * 1.4;
    const ry = b.y + (rng() - 0.5) * b.radius * 1.4;
    const rr = 0.6 + rng() * 1.1;
    ctx.globalAlpha = 0.6 + rng() * 0.35;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(rx, ry, rr, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Bright crescent highlight on upper-left.
  ctx.save();
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * 0.95, 0, 6.28); ctx.clip();
  const highlight = ctx.createRadialGradient(
    b.x - b.radius * 0.45, b.y - b.radius * 0.45, 0,
    b.x - b.radius * 0.2, b.y - b.radius * 0.2, b.radius * 0.6
  );
  highlight.addColorStop(0, 'rgba(255,255,255,0.95)');
  highlight.addColorStop(0.5, 'rgba(255,255,255,0.25)');
  highlight.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = highlight;
  ctx.beginPath(); ctx.arc(b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.55, 0, 6.28); ctx.fill();
  ctx.restore();

  // Dark rim for depth.
  ctx.strokeStyle = 'rgba(0,0,0,0.75)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius - 0.5, 0, 6.28); ctx.stroke();
  ctx.restore();
}

function drawSkull(b) {
  const r = b.radius;
  const pal = b.skullPalette || { top: '#3a6b38', mid: '#5a8a3c', low: '#6d5a30' };

  ctx.save();
  // Clip to disc so nothing leaks outside.
  ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, 6.28); ctx.clip();

  // Vertical gradient: planet colors at top transition to bone/dark at bottom.
  const vert = ctx.createLinearGradient(b.x, b.y - r, b.x, b.y + r);
  vert.addColorStop(0,    pal.top);
  vert.addColorStop(0.4,  pal.mid);
  vert.addColorStop(0.55, pal.low);
  vert.addColorStop(0.75, '#8a7d68');
  vert.addColorStop(1,    '#2a2218');
  ctx.fillStyle = vert;
  ctx.fillRect(b.x - r, b.y - r, r * 2, r * 2);

  // Subtle sphere shading — darken lower-right, brighten upper-left.
  const sphereShade = ctx.createRadialGradient(
    b.x - r * 0.3, b.y - r * 0.3, 0,
    b.x, b.y, r
  );
  sphereShade.addColorStop(0, 'rgba(255,255,255,0.22)');
  sphereShade.addColorStop(0.6, 'rgba(255,255,255,0)');
  sphereShade.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = sphereShade;
  ctx.fillRect(b.x - r, b.y - r, r * 2, r * 2);

  // Cloud-like lighter patches on the upper portion (multiple overlapping
  // semi-transparent circles).
  const rng = mulberry32(b.skullSeed);
  ctx.fillStyle = 'rgba(240,240,230,0.35)';
  for (let i = 0; i < 7; i++) {
    const a = (rng() - 0.5) * Math.PI; // confine to upper half mostly
    const yFrac = -0.55 + rng() * 0.6;
    const cx = b.x + (rng() - 0.5) * r * 1.6;
    const cy = b.y + yFrac * r;
    const cr = r * (0.1 + rng() * 0.22);
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, 6.28); ctx.fill();
  }

  // --- Skull face on the lower half ---
  const flash = b.skullEyeFlash > 0;

  // Eye sockets: irregular black cavities.
  const eyeOffX = r * 0.32;
  const eyeOffY = r * 0.05; // slightly below center
  for (const side of [-1, 1]) {
    const ex = b.x + side * eyeOffX;
    const ey = b.y + eyeOffY;
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(side * 0.22);
    // Deep black cavity.
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.19, r * 0.22, 0, 0, 6.28);
    ctx.fill();
    // Red glow when flashing.
    if (flash) {
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.22);
      glow.addColorStop(0, 'rgba(220,30,30,0.95)');
      glow.addColorStop(0.6, 'rgba(160,10,10,0.45)');
      glow.addColorStop(1, 'rgba(80,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.22, r * 0.24, 0, 0, 6.28);
      ctx.fill();
    }
    ctx.restore();
  }

  // Cheekbones: subtle highlight curves below the eye sockets.
  ctx.strokeStyle = 'rgba(230,220,200,0.5)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(b.x + side * r * 0.5, b.y + r * 0.18);
    ctx.quadraticCurveTo(
      b.x + side * r * 0.45, b.y + r * 0.35,
      b.x + side * r * 0.2,  b.y + r * 0.5
    );
    ctx.stroke();
  }

  // Nasal cavity: upside-down heart/triangle void in the center.
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(b.x, b.y + r * 0.55);
  ctx.quadraticCurveTo(b.x - r * 0.12, b.y + r * 0.45, b.x - r * 0.1, b.y + r * 0.3);
  ctx.quadraticCurveTo(b.x - r * 0.06, b.y + r * 0.22, b.x, b.y + r * 0.32);
  ctx.quadraticCurveTo(b.x + r * 0.06, b.y + r * 0.22, b.x + r * 0.1,  b.y + r * 0.3);
  ctx.quadraticCurveTo(b.x + r * 0.12, b.y + r * 0.45, b.x, b.y + r * 0.55);
  ctx.closePath();
  ctx.fill();

  // Teeth row: irregular triangular teeth.
  const toothRng = mulberry32(b.skullSeed ^ 0x7e5);
  const toothCount = 7;
  const toothBaseY = b.y + r * 0.72;
  const toothLen = r * 0.18;
  const toothStartX = b.x - r * 0.45;
  const toothSpan = r * 0.9;
  ctx.fillStyle = 'rgba(220,215,200,0.92)';
  for (let i = 0; i < toothCount; i++) {
    const tu = (i + 0.5) / toothCount;
    const tx = toothStartX + tu * toothSpan;
    const baseW = r * 0.085 * (0.85 + toothRng() * 0.3);
    const tlen = toothLen * (0.75 + toothRng() * 0.4);
    ctx.beginPath();
    ctx.moveTo(tx - baseW, toothBaseY);
    ctx.lineTo(tx + baseW, toothBaseY);
    ctx.lineTo(tx, toothBaseY + tlen);
    ctx.closePath();
    ctx.fill();
  }
  // Jaw line shadow beneath teeth.
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.ellipse(b.x, toothBaseY, r * 0.5, r * 0.06, 0, 0, 6.28);
  ctx.fill();

  ctx.restore();

  // Outer rim (drawn after the clipped interior so it sits on the edge).
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, 6.28); ctx.stroke();
}

// Tiny deterministic PRNG used for stable per-body random details (veins,
// cracks). Keyed off a seed on the body so the pattern doesn't jitter.
function mulberry32(seed) {
  let a = seed >>> 0;
  return function() {
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Crack fragments drawn as small glowing discs.
function drawCrackFragments() {
  for (const f of crackFragments) {
    const life = Math.max(0, f.life / f.maxLife);
    ctx.save();
    const glowR = f.radius * 3.5;
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, glowR);
    g.addColorStop(0, 'rgba(255,150,60,0.6)');
    g.addColorStop(1, 'rgba(255,100,40,0)');
    ctx.globalAlpha = life * 0.65;
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(f.x, f.y, glowR, 0, 6.28); ctx.fill();
    ctx.globalAlpha = life;
    ctx.fillStyle = '#ff8040';
    ctx.beginPath(); ctx.arc(f.x, f.y, f.radius * (0.7 + 0.3 * life), 0, 6.28); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// Orb-specific trail particles. Every orb (including cyan) emits behind the
// player. Intensity (spawn rate, size, opacity) scales with both the player's
// motion speed and the current scroll speed so faster play feels more visceral.
let orbTrailParticles = [];
const ORB_TRAIL_CAP = 200;

function emitOrbTrail() {
  if (state !== 'playing') return;
  const orb = activeOrb;
  const pvx = player.vx, pvy = player.vy;
  const moveMag = Math.hypot(pvx, pvy);
  const scroll = scrollSpeed();
  // Trail intensity formula per spec.
  const intensity = scroll * 0.3 + moveMag * 0.5;

  // Direction behind the player. If stationary, default to "below" (up the
  // scroll — planets fall down, so behind = above in screen space would be
  // wrong. Scroll falls toward y+, player sits low on screen, so behind in
  // the world is toward y+ (down). Use a safe fallback pointing upward in
  // movement space (-vx, -vy); when still, use straight down in screen space
  // to match the scroll.
  let bx, by;
  if (moveMag > 0.01) {
    bx = -pvx / moveMag;
    by = -pvy / moveMag;
  } else {
    bx = 0;
    by = 1;
  }
  const px = player.x + bx * (PLAYER_R + 2);
  const py = player.y + by * (PLAYER_R + 2);

  // Spawn count scales with intensity (at least one occasional particle even
  // when mostly still; many when moving fast).
  const spawnChance = Math.min(1, 0.35 + intensity * 0.12);
  const count = Math.random() < spawnChance ? 1 + Math.floor(intensity * 0.35) : 0;
  if (count <= 0) return;
  const sizeMul = 0.8 + Math.min(1.2, intensity * 0.12);
  const alphaMul = 0.7 + Math.min(0.3, intensity * 0.04);

  for (let i = 0; i < count; i++) {
    // Small jitter around the behind-player spawn point.
    const jx = px + (Math.random() - 0.5) * 8;
    const jy = py + (Math.random() - 0.5) * 8;

    const nowOt = Date.now();
    if (orb === 'cyan') {
      // fade 0.05/frame → 20 frames → 333ms
      pushCapped(orbTrailParticles, {
        kind: 'cyan',
        x: jx, y: jy,
        vx: bx * (0.3 + Math.random() * 0.6) + (Math.random() - 0.5) * 0.3,
        vy: by * (0.3 + Math.random() * 0.6) + (Math.random() - 0.5) * 0.3,
        life: 1, size: (2 + Math.random() * 2.4) * sizeMul,
        alphaMul, startTime: nowOt, maxLifeMs: 333,
      }, ORB_TRAIL_CAP);
    } else if (orb === 'cosmic') {
      // fade 0.025/frame → 40 frames → 667ms. Purple wisps drift sideways.
      pushCapped(orbTrailParticles, {
        kind: 'wisp',
        x: jx, y: jy,
        vx: bx * (0.4 + Math.random() * 0.6) + (Math.random() - 0.5) * 0.8,
        vy: by * (0.4 + Math.random() * 0.6) + (Math.random() - 0.5) * 0.4,
        drift: (Math.random() - 0.5) * 0.12, // sideways drift per frame
        life: 1, size: (2.5 + Math.random() * 2.5) * sizeMul,
        alphaMul, startTime: nowOt, maxLifeMs: 667,
      }, ORB_TRAIL_CAP);
    } else if (orb === 'solar') {
      // fade 0.055/frame → 18 frames → 300ms. Orange/red fire, flickers, fades fast.
      pushCapped(orbTrailParticles, {
        kind: 'fire',
        x: jx, y: jy,
        vx: bx * (0.5 + Math.random() * 0.9) + (Math.random() - 0.5) * 0.6,
        vy: by * (0.5 + Math.random() * 0.9) + (Math.random() - 0.5) * 0.6,
        life: 1, size: (3 + Math.random() * 3.5) * sizeMul,
        hue: Math.random() < 0.35 ? '255,210,80'
           : (Math.random() < 0.55 ? '255,120,40' : '255,80,30'),
        flicker: Math.random() * 6.28,
        alphaMul, startTime: nowOt, maxLifeMs: 300,
      }, ORB_TRAIL_CAP);
    } else if (orb === 'nebula') {
      // fade 0.045/frame → ~22 frames → 367ms. Blue speed lines.
      const len = (10 + Math.random() * 14) * sizeMul;
      pushCapped(orbTrailParticles, {
        kind: 'line',
        x: jx, y: jy,
        vx: bx * (0.9 + Math.random() * 0.8),
        vy: by * (0.9 + Math.random() * 0.8),
        dx: bx, dy: by, // streak direction = movement direction
        len,
        life: 1, alphaMul, startTime: nowOt, maxLifeMs: 367,
      }, ORB_TRAIL_CAP);
    } else if (orb === 'asteroid') {
      // fade 0.03/frame → 33 frames → 550ms. Grey rock fragments tumble.
      pushCapped(orbTrailParticles, {
        kind: 'rock',
        x: jx, y: jy,
        vx: bx * (0.3 + Math.random() * 0.7) + (Math.random() - 0.5) * 1.4,
        vy: by * (0.3 + Math.random() * 0.7) + (Math.random() - 0.5) * 1.4,
        life: 1, size: (2 + Math.random() * 2.5) * sizeMul,
        angle: Math.random() * 6.28, spin: (Math.random() - 0.5) * 0.3,
        alphaMul, startTime: nowOt, maxLifeMs: 550,
      }, ORB_TRAIL_CAP);
    }
  }
}

function updateOrbTrailParticles() {
  const nowOtu = Date.now();
  for (let i = orbTrailParticles.length - 1; i >= 0; i--) {
    const p = orbTrailParticles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.drift) p.x += p.drift;
    if (p.angle !== undefined) p.angle += p.spin;
    if (p.kind === 'fire') {
      p.vy -= 0.03; // fire curls upward as it fades
      if (p.flicker !== undefined) p.flicker += 0.3;
    }
    if (p.startTime !== undefined && p.maxLifeMs) {
      p.life = Math.max(0, 1 - (nowOtu - p.startTime) / p.maxLifeMs);
    } else {
      p.life -= p.fade || 0.03;
    }
    if (p.life <= 0) orbTrailParticles.splice(i, 1);
  }
}

function drawOrbTrailParticles() {
  if (!orbTrailParticles.length) return;
  const orbRgb = activeOrbColor();
  ctx.save();
  for (const p of orbTrailParticles) {
    const a = Math.max(0, p.life) * (p.alphaMul || 0.8);
    ctx.globalAlpha = a;
    if (p.kind === 'cyan' || p.kind === 'wisp') {
      ctx.fillStyle = `rgba(${orbRgb},1)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.5 + 0.5 * p.life), 0, 6.28);
      ctx.fill();
    } else if (p.kind === 'fire') {
      ctx.fillStyle = `rgba(${p.hue},1)`;
      const flick = 0.85 + Math.sin(p.flicker || 0) * 0.25;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.45 + 0.6 * p.life) * flick, 0, 6.28);
      ctx.fill();
    } else if (p.kind === 'line') {
      ctx.strokeStyle = `rgba(${orbRgb},1)`;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.dx * p.len, p.y - p.dy * p.len);
      ctx.stroke();
    } else if (p.kind === 'rock') {
      ctx.fillStyle = `rgba(${orbRgb},1)`;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      const s = p.size;
      ctx.beginPath();
      ctx.moveTo(-s, -s * 0.4);
      ctx.lineTo(s * 0.6, -s);
      ctx.lineTo(s, s * 0.3);
      ctx.lineTo(-s * 0.3, s);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// drawTrail now renders the orb particle stream only. The legacy cyan position
// trail was replaced per spec — every orb shares the same particle system.
function drawTrail() {
  drawOrbTrailParticles();
}

function drawPlayer() {
  const inGrace = Date.now() < graceEndTime;
  const gf = inGrace ? Math.sin(frame*0.26)*0.5+0.5 : 1;
  const shielded = activeEffects.shield > 0;
  const ghosting = activeEffects.ghost  > 0;
  const eternal = !!activeCombos.ghost_ghost;
  const phantomBlast = Date.now() < phantomBlastEndTime && ghosting;

  // Shield blink in last 1s of duration — ~12hz (83ms period pair) so the
  // player-perceived blink rate is the same at any framerate.
  let shieldVis = 1;
  if (shielded && activeEffects.shield < SHIELD_BLINK_MS) {
    shieldVis = (Math.floor(Date.now() / 83) % 2) ? 1 : 0.25;
  }

  // ETERNAL PHANTOM uses 30% opacity instead of 50%
  const ghostAlpha = ghosting ? (eternal ? 0.3 : 0.5) : 1;

  ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);

  // Shield outer aura (drawn behind the player so it haloes around)
  if (shielded) {
    ctx.globalAlpha = 0.55 * shieldVis;
    const sg = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*4.2);
    sg.addColorStop(0,'rgba(120,230,255,0.55)');
    sg.addColorStop(0.55,'rgba(80,200,255,0.28)');
    sg.addColorStop(1,'rgba(80,200,255,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*4.2,0,6.28); ctx.fill();
    ctx.globalAlpha = 0.85 * shieldVis;
    ctx.strokeStyle = 'rgba(180,240,255,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*3.6,0,6.28); ctx.stroke();
    ctx.globalAlpha = 0.4 * shieldVis;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*4.0,0,6.28); ctx.stroke();
    // Stack rings: one ring per shield hit point remaining. Asteroid orb uses
    // a stone/grey tone, default/fortress use cyan. Each ring sits at a
    // slightly larger radius.
    const hits = Math.min(shieldHits, 4);
    const asteroidRing = activeOrb === 'asteroid';
    const ringRgb = asteroidRing ? '200,195,185' : '120,255,255';
    const ringFadeRgb = asteroidRing ? '220,215,205' : '180,240,255';
    for (let i = 2; i <= hits; i++) {
      const r = PLAYER_R * (2.2 + (i - 2) * 0.5);
      ctx.globalAlpha = (0.95 - (i - 2) * 0.18) * shieldVis;
      ctx.strokeStyle = i === 2
        ? `rgba(${ringRgb},0.95)`
        : `rgba(${ringFadeRgb},0.85)`;
      ctx.lineWidth = i === 2 ? 1.6 : 1.2;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.stroke();
    }
  }
  // PHANTOM BLAST: red/orange damage aura around player
  if (phantomBlast) {
    const auraR = 120;
    const pulse = Math.sin(frame * 0.18) * 0.15 + 0.85;
    ctx.globalAlpha = 0.18 * pulse;
    const pg = ctx.createRadialGradient(0, 0, PLAYER_R, 0, 0, auraR);
    pg.addColorStop(0, 'rgba(255,140,60,0.55)');
    pg.addColorStop(0.6, 'rgba(255,80,40,0.18)');
    pg.addColorStop(1, 'rgba(255,60,20,0)');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(0,0,auraR,0,6.28); ctx.fill();
    ctx.globalAlpha = 0.55 * pulse;
    ctx.strokeStyle = 'rgba(255,120,50,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0,0,auraR,0,6.28); ctx.stroke();
  }

  // Ghost wispy aura: 3 concentric pulsing rings out of phase + soft purple halo
  if (ghosting) {
    const f1 = Math.sin(frame * 0.10)         * 0.5 + 0.5;
    const f2 = Math.sin(frame * 0.10 + 2.094) * 0.5 + 0.5; // +120deg
    const f3 = Math.sin(frame * 0.10 + 4.189) * 0.5 + 0.5; // +240deg

    // Soft purple gradient halo
    ctx.globalAlpha = 0.35;
    const gg = ctx.createRadialGradient(0, 0, PLAYER_R, 0, 0, PLAYER_R * 4.4);
    gg.addColorStop(0,   'rgba(190,110,240,0.5)');
    gg.addColorStop(0.5, 'rgba(170,90,220,0.22)');
    gg.addColorStop(1,   'rgba(170,90,220,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * 4.4, 0, 6.28); ctx.fill();

    // Inner ring
    ctx.globalAlpha = 0.55 + 0.3 * f1;
    ctx.strokeStyle = 'rgba(210,140,255,0.95)';
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * (2.0 + f1 * 0.45), 0, 6.28); ctx.stroke();

    // Middle ring
    ctx.globalAlpha = 0.4 + 0.25 * f2;
    ctx.strokeStyle = 'rgba(185,105,240,0.85)';
    ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * (3.0 + f2 * 0.55), 0, 6.28); ctx.stroke();

    // Outer ring
    ctx.globalAlpha = 0.28 + 0.2 * f3;
    ctx.strokeStyle = 'rgba(160,80,220,0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * (4.0 + f3 * 0.6), 0, 6.28); ctx.stroke();
  }

  if (inGrace) {
    ctx.globalAlpha = 0.28*gf*ghostAlpha;
    ctx.strokeStyle = '#4af'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*(2.4-gf*0.4),0,6.28); ctx.stroke();
  }

  // Stacked hyperspeed glow — added behind the regular cyan aura. Tint shifts
  // gold→orange→red as stacks climb; stack 4 layers a pulsing white core on
  // top so it visibly screams "danger".
  if (hyperSpeedStacks > 0 && hyperspeedCurrentMult > 1.05) {
    const tint = hyperStackTint(hyperSpeedStacks);
    const intensity = (hyperspeedCurrentMult - 1) / 2;
    ctx.globalAlpha = 0.55 * intensity * ghostAlpha;
    const hg = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*3.8);
    hg.addColorStop(0,   `rgba(${tint.r},${tint.g},${tint.b},0.75)`);
    hg.addColorStop(0.5, `rgba(${tint.r},${tint.g},${tint.b},0.25)`);
    hg.addColorStop(1,   `rgba(${tint.r},${tint.g},${tint.b},0)`);
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*3.8,0,6.28); ctx.fill();
    if (tint.white) {
      const pulse = (Math.sin(frame * 0.3) + 1) * 0.5;
      ctx.globalAlpha = (0.45 + 0.45 * pulse) * intensity * ghostAlpha;
      const wg = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*1.9);
      wg.addColorStop(0, 'rgba(255,255,255,0.9)');
      wg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = wg;
      ctx.beginPath(); ctx.arc(0,0,PLAYER_R*1.9,0,6.28); ctx.fill();
    }
  }

  const orbColor = getOrbBonus().color;
  ctx.globalAlpha = (inGrace?gf:1) * ghostAlpha;
  const aura = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*2.8);
  aura.addColorStop(0,`rgba(${orbColor},0.38)`); aura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(0,0,PLAYER_R*2.8,0,6.28); ctx.fill();

  ctx.globalAlpha = ghostAlpha;
  const core = ctx.createRadialGradient(-1.5,-1.5,0,0,0,PLAYER_R);
  core.addColorStop(0,'#fff');
  core.addColorStop(0.4,`rgba(${orbColor},1)`);
  core.addColorStop(1,`rgba(${orbColor},0.45)`);
  ctx.fillStyle = core; ctx.beginPath(); ctx.arc(0,0,PLAYER_R,0,6.28); ctx.fill();

  const spd = Math.hypot(player.vx, player.vy);
  if (spd > 0.9) {
    ctx.globalAlpha = Math.min(spd/4,0.55) * ghostAlpha;
    ctx.strokeStyle = `rgba(${orbColor},0.85)`;
    ctx.lineWidth = 1.8; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-player.vx*2.8,-player.vy*2.8); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

function drawPairTethers() {
  const drawn = new Set();
  for (const p of powerups) {
    if (!p.pairSibling || p.collected) continue;
    const key = Math.min(p.pairId, p.pairSibling.pairId) + '_' + Math.max(p.pairId, p.pairSibling.pairId);
    if (drawn.has(key)) continue;
    drawn.add(key);
    const q = p.pairSibling;
    if (q.collected) continue;
    const rgb1 = POWERUP_COLORS[p.type].rgb;
    const rgb2 = POWERUP_COLORS[q.type].rgb;
    // Mixed color by averaging
    const mix = rgb1.split(',').map((n, i) => Math.round((+n + +rgb2.split(',')[i]) / 2)).join(',');
    const pulse = Math.sin(frame * 0.18) * 0.3 + 0.7;
    const segments = 6;
    ctx.save();
    // Outer glow beam
    ctx.globalAlpha = 0.35 * pulse;
    ctx.strokeStyle = `rgba(${mix},0.9)`;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
    // Inner bright beam
    ctx.globalAlpha = 0.85 * pulse;
    ctx.strokeStyle = `rgba(${mix},1)`;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
    // Energy particles travelling along the beam
    for (let i = 0; i < segments; i++) {
      const t = ((frame * 0.02 + i / segments) % 1);
      const ex = p.x + (q.x - p.x) * t;
      const ey = p.y + (q.y - p.y) * t;
      ctx.globalAlpha = (1 - Math.abs(t - 0.5) * 2) * 0.9;
      ctx.fillStyle = `rgba(${mix},1)`;
      ctx.beginPath(); ctx.arc(ex, ey, 2.2, 0, 6.28); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function drawPowerups() {
  drawPairTethers();
  for (const p of powerups) {
    const pulse = Math.sin(p.pulse) * 0.35 + 0.65;
    const r = p.radius * (0.95 + Math.sin(p.pulse) * 0.18);
    const rgb = POWERUP_COLORS[p.type].rgb;

    // Outer pulsing halo
    ctx.globalAlpha = 0.55 * pulse;
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3.4);
    grd.addColorStop(0, `rgba(${rgb},0.65)`);
    grd.addColorStop(0.5, `rgba(${rgb},0.22)`);
    grd.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 3.4, 0, 6.28); ctx.fill();

    // Bright inner ring
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = `rgba(${rgb},0.9)`;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 1.55, 0, 6.28); ctx.stroke();

    // Icon
    ctx.globalAlpha = 1;
    ctx.fillStyle = `rgba(${rgb},1)`;
    ctx.strokeStyle = `rgba(${rgb},1)`;
    ctx.lineWidth = 1.8;

    if (p.type === 'shield') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - r);
      ctx.lineTo(p.x + r*0.78, p.y);
      ctx.lineTo(p.x, p.y + r);
      ctx.lineTo(p.x - r*0.78, p.y);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.28, 0, 6.28); ctx.fill();
    } else if (p.type === 'nova') {
      // Concentric burst rings
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.42, 0, 6.28); ctx.fill();
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.78, 0, 6.28); ctx.stroke();
      ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*1.12, 0, 6.28); ctx.stroke();
    } else if (p.type === 'hyperspeed') {
      // Lightning bolt / arrow pointing up
      ctx.beginPath();
      ctx.moveTo(p.x + r*0.15, p.y - r*0.95);
      ctx.lineTo(p.x - r*0.45, p.y + r*0.1);
      ctx.lineTo(p.x - r*0.05, p.y + r*0.1);
      ctx.lineTo(p.x - r*0.15, p.y + r*0.95);
      ctx.lineTo(p.x + r*0.45, p.y - r*0.1);
      ctx.lineTo(p.x + r*0.05, p.y - r*0.1);
      ctx.closePath(); ctx.fill();
    } else { // ghost
      // Wispy round head with three "feet" tails
      ctx.beginPath();
      ctx.arc(p.x, p.y - r*0.15, r*0.85, Math.PI, 0);
      ctx.lineTo(p.x + r*0.85, p.y + r*0.65);
      ctx.lineTo(p.x + r*0.5,  p.y + r*0.35);
      ctx.lineTo(p.x + r*0.15, p.y + r*0.65);
      ctx.lineTo(p.x - r*0.15, p.y + r*0.35);
      ctx.lineTo(p.x - r*0.5,  p.y + r*0.65);
      ctx.lineTo(p.x - r*0.85, p.y + r*0.35);
      ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x - r*0.28, p.y - r*0.2, r*0.13, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x + r*0.28, p.y - r*0.2, r*0.13, 0, 6.28); ctx.fill();
    }

    // Target indicator when powerup is closest body
    if (p === closestBody && state === 'playing') {
      const orbRgb = getOrbBonus().color;
      const lineColor = leftDown ? 'rgba(80,200,255,' : rightDown ? 'rgba(255,120,80,' : `rgba(${orbRgb},`;
      ctx.globalAlpha = 0.55 + 0.25*Math.sin(frame*0.18);
      ctx.strokeStyle = lineColor+'0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,r*1.55+5+Math.sin(frame*0.18)*2,0,6.28); ctx.stroke();
      if (leftDown || rightDown) {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = lineColor+'0.8)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(p.x,p.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.globalAlpha = 1;
  }
}

function drawNovaRings() {
  for (const r of novaRings) {
    const rm = r.radiusMult || 1;
    const drawR = r.radius * rm;
    const innerR = Math.max(0, drawR - 20);
    const sn = r.supernova;
    const innerCol = sn ? '255,80,80' : '255,160,60';
    const outerCol = sn ? '255,60,60' : '255,200,90';
    ctx.globalAlpha = r.life * 0.5;
    ctx.strokeStyle = `rgba(${innerCol},${r.life * 0.7})`;
    ctx.lineWidth = 10;
    ctx.beginPath(); ctx.arc(r.x, r.y, innerR, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = r.life * 0.85;
    ctx.strokeStyle = `rgba(${outerCol},${r.life})`;
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(r.x, r.y, drawR, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = r.life * 0.35;
    ctx.lineWidth = 18;
    ctx.beginPath(); ctx.arc(r.x, r.y, drawR, 0, 6.28); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPlanetRipples() {
  for (const r of planetRipples) {
    ctx.globalAlpha = r.life * 0.7;
    ctx.strokeStyle = `rgba(220,150,255,${r.life})`;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.baseR + r.expand, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = r.life * 0.35;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.baseR + r.expand * 1.6, 0, 6.28); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawEmpRings() {
  if (!empRings.length) return;
  const now = Date.now();
  const maxLifeMs = 400; // dome expansion window — everything keyed off this
  for (const r of empRings) {
    const age = now - r.startTime;
    const life = Math.max(0, Math.min(1, age / maxLifeMs)); // 0..1 progress
    const fade = (1 - life) * (r.opacity != null ? r.opacity : 1);
    const ringMax = r.maxRadius != null ? r.maxRadius : EMP_MAX_RADIUS;

    ctx.save();
    ctx.translate(r.x, r.y);

    // 1) GROUND SHOCKWAVE — faint squashed ellipse beneath the dome so it
    // feels grounded. Expands horizontally faster than vertically.
    if (life < 1) {
      const gx = 40 + life * 180;
      const gy = 10 + life * 45;
      ctx.save();
      ctx.globalAlpha = 0.08 * fade;
      ctx.fillStyle = 'rgba(100,220,255,1)';
      ctx.beginPath();
      ctx.ellipse(0, 18, gx, gy, 0, 0, 6.28);
      ctx.fill();
      ctx.restore();
    }

    // 2) EXPANDING DOME RING — inner and outer concentric circles with a
    // semi-transparent cyan fill between them. Ring sized per-burst so chain
    // (secondary) bursts read as smaller.
    const outerR = 20 + life * (ringMax - 20);
    const innerR = Math.max(0, outerR - 20);
    // Ring-fill band (draw outer-filled then punch out inner via even-odd).
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(100,220,255,0.15)';
    ctx.beginPath();
    ctx.arc(0, 0, outerR, 0, 6.28);
    ctx.arc(0, 0, innerR, 0, 6.28, true);
    ctx.fill('evenodd');
    ctx.restore();
    // Outer stroke — bright cyan.
    ctx.globalAlpha = fade;
    ctx.strokeStyle = 'rgba(100,220,255,0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, outerR, 0, 6.28); ctx.stroke();
    // Inner stroke — white edge.
    ctx.globalAlpha = fade * 0.75;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, innerR, 0, 6.28); ctx.stroke();

    // 3) LIGHTNING BOLTS — from center to dome edge, flicker every 3 frames.
    // Fade over first 0.3s (life < 0.75 at maxLifeMs=400).
    const boltT = Math.min(1, age / 300);
    const boltFade = 1 - boltT;
    if (boltFade > 0 && r.bolts) {
      // Re-randomize offsets on a 3-frame cycle so bolts visibly flicker.
      const flickerTick = Math.floor(frame / 3);
      const rng = mulberry32((r.startTime & 0xffff) ^ flickerTick);
