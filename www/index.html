<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DRIFT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
  }

  #gameWrapper {
    position: relative;
    width: 400px;
    height: 700px;
  }

  canvas {
    display: block;
    border-radius: 4px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #score {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.9);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100,200,255,0.8);
  }

  #powerupTimer {
    position: absolute;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    pointer-events: none;
  }
  #powerupTimer.visible { display: flex; }
  .pt-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
  .pt-bar {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .pt-fill {
    height: 100%;
    width: 100%;
    border-radius: 2px;
  }
  .pt-combo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-shadow: 0 0 8px currentColor;
    margin-top: 2px;
    display: none;
  }
  .pt-combo.visible { display: block; }

  #hintLeft, #hintRight {
    position: absolute;
    bottom: 80px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  #hintLeft { left: 20px; }
  #hintRight { right: 20px; }

  #highscores {
    display: none;
    margin-bottom: 16px;
    width: 220px;
    max-height: 180px;
    overflow-y: auto;
  }
  .hs-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
  }
  .hs-row:first-child { color: rgba(100,200,255,0.9); }
  .hs-rank { color: rgba(255,255,255,0.25); margin-right: 12px; }
  .hs-val { flex: 1; text-align: right; margin-right: 10px; }
  .hs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    min-width: 48px;
    text-align: right;
  }
  .hs-diff.HARD { color: rgba(255,180,80,0.7); }
  .hs-diff.EXTREME { color: rgba(255,90,120,0.85); }

  #difficultySelect {
    display: flex;
    gap: 8px;
    margin-bottom: 36px;
  }
  .diff-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.45);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .diff-btn:hover {
    color: rgba(255,255,255,0.8);
    border-color: rgba(255,255,255,0.4);
  }
  .diff-btn.selected {
    border-color: rgba(100,200,255,0.9);
    color: rgba(100,220,255,1);
    background: rgba(100,200,255,0.08);
    box-shadow: 0 0 14px rgba(100,200,255,0.25);
  }
  .diff-btn.selected[data-diff="HARD"] {
    border-color: rgba(255,180,80,0.9);
    color: rgba(255,200,100,1);
    background: rgba(255,180,80,0.08);
    box-shadow: 0 0 14px rgba(255,180,80,0.25);
  }
  .diff-btn.selected[data-diff="EXTREME"] {
    border-color: rgba(255,90,120,0.95);
    color: rgba(255,120,150,1);
    background: rgba(255,90,120,0.1);
    box-shadow: 0 0 16px rgba(255,90,120,0.3);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.88);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    transition: opacity 0.6s;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.6s, visibility 0s 0.6s;
  }

  .title-word {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 16px;
    background: linear-gradient(135deg, #4af, #a4f, #4af);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 3s ease infinite;
    margin-bottom: 6px;
  }

  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 48px;
    text-transform: uppercase;
  }

  .controls-hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 2;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .controls-hint span {
    color: rgba(100,200,255,0.9);
  }

  #updateBanner {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0,0,10,0.55);
    border: 1px solid rgba(100,200,255,0.35);
    border-radius: 3px;
    padding: 8px 14px;
    margin: 0 auto 24px auto;
    cursor: pointer;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
  }
  #updateBanner.visible { display: inline-flex; }
  #updateBanner:hover {
    background: rgba(100,200,255,0.12);
    border-color: rgba(100,200,255,0.7);
    box-shadow: 0 0 18px rgba(100,200,255,0.2);
  }
  .ub-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(140,220,255,0.9);
    text-transform: uppercase;
  }
  .ub-close {
    background: transparent;
    border: none;
    color: rgba(140,220,255,0.55);
    font-size: 11px;
    line-height: 1;
    padding: 0 2px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .ub-close:hover {
    color: rgba(180,240,255,1);
  }

  #startBtn {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,200,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    padding: 14px 36px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #startBtn:hover {
    background: rgba(100,200,255,0.1);
    border-color: rgba(100,200,255,0.9);
    box-shadow: 0 0 30px rgba(100,200,255,0.3);
  }

  #streakDisplay {
    position: absolute;
    top: 58px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(255,200,80,0.9);
    text-shadow: 0 0 10px rgba(255,180,60,0.5);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  #streakDisplay.visible { opacity: 1; }

  #runSummary {
    display: none;
    width: 260px;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }
  .rs-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.85);
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 16px rgba(100,200,255,0.5);
  }
  .rs-row {
    display: flex;
    padding: 1px 0;
  }
  .rs-label { color: rgba(255,255,255,0.4); flex: 1; }
  .rs-val { color: rgba(255,255,255,0.7); width: 30px; text-align: right; }
  .rs-pts { color: rgba(255,255,255,0.35); font-size: 8px; text-align: right; width: 48px; }
  .rs-sep {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 4px 0;
  }
  .rs-total {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    letter-spacing: 2px;
  }
  .rs-total .rs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    margin-left: 6px;
  }
  .rs-diff.NORMAL { color: rgba(100,200,255,0.8); }
  .rs-diff.HARD { color: rgba(255,180,80,0.8); }
  .rs-diff.EXTREME { color: rgba(255,90,120,0.85); }

  .lb-diff-tabs {
    display: none;
    gap: 0;
    width: 220px;
    margin-bottom: 4px;
  }
  .lb-diff-tab {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    padding: 3px 0;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .lb-diff-tab:first-child { border-radius: 2px 0 0 2px; }
  .lb-diff-tab:last-child { border-radius: 0 2px 2px 0; border-left: none; }
  .lb-diff-tab:not(:first-child):not(:last-child) { border-left: none; }
  .lb-diff-tab.active[data-diff="NORMAL"] {
    color: rgba(100,200,255,0.9);
    border-color: rgba(100,200,255,0.4);
    background: rgba(100,200,255,0.06);
  }
  .lb-diff-tab.active[data-diff="HARD"] {
    color: rgba(255,200,100,0.9);
    border-color: rgba(255,180,80,0.4);
    background: rgba(255,180,80,0.06);
  }
  .lb-diff-tab.active[data-diff="EXTREME"] {
    color: rgba(255,120,150,0.9);
    border-color: rgba(255,90,120,0.4);
    background: rgba(255,90,120,0.06);
  }

  #deathScore {
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
    display: none;
  }

  #pauseBtn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,10,0.35);
    border: 1px solid rgba(100,200,255,0.25);
    border-radius: 4px;
    color: rgba(100,200,255,0.6);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
  }

  #settingsBtn {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,10,0.35);
    border: 1px solid rgba(100,200,255,0.25);
    border-radius: 4px;
    color: rgba(100,200,255,0.85);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 25;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
    padding: 0;
  }
  #settingsBtn:hover {
    background: rgba(100,200,255,0.12);
    border-color: rgba(100,200,255,0.7);
    color: rgba(100,200,255,1);
    box-shadow: 0 0 18px rgba(100,200,255,0.25);
  }

  #settingsOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.92);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    z-index: 28;
  }
  #settingsOverlay.visible { display: flex; }
  .settings-rows {
    display: flex;
    flex-direction: column;
    gap: 22px;
    width: 260px;
    margin-bottom: 36px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .settings-label {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(100,200,255,0.85);
  }
  .settings-toggle {
    display: flex;
    gap: 4px;
    border: 1px solid rgba(100,200,255,0.35);
    border-radius: 3px;
    padding: 2px;
  }
  .toggle-opt {
    background: transparent;
    border: none;
    color: rgba(100,200,255,0.55);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .toggle-opt:hover {
    color: rgba(100,200,255,0.9);
  }
  .toggle-opt.active {
    background: rgba(100,200,255,0.18);
    color: rgba(180,240,255,1);
    box-shadow: 0 0 10px rgba(100,200,255,0.25);
  }
  #pauseBtn.visible { display: flex; }
  #pauseBtn:hover {
    background: rgba(100,200,255,0.12);
    border-color: rgba(100,200,255,0.7);
    color: rgba(100,200,255,0.95);
    box-shadow: 0 0 18px rgba(100,200,255,0.25);
  }

  #pauseOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.88);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    z-index: 20;
  }
  #pauseOverlay.visible { display: flex; }

  .pause-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #4af, #a4f, #4af);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 3s ease infinite;
    margin-bottom: 40px;
  }

  .pause-menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 220px;
  }

  .pause-btn {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.4);
    color: rgba(100,200,255,0.85);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .pause-btn:hover {
    background: rgba(100,200,255,0.1);
    border-color: rgba(100,200,255,0.9);
    box-shadow: 0 0 20px rgba(100,200,255,0.25);
  }

  #quitMsg {
    display: none;
    margin-top: 26px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    text-transform: uppercase;
  }

  /* Username prompt overlay */
  #usernameOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.94);
    backdrop-filter: blur(10px);
    border-radius: 4px;
    z-index: 30;
  }
  #usernameOverlay.visible { display: flex; }
  .username-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(100,200,255,0.9);
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  #usernameInput {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(100,200,255,0.4);
    color: rgba(255,255,255,0.9);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 12px 18px;
    width: 240px;
    text-align: center;
    outline: none;
    border-radius: 2px;
    margin-bottom: 18px;
  }
  #usernameInput:focus {
    border-color: rgba(100,200,255,0.8);
    box-shadow: 0 0 20px rgba(100,200,255,0.2);
  }
  #usernameInput::placeholder {
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }
  #usernameConfirm {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,200,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 32px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #usernameConfirm:hover {
    background: rgba(100,200,255,0.1);
    border-color: rgba(100,200,255,0.9);
    box-shadow: 0 0 24px rgba(100,200,255,0.3);
  }
  #usernameConfirm:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* Leaderboard tabs */
  .lb-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 4px;
    width: 220px;
  }
  .lb-tab {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.35);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 4px 0;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .lb-tab:first-child { border-radius: 2px 0 0 2px; }
  .lb-tab:last-child { border-radius: 0 2px 2px 0; border-left: none; }
  .lb-tab.active {
    color: rgba(100,200,255,0.9);
    border-color: rgba(100,200,255,0.5);
    background: rgba(100,200,255,0.08);
  }
  #globalScores {
    width: 220px;
    display: none;
    margin-bottom: 16px;
    max-height: 180px;
    overflow-y: auto;
  }
  .gs-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
  }
  .gs-row.self { color: rgba(100,220,255,0.95); }
  .gs-rank { color: rgba(255,255,255,0.25); margin-right: 10px; min-width: 18px; }
  .gs-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .gs-val { text-align: right; margin-left: 10px; }
  .gs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    min-width: 48px;
    text-align: right;
    margin-left: 6px;
  }
  .gs-diff.HARD { color: rgba(255,180,80,0.7); }
  .gs-diff.EXTREME { color: rgba(255,90,120,0.85); }
  .gs-status {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 16px 0;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c" width="400" height="700"></canvas>
  <div id="ui">
    <div id="score">0</div>
    <div id="powerupTimer">
      <div class="pt-label" id="ptLabel">SHIELD</div>
      <div class="pt-bar"><div class="pt-fill" id="ptFill"></div></div>
      <div class="pt-combo" id="ptCombo"></div>
    </div>
    <div id="streakDisplay"></div>
    <div id="hintLeft">◀ ATTRACT</div>
    <div id="hintRight">REPEL ▶</div>
  </div>
  <div id="overlay">
    <div class="title-word">DRIFT</div>
    <div class="subtitle">gravity surfing</div>
    <div id="difficultySelect">
      <button class="diff-btn selected" data-diff="NORMAL">NORMAL</button>
      <button class="diff-btn" data-diff="HARD">HARD</button>
      <button class="diff-btn" data-diff="EXTREME">EXTREME</button>
    </div>
    <div id="deathScore"></div>
    <div id="runSummary"></div>
    <div class="lb-tabs" id="lbTabs" style="display:none">
      <button class="lb-tab active" data-tab="local">LOCAL</button>
      <button class="lb-tab" data-tab="global">GLOBAL</button>
    </div>
    <div class="lb-diff-tabs" id="lbDiffTabs">
      <button class="lb-diff-tab" data-diff="NORMAL">NORMAL</button>
      <button class="lb-diff-tab" data-diff="HARD">HARD</button>
      <button class="lb-diff-tab" data-diff="EXTREME">EXTREME</button>
    </div>
    <div id="highscores"></div>
    <div id="globalScores"></div>

<script>
const GAME_VERSION = '1.2.0';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;

// Offscreen nebula canvas — nebula is repainted every NEBULA_UPDATE_INTERVAL
// frames instead of every frame, and drawn via drawImage in drawBg.
const nebulaCanvas = document.createElement('canvas');
nebulaCanvas.width = W; nebulaCanvas.height = H;
const nebulaCtx = nebulaCanvas.getContext('2d');
const NEBULA_UPDATE_INTERVAL = 120;
let nebulaRenderedFrame = -1; // force first render

const PLAYER_R = 6;
const GRACE_FRAMES = 90;
const BODY_SPACING = 290;
const FORCE = 0.18;

// --- Difficulty ---
const DIFFICULTIES = {
  NORMAL:  { startSpeed: 1.0, maxSpeed: 2.2, speedCapScore: 300, maxBodies: 4, powerupFrequency: 1.0 },
  HARD:    { startSpeed: 1.3, maxSpeed: 3.0, speedCapScore: 250, maxBodies: 6, powerupFrequency: 1.3 },
  EXTREME: { startSpeed: 1.6, maxSpeed: 4.0, speedCapScore: 200, maxBodies: 8, powerupFrequency: 1.8 },
};
let difficulty = 'NORMAL';
function diff() { return DIFFICULTIES[difficulty]; }

let state = 'idle', score = 0, frame = 0, planetsPassed = 0;
let player = {}, bodies = [], trail = [], bgStars = [], deathParticles = [];
let leftDown = false, rightDown = false;
let closestBody = null;

// Streak scoring
let destroyStreak = 0;
let runStats = { totalPassed: 0, totalDestroyed: 0, pointsFromPassing: 0, pointsFromDestroying: 0, longestStreak: 0, powerupsUsed: 0 };

// --- Powerups ---
const POWERUP_TYPES = ['shield','nova','hyperspeed','ghost'];
const POWERUP_COLORS = {
  shield:     { rgb: '120,230,255', name: 'cyan' },
  nova:       { rgb: '255,180,80',  name: 'orange' },
  hyperspeed: { rgb: '255,220,60',  name: 'gold' },
  ghost:      { rgb: '200,120,255', name: 'purple' },
};
let powerups = [];
let novaRings = [];
let screenShake = 0;
let pickupParticles = [];
let planetRipples = [];
let pendingNovaTimeouts = [];
// Hard caps on visual-effect arrays. Exceeding these on Android at high
// scores (lots of combos firing) can crash the tab — cap aggressively and
// drop oldest elements on overflow.
const NOVA_RINGS_CAP    = 20;
const PICKUP_PART_CAP   = 200;
const PLANET_RIPPLE_CAP = 50;
const DEATH_PART_CAP    = 60;
function pushCapped(arr, item, cap) {
  if (arr.length >= cap) arr.shift();
  arr.push(item);
}
let activeEffects = { shield: 0, hyperspeed: 0, ghost: 0 };
let lastPowerupSpawn = 0;
const SHIELD_DURATION = 900;        // 15s @ 60fps
const HYPERSPEED_DURATION = 360;    // 6s base
const HYPERSPEED_COMBO_DURATION = 480; // 8s for warp time / spectral rush
const GHOST_DURATION  = 480;        // 8s
const GHOST_ETERNAL_DURATION = 960; // 16s for eternal phantom
const SHIELD_BLINK_FRAMES = 180;    // last 3s blink

// Hyperspeed state
let hyperspeedTargetSpeed = 0;    // the normal speed to decelerate back to
let hyperspeedCurrentMult = 1;    // current speed multiplier (peaks then decays to 1)
let hyperspeedPeakMult = 1;       // this instance's peak multiplier
let hyperspeedActiveDuration = HYPERSPEED_DURATION; // duration used for deceleration curve
let hyperspeedWhooshNodes = null; // audio nodes for sustained whoosh

// Shield hitpoints (fortress shield = 2)
let shieldHits = 1;

// --- Combos ---
const COMBO_DEFS = {
  nova_nova:        { name: 'SUPERNOVA',       color: '255,80,80',    labelColor: 'rgba(255,120,120,0.95)' },
  nova_hyperspeed:  { name: 'WARP TIME',       color: '255,180,40',   labelColor: 'rgba(255,200,80,0.95)' },
  nova_ghost:       { name: 'PHANTOM BLAST',   color: '255,140,60',   labelColor: 'rgba(255,160,80,0.95)' },
  nova_shield:      { name: 'PULSAR',          color: '180,255,220',  labelColor: 'rgba(180,255,220,0.95)' },
  hyperspeed_ghost: { name: 'SPECTRAL RUSH',   color: '230,200,255',  labelColor: 'rgba(230,200,255,0.95)' },
  hyperspeed_shield:{ name: 'JUGGERNAUT',      color: '255,200,100',  labelColor: 'rgba(255,200,100,0.95)' },
  ghost_shield:     { name: 'WRAITH',          color: '160,100,255',  labelColor: 'rgba(180,140,255,0.95)' },
  ghost_ghost:      { name: 'ETERNAL PHANTOM', color: '110,40,180',   labelColor: 'rgba(160,80,230,0.95)' },
  shield_shield:    { name: 'FORTRESS SHIELD', color: '120,255,255',  labelColor: 'rgba(120,255,255,0.95)' },
};
// Active combo state: map key -> { framesLeft (for purely-timed combos like supernova), ... }
let activeCombos = {};
// Pulsar automatic nova scheduling
let pulsarNovaTimer = 0;
// Warp time automatic nova scheduling
let warpTimeNovaTimer = 0;
// Supernova sequencing
let supernovaQueue = [];
// Phantom blast flag: turns ghost into a damage aura
let phantomBlastFrames = 0;
// Juggernaut pending shield refresh (when hyperspeed ends)
let juggernautPendingShieldRefresh = false;
// Fortress shield tracking
let fortressShield = false;

// Shield break tracking
let shieldBroken = false;

// --- Audio (procedural Web Audio synthesis) ---
// Self-contained module. All sounds synthesized on demand. Errors are
// swallowed so audio failures never crash gameplay. Init lazily on the
// first user gesture so we don't trip the autoplay policy.
//
// Signal graph:
//   (per-sfx node chains) ──▶ sfxGain  ─┐
//                                       ├─▶ masterGain ──▶ destination
//   (music layer chains)  ──▶ musicGain ┘
//
// sfxGain and musicGain are toggled independently by the settings overlay.
const SFX = (function() {
  let ctx = null;
  let masterGain = null, musicGain = null, sfxGain = null;
  let initialized = false;

  // Persisted settings: music and SFX enabled toggles.
  let musicEnabled = true, sfxEnabled = true;
  try {
    const m = localStorage.getItem('drift_music_enabled');
    if (m !== null) musicEnabled = m !== '0' && m !== 'false';
    const s = localStorage.getItem('drift_sfx_enabled');
    if (s !== null) sfxEnabled = s !== '0' && s !== 'false';
  } catch {}

  const MUSIC_GAIN_VALUE = 0.4;
  const SFX_GAIN_VALUE   = 1.0;

  // Throttle trackers use ctx.currentTime (audio-clock seconds), NOT game
  // frame numbers — frame counters reset on game restart, which would make
  // `frame - lastFrame` negative and silently disable the throttle.
  let lastAttract = -100, lastRepel = -100;
  const ATTRACT_THROTTLE = 0.13;
  const REPEL_THROTTLE   = 0.13;

  // --- Music state (audio file playback) ---
  let musicPlaying = false;          // true when a track is actively scheduled
  let musicBuffer = null;            // decoded AudioBuffer for assets/music.mp3
  let musicLoading = null;           // in-flight load promise (dedupes concurrent loads)
  let currentMusicSource = null;     // active AudioBufferSourceNode
  let currentMusicSourceGain = null; // per-source gain (used for crossfades)
  let crossfadeTimer = null;         // setTimeout handle for the next crossfade
  const MUSIC_CROSSFADE = 2.0;       // seconds of overlap at the loop point

  function init() {
    if (initialized) return;
    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;
      ctx = new Ctor();

      masterGain = ctx.createGain();
      masterGain.gain.value = 1;
      masterGain.connect(ctx.destination);

      musicGain = ctx.createGain();
      musicGain.gain.value = musicEnabled ? MUSIC_GAIN_VALUE : 0;
      musicGain.connect(masterGain);

      sfxGain = ctx.createGain();
      sfxGain.gain.value = sfxEnabled ? SFX_GAIN_VALUE : 0;
      sfxGain.connect(masterGain);

      initialized = true;
    } catch {}
  }

  // Aggressively try to bring the AudioContext into the running state.
  // Handles 'suspended' (Chrome autoplay) and 'interrupted' (iOS).
  function ensureRunning() {
    // Android WebView occasionally closes the AudioContext out from under us
    // when the app is backgrounded, leaving us with a permanently broken ctx.
    // Detect that and rebuild from scratch instead of leaving audio dead.
    if (initialized && ctx && ctx.state === 'closed') {
      initialized = false;
      ctx = null;
      masterGain = musicGain = sfxGain = null;
      // Drop the cached music source/timer so the fresh context can re-arm.
      if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
      currentMusicSource = null;
      currentMusicSourceGain = null;
      musicPlaying = false;
    }
    if (!initialized) init();
    if (!ctx) return false;
    if (ctx.state !== 'running') {
      try { ctx.resume(); } catch {}
    }
    return true;
  }

  // Suspend/resume the AudioContext itself — used by the visibilitychange
  // handler so Android doesn't kill the audio thread while the app is
  // backgrounded. These are no-ops if the context isn't built yet.
  function suspendCtx() {
    if (!ctx) return;
    try { ctx.suspend(); } catch {}
  }
  function resumeCtx() {
    if (!ctx) return;
    try { ctx.resume(); } catch {}
  }

  function safeSfx(fn) {
    if (!sfxEnabled) return;
    if (!ensureRunning()) return;
    try { fn(ctx.currentTime); } catch {}
  }

  // When a node ends, disconnect it and any related nodes so orphan
  // branches don't accumulate during long sessions.
  function killOnEnd(node, ...others) {
    if (!node) return;
    node.onended = () => {
      try { node.disconnect(); } catch {}
      for (const n of others) { try { n.disconnect(); } catch {} }
      node.onended = null;
    };
  }

  function resetThrottles() {
    lastAttract = -100;
    lastRepel = -100;
  }

  // --- Settings API ---
  function setMusicEnabled(on) {
    musicEnabled = !!on;
    try { localStorage.setItem('drift_music_enabled', on ? '1' : '0'); } catch {}
    if (musicGain && ctx) {
      try {
        const t = ctx.currentTime;
        musicGain.gain.cancelScheduledValues(t);
        musicGain.gain.setValueAtTime(musicGain.gain.value, t);
        musicGain.gain.linearRampToValueAtTime(on ? MUSIC_GAIN_VALUE : 0, t + 0.08);
      } catch {}
    }
  }
  function setSfxEnabled(on) {
    sfxEnabled = !!on;
    try { localStorage.setItem('drift_sfx_enabled', on ? '1' : '0'); } catch {}
    if (sfxGain && ctx) {
      try {
        const t = ctx.currentTime;
        sfxGain.gain.cancelScheduledValues(t);
        sfxGain.gain.setValueAtTime(sfxGain.gain.value, t);
        sfxGain.gain.linearRampToValueAtTime(on ? SFX_GAIN_VALUE : 0, t + 0.05);
      } catch {}
    }
  }
  function isMusicEnabled() { return musicEnabled; }
  function isSfxEnabled()   { return sfxEnabled; }

  // Tiny noise buffer factory
  function noiseBuffer(durationSec, shape) {
    const len = Math.max(1, Math.floor(ctx.sampleRate * durationSec));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const env = shape ? shape(i / len) : 1;
      data[i] = (Math.random() * 2 - 1) * env;
    }
    return buf;
  }

  // ---- one-shot sound effects ----
  //
  // Helpers below keep the per-cue functions short. Every node ends up wired
  // through sfxGain so the SFX toggle mutes everything uniformly, and every
  // schedule call ends in killOnEnd to stop nodes accumulating.

  // Single staccato note — used for chiptune jingles and combo fanfares.
  function chipNote(freq, start, dur, vol, type) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, g);
  }

  // Frequency-swept single oscillator — used for booms, zaps, drops.
  function chipSweep(type, fStart, fEnd, start, dur, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(fStart, start);
    o.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, g);
  }

  // Bandpass noise burst — explosions and crunches.
  function noiseBurst(start, dur, centerHz, q, vol, fadeShape) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, fadeShape || (x => 1 - x));
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = centerHz;
    f.Q.value = q;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Highpass shimmer — bright noise tail for jingles.
  function shimmer(start, dur, vol, hp) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, x => 1 - x);
    const f = ctx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = hp;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Slow-attack sine voice with long decay — ghost dimensional tone.
  function ghostVoice(freq, start, attack, decay, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + attack);
    g.gain.exponentialRampToValueAtTime(0.001, start + decay);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + decay + 0.05);
    killOnEnd(o, g);
  }

  // Cinematic 4-layer nova explosion — sub boom, mid noise, high crack, pitch
  // drop. `vScale` lets Supernova play the same shape 30% louder on each layer.
  function novaBoom(t, vScale) {
    const s = vScale || 1;
    // Layer 1: massive sub boom — sine 40→15hz, 0.4s, vol 0.5.
    chipSweep('sine', 40, 15, t, 0.4, 0.5 * s);
    // Layer 2: mid explosion — bandpass noise centered at 250hz (covers
    // ~100-400hz), 0.3s, vol 0.45.
    noiseBurst(t, 0.3, 250, 0.85, 0.45 * s, x => Math.pow(1 - x, 1.0));
    // Layer 3: high crack — highpass noise 2000hz, 0.1s, vol 0.25.
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(0.1, x => 1 - x);
    const hf = ctx.createBiquadFilter();
    hf.type = 'highpass'; hf.frequency.value = 2000;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.25 * s, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    n.connect(hf); hf.connect(ng); ng.connect(sfxGain);
    n.start(t); n.stop(t + 0.12);
    killOnEnd(n, hf, ng);
    // Layer 4: pitch drop — square 200→30hz, 0.2s, vol 0.3.
    chipSweep('square', 200, 30, t, 0.2, 0.3 * s);
  }

  function attract(_frame) {
    safeSfx(t => {
      // Throttled at ~8 frames @ 60fps via ATTRACT_THROTTLE (0.13s).
      if (t - lastAttract < ATTRACT_THROTTLE) return;
      lastAttract = t;
      // Short low pulse — sine 110hz, 0.06s, soft attack. Subtle gravity hum.
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 110;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.07, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o.connect(g); g.connect(sfxGain);
      o.start(t); o.stop(t + 0.08);
      killOnEnd(o, g);
    });
  }

  function repel(_frame) {
    safeSfx(t => {
      // Throttled at ~8 frames @ 60fps via REPEL_THROTTLE (0.13s).
      if (t - lastRepel < REPEL_THROTTLE) return;
      lastRepel = t;
      // Sharp zap — square 440→220hz, 0.08s, snappy push.
      chipSweep('square', 440, 220, t, 0.08, 0.12);
    });
  }

  function pickup(type) {
    safeSfx(t => {
      if (type === 'shield') {
        // Classic SNES power-up jingle: ascending C5-E5-G5-C6 squares,
        // each 0.07s staccato, then a high-frequency shimmer burst.
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => chipNote(freq, t + i * 0.07, 0.07, 0.35, 'square'));
        shimmer(t + notes.length * 0.07, 0.1, 0.18, 6000);

      } else if (type === 'nova') {
        // Deep retro BOOM — square sub 60→30hz drop 0.2s, then a rising
        // noise sweep 100→3000hz over 0.3s. Charging up a massive weapon.
        chipSweep('square', 60, 30, t, 0.2, 0.4);
        const sweepStart = t + 0.05;
        const n = ctx.createBufferSource();
        n.buffer = noiseBuffer(0.32, x => 1 - x * 0.5);
        const f = ctx.createBiquadFilter();
        f.type = 'bandpass';
        f.Q.value = 1.5;
        f.frequency.setValueAtTime(100, sweepStart);
        f.frequency.exponentialRampToValueAtTime(3000, sweepStart + 0.3);
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0, sweepStart);
        ng.gain.linearRampToValueAtTime(0.28, sweepStart + 0.03);
        ng.gain.exponentialRampToValueAtTime(0.001, sweepStart + 0.3);
        n.connect(f); f.connect(ng); ng.connect(sfxGain);
        n.start(sweepStart); n.stop(sweepStart + 0.34);
        killOnEnd(n, f, ng);

      } else if (type === 'hyperspeed') {
        // Rapid ascending arpeggio A3-C4-E4-A4-C5-E5-A5, each 0.04s,
        // square. ENGAGING WARP DRIVE. (Sustained engine tone is owned
        // separately by startHyperspeedWhoosh.)
        const arp = [220.00, 261.63, 329.63, 440.00, 523.25, 659.25, 880.00];
        arp.forEach((freq, i) => chipNote(freq, t + i * 0.04, 0.05, 0.3, 'square'));

      } else if (type === 'ghost') {
        // Eerie descending tritone C5→F#4 on sines with slow attack and a
        // long dreamy decay, plus three echoes 80ms apart, each 40% of the
        // previous voice's volume. Phasing into another dimension.
        const notes = [523.25, 369.99]; // C5, F#4
        let vol = 0.25;
        for (let i = 0; i < 4; i++) {
          const start = t + i * 0.08;
          notes.forEach(freq => ghostVoice(freq, start, 0.15, 1.0, vol));
          vol *= 0.4;
        }
      }
    });
  }

  function planetDestroyed(kind) {
    safeSfx(t => {
      if (kind === 'shield') {
        // Crunchy retro explosion: bandpass noise 300-600hz 0.15s + a
        // square wave 80→40hz drop. Satisfying CRUNCH.
        noiseBurst(t, 0.15, 450, 1.5, 0.3, x => Math.pow(1 - x, 1.2));
        chipSweep('square', 80, 40, t, 0.1, 0.3);

      } else if (kind === 'ghost') {
        // Soft whomp: sine 200→60hz 0.2s + short high shimmer 2000→800hz.
        chipSweep('sine', 200, 60, t, 0.2, 0.18);
        chipSweep('sine', 2000, 800, t, 0.08, 0.12);

      } else if (kind === 'nova') {
        // MASSIVE cinematic explosion — 4 simultaneous layers (see novaBoom).
        novaBoom(t, 1);

      } else if (kind === 'barrier') {
        // Hyperspeed barrier kill: sharp square 300→60hz zap-crunch + a
        // short high-frequency noise burst. Machine-gun feel when chained.
        chipSweep('square', 300, 60, t, 0.1, 0.25);
        const n = ctx.createBufferSource();
        n.buffer = noiseBuffer(0.08, x => 1 - x);
        const f = ctx.createBiquadFilter();
        f.type = 'highpass'; f.frequency.value = 1500;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.22, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        n.connect(f); f.connect(ng); ng.connect(sfxGain);
        n.start(t); n.stop(t + 0.1);
        killOnEnd(n, f, ng);
      }
    });
  }

  function shieldBreak() {
    safeSfx(t => {
      // Sharp retro CRACK: square 800→100hz 0.1s + highpass noise burst.
      chipSweep('square', 800, 100, t, 0.1, 0.4);
      const n = ctx.createBufferSource();
      n.buffer = noiseBuffer(0.06, x => 1 - x);
      const f = ctx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 2000;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.3, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      n.connect(f); f.connect(ng); ng.connect(sfxGain);
      n.start(t); n.stop(t + 0.08);
      killOnEnd(n, f, ng);
    });
  }

  // Combo activate — every combo distinct, all at vol ~0.4.
  // Wired by activateCombo() in the game loop, keys must match COMBO_DEFS.
  function comboActivate(key) {
    safeSfx(t => {
      switch (key) {
        case 'nova_nova': {
          // SUPERNOVA: ascending C5-E5-G5-C6 fanfare + noise explosion.
          const fanfare = [523.25, 659.25, 783.99, 1046.50];
          fanfare.forEach((freq, i) => chipNote(freq, t + i * 0.06, 0.07, 0.4, 'square'));
          const expStart = t + fanfare.length * 0.06;
          noiseBurst(expStart, 0.3, 500, 1.0, 0.4, x => Math.pow(1 - x, 1.0));
          chipSweep('square', 80, 30, expStart, 0.3, 0.35);
          break;
        }
        case 'nova_hyperspeed': {
          // WARP TIME: rapid arpeggio up then down, A4-E5-A5-E5-A4.
          const arp = [440.00, 659.25, 880.00, 659.25, 440.00];
          arp.forEach((freq, i) => chipNote(freq, t + i * 0.05, 0.06, 0.4, 'square'));
          break;
        }
        case 'nova_ghost': {
          // PHANTOM BLAST: deep bass drop 60→30hz + eerie shimmer 3000→800hz.
          chipSweep('square', 60, 30, t, 0.3, 0.4);
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(3000, t);
          o.frequency.exponentialRampToValueAtTime(800, t + 0.3);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.18, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o.connect(g); g.connect(sfxGain);
          o.start(t); o.stop(t + 0.32);
          killOnEnd(o, g);
          break;
        }
        case 'nova_shield': {
          // PULSAR: rhythmic triple pulse C5-C5-C6 with 0.05s gaps.
          chipNote(523.25, t,        0.08, 0.4, 'square');
          chipNote(523.25, t + 0.13, 0.08, 0.4, 'square');
          chipNote(1046.50, t + 0.26, 0.08, 0.4, 'square');
          break;
        }
        case 'hyperspeed_ghost': {
          // SPECTRAL RUSH: ghost tritone + speed arpeggio layered.
          const ghostNotes = [523.25, 369.99];
          ghostNotes.forEach(freq => ghostVoice(freq, t, 0.1, 0.7, 0.28));
          const arp = [220.00, 261.63, 329.63, 440.00, 523.25, 659.25, 880.00];
          arp.forEach((freq, i) => chipNote(freq, t + i * 0.04, 0.05, 0.32, 'square'));
          break;
        }
        case 'hyperspeed_shield': {
          // JUGGERNAUT: heavy 80→40hz BOOM + shield jingle layered.
          chipSweep('square', 80, 40, t, 0.4, 0.4);
          const jingle = [523.25, 659.25, 783.99, 1046.50];
          jingle.forEach((freq, i) => chipNote(freq, t + i * 0.07, 0.07, 0.35, 'square'));
          break;
        }
        case 'ghost_shield': {
          // WRAITH: ghost descending tritone + shield shimmer noise.
          ghostVoice(523.25, t, 0.12, 0.8, 0.32);
          ghostVoice(369.99, t, 0.12, 0.8, 0.32);
          shimmer(t, 0.2, 0.25, 6000);
          break;
        }
        case 'ghost_ghost': {
          // ETERNAL PHANTOM: ghost sound 2x slower, an octave deeper, with
          // five echoing layers each 50% quieter than the previous.
          const notes = [261.63, 185.00]; // C4, F#3 — one octave down
          let vol = 0.4;
          for (let i = 0; i < 5; i++) {
            const start = t + i * 0.16;
            notes.forEach(freq => ghostVoice(freq, start, 0.3, 2.0, vol));
            vol *= 0.5;
          }
          break;
        }
        case 'shield_shield': {
          // FORTRESS SHIELD: shield jingle played twice in rapid succession.
          const jingle = [523.25, 659.25, 783.99, 1046.50];
          for (let pass = 0; pass < 2; pass++) {
            const passStart = t + pass * 0.32;
            jingle.forEach((freq, i) => chipNote(freq, passStart + i * 0.07, 0.07, 0.4, 'square'));
          }
          shimmer(t + 0.64, 0.12, 0.25, 6000);
          break;
        }
      }
    });
  }

  // Per-combo planet destruction sound — used in place of the regular
  // planetDestroyed() variant when a combo wants a beefier kill cue.
  // Currently only Supernova (nova_nova) overrides; everything else falls
  // back to the normal nova boom.
  function comboDestroySound(key) {
    safeSfx(t => {
      if (key === 'nova_nova') {
        // Same 4-layer nova boom, every layer 30% louder.
        novaBoom(t, 1.3);
      } else {
        novaBoom(t, 1);
      }
    });
  }

  // Sustained hyperspeed tone — separate from the pickup whoosh. Low
  // rumbling engine: 80hz sine fundamental + 160hz sine 2nd harmonic at
  // 0.4x, both through a lowpass (cutoff ~200hz, Q=2) modulated by a
  // 0.3hz LFO sweeping between 120 and 280hz for movement. Capped at
  // 0.08. Hard-stop (no fade) when hyperspeed ends.
  function startHyperspeedWhoosh() {
    if (!ensureRunning()) return null;
    if (!sfxEnabled) return null;
    try {
      const t = ctx.currentTime;
      const f = ctx.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.value = 200;
      f.Q.value = 2;

      // LFO sweeps cutoff 120..280hz. A ±80 gain around a 200hz base
      // gives that window.
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.type = 'sine';
      lfo.frequency.value = 0.3;
      lfoGain.gain.value  = 80;
      lfo.connect(lfoGain); lfoGain.connect(f.frequency);

      // Fundamental
      const o1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.type = 'sine'; o1.frequency.value = 80;
      g1.gain.value = 1;
      o1.connect(g1); g1.connect(f);

      // 2nd harmonic at 0.4x
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine'; o2.frequency.value = 160;
      g2.gain.value = 0.4;
      o2.connect(g2); g2.connect(f);

      // Master envelope for the sustained voice, capped at 0.08.
      const out = ctx.createGain();
      out.gain.setValueAtTime(0, t);
      out.gain.linearRampToValueAtTime(0.08, t + 0.12);
      f.connect(out); out.connect(sfxGain);

      o1.start(t); o2.start(t); lfo.start(t);
      return {
        stop() {
          try {
            const now = ctx.currentTime;
            out.gain.cancelScheduledValues(now);
            out.gain.setValueAtTime(0, now);
            o1.stop(now); o2.stop(now); lfo.stop(now);
            killOnEnd(o1, o2, lfo, lfoGain, g1, g2, f, out);
          } catch {}
        }
      };
    } catch {}
    return null;
  }

  function death() {
    safeSfx(t => {
      // Iconic chromatic descent: C5-B4-Bb4-A4-Ab4-G4-F#4-F4-E4-Eb4-D4-C4,
      // each note 0.08s on a square wave. Followed by a low 80hz sine
      // rumble that fades out over 0.5s.
      const notes = [
        523.25, 493.88, 466.16, 440.00, 415.30, 392.00,
        369.99, 349.23, 329.63, 311.13, 293.66, 261.63,
      ];
      notes.forEach((freq, i) => chipNote(freq, t + i * 0.08, 0.085, 0.45, 'square'));

      const rumbleStart = t + notes.length * 0.08;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 80;
      g.gain.setValueAtTime(0, rumbleStart);
      g.gain.linearRampToValueAtTime(0.4, rumbleStart + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, rumbleStart + 0.5);
      o.connect(g); g.connect(sfxGain);
      o.start(rumbleStart); o.stop(rumbleStart + 0.55);
      killOnEnd(o, g);
    });
  }

  // ---- Background music: file playback with seamless crossfade loop ----
  //
  // assets/music.mp3 is fetched once, decoded into an AudioBuffer, then played
  // through chained AudioBufferSourceNodes. Two seconds before the active
  // source ends we kick off a fresh source from offset 0 and equal-power
  // crossfade between the two so the loop point is inaudible.
  //
  // Each source has its own gain node so we can fade them independently.
  // They both feed into musicGain → masterGain → destination, matching the
  // existing audio routing.

  function loadMusicBuffer() {
    if (musicBuffer) return Promise.resolve(musicBuffer);
    if (musicLoading) return musicLoading;
    if (!ctx) return Promise.reject(new Error('no audio context'));
    // Path is relative to index.html — resolves to <base>/assets/music.mp3.
    const url = './assets/music.mp3';
    console.log('[music] fetching', url);
    musicLoading = fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('music.mp3 fetch failed: ' + r.status);
        return r.arrayBuffer();
      })
      .then(ab => new Promise((resolve, reject) => {
        // Use callback form for Safari compatibility.
        ctx.decodeAudioData(ab, resolve, reject);
      }))
      .then(buf => {
        musicBuffer = buf;
        console.log('[music] loaded', url, 'duration=' + buf.duration.toFixed(2) + 's');
        return buf;
      })
      .catch(err => {
        musicLoading = null;
        console.error('[music] load failed', url, err);
        throw err;
      });
    return musicLoading;
  }

  // Start a fresh source at full volume and arm the crossfade timer.
  function startMusicSource() {
    if (!ctx || !musicBuffer || !musicGain) return;
    const t = ctx.currentTime;
    const src = ctx.createBufferSource();
    src.buffer = musicBuffer;
    const g = ctx.createGain();
    g.gain.setValueAtTime(1, t);
    src.connect(g); g.connect(musicGain);
    try { src.start(t); } catch { return; }
    currentMusicSource = src;
    currentMusicSourceGain = g;
    armCrossfade(t);
  }

  // Schedule a setTimeout that fires MUSIC_CROSSFADE seconds before the
  // currently playing source ends, kicking off the next loop iteration.
  function armCrossfade(sourceStartTime) {
    if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
    if (!musicBuffer || !ctx) return;
    const fireAt = sourceStartTime + musicBuffer.duration - MUSIC_CROSSFADE;
    const delayMs = Math.max(0, (fireAt - ctx.currentTime) * 1000);
    crossfadeTimer = setTimeout(() => {
      crossfadeTimer = null;
      if (!musicPlaying) return;
      doCrossfade();
    }, delayMs);
  }

  function doCrossfade() {
    if (!ctx || !musicBuffer || !musicGain) return;
    const t = ctx.currentTime;

    // Fade the outgoing source out; stop it once silent.
    const oldSrc = currentMusicSource;
    const oldGain = currentMusicSourceGain;
    if (oldGain) {
      try {
        oldGain.gain.cancelScheduledValues(t);
        oldGain.gain.setValueAtTime(oldGain.gain.value, t);
        oldGain.gain.linearRampToValueAtTime(0, t + MUSIC_CROSSFADE);
      } catch {}
    }
    if (oldSrc) {
      try { oldSrc.stop(t + MUSIC_CROSSFADE + 0.05); } catch {}
      killOnEnd(oldSrc, oldGain);
    }

    // Start the new source from the top, fading in over the same window.
    const src = ctx.createBufferSource();
    src.buffer = musicBuffer;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(1, t + MUSIC_CROSSFADE);
    src.connect(g); g.connect(musicGain);
    try { src.start(t); } catch { return; }
    currentMusicSource = src;
    currentMusicSourceGain = g;
    armCrossfade(t);
  }

  function startMusic() {
    if (musicPlaying) return;
    if (!ensureRunning()) return;
    resetThrottles();
    musicPlaying = true;
    // Restore musicGain to its enabled target in case a previous stopMusic
    // (or pauseMusic) left it at 0.
    if (musicGain) {
      try {
        const t = ctx.currentTime;
        musicGain.gain.cancelScheduledValues(t);
        musicGain.gain.setValueAtTime(musicEnabled ? MUSIC_GAIN_VALUE : 0, t);
      } catch {}
    }
    loadMusicBuffer()
      .then(() => { if (musicPlaying) startMusicSource(); })
      .catch(() => {});
  }

  function stopMusic() {
    if (!musicPlaying) return;
    musicPlaying = false;
    if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
    if (!ctx) return;
    const t = ctx.currentTime;
    // 0.3s fade out on the source's own gain, then stop it cleanly.
    if (currentMusicSourceGain) {
      try {
        currentMusicSourceGain.gain.cancelScheduledValues(t);
        currentMusicSourceGain.gain.setValueAtTime(currentMusicSourceGain.gain.value, t);
        currentMusicSourceGain.gain.linearRampToValueAtTime(0, t + 0.3);
      } catch {}
    }
    if (currentMusicSource) {
      try { currentMusicSource.stop(t + 0.35); } catch {}
      killOnEnd(currentMusicSource, currentMusicSourceGain);
    }
    currentMusicSource = null;
    currentMusicSourceGain = null;
  }

  function pauseMusic() {
    if (!musicGain || !ctx) return;
    try {
      const t = ctx.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(0, t + 0.2);
    } catch {}
  }

  function resumeMusic() {
    if (!musicGain || !ctx) return;
    try {
      const t = ctx.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(musicEnabled ? MUSIC_GAIN_VALUE : 0, t + 0.3);
    } catch {}
  }

  return {
    init, attract, repel, pickup, planetDestroyed, death,
    shieldBreak, comboActivate, comboDestroySound, startHyperspeedWhoosh,
    startMusic, stopMusic, pauseMusic, resumeMusic,
    setMusicEnabled, setSfxEnabled, isMusicEnabled, isSfxEnabled,
    suspendCtx, resumeCtx,
  };
})();

// --- Highscores (localStorage, top 5) ---
// Schema: [{ score: number, difficulty: 'NORMAL'|'HARD'|'EXTREME' }, ...]
// Old schema (numbers) is migrated transparently.
function getScores() {
  try {
    const raw = JSON.parse(localStorage.getItem('drift_scores') || '[]');
    return raw.map(s => typeof s === 'number' ? { score: s, difficulty: 'NORMAL' } : s);
  } catch { return []; }
}
function saveScore(s, d) {
  const scores = getScores();
  scores.push({ score: s, difficulty: d });
  // Keep top 5 per difficulty (not 5 total) so one difficulty can't push out another
  const byDiff = {};
  for (const sc of scores) {
    (byDiff[sc.difficulty] = byDiff[sc.difficulty] || []).push(sc);
  }
  const kept = [];
  for (const arr of Object.values(byDiff)) {
    arr.sort((a,b) => b.score - a.score);
    kept.push(...arr.slice(0, 5));
  }
  kept.sort((a,b) => b.score - a.score);
  localStorage.setItem('drift_scores', JSON.stringify(kept));
  console.log('[drift] saved scores:', JSON.stringify(kept));
  return kept;
}
