      particles.push({ x: cx + (Math.random() - 0.5) * 20, y: cy + 14, vx: (Math.random() - 0.5) * 2, vy: 1.5 + Math.random() * 2, life: 1, size: 2 + Math.random() * 3, angle: Math.random() * 6.28, spin: (Math.random() - 0.5) * 0.2 });
    } else {
      particles.push({ x: cx + (Math.random() - 0.5) * 10, y: cy + 10, vx: (Math.random() - 0.5) * 1.5, vy: 1 + Math.random() * 2, life: 1, size: 2 + Math.random() * 3 });
    }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.025;
    if (p.angle !== undefined) p.angle += p.spin;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 40) particles.splice(0, particles.length - 40);

  orbPreviewCtx.save();
  for (const p of particles) {
    orbPreviewCtx.globalAlpha = p.life * 0.75;
    if (def.trail === 'nebula') {
      orbPreviewCtx.strokeStyle = `rgba(${color},1)`;
      orbPreviewCtx.lineWidth = 2;
      orbPreviewCtx.beginPath();
      orbPreviewCtx.moveTo(p.x, p.y);
      orbPreviewCtx.lineTo(p.x, p.y - (p.lineLen || 20));
      orbPreviewCtx.stroke();
    } else if (def.trail === 'asteroid') {
      orbPreviewCtx.fillStyle = `rgba(${color},1)`;
      orbPreviewCtx.save();
      orbPreviewCtx.translate(p.x, p.y);
      orbPreviewCtx.rotate(p.angle || 0);
      const s = p.size;
      orbPreviewCtx.beginPath();
      orbPreviewCtx.moveTo(-s, -s * 0.4);
      orbPreviewCtx.lineTo(s * 0.6, -s);
      orbPreviewCtx.lineTo(s, s * 0.3);
      orbPreviewCtx.lineTo(-s * 0.3, s);
      orbPreviewCtx.closePath();
      orbPreviewCtx.fill();
      orbPreviewCtx.restore();
    } else {
      orbPreviewCtx.fillStyle = `rgba(${color},1)`;
      orbPreviewCtx.beginPath();
      orbPreviewCtx.arc(p.x, p.y, p.size, 0, 6.28);
      orbPreviewCtx.fill();
    }
  }
  orbPreviewCtx.restore();

  // Orb aura + core
  orbPreviewCtx.save();
  orbPreviewCtx.globalAlpha = 0.55;
  const aura = orbPreviewCtx.createRadialGradient(cx, cy, 0, cx, cy, 48);
  aura.addColorStop(0, `rgba(${color},0.75)`);
  aura.addColorStop(0.5, `rgba(${color},0.25)`);
  aura.addColorStop(1, `rgba(${color},0)`);
  orbPreviewCtx.fillStyle = aura;
  orbPreviewCtx.beginPath(); orbPreviewCtx.arc(cx, cy, 48, 0, 6.28); orbPreviewCtx.fill();

  orbPreviewCtx.globalAlpha = 1;
  const core = orbPreviewCtx.createRadialGradient(cx - 5, cy - 5, 0, cx, cy, 20);
  core.addColorStop(0, '#fff');
  core.addColorStop(0.5, `rgba(${color},1)`);
  core.addColorStop(1, `rgba(${color},0.3)`);
  orbPreviewCtx.fillStyle = core;
  orbPreviewCtx.beginPath(); orbPreviewCtx.arc(cx, cy, 20, 0, 6.28); orbPreviewCtx.fill();
  orbPreviewCtx.restore();
}

function orbPreviewLoop() {
  try { drawOrbPreview(); } catch {}
  requestAnimationFrame(orbPreviewLoop);
}
orbPreviewLoop();

document.getElementById('orbPrev').addEventListener('click', () => {
  SFX.clickSecondary();
  orbBrowserIndex = (orbBrowserIndex - 1 + ORB_ORDER.length) % ORB_ORDER.length;
  refreshOrbBrowser();
});
document.getElementById('orbNext').addEventListener('click', () => {
  SFX.clickSecondary();
  orbBrowserIndex = (orbBrowserIndex + 1) % ORB_ORDER.length;
  refreshOrbBrowser();
});
refreshOrbBrowser();

document.getElementById('shopBtn').addEventListener('click', () => {
  SFX.clickSecondary();
  goToMainMenu();
});

// Settings overlay (replaces the old mute button)
const settingsBtn     = document.getElementById('settingsBtn');
const settingsOverlay = document.getElementById('settingsOverlay');
const pauseSettingsBtn = document.getElementById('pauseSettingsBtn');
const settingsCloseBtn = document.getElementById('settingsCloseBtn');

// Reflect current SFX/music state onto the toggle buttons.
function refreshSettingsUI() {
  const musicOn = SFX.isMusicEnabled();
  const sfxOn   = SFX.isSfxEnabled();
  settingsOverlay.querySelectorAll('.settings-toggle').forEach(group => {
    const setting = group.dataset.setting;
    const on = setting === 'music' ? musicOn : sfxOn;
    group.querySelectorAll('.toggle-opt').forEach(btn => {
      const want = btn.dataset.val === 'on';
      btn.classList.toggle('active', want === on);
    });
  });
}

function openSettings() {
  SFX.init();
  refreshSettingsUI();
  settingsOverlay.classList.add('visible');
}
function closeSettings() {
  settingsOverlay.classList.remove('visible');
}

settingsBtn.addEventListener('click', () => { SFX.clickSecondary(); openSettings(); });
pauseSettingsBtn.addEventListener('click', () => { SFX.clickSecondary(); openSettings(); });
settingsCloseBtn.addEventListener('click', () => { SFX.clickSecondary(); closeSettings(); });

settingsOverlay.addEventListener('click', e => {
  const btn = e.target.closest('.toggle-opt');
  if (!btn) return;
  const group = btn.closest('.settings-toggle');
  const setting = group.dataset.setting;
  const on = btn.dataset.val === 'on';
  SFX.init();
  SFX.clickSecondary();
  if (setting === 'music') SFX.setMusicEnabled(on);
  else if (setting === 'sfx') SFX.setSfxEnabled(on);
  refreshSettingsUI();
});

refreshSettingsUI();

// --- Play In-App Update ---
// Only runs on Android via the @capawesome/capacitor-app-update plugin.
// Flexible update: downloads in the background, installs when the player
// returns to the store or taps a follow-up CTA — never force-closes mid-game.
let updateCheckStarted = false;
async function checkPlayStoreUpdate() {
  if (updateCheckStarted) return;
  updateCheckStarted = true;
  const Cap = window.Capacitor;
  const AppUpdate = Cap && Cap.Plugins && Cap.Plugins.AppUpdate;
  if (!AppUpdate || !Cap.isNativePlatform || !Cap.isNativePlatform()) return;
  try {
    const info = await AppUpdate.getAppUpdateInfo();
    // 2 === UPDATE_AVAILABLE in AppUpdateAvailability enum.
    if (info && info.updateAvailability === 2 && info.flexibleUpdateAllowed) {
      await AppUpdate.startFlexibleUpdate();
      AppUpdate.addListener('onFlexibleUpdateStateChange', async state => {
        // 11 === DOWNLOADED in FlexibleUpdateInstallStatus.
        if (state && state.installStatus === 11) {
          try { await AppUpdate.completeFlexibleUpdate(); } catch {}
        }
      });
    }
  } catch (err) {
    console.warn('[update] check failed', err);
  }
}
if (state === 'idle') checkPlayStoreUpdate();

// Initialize the audio context on the very first user gesture so the
// browser autoplay policy is satisfied even if the player taps the canvas
// before clicking ENTER THE VOID.
function _firstAudioGesture() {
  SFX.init();
  document.removeEventListener('pointerdown', _firstAudioGesture, true);
  document.removeEventListener('touchstart',  _firstAudioGesture, true);
  document.removeEventListener('keydown',     _firstAudioGesture, true);
}
document.addEventListener('pointerdown', _firstAudioGesture, true);
document.addEventListener('touchstart',  _firstAudioGesture, true);
document.addEventListener('keydown',     _firstAudioGesture, true);

// --- Leaderboard tab switching ---
function isLocalTabActive() {
  const active = document.querySelector('.lb-tab.active');
  return active && active.dataset.tab === 'local';
}

document.getElementById('lbTabs').addEventListener('click', e => {
  const tab = e.target.closest('.lb-tab');
  if (!tab) return;
  SFX.clickSecondary();
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const isLocal = tab.dataset.tab === 'local';
  document.getElementById('highscores').style.display = isLocal ? 'block' : 'none';
  document.getElementById('globalScores').style.display = isLocal ? 'none' : 'block';
  // Re-render for current difficulty selection
  if (window._deathLbHandlers) {
    const diff = window._deathLbHandlers.getDifficulty();
    if (isLocal) window._deathLbHandlers.renderLocal(diff);
    else window._deathLbHandlers.fetchGlobal(diff);
  }
});

document.getElementById('lbDiffTabs').addEventListener('click', e => {
  const tab = e.target.closest('.lb-diff-tab');
  if (!tab || !window._deathLbHandlers) return;
  SFX.clickSecondary();
  const diff = tab.dataset.diff;
  document.querySelectorAll('.lb-diff-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  window._deathLbHandlers.setDifficulty(diff);
  // Re-render whichever tab is active
  if (isLocalTabActive()) {
    window._deathLbHandlers.renderLocal(diff);
  } else {
    window._deathLbHandlers.fetchGlobal(diff);
  }
});

// --- Username prompt ---
const usernameOverlay = document.getElementById('usernameOverlay');
const usernameInput = document.getElementById('usernameInput');
const usernameConfirm = document.getElementById('usernameConfirm');
let usernameCallback = null;

function showUsernamePrompt(onDone) {
  usernameCallback = onDone || null;
  usernameInput.value = getUsername();
  usernameConfirm.disabled = !usernameInput.value.length;
  usernameOverlay.classList.add('visible');
  usernameInput.focus();
}

usernameInput.addEventListener('input', () => {
  usernameInput.value = usernameInput.value.replace(/[^a-zA-Z0-9]/g, '');
  usernameConfirm.disabled = !usernameInput.value.length;
});

usernameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && usernameInput.value.length > 0) confirmUsername();
});

function confirmUsername() {
  const name = usernameInput.value.trim();
  if (!name) return;
  setUsername(name);
  usernameOverlay.classList.remove('visible');
  if (usernameCallback) usernameCallback();
  usernameCallback = null;
}

usernameConfirm.addEventListener('click', () => { SFX.clickPrimary(); confirmUsername(); });

// Show username prompt on first launch, then start
if (!getUsername()) {
  showUsernamePrompt();
}

// Bootstrap menu music on the user's first interaction. Browsers won't let
// us start audio before a gesture, so we wait for the first pointer or key
// event, then fire the menu track if we're still on the main menu.
function bootstrapMenuMusic() {
  document.removeEventListener('pointerdown', bootstrapMenuMusic);
  document.removeEventListener('keydown', bootstrapMenuMusic);
  document.removeEventListener('touchstart', bootstrapMenuMusic);
  try {
    SFX.init();
    if (state === 'idle') SFX.playTrack('menu', 0.5);
  } catch (err) {
    console.error('[bootstrapMenuMusic] failed', err);
  }
}
document.addEventListener('pointerdown', bootstrapMenuMusic);
document.addEventListener('keydown', bootstrapMenuMusic);
document.addEventListener('touchstart', bootstrapMenuMusic);

initBgStars(); initBodies(); loop();
</script>
