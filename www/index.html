<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DRIFT</title>
<script src="https://browser.sentry-cdn.com/7.99.0/bundle.min.js" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #00000a;
  }
  body {
    font-family: 'Orbitron', monospace;
  }

  #gameWrapper {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
  }

  @media (max-width: 380px) {
    .title-word { font-size: 52px; }
    #startBtn { font-size: 10px; }
    .diff-btn { font-size: 8px; }
    .controls-hint { font-size: 9px; }
    .subtitle { font-size: 8px; }
  }

  canvas {
    display: block;
    border-radius: 4px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #score {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.9);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100,200,255,0.8);
  }

  #runTimer {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.8);
    text-shadow: 0 0 12px rgba(255,255,255,0.4);
    pointer-events: none;
  }

  #powerupTimer {
    position: absolute;
    top: 104px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    pointer-events: none;
  }
  #powerupTimer.visible { display: flex; }
  .pt-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
  .pt-bar {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .pt-fill {
    height: 100%;
    width: 100%;
    border-radius: 2px;
  }
  .pt-combo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-shadow: 0 0 8px currentColor;
    margin-top: 2px;
    display: none;
  }
  .pt-combo.visible { display: block; }

  #hintLeft, #hintRight {
    position: absolute;
    bottom: 80px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  #hintLeft { left: 20px; }
  #hintRight { right: 20px; }

  #highscores {
    display: none;
    margin-bottom: 16px;
    width: 220px;
    max-height: 180px;
    overflow-y: auto;
  }
  .hs-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
  }
  .hs-row:first-child { color: rgba(100,200,255,0.9); }
  .hs-rank { color: rgba(255,255,255,0.25); margin-right: 12px; }
  .hs-val { flex: 1; text-align: right; margin-right: 10px; }
  .hs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    min-width: 48px;
    text-align: right;
  }
  .hs-diff.HARD { color: rgba(255,180,80,0.7); }
  .hs-diff.EXTREME { color: rgba(255,90,120,0.85); }

  #difficultySelect {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }

  #orbBrowser {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 26px;
    position: relative;
    width: 300px;
  }
  #orbCrystalBalance {
    position: absolute;
    top: -18px;
    right: 0;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(255,210,90,0.95);
    text-shadow: 0 0 10px rgba(255,200,60,0.45);
  }
  .orb-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .orb-arrow {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.55);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .orb-arrow:hover {
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.45);
  }
  #orbPreview {
    width: 120px;
    height: 120px;
    background: rgba(0,0,15,0.55);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  #orbPreview.locked::after {
    content: '🔒';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    color: rgba(255,255,255,0.65);
    text-shadow: 0 0 12px rgba(0,0,0,0.8);
  }
  #orbPreviewCanvas {
    width: 120px;
    height: 120px;
    display: block;
  }
  #orbPreview.locked #orbPreviewCanvas { opacity: 0.5; }
  #orbName {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.92);
    margin-top: 10px;
    text-transform: uppercase;
  }
  #orbDesc {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-align: center;
    max-width: 260px;
    line-height: 1.4;
  }
  #orbDots {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .orb-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .orb-dot.active { background: rgba(100,220,255,0.95); box-shadow: 0 0 6px rgba(100,200,255,0.6); }
  #orbAction {
    margin-top: 10px;
    min-height: 34px;
  }
  .orb-btn {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,220,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    padding: 9px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .orb-btn:hover { background: rgba(100,200,255,0.12); box-shadow: 0 0 16px rgba(100,200,255,0.25); }
  .orb-btn.equipped {
    border-color: rgba(100,200,255,0.5);
    color: rgba(100,220,255,0.7);
    cursor: default;
    background: rgba(100,200,255,0.06);
  }
  .orb-btn.unlock {
    border-color: rgba(255,200,60,0.75);
    color: rgba(255,220,120,0.95);
    text-shadow: 0 0 8px rgba(255,200,60,0.35);
  }
  .orb-btn.unlock:hover { background: rgba(255,200,60,0.12); box-shadow: 0 0 18px rgba(255,200,60,0.3); }
  .orb-btn.flash-err {
    animation: orbFlashErr 0.6s ease;
  }
  @keyframes orbFlashErr {
    0%,100% { color: rgba(255,220,120,0.95); border-color: rgba(255,200,60,0.75); }
    50% { color: rgba(255,120,120,1); border-color: rgba(255,100,100,1); }
  }

  #deathCrystals {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    color: rgba(255,220,120,0.95);
    text-shadow: 0 0 12px rgba(255,200,60,0.4);
    margin-bottom: 4px;
    display: none;
  }
  #deathCrystalTotal {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,210,90,0.75);
    margin-bottom: 10px;
    display: none;
  }
  #deathActions {
    display: none;
    gap: 10px;
    margin-top: 10px;
  }
  #shopBtn {
    background: transparent;
    border: 1px solid rgba(255,200,60,0.6);
    color: rgba(255,220,120,0.95);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #shopBtn:hover { background: rgba(255,200,60,0.12); box-shadow: 0 0 22px rgba(255,200,60,0.3); }
  .diff-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.45);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .diff-btn:hover {
    color: rgba(255,255,255,0.8);
    border-color: rgba(255,255,255,0.4);
  }
  .diff-btn.selected {
    border-color: rgba(100,200,255,0.9);
    color: rgba(100,220,255,1);
    background: rgba(100,200,255,0.08);
    box-shadow: 0 0 14px rgba(100,200,255,0.25);
  }
  .diff-btn.selected[data-diff="HARD"] {
    border-color: rgba(255,180,80,0.9);
    color: rgba(255,200,100,1);
    background: rgba(255,180,80,0.08);
    box-shadow: 0 0 14px rgba(255,180,80,0.25);
  }
  .diff-btn.selected[data-diff="EXTREME"] {
    border-color: rgba(255,90,120,0.95);
    color: rgba(255,120,150,1);
    background: rgba(255,90,120,0.1);
    box-shadow: 0 0 16px rgba(255,90,120,0.3);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.88);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    transition: opacity 0.6s;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.6s, visibility 0s 0.6s;
  }

  .title-word {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 16px;
    background: linear-gradient(135deg, #4af, #a4f, #4af);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 3s ease infinite;
    margin-bottom: 6px;
  }

  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 48px;
    text-transform: uppercase;
  }

  .controls-hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 2;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .controls-hint span {
    color: rgba(100,200,255,0.9);
  }

  #startBtn {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,200,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    padding: 14px 36px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #startBtn:hover {
    background: rgba(100,200,255,0.1);
    border-color: rgba(100,200,255,0.9);
    box-shadow: 0 0 30px rgba(100,200,255,0.3);
  }

  #streakDisplay {
    position: absolute;
    top: 84px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(255,200,80,0.9);
    text-shadow: 0 0 10px rgba(255,180,60,0.5);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  #streakDisplay.visible { opacity: 1; }

  #runSummary {
    display: none;
    width: 260px;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }
  .rs-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.85);
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 16px rgba(100,200,255,0.5);
  }
  .rs-row {
    display: flex;
    padding: 1px 0;
  }
  .rs-label { color: rgba(255,255,255,0.4); flex: 1; }
  .rs-val { color: rgba(255,255,255,0.7); width: 30px; text-align: right; }
  .rs-pts { color: rgba(255,255,255,0.35); font-size: 8px; text-align: right; width: 48px; }
  .rs-sep {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 4px 0;
  }
  .rs-total {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    letter-spacing: 2px;
  }
  .rs-total .rs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    margin-left: 6px;
  }
  .rs-diff.NORMAL { color: rgba(100,200,255,0.8); }
  .rs-diff.HARD { color: rgba(255,180,80,0.8); }
  .rs-diff.EXTREME { color: rgba(255,90,120,0.85); }

  .lb-diff-tabs {
    display: none;
    gap: 0;
    width: 220px;
    margin-bottom: 4px;
  }
  .lb-diff-tab {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    padding: 3px 0;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .lb-diff-tab:first-child { border-radius: 2px 0 0 2px; }
  .lb-diff-tab:last-child { border-radius: 0 2px 2px 0; border-left: none; }
  .lb-diff-tab:not(:first-child):not(:last-child) { border-left: none; }
  .lb-diff-tab.active[data-diff="NORMAL"] {
    color: rgba(100,200,255,0.9);
    border-color: rgba(100,200,255,0.4);
    background: rgba(100,200,255,0.06);
  }
  .lb-diff-tab.active[data-diff="HARD"] {
    color: rgba(255,200,100,0.9);
    border-color: rgba(255,180,80,0.4);
    background: rgba(255,180,80,0.06);
  }
  .lb-diff-tab.active[data-diff="EXTREME"] {
    color: rgba(255,120,150,0.9);
    border-color: rgba(255,90,120,0.4);
    background: rgba(255,90,120,0.06);
  }

  #deathScore {
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
    display: none;
  }

  #pauseBtn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,10,0.35);
    border: 1px solid rgba(100,200,255,0.25);
    border-radius: 4px;
    color: rgba(100,200,255,0.6);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
  }

  #settingsBtn {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,10,0.35);
    border: 1px solid rgba(100,200,255,0.25);
    border-radius: 4px;
    color: rgba(100,200,255,0.85);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 25;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
    padding: 0;
  }
  #settingsBtn:hover {
    background: rgba(100,200,255,0.12);
    border-color: rgba(100,200,255,0.7);
    color: rgba(100,200,255,1);
    box-shadow: 0 0 18px rgba(100,200,255,0.25);
  }

  #settingsOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.92);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    z-index: 28;
  }
  #settingsOverlay.visible { display: flex; }
  .settings-rows {
    display: flex;
    flex-direction: column;
    gap: 22px;
    width: 260px;
    margin-bottom: 36px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .settings-label {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(100,200,255,0.85);
  }
  .settings-toggle {
    display: flex;
    gap: 4px;
    border: 1px solid rgba(100,200,255,0.35);
    border-radius: 3px;
    padding: 2px;
  }
  .toggle-opt {
    background: transparent;
    border: none;
    color: rgba(100,200,255,0.55);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .toggle-opt:hover {
    color: rgba(100,200,255,0.9);
  }
  .toggle-opt.active {
    background: rgba(100,200,255,0.18);
    color: rgba(180,240,255,1);
    box-shadow: 0 0 10px rgba(100,200,255,0.25);
  }
  #pauseBtn.visible { display: flex; }
  #pauseBtn:hover {
    background: rgba(100,200,255,0.12);
    border-color: rgba(100,200,255,0.7);
    color: rgba(100,200,255,0.95);
    box-shadow: 0 0 18px rgba(100,200,255,0.25);
  }

  #pauseOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.88);
    backdrop-filter: blur(8px);
    border-radius: 4px;

  #pauseOverlay.visible { display: flex; }

  .pause-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #4af, #a4f, #4af);

  #quitMsg {

    margin-top: 26px;

    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);

  /* Username prompt overlay */
  #usernameOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    z-index: 30;
  }
  #usernameOverlay.visible { display: flex; }
  .username-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(100,200,255,0.9);
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  #usernameInput {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(100,200,255,0.4);
    color: rgba(255,255,255,0.9);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 12px 18px;
    width: 240px;

// --- Audio (procedural Web Audio synthesis) ---

//   (per-sfx node chains) ──▶ sfxGain  ─┐

//
// sfxGain and musicGain are toggled independently by the settings overlay.
const SFX = (function() {
  let ctx = null;
  let masterGain = null, musicGain = null, sfxGain = null;
  let initialized = false;

  // Persisted settings: music and SFX enabled toggles.
  let musicEnabled = true, sfxEnabled = true;

    const m = localStorage.getItem('drift_music_enabled');
    if (m !== null) musicEnabled = m !== '0' && m !== 'false';

  const SFX_GAIN_VALUE   = 1.0;

  const REPEL_THROTTLE   = 0.13;

  // lazily on first play and cached. The seamless 2-second loop crossfade
  // and track-switch crossfades share the same source-pair machinery.
  const MUSIC_TRACKS = ['menu', 'gameplay', 'results'];
  const musicBuffers = { menu: null, gameplay: null, results: null };
  const musicLoading = { menu: null, gameplay: null, results: null };

  // instead of procedural synths. Files loaded lazily on first touch, cached
  // here after decode. ghost keeps its synthesized sound.
  const SFX_BUFFER_URLS = {
    shieldDestroy:     './assets/SFX/SHIELD DESTROY.mp3',
    novaDestroy:       './assets/SFX/NOVA DESTROY.mp3',
    hyperspeedBarrier: './assets/SFX/HYPERSPEED BARRIER.mp3',
  };
  const sfxBuffers = { shieldDestroy: null, novaDestroy: null, hyperspeedBarrier: null };
  const sfxLoading = { shieldDestroy: null, novaDestroy: null, hyperspeedBarrier: null };
  let currentTrackName = null;       // null = no track playing
  let currentMusicSource = null;     // active AudioBufferSourceNode
  let currentMusicSourceGain = null; // per-source gain (used for crossfades)
  let crossfadeTimer = null;         // setTimeout handle for the next loop crossfade
  const MUSIC_CROSSFADE = 2.0;       // seconds of overlap at the loop point
  const PAUSE_DUCK_LEVEL = 0.2;      // pause "ducks" music to 20% of normal

    if (initialized) return;

      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;

      sfxGain.gain.value = sfxEnabled ? SFX_GAIN_VALUE : 0;
      sfxGain.connect(masterGain);

      // isn't delayed by fetch/decode. Failures are logged; playback
      // silently no-ops until a buffer is available.
      preloadSfxBuffers();
    } catch {}

  // Aggressively try to bring the AudioContext into the running state.

  function ensureRunning() {

    // when the app is backgrounded, leaving us with a permanently broken ctx.
    // Detect that and rebuild from scratch instead of leaving audio dead.
    if (initialized && ctx && ctx.state === 'closed') {
      initialized = false;
      ctx = null;
      masterGain = musicGain = sfxGain = null;
      // Drop the cached music source/timer so the fresh context can re-arm.
      if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
      currentMusicSource = null;
      currentMusicSourceGain = null;
      currentTrackName = null;
      // Decoded buffers are tied to the dead AudioContext — invalidate them
      // so the next playTrack() refetches against the new context.
      for (const k of MUSIC_TRACKS) {
        musicBuffers[k] = null;
        musicLoading[k] = null;
      }
      for (const k of Object.keys(SFX_BUFFER_URLS)) {
        sfxBuffers[k] = null;
        sfxLoading[k] = null;
      }
    }
    if (!initialized) init();
    if (!ctx) return false;
    if (ctx.state !== 'running') {
      try { ctx.resume(); } catch {}
    }
    return true;
  }

  // Suspend/resume the AudioContext itself — used by the visibilitychange
  // handler so Android doesn't kill the audio thread while the app is
  // backgrounded. These are no-ops if the context isn't built yet.
  function suspendCtx() {
    if (!ctx) return;
    try { ctx.suspend(); } catch {}
  }
  function resumeCtx() {
    if (!ctx) return;
    try { ctx.resume(); } catch {}
  }

  function safeSfx(fn) {
    if (!sfxEnabled) return;
    if (!ensureRunning()) return;
    try { fn(ctx.currentTime); } catch {}
  }

  // When a node ends, disconnect it and any related nodes so orphan
  // branches don't accumulate during long sessions.
  function killOnEnd(node, ...others) {
    if (!node) return;
    node.onended = () => {
      try { node.disconnect(); } catch {}
      for (const n of others) { try { n.disconnect(); } catch {} }
      node.onended = null;
    };
  }

  function resetThrottles() {
    lastAttract = -100;
    lastRepel = -100;
  }

  // --- Settings API ---
  function setMusicEnabled(on) {
    musicEnabled = !!on;
    try { localStorage.setItem('drift_music_enabled', on ? '1' : '0'); } catch {}
    // Bug fix: never restart playback here. Just adjust musicGain to whatever
    // the current target should be — which respects the pause duck so toggling
    // music off→on while paused returns to the ducked level, not full volume.
    setMusicGainTarget(currentMusicGainTarget(), 0.08);
  }
  function setSfxEnabled(on) {
    sfxEnabled = !!on;
    try { localStorage.setItem('drift_sfx_enabled', on ? '1' : '0'); } catch {}
    if (sfxGain && ctx) {
      try {
        const t = ctx.currentTime;
        sfxGain.gain.cancelScheduledValues(t);
        sfxGain.gain.setValueAtTime(sfxGain.gain.value, t);
        sfxGain.gain.linearRampToValueAtTime(on ? SFX_GAIN_VALUE : 0, t + 0.05);
      } catch {}
    }
  }
  function isMusicEnabled() { return musicEnabled; }
  function isSfxEnabled()   { return sfxEnabled; }

  // Tiny noise buffer factory
  function noiseBuffer(durationSec, shape) {
    const len = Math.max(1, Math.floor(ctx.sampleRate * durationSec));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const env = shape ? shape(i / len) : 1;
      data[i] = (Math.random() * 2 - 1) * env;
    }
    return buf;
  }

  // ---- one-shot sound effects ----
  //
  // Helpers below keep the per-cue functions short. Every node ends up wired
  // through sfxGain so the SFX toggle mutes everything uniformly, and every
  // schedule call ends in killOnEnd to stop nodes accumulating.

  // Single staccato note — used for chiptune jingles and combo fanfares.
  function chipNote(freq, start, dur, vol, type) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, g);
  }

  // Frequency-swept single oscillator — used for booms, zaps, drops.
  function chipSweep(type, fStart, fEnd, start, dur, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(fStart, start);
    o.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, g);
  }

  // Reusable tanh waveshaper for chiptune-explosion crunch. `amount` in the
  // 200-400 range effectively hard-clips the signal, turning a clean square
  // into a growly, distorted crunch.
  function makeDistortion(amount) {
    const ws = ctx.createWaveShaper();
    const n = 256;
    const curve = new Float32Array(n);
    const k = amount || 0;
    for (let i = 0; i < n; i++) {
      const x = (i * 2 / n) - 1;
      curve[i] = Math.tanh(k * x);
    }
    ws.curve = curve;
    ws.oversample = '2x';
    return ws;
  }

  // chipSweep routed through a waveshaper — the distorted version used for
  // the crunchy square-wave layers in planetDestroyed.
  function crunchSweep(type, fStart, fEnd, start, dur, vol, amount) {
    const o = ctx.createOscillator();
    const ws = makeDistortion(amount);
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(fStart, start);
    o.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(ws); ws.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, ws, g);
  }

  // Frequency-swept filtered noise — used for the "eerie high end" sweep
  // in the ghost destroy and similar effects.
  function sweepNoise(start, dur, filterType, fStart, fEnd, q, vol) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, x => 1 - x);
    const f = ctx.createBiquadFilter();
    f.type = filterType;
    if (typeof q === 'number') f.Q.value = q;
    f.frequency.setValueAtTime(fStart, start);
    f.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Bandpass noise burst — explosions and crunches.
  function noiseBurst(start, dur, centerHz, q, vol, fadeShape) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, fadeShape || (x => 1 - x));
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = centerHz;
    f.Q.value = q;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Highpass shimmer — bright noise tail for jingles.
  function shimmer(start, dur, vol, hp) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, x => 1 - x);
    const f = ctx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = hp;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Slow-attack sine voice with long decay — ghost dimensional tone.
  function ghostVoice(freq, start, attack, decay, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + attack);
    g.gain.exponentialRampToValueAtTime(0.001, start + decay);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + decay + 0.05);
    killOnEnd(o, g);
  }

  // Supernova/combo kill — plays the shared NOVA DESTROY clip at 0.85,
  // scaled by vScale so combos can punch harder (e.g. nova_nova at 1.3).
  function novaBoom(_t, vScale) {
    playSfxBuffer('novaDestroy', Math.min(1, 0.65 * (vScale || 1)));
  }

  function attract(_frame) {
    safeSfx(t => {
      // Throttled at ~8 frames @ 60fps via ATTRACT_THROTTLE (0.13s).
      if (t - lastAttract < ATTRACT_THROTTLE) return;
      lastAttract = t;
      // Short low pulse — sine 110hz, 0.06s, soft attack. Subtle gravity hum.
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 110;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.07, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o.connect(g); g.connect(sfxGain);
      o.start(t); o.stop(t + 0.08);
      killOnEnd(o, g);
    });
  }

  function repel(_frame) {
    safeSfx(t => {
      // Throttled at ~8 frames @ 60fps via REPEL_THROTTLE (0.13s).
      if (t - lastRepel < REPEL_THROTTLE) return;
      lastRepel = t;
      // Sharp zap — square 440→220hz, 0.08s, snappy push.
      chipSweep('square', 440, 220, t, 0.08, 0.12);
    });
  }

  function pickup(type, opts) {
    safeSfx(t => {
      if (type === 'shield') {
        // Classic SNES power-up jingle: ascending C5-E5-G5-C6 squares,
        // each 0.07s staccato, then a high-frequency shimmer burst.
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => chipNote(freq, t + i * 0.07, 0.07, 0.35, 'square'));
        shimmer(t + notes.length * 0.07, 0.1, 0.18, 6000);

      } else if (type === 'nova') {
        // Deep retro BOOM — square sub 60→30hz drop 0.2s, then a rising
        // noise sweep 100→3000hz over 0.3s. Charging up a massive weapon.
        chipSweep('square', 60, 30, t, 0.2, 0.4);
        const sweepStart = t + 0.05;
        const n = ctx.createBufferSource();
        n.buffer = noiseBuffer(0.32, x => 1 - x * 0.5);
        const f = ctx.createBiquadFilter();
        f.type = 'bandpass';
        f.Q.value = 1.5;
        f.frequency.setValueAtTime(100, sweepStart);
        f.frequency.exponentialRampToValueAtTime(3000, sweepStart + 0.3);
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0, sweepStart);
        ng.gain.linearRampToValueAtTime(0.28, sweepStart + 0.03);
        ng.gain.exponentialRampToValueAtTime(0.001, sweepStart + 0.3);
        n.connect(f); f.connect(ng); ng.connect(sfxGain);
        n.start(sweepStart); n.stop(sweepStart + 0.34);
        killOnEnd(n, f, ng);

      } else if (type === 'hyperspeed') {
        // Rapid ascending arpeggio A3-C4-E4-A4-C5-E5-A5, each 0.04s,
        // square. ENGAGING WARP DRIVE. (Sustained engine tone is owned
        // separately by startHyperspeedWhoosh.)
        // opts.stacks pitch-shifts the arpeggio so each additional stack
        // sounds slightly higher (1.0/1.2/1.4/1.6 for stacks 1/2/3/4).
        const stacks = (opts && opts.stacks) || 1;
        const pitchMult = 1 + 0.2 * (Math.max(1, stacks) - 1);
        const arp = [220.00, 261.63, 329.63, 440.00, 523.25, 659.25, 880.00];
        arp.forEach((freq, i) => chipNote(freq * pitchMult, t + i * 0.04, 0.05, 0.3, 'square'));

      } else if (type === 'ghost') {
        // Eerie descending tritone C5→F#4 on sines with slow attack and a
        // long dreamy decay, plus three echoes 80ms apart, each 40% of the
        // previous voice's volume. Phasing into another dimension.
        const notes = [523.25, 369.99]; // C5, F#4
        let vol = 0.25;
        for (let i = 0; i < 4; i++) {
          const start = t + i * 0.08;
          notes.forEach(freq => ghostVoice(freq, start, 0.15, 1.0, vol));
          vol *= 0.4;
        }
      }
    });
  }

  function planetDestroyed(kind) {
    if (kind === 'shield') {
      playSfxBuffer('shieldDestroy', 0.7);
    } else if (kind === 'nova') {
      playSfxBuffer('novaDestroy', 0.45);
    } else if (kind === 'barrier') {
      playSfxBuffer('hyperspeedBarrier', 0.65);
    } else if (kind === 'ghost') {
      // Soft ethereal passthrough — not a destroy. Sine whomp 180→60hz 0.2s
      // plus a brief sine shimmer 2000→800hz 0.08s. Volume 0.15 so it sits
      // well below the crunchy destroy SFX.
      safeSfx(t => {
        chipSweep('sine', 180, 60, t, 0.2, 0.15);
        chipSweep('sine', 2000, 800, t, 0.08, 0.15);
      });
    }
  }

  // Combo activate — every combo distinct, all at vol ~0.4.
  // Wired by activateCombo() in the game loop, keys must match COMBO_DEFS.
  function comboActivate(key) {
    safeSfx(t => {
      switch (key) {
        case 'nova_nova': {
          // SUPERNOVA: ascending C5-E5-G5-C6 fanfare + noise explosion.
          const fanfare = [523.25, 659.25, 783.99, 1046.50];
          fanfare.forEach((freq, i) => chipNote(freq, t + i * 0.06, 0.07, 0.4, 'square'));
          const expStart = t + fanfare.length * 0.06;
          noiseBurst(expStart, 0.3, 500, 1.0, 0.4, x => Math.pow(1 - x, 1.0));
          chipSweep('square', 80, 30, expStart, 0.3, 0.35);
          break;
        }
        case 'nova_hyperspeed': {
          // WARP TIME: rapid arpeggio up then down, A4-E5-A5-E5-A4.
          const arp = [440.00, 659.25, 880.00, 659.25, 440.00];
          arp.forEach((freq, i) => chipNote(freq, t + i * 0.05, 0.06, 0.4, 'square'));
          break;
        }
        case 'nova_ghost': {
          // PHANTOM BLAST: deep bass drop 60→30hz + eerie shimmer 3000→800hz.
          chipSweep('square', 60, 30, t, 0.3, 0.4);
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(3000, t);
          o.frequency.exponentialRampToValueAtTime(800, t + 0.3);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.18, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o.connect(g); g.connect(sfxGain);
          o.start(t); o.stop(t + 0.32);
          killOnEnd(o, g);
          break;
        }
        case 'nova_shield': {
          // PULSAR: rhythmic triple pulse C5-C5-C6 with 0.05s gaps.
          chipNote(523.25, t,        0.08, 0.4, 'square');
          chipNote(523.25, t + 0.13, 0.08, 0.4, 'square');
          chipNote(1046.50, t + 0.26, 0.08, 0.4, 'square');
          break;
        }
        case 'hyperspeed_ghost': {
          // SPECTRAL RUSH: ghost tritone + speed arpeggio layered.
          const ghostNotes = [523.25, 369.99];
          ghostNotes.forEach(freq => ghostVoice(freq, t, 0.1, 0.7, 0.28));
          const arp = [220.00, 261.63, 329.63, 440.00, 523.25, 659.25, 880.00];
          arp.forEach((freq, i) => chipNote(freq, t + i * 0.04, 0.05, 0.32, 'square'));
          break;
        }
        case 'hyperspeed_shield': {
          // JUGGERNAUT: heavy 80→40hz BOOM + shield jingle layered.
          chipSweep('square', 80, 40, t, 0.4, 0.4);
          const jingle = [523.25, 659.25, 783.99, 1046.50];
          jingle.forEach((freq, i) => chipNote(freq, t + i * 0.07, 0.07, 0.35, 'square'));
          break;
        }
        case 'ghost_shield': {
          // WRAITH: ghost descending tritone + shield shimmer noise.
          ghostVoice(523.25, t, 0.12, 0.8, 0.32);
          ghostVoice(369.99, t, 0.12, 0.8, 0.32);
          shimmer(t, 0.2, 0.25, 6000);
          break;
        }
        case 'ghost_ghost': {
          // ETERNAL PHANTOM: ghost sound 2x slower, an octave deeper, with
          // five echoing layers each 50% quieter than the previous.
          const notes = [261.63, 185.00]; // C4, F#3 — one octave down
          let vol = 0.4;
          for (let i = 0; i < 5; i++) {
            const start = t + i * 0.16;
            notes.forEach(freq => ghostVoice(freq, start, 0.3, 2.0, vol));
            vol *= 0.5;
          }
          break;
        }
        case 'shield_shield': {
          // FORTRESS SHIELD: shield jingle played twice in rapid succession.
          const jingle = [523.25, 659.25, 783.99, 1046.50];
          for (let pass = 0; pass < 2; pass++) {
            const passStart = t + pass * 0.32;
            jingle.forEach((freq, i) => chipNote(freq, passStart + i * 0.07, 0.07, 0.4, 'square'));
          }
          shimmer(t + 0.64, 0.12, 0.25, 6000);
          break;
        }
      }
    });
  }

  // Per-combo planet destruction sound — used in place of the regular
  // planetDestroyed() variant when a combo wants a beefier kill cue.
  // Currently only Supernova (nova_nova) overrides; everything else falls
  // back to the normal nova boom.
  function comboDestroySound(key) {
    safeSfx(t => {
      if (key === 'nova_nova') {
        // Same 4-layer nova boom, every layer 30% louder.
        novaBoom(t, 1.3);
      } else {
        novaBoom(t, 1);
      }
    });
  }

  // Sustained hyperspeed tone — separate from the pickup whoosh. Low
  // rumbling engine: 80hz sine fundamental + 160hz sine 2nd harmonic at
  // 0.4x, both through a lowpass (cutoff ~200hz, Q=2) modulated by a
  // 0.3hz LFO sweeping between 120 and 280hz for movement. Capped at
  // 0.08. Hard-stop (no fade) when hyperspeed ends.
  //
  // `stacks` (1..4) shifts the base pitch up 15% per additional stack so the
  // engine sounds more aggressive at higher stack counts. Stack 1 keeps the
  // original 80hz so existing single-pickup behavior is unchanged.
  function startHyperspeedWhoosh(stacks) {
    if (!ensureRunning()) return null;
    if (!sfxEnabled) return null;
    try {
      const t = ctx.currentTime;
      const stackLevel = Math.max(1, stacks || 1);
      const baseFreq = 80 * (1 + 0.15 * (stackLevel - 1));

      const f = ctx.createBiquadFilter();
      f.type = 'lowpass';
      // Track the base pitch so the LFO window stays centered relative to it.
      f.frequency.value = baseFreq * 2.5;
      f.Q.value = 2;

      // LFO sweeps cutoff ±80hz around the base.
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.type = 'sine';
      lfo.frequency.value = 0.3;
      lfoGain.gain.value  = 80;
      lfo.connect(lfoGain); lfoGain.connect(f.frequency);

      // Fundamental at the stack-scaled base.
      const o1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.type = 'sine'; o1.frequency.value = baseFreq;
      g1.gain.value = 1;
      o1.connect(g1); g1.connect(f);

      // 2nd harmonic at 0.4x
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine'; o2.frequency.value = baseFreq * 2;
      g2.gain.value = 0.4;
      o2.connect(g2); g2.connect(f);

      // Master envelope for the sustained voice, capped at 0.08.
      const out = ctx.createGain();
      out.gain.setValueAtTime(0, t);
      out.gain.linearRampToValueAtTime(0.08, t + 0.12);
      f.connect(out); out.connect(sfxGain);

      o1.start(t); o2.start(t); lfo.start(t);
      return {
        stop() {
          try {
            const now = ctx.currentTime;
            out.gain.cancelScheduledValues(now);
            out.gain.setValueAtTime(0, now);
            o1.stop(now); o2.stop(now); lfo.stop(now);
            killOnEnd(o1, o2, lfo, lfoGain, g1, g2, f, out);
          } catch {}
        }
      };
    } catch {}
    return null;
  }

  function death() {
    safeSfx(t => {
      // Iconic chromatic descent: C5-B4-Bb4-A4-Ab4-G4-F#4-F4-E4-Eb4-D4-C4,
      // each note 0.08s on a square wave. Followed by a low 80hz sine
      // rumble that fades out over 0.5s.
      const notes = [
        523.25, 493.88, 466.16, 440.00, 415.30, 392.00,
        369.99, 349.23, 329.63, 311.13, 293.66, 261.63,
      ];
      notes.forEach((freq, i) => chipNote(freq, t + i * 0.08, 0.085, 0.45, 'square'));

      const rumbleStart = t + notes.length * 0.08;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 80;
      g.gain.setValueAtTime(0, rumbleStart);
      g.gain.linearRampToValueAtTime(0.4, rumbleStart + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, rumbleStart + 0.5);
      o.connect(g); g.connect(sfxGain);
      o.start(rumbleStart); o.stop(rumbleStart + 0.55);
      killOnEnd(o, g);
    });
  }

  // ---- Background music: per-state file playback with crossfades ----
  //
  // playTrack(name, fade) is the single entry point — it crossfades from the
  // currently playing track (if any) into the named one over `fade` seconds.
  // Each track also self-loops via a 2-second crossfade scheduled by
  // armCrossfade() so loop points are inaudible. Pause "ducks" the music to
  // PAUSE_DUCK_LEVEL of normal volume rather than stopping playback so the
  // game returns instantly with no fade-in lag.

  function loadMusicBuffer(name) {
    if (musicBuffers[name]) return Promise.resolve(musicBuffers[name]);
    if (musicLoading[name]) return musicLoading[name];
    if (!ctx) return Promise.reject(new Error('no audio context'));
    // Paths are relative to index.html — resolves to <base>/assets/<name>.mp3.
    const url = './assets/' + name + '.mp3';
    console.log('[music] fetching', url);
    musicLoading[name] = fetch(url)
      .then(r => {
        if (!r.ok) throw new Error(name + '.mp3 fetch failed: ' + r.status);
        return r.arrayBuffer();
      })
      .then(ab => new Promise((resolve, reject) => {
        // Callback form for Safari compatibility.
        ctx.decodeAudioData(ab, resolve, reject);
      }))
      .then(buf => {
        musicBuffers[name] = buf;
        console.log('[music] loaded', url, 'duration=' + buf.duration.toFixed(2) + 's');
        return buf;
      })
      .catch(err => {
        musicLoading[name] = null;
        console.error('[music] load failed', url, err);
        throw err;
      });
    return musicLoading[name];
  }

  // Same pattern as loadMusicBuffer, for the destruction SFX files.
  function loadSfxBuffer(key) {
    if (sfxBuffers[key]) return Promise.resolve(sfxBuffers[key]);
    if (sfxLoading[key]) return sfxLoading[key];
    if (!ctx) return Promise.reject(new Error('no audio context'));
    const url = SFX_BUFFER_URLS[key];
    if (!url) return Promise.reject(new Error('unknown sfx ' + key));
    console.log('[sfx] fetching', url);
    sfxLoading[key] = fetch(url)
      .then(r => {
        if (!r.ok) throw new Error(key + ' fetch failed: ' + r.status);
        return r.arrayBuffer();
      })
      .then(ab => new Promise((resolve, reject) => {
        ctx.decodeAudioData(ab, resolve, reject);
      }))
      .then(buf => {
        sfxBuffers[key] = buf;
        console.log('[sfx] loaded', url, 'duration=' + buf.duration.toFixed(2) + 's');
        return buf;
      })
      .catch(err => {
        sfxLoading[key] = null;
        console.error('[sfx] load failed', url, err);
        throw err;
      });
    return sfxLoading[key];
  }

  function preloadSfxBuffers() {
    for (const k of Object.keys(SFX_BUFFER_URLS)) {
      loadSfxBuffer(k).catch(() => {});
    }
  }

  // One-shot: play a decoded SFX buffer at `volume` through sfxGain. If the
  // buffer isn't ready yet, kick off the load so the next hit is instant and
  // silently skip this one — destroys are frequent enough that dropping one
  // is better than introducing decode-jitter latency.
  function playSfxBuffer(key, volume) {
    if (!sfxEnabled) return;
    if (!ensureRunning()) return;
    const buf = sfxBuffers[key];
    if (!buf) {
      loadSfxBuffer(key).catch(() => {});
      return;
    }
    try {
      const src = ctx.createBufferSource();
      const g = ctx.createGain();
      src.buffer = buf;
      g.gain.value = volume;
      src.connect(g); g.connect(sfxGain);
      src.start(0);
      killOnEnd(src, g);
    } catch {}
  }

  // What musicGain should be at right now — accounts for the music toggle
  // and the pause duck. `state` lives in the outer game scope; this closure
  // resolves it lazily, so toggling mid-pause uses the ducked target.
  function currentMusicGainTarget() {
    if (!musicEnabled) return 0;
    if (typeof state !== 'undefined' && state === 'paused') {
      return MUSIC_GAIN_VALUE * PAUSE_DUCK_LEVEL;
    }
    return MUSIC_GAIN_VALUE;
  }

  function setMusicGainTarget(target, ramp) {
    if (!musicGain || !ctx) return;
    try {
      const t = ctx.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(target, t + (ramp || 0.3));
    } catch {}
  }

  // Build, connect, and start a buffer source with an optional fade-in ramp
  // on its per-source gain. Returns the (src, gain, startTime) triple, or
  // null if the context refused to start.
  function startBufferSource(buffer, fadeIn) {
    if (!ctx || !buffer || !musicGain) return null;
    const t = ctx.currentTime;
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const g = ctx.createGain();
    if (fadeIn > 0) {
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(1, t + fadeIn);
    } else {
      g.gain.setValueAtTime(1, t);
    }
    src.connect(g); g.connect(musicGain);
    try { src.start(t); } catch { return null; }
    return { src: src, gain: g, startTime: t };
  }

  // Fade the currently active source to silence over `fadeOut` seconds and
  // schedule a stop just past the fade. Clears the source pointers; callers
  // should set new ones afterwards if they're starting a fresh source.
  function fadeOutCurrentSource(fadeOut) {
    if (!ctx) return;
    const t = ctx.currentTime;
    const oldSrc = currentMusicSource;
    const oldGain = currentMusicSourceGain;
    if (oldGain) {
      try {
        oldGain.gain.cancelScheduledValues(t);
        oldGain.gain.setValueAtTime(oldGain.gain.value, t);
        oldGain.gain.linearRampToValueAtTime(0, t + fadeOut);
      } catch {}
    }
    if (oldSrc) {
      try { oldSrc.stop(t + fadeOut + 0.05); } catch {}
      killOnEnd(oldSrc, oldGain);
    }
    currentMusicSource = null;
    currentMusicSourceGain = null;
  }

  // Schedule the next seamless-loop crossfade for the active track. Fires
  // MUSIC_CROSSFADE seconds before the buffer ends.
  function armCrossfade(sourceStartTime, buffer) {
    if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
    if (!buffer || !ctx) return;
    const fireAt = sourceStartTime + buffer.duration - MUSIC_CROSSFADE;
    const delayMs = Math.max(0, (fireAt - ctx.currentTime) * 1000);
    crossfadeTimer = setTimeout(() => {
      crossfadeTimer = null;
      if (!currentTrackName) return;
      doLoopCrossfade();
    }, delayMs);
  }

  function doLoopCrossfade() {
    const buf = musicBuffers[currentTrackName];
    if (!buf || !ctx) return;
    fadeOutCurrentSource(MUSIC_CROSSFADE);
    const started = startBufferSource(buf, MUSIC_CROSSFADE);
    if (!started) return;
    currentMusicSource = started.src;
    currentMusicSourceGain = started.gain;
    armCrossfade(started.startTime, buf);
  }

  // Public: switch to a named track ('menu' | 'gameplay' | 'results') with
  // a `fade` second crossfade. Pass null/'' to stop music entirely.
  function playTrack(name, fade) {
    const fadeDur = (fade == null) ? 0.5 : fade;

    // Stop request — fade out whatever's playing and forget the track.
    if (!name) {
      currentTrackName = null;
      if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
      fadeOutCurrentSource(fadeDur);
      return;
    }

    if (!ensureRunning()) return;
    resetThrottles();

    // Already on this track — just make sure musicGain matches the current
    // target (e.g. unducking from pause). Never restart the source.
    if (currentTrackName === name && currentMusicSource) {
      setMusicGainTarget(currentMusicGainTarget(), 0.2);
      return;
    }

    currentTrackName = name;
    // Restore musicGain to the right target before starting the new source.
    setMusicGainTarget(currentMusicGainTarget(), 0.05);

    loadMusicBuffer(name)
      .then(buf => {
        // Bail if the user navigated away mid-load.
        if (currentTrackName !== name) return;
        fadeOutCurrentSource(fadeDur);
        const started = startBufferSource(buf, fadeDur);
        if (!started) return;
        currentMusicSource = started.src;
        currentMusicSourceGain = started.gain;
        armCrossfade(started.startTime, buf);
      })
      .catch(() => {});
  }

  // Pause and resume "duck" musicGain rather than stopping the source so
  // gameplay returns instantly when the player hits resume.
  function pauseMusic() {
    setMusicGainTarget(musicEnabled ? MUSIC_GAIN_VALUE * PAUSE_DUCK_LEVEL : 0, 0.3);
  }
  function resumeMusic() {
    setMusicGainTarget(currentMusicGainTarget(), 0.3);
  }

  // ---- UI button click sounds ----
  // Two retro variants, both wired through sfxGain so they're muted by the
  // SFX toggle. clickPrimary is the bright confirm/start sound; clickSecondary
  // is the smaller toggle/navigate sound.
  function clickPrimary() {
    safeSfx(t => { chipNote(523.25, t, 0.04, 0.2, 'square'); });   // C5
  }
  function clickSecondary() {
    safeSfx(t => { chipNote(392.00, t, 0.03, 0.15, 'square'); });  // G4
  }

  return {
    init, attract, repel, pickup, planetDestroyed, death,
    comboActivate, comboDestroySound, startHyperspeedWhoosh,
    playTrack, pauseMusic, resumeMusic,
    clickPrimary, clickSecondary,
    setMusicEnabled, setSfxEnabled, isMusicEnabled, isSfxEnabled,
    suspendCtx, resumeCtx,
  };
})();

// --- Highscores (localStorage, top 5) ---
// Schema: [{ score: number, difficulty: 'NORMAL'|'HARD'|'EXTREME' }, ...]
// Old schema (numbers) is migrated transparently.
function getScores() {
  try {
    const raw = JSON.parse(localStorage.getItem('drift_scores') || '[]');
    return raw.map(s => typeof s === 'number' ? { score: s, difficulty: 'NORMAL' } : s);
  } catch { return []; }
}
function saveScore(s, d) {
  const scores = getScores();
  scores.push({ score: s, difficulty: d });
  // Keep top 5 per difficulty (not 5 total) so one difficulty can't push out another
  const byDiff = {};
  for (const sc of scores) {
    (byDiff[sc.difficulty] = byDiff[sc.difficulty] || []).push(sc);
  }
  const kept = [];
  for (const arr of Object.values(byDiff)) {
    arr.sort((a,b) => b.score - a.score);
    kept.push(...arr.slice(0, 5));
  }
  kept.sort((a,b) => b.score - a.score);
  localStorage.setItem('drift_scores', JSON.stringify(kept));
  console.log('[drift] saved scores:', JSON.stringify(kept));
  return kept;
}

function normalScrollSpeed() {
  const d = diff();
  const t = Math.min(frame / (d.speedCapScore * 60), 1);
  return d.startSpeed + (d.maxSpeed - d.startSpeed) * t;
}

function scrollSpeed() {
  let s = normalScrollSpeed();
  if (activeEffects.hyperspeed > 0) s *= hyperspeedCurrentMult;
  return s;
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// --- Background stars ---
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 160; i++)
    bgStars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+0.2, phase: Math.random()*6.28, spd: Math.random()*0.3+0.08 });
}

// --- Bodies ---
function spawnBody(yBase) {
  const types = ['star','star','planet','blackhole'];
  const type = types[Math.floor(Math.random() * types.length)];
  const x = 70 + Math.random() * (W - 140);
  let radius, color, glowColor;
  if (type === 'star') {
    radius = 13 + Math.random() * 9;
    const hue = Math.random() < 0.5 ? 42 : 200;
    color = `hsl(${hue},100%,80%)`; glowColor = `hsl(${hue},100%,65%)`;
  } else if (type === 'planet') {
    radius = 17 + Math.random() * 13;
    const hue = 100 + Math.random() * 220;
    color = `hsl(${hue},55%,50%)`; glowColor = `hsl(${hue},80%,58%)`;
  } else {
    radius = 11 + Math.random() * 7;
    color = '#080808'; glowColor = 'rgba(170,70,255,0.9)';
  }

  // Pre-build gradients at local origin (0,0). drawBodies translates by
  // (b.x, b.y). Cached gradients avoid per-frame createRadialGradient calls,
  // which are expensive on mobile GPUs.
  const maxGlowR = radius * 2.95;
  const cachedGlow = ctx.createRadialGradient(0, 0, radius * 0.4, 0, 0, maxGlowR);
  cachedGlow.addColorStop(0, glowColor);
  cachedGlow.addColorStop(1, 'rgba(0,0,0,0)');

  let cachedFill = null;
  if (type !== 'blackhole') {
    cachedFill = ctx.createRadialGradient(-radius*0.28, -radius*0.28, 0, 0, 0, radius);
    cachedFill.addColorStop(0, '#fff');
    cachedFill.addColorStop(0.3, color);
    cachedFill.addColorStop(1, 'rgba(0,0,0,0.5)');
  }

  return {
    x, y: yBase, radius, type, color, glowColor,
    passed: false, pulse: Math.random()*6.28,
    cachedFill, cachedGlow, cachedMaxGlowR: maxGlowR,
  };
}

// After 5 minutes, the playfield density ramps: +2 bodies per minute survived,
// uncapped. Base value from difficulty settings for the first 5 minutes.
function effectiveMaxBodies() {
  const base = diff().maxBodies;
  const es = elapsedRunSeconds();
  if (es < 300) return base;
  return base + 2 * Math.floor((es - 300) / 60);
}

function initBodies() {
  bodies = [];
  const max = effectiveMaxBodies();
  for (let i = 0; i < max; i++)
    bodies.push(spawnBody(H * 0.05 - i * BODY_SPACING));
}

// --- Powerup helpers ---
const PAIR_COMBOS = [
  ['nova','nova'], ['nova','hyperspeed'], ['nova','ghost'], ['nova','shield'],
  ['hyperspeed','ghost'], ['hyperspeed','shield'],
  ['ghost','shield'], ['ghost','ghost'], ['shield','shield'],
];
let nextPairId = 1;

function spawnPowerup() {
  const topBodyY = bodies.length ? Math.min(...bodies.map(b => b.y)) : -100;
  const y = Math.min(-30, topBodyY - 60 - Math.random() * 80);
  // 1 in 5 spawns is a tethered pair
  if (Math.random() < 0.2) {
    // Pair-combo selection weighted by active orb's specialty: combos that
    // include the orb's bias type get 2x weight so they spawn more often.
    const bias = getOrbBonus().bias;
    const weights = PAIR_COMBOS.map(c => (bias && (c[0] === bias || c[1] === bias)) ? 2 : 1);
    let total = 0;
    for (const w of weights) total += w;
    let pick = Math.random() * total;
    let idx = 0;
    for (let i = 0; i < weights.length; i++) {
      pick -= weights[i];
      if (pick <= 0) { idx = i; break; }
    }
    const combo = PAIR_COMBOS[idx];
    const gap = 60;
    const cx = 80 + Math.random() * (W - 160);
    const id = nextPairId++;
    const a = {
      type: combo[0], x: cx - gap/2, y, radius: 13,
      pulse: Math.random() * 6.28, collected: false, pairId: id, pairSibling: null,
    };
    const b = {
      type: combo[1], x: cx + gap/2, y, radius: 13,
      pulse: Math.random() * 6.28, collected: false, pairId: id, pairSibling: null,
    };
    a.pairSibling = b; b.pairSibling = a;
    powerups.push(a, b);
    return;
  }
  let type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  // Nova overload guard: don't drop a nova if any nova-flavored effect is
  // already running (in-flight rings or nova-based combo). Reroll to a
  // non-nova type so the spawn slot stays useful.
  if (type === 'nova') {
    const novaActive = novaRings.length > 0
      || activeCombos.nova_nova
      || activeCombos.nova_hyperspeed
      || activeCombos.nova_ghost
      || activeCombos.nova_shield;
    if (novaActive) {
      const alt = ['shield', 'ghost', 'hyperspeed'];
      type = alt[Math.floor(Math.random() * alt.length)];
    }
  }
  powerups.push({
    type,
    x: 60 + Math.random() * (W - 120),
    y,
    radius: 13,
    pulse: Math.random() * 6.28,
    collected: false,
  });
}

function trimParticles() {
  if (pickupParticles.length > PICKUP_PART_CAP) {
    pickupParticles.splice(0, pickupParticles.length - PICKUP_PART_CAP);
  }
  if (deathParticles.length > DEATH_PART_CAP) {
    deathParticles.splice(0, deathParticles.length - DEATH_PART_CAP);
  }
}

function emitPickupParticles(x, y, type) {
  const rgb = POWERUP_COLORS[type].rgb;
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 4.5 + 1.2;
    pushCapped(pickupParticles, {
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      size: Math.random() * 2.4 + 0.9,
      rgb,
    }, PICKUP_PART_CAP);
  }
  trimParticles();
}

function emitDestroyBurst(x, y, rgb) {
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 3.5 + 0.8;
    pushCapped(pickupParticles, {
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      size: Math.random() * 2.2 + 0.8,
      rgb,
    }, PICKUP_PART_CAP);
  }
  trimParticles();
}

// Spawn a distinct visual effect per destroy kind. Each entry lives in the
// unified destroyEffects array and is capped so simultaneous combo kills
// can't blow up the allocation. Directional barrier effects assume world-
// down travel (planets scroll down past the player).
function countEffectKind(k) {
  let n = 0;
  for (const e of destroyEffects) if (e.kind === k) n++;
  return n;
}

function pushEffect(e) {
  if (destroyEffects.length >= DESTROY_EFFECTS_CAP) destroyEffects.shift();
  destroyEffects.push(e);
}

function emitDestroyEffects(body, kind) {
  if (kind === 'nova' || kind === 'supernova') {
    const isSuper = kind === 'supernova';
    const ringScale = isSuper ? 4 : 3;
    const flashR   = body.radius * (isSuper ? 2.2 : 1.5);
    const fragsWant = isSuper ? 12 + Math.floor(Math.random() * 3)
                               :  8 + Math.floor(Math.random() * 3);
    // Center flash
    pushEffect({ kind: 'novaFlash', x: body.x, y: body.y, age: 0, maxLife: isSuper ? 8 : 6,
                 r: flashR, color: '255,240,200' });
    // Shockwave ring in planet's color
    pushEffect({ kind: 'novaShock', x: body.x, y: body.y, age: 0, maxLife: isSuper ? 22 : 18,
                 maxR: body.radius * ringScale, color: body.glowColor || 'rgba(255,160,90,1)' });
    // Fragments — capped at 15 total across all simultaneous nova kills.
    const have = countEffectKind('novaFrag');
    const fragsAdd = Math.max(0, Math.min(fragsWant, 15 - have));
    for (let i = 0; i < fragsAdd; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.8 + Math.random() * 2.6;
      pushEffect({
        kind: 'novaFrag', x: body.x, y: body.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        age: 0, maxLife: 30,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.35,
        size: 4 + Math.random() * 4,
        sides: 3 + Math.floor(Math.random() * 2),
        color: body.glowColor || 'rgba(255,180,120,1)',
      });
    }

  } else if (kind === 'shield') {
    // Scan lines: 4-6 cyan laser lines sweep horizontally in 0.2s.
    const dir = Math.random() < 0.5 ? 1 : -1;
    const lines = 4 + Math.floor(Math.random() * 3);
    for (let i = 0; i < lines; i++) {
      const laneY = (i / Math.max(1, lines - 1) - 0.5) * body.radius * 1.8;
      pushEffect({ kind: 'shieldScan', x: body.x, y: body.y + laneY,
                   dir, baseR: body.radius, age: 0, maxLife: 12 });
    }
    // Sparks: perpendicular to scan = vertical. Cap 20 per kill.
    const sparkCount = Math.min(20, 12 + Math.floor(Math.random() * 4));
    for (let i = 0; i < sparkCount; i++) {
      const vy = (Math.random() < 0.5 ? -1 : 1) * (1.0 + Math.random() * 2.2);
      const vx = (Math.random() - 0.5) * 0.8;
      pushEffect({
        kind: 'shieldSpark',
        x: body.x + (Math.random() - 0.5) * body.radius * 1.6,
        y: body.y + (Math.random() - 0.5) * body.radius * 1.6,
        vx, vy, age: 0, maxLife: 18,
        color: Math.random() < 0.5 ? '180,240,255' : '255,255,255',
      });
    }
    // Afterburn glow — 0.15s.
    pushEffect({ kind: 'shieldAfter', x: body.x, y: body.y, age: 0, maxLife: 9,
                 r: body.radius * 1.4 });

  } else if (kind === 'barrier') {
    const travel = Math.PI / 2; // world-down
    // Impact streak in direction of travel — 0.08s.
    pushEffect({ kind: 'barrierStreak', x: body.x, y: body.y, age: 0, maxLife: 5,
                 len: body.radius * 2, angle: travel });
    // Compression wave squashed in travel direction — 0.2s.
    pushEffect({ kind: 'barrierComp', x: body.x, y: body.y, age: 0, maxLife: 12,
                 maxR: body.radius * 3, angle: travel });
    // Fragments flying BACKWARD (upward) — cap 8 per kill.
    const fragCount = Math.min(8, 5 + Math.floor(Math.random() * 2));
    for (let i = 0; i < fragCount; i++) {
      const spread = (Math.random() - 0.5) * (Math.PI * 0.6);
      const a = -Math.PI / 2 + spread; // upward
      const sp = 2.0 + Math.random() * 2.0;
      pushEffect({
        kind: 'barrierFrag', x: body.x, y: body.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        age: 0, maxLife: 22,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.4,
        size: 3 + Math.random() * 3,
        sides: 3,
        color: '255,220,120',
      });
    }

  } else if (kind === 'ghost') {
    // Soft purple ripple.
    pushEffect({ kind: 'ghostRipple', x: body.x, y: body.y, age: 0, maxLife: 24,
                 maxR: body.radius * 2.8 });
    // 4-5 wisps drift upward — cap 8.
    const wispCount = Math.min(8, 4 + Math.floor(Math.random() * 2));
    for (let i = 0; i < wispCount; i++) {
      pushEffect({
        kind: 'ghostWisp',
        x: body.x + (Math.random() - 0.5) * body.radius * 0.8,
        y: body.y + (Math.random() - 0.5) * body.radius * 0.4,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -0.6 - Math.random() * 0.8,
        age: 0, maxLife: 24,
        size: 2.5 + Math.random() * 2,
      });
    }
  }
}

function drawDestroyEffects() {
  destroyEffects = destroyEffects.filter(e => e.age < e.maxLife);
  for (const e of destroyEffects) {
    e.age++;
    const t = e.age / e.maxLife;

    if (e.kind === 'novaFlash') {
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = `rgba(${e.color},1)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.4 + t * 0.6), 0, 6.28); ctx.fill();

    } else if (e.kind === 'novaShock') {
      const r = e.maxR * t;
      ctx.globalAlpha = (1 - t) * 0.9;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, 6.28); ctx.stroke();

    } else if (e.kind === 'novaFrag') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.96;
      e.vy = e.vy * 0.96 + 0.1; // slight gravity
      e.angle += e.spin;
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = e.color;
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.angle);
      ctx.beginPath();
      for (let i = 0; i < e.sides; i++) {
        const a = (i / e.sides) * 6.28;
        const px = Math.cos(a) * e.size;
        const py = Math.sin(a) * e.size;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();

    } else if (e.kind === 'shieldScan') {
      const half = e.baseR * 1.2;
      const lineX = e.x + e.dir * (-half + t * 2 * half);
      ctx.globalAlpha = (1 - t) * 0.85;
      ctx.strokeStyle = 'rgba(180,240,255,1)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(lineX - e.dir * 8, e.y);
      ctx.lineTo(lineX, e.y);
      ctx.stroke();

    } else if (e.kind === 'shieldSpark') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.95; e.vy *= 0.95;
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = `rgba(${e.color},1)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, 1.4, 0, 6.28); ctx.fill();

    } else if (e.kind === 'shieldAfter') {
      const alpha = (1 - t) * 0.55;
      const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
      g.addColorStop(0, `rgba(180,240,255,${alpha})`);
      g.addColorStop(1, 'rgba(180,240,255,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 6.28); ctx.fill();

    } else if (e.kind === 'barrierStreak') {
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = 'rgba(255,240,180,1)';
      ctx.lineWidth = 4;
      const dx = Math.cos(e.angle) * e.len;
      const dy = Math.sin(e.angle) * e.len;
      ctx.beginPath();
      ctx.moveTo(e.x - dx * 0.2, e.y - dy * 0.2);
      ctx.lineTo(e.x + dx, e.y + dy);
      ctx.stroke();

    } else if (e.kind === 'barrierComp') {
      const r = e.maxR * t;
      ctx.globalAlpha = (1 - t) * 0.75;
      ctx.strokeStyle = 'rgba(255,220,100,1)';
      ctx.lineWidth = 2;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.angle);
      ctx.scale(0.55, 1);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.stroke();
      ctx.restore();

    } else if (e.kind === 'barrierFrag') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.95;
      e.vy = e.vy * 0.95 + 0.1;
      e.angle += e.spin;
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = `rgba(${e.color},1)`;
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.angle);
      ctx.beginPath();
      for (let i = 0; i < e.sides; i++) {
        const a = (i / e.sides) * 6.28;
        const px = Math.cos(a) * e.size;
        const py = Math.sin(a) * e.size;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();

    } else if (e.kind === 'ghostRipple') {
      const r = e.maxR * t;
      ctx.globalAlpha = (1 - t) * 0.35;
      ctx.strokeStyle = 'rgba(210,140,255,1)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, 6.28); ctx.stroke();

    } else if (e.kind === 'ghostWisp') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.97; e.vy *= 0.98;
      ctx.globalAlpha = (1 - t) * 0.55;
      ctx.fillStyle = 'rgba(210,180,255,1)';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, 6.28); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function addDestroyPoints() {
  destroyStreak++;
  const streakForScore = Math.min(destroyStreak, getStreakCap());
  const pts = streakForScore * streakForScore;
  score += pts;
  runStats.totalDestroyed++;
  runStats.pointsFromDestroying += pts;
  if (destroyStreak > runStats.longestStreak) runStats.longestStreak = destroyStreak;
  document.getElementById('score').textContent = score;
  const sd = document.getElementById('streakDisplay');
  if (destroyStreak > 1) {
    sd.textContent = '\uD83D\uDD25 x' + destroyStreak;
    sd.classList.add('visible');
  }
}

// --- Combo helpers ---
let recentNovaFrames = 0;
let lastComboLabel = null; // which combo key is currently shown on the timer bar
// Pickup recency tracking — used by detectCombo to decide which active
// effect a new single pickup should combine with. Single pickups produce a
// 1-entry array; pair pickups produce a 2-entry array with the same
// timestamp, which triggers Rule 3 (random tie-break) on the next pickup.
let lastGainedEffects = [];
let lastGainedTimestamp = -1;

function comboKey(a, b) {
  const order = { nova: 0, hyperspeed: 1, ghost: 2, shield: 3 };
  const [x, y] = [a, b].sort((p, q) => order[p] - order[q]);
  const k = x + '_' + y;
  return COMBO_DEFS[k] ? k : null;
}

// Treat a nova burst as "active" for combo purposes while recentNovaFrames
// is still counting — matches the original detectCombo behaviour.
function effectActive(t) {
  return t === 'nova' ? recentNovaFrames > 0 : activeEffects[t] > 0;
}

function detectCombo(newType) {
  // RULE 1 - SAME TYPE WINS: if the new pickup matches any currently
  // active effect, combine with that matching effect.
  if (effectActive(newType)) {
    const k = comboKey(newType, newType);
    if (k) return k;
  }

  // Build candidate partners from the most-recent pickup event, filtered
  // to effects still currently active and different from newType.
  const partners = lastGainedEffects.filter(t => t !== newType && effectActive(t));

  if (partners.length === 1) {
    // RULE 2 - MOST RECENTLY GAINED: single unambiguous partner.
    const k = comboKey(newType, partners[0]);
    if (k) return k;
  } else if (partners.length >= 2) {
    // RULE 3 - RANDOM TIE BREAK: pair pickup left two equally-recent
    // effects; pick one at random.
    const pick = partners[Math.floor(Math.random() * partners.length)];
    const k = comboKey(newType, pick);
    if (k) return k;
  }

  return null;
}

// Bring all listed timed-effect components up to the longest one's remaining
// duration. Stops a combo's "shorter" half (e.g. shield at 60 frames when ghost
// is freshly picked up at 480) from expiring mid-combo. Only acts on effects
// that are actually active (>0); never reactivates a dead one.
function syncComboDurations(...effectKeys) {
  let max = 0;
  for (const k of effectKeys) {
    if (activeEffects[k] > max) max = activeEffects[k];
  }
  if (max <= 0) return;
  for (const k of effectKeys) {
    if (activeEffects[k] > 0 && activeEffects[k] < max) {
      activeEffects[k] = max;
    }
  }
  // Hyperspeed deceleration uses hyperspeedActiveDuration as the curve
  // denominator — bump it so the curve stays valid when we extend the timer.
  // Also extend the longest stack timer so the next update tick doesn't
  // immediately undo the sync by recomputing activeEffects.hyperspeed.
  if (effectKeys.includes('hyperspeed') && hyperspeedActiveDuration < max) {
    hyperspeedActiveDuration = max;
  }
  if (effectKeys.includes('hyperspeed') && hyperSpeedTimers.length > 0) {
    let longestIdx = 0;
    for (let i = 1; i < hyperSpeedTimers.length; i++) {
      if (hyperSpeedTimers[i] > hyperSpeedTimers[longestIdx]) longestIdx = i;
    }
    if (hyperSpeedTimers[longestIdx] < max) hyperSpeedTimers[longestIdx] = max;
  }
}

function activateCombo(key, x, y) {
  const def = COMBO_DEFS[key];
  if (!def) return;
  Sentry.addBreadcrumb({ category: 'combo', message: 'combo activated: ' + key, level: 'info' });
  // Guard: if the same combo is already active, refresh its timers without
  // re-running the activation body. Re-activating Warp Time or Pulsar while
  // already running would schedule a second stream of setTimeout-driven nova
  // spawns (the cause of the Android hyperspeed-combo crash at high scores).
  if (activeCombos[key]) {
    if (key === 'nova_hyperspeed') {
      // Refresh hyperspeed duration but leave warpTimeNovaTimer alone so the
      // auto-nova cadence continues uninterrupted.
      activateHyperspeed(HYPERSPEED_COMBO_DURATION);
    } else if (key === 'nova_shield') {
      // Refresh shield duration but leave pulsarNovaTimer alone so the
      // auto-nova cadence continues uninterrupted.
      activeEffects.shield = SHIELD_DURATION();
      shieldBroken = false;
    } else if (key === 'hyperspeed_ghost') {
      activateHyperspeed(HYPERSPEED_COMBO_DURATION, 2);
      activeEffects.ghost = HYPERSPEED_COMBO_DURATION;
      syncComboDurations('hyperspeed', 'ghost');
    } else if (key === 'hyperspeed_shield') {
      if (activeEffects.hyperspeed <= 0) activateHyperspeed();
      if (activeEffects.shield <= 0) { activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
      syncComboDurations('hyperspeed', 'shield');
    } else if (key === 'ghost_shield') {
      // Wraith refresh wasn't previously handled — make sure both halves
      // come up to whichever timer is longest so the combo doesn't die mid-effect.
      if (activeEffects.ghost <= 0) activeEffects.ghost = GHOST_DURATION();
      if (activeEffects.shield <= 0) { activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
      syncComboDurations('ghost', 'shield');
    } else if (key === 'ghost_ghost') {
      // Eternal Phantom refresh: always reset to the full 16s ghost duration
      // when a fresh ghost pickup arrives, never downgrade to the shorter
      // single-ghost timer.
      activeEffects.ghost = GHOST_ETERNAL_DURATION;
    } else if (key === 'shield_shield') {
      // Fortress refresh: keep 2 hits, refresh duration; don't let a stale
      // timer race lose the fortress state.
      activeEffects.shield = SHIELD_DURATION();
      shieldBroken = false;
      shieldHits = Math.max(shieldHits, 2);
      fortressShield = true;
    } else if (key === 'nova_ghost') {
      // Phantom Blast refresh: reset the damage aura frames and the ghost
      // half so neither expires mid-combo.
      activeEffects.ghost = GHOST_DURATION();
      phantomBlastFrames = GHOST_DURATION();
    }
    lastComboLabel = key;
    screenShake = Math.max(screenShake, 6);
    return;
  }
  lastComboLabel = key;
  screenShake = Math.max(screenShake, 8);
  SFX.comboActivate(key);

  if (key === 'nova_nova') {
    // SUPERNOVA: 6 red/crimson waves at 400ms intervals, each larger
    for (let i = 0; i < 6; i++) {
      pendingNovaTimeouts.push(setTimeout(() => {
        if (state !== 'playing') return;
        pushCapped(novaRings, {
          x: player.x, y: player.y, radius: 0, life: 1, prevR: 0,
          radiusMult: 1 + i * 0.15,
          supernova: true,
        }, NOVA_RINGS_CAP);
        screenShake = Math.max(screenShake, 10 + i);
        SFX.pickup('nova');
      }, i * 400));
    }
    activeCombos[key] = { def, framesLeft: 170 };
  } else if (key === 'nova_hyperspeed') {
    // WARP TIME: 8s hyperspeed + auto full nova every 2s
    activateHyperspeed(HYPERSPEED_COMBO_DURATION);
    warpTimeNovaTimer = 0;
    activeCombos[key] = { def, deps: ['hyperspeed'] };
  } else if (key === 'nova_ghost') {
    // PHANTOM BLAST: 8s damage aura
    activeEffects.ghost = GHOST_DURATION();
    phantomBlastFrames = GHOST_DURATION();
    activeCombos[key] = { def, deps: ['ghost'] };
  } else if (key === 'nova_shield') {
    // PULSAR: full shield + auto nova every 4s
    activeEffects.shield = SHIELD_DURATION();
    shieldBroken = false;
    pulsarNovaTimer = 0;
    activeCombos[key] = { def, deps: ['shield'] };
  } else if (key === 'hyperspeed_ghost') {
    // SPECTRAL RUSH: 8s, 2x spike, barrier fires during ghost
    activateHyperspeed(HYPERSPEED_COMBO_DURATION, 2);
    activeEffects.ghost = HYPERSPEED_COMBO_DURATION;
    syncComboDurations('hyperspeed', 'ghost');
    activeCombos[key] = { def, deps: ['hyperspeed', 'ghost'] };
  } else if (key === 'hyperspeed_shield') {
    // JUGGERNAUT: barrier + shield + refresh shield on hyperspeed end
    if (activeEffects.hyperspeed <= 0) activateHyperspeed();
    if (activeEffects.shield <= 0) { activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
    syncComboDurations('hyperspeed', 'shield');
    juggernautPendingShieldRefresh = true;
    activeCombos[key] = { def, deps: ['hyperspeed'] };
  } else if (key === 'ghost_shield') {
    // WRAITH: during ghost destroy on contact; when ghost ends, shield absorbs 1 hit
    if (activeEffects.ghost <= 0) activeEffects.ghost = GHOST_DURATION();
    if (activeEffects.shield <= 0) { activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
    syncComboDurations('ghost', 'shield');
    activeCombos[key] = { def, deps: ['ghost'] };
  } else if (key === 'ghost_ghost') {
    // ETERNAL PHANTOM: 16s ghost
    activeEffects.ghost = GHOST_ETERNAL_DURATION;
    activeCombos[key] = { def, deps: ['ghost'] };
  } else if (key === 'shield_shield') {
    // FORTRESS SHIELD: 15s, 2 hits
    activeEffects.shield = SHIELD_DURATION();
    shieldBroken = false;
    shieldHits = 2;
    fortressShield = true;
    activeCombos[key] = { def, deps: ['shield'] };
  }
}

function activatePair(a, b) {
  Sentry.addBreadcrumb({ category: 'powerup', message: 'picked up ' + a.type, level: 'info' });
  Sentry.addBreadcrumb({ category: 'powerup', message: 'picked up ' + b.type, level: 'info' });
  emitPickupParticles(a.x, a.y, a.type);
  emitPickupParticles(b.x, b.y, b.type);
  // Defer hyperspeed pickup sound until after activation so it picks up the
  // new stack count for its pitch shift.
  if (a.type !== 'hyperspeed') SFX.pickup(a.type);
  runStats.powerupsUsed += 2;
  const key = comboKey(a.type, b.type);
  if (key) {
    activateCombo(key, a.x, a.y);
  } else {
    // Fallback: activate both individually (e.g. hyperspeed+hyperspeed)
    rawActivate(a.type, a.x, a.y);
    rawActivate(b.type, b.x, b.y);
  }
  if (a.type === 'hyperspeed') SFX.pickup('hyperspeed', { stacks: hyperSpeedStacks });

  // Both effects were gained simultaneously — identical timestamp triggers
  // Rule 3 (random tie-break) on the next single pickup.
  lastGainedEffects = [a.type, b.type];
  lastGainedTimestamp = frame;
}

function rawActivate(type, x, y) {
  if (type === 'shield') {
    activeEffects.shield = SHIELD_DURATION();
    shieldBroken = false;
    if (activeOrb === 'asteroid') {
      shieldHits = Math.min(SHIELD_HITS_MAX_ASTEROID, Math.max(shieldHits, 0) + 2);
    } else {
      shieldHits = Math.max(shieldHits, 1);
    }
  } else if (type === 'hyperspeed') {
    activateHyperspeed();
    if (activeOrb === 'nebula') activateHyperspeed();
  } else if (type === 'ghost') {
    activeEffects.ghost = GHOST_DURATION();
  } else if (type === 'nova') {
    fireTripleNova(player.x, player.y);
    recentNovaFrames = 90;
  }
}

function fireTripleNova(px, py) {
  pushCapped(novaRings, { x: px, y: py, radius: 0, life: 1, prevR: 0 }, NOVA_RINGS_CAP);
  screenShake = Math.max(screenShake, 10);
  const waves = activeOrb === 'solar' ? 6 : 3;
  for (let i = 1; i < waves; i++) {
    const life = Math.max(0.4, 1 - i * 0.1);
    const shake = Math.max(3, 10 - i * 1.5);
    pendingNovaTimeouts.push(setTimeout(() => {
      if (state === 'playing') {
        pushCapped(novaRings, { x: player.x, y: player.y, radius: 0, life, prevR: 0 }, NOVA_RINGS_CAP);
        screenShake = Math.max(screenShake, shake);
        SFX.pickup('nova');
      }
    }, i * 400));
  }
}

function clearPendingNovaTimeouts() {
  for (const id of pendingNovaTimeouts) clearTimeout(id);
  pendingNovaTimeouts = [];
}

// Recompute the peak speed multiplier for the current stack count. Stacks
// scale both the speed-relative cap (3.5 * stacks) and the absolute floor
// (6.0 * stacks). peakScale is an optional combo bonus (e.g. Spectral Rush
// passes 2 for double the effective speed).
function computeHyperspeedPeakMult(stacks, peakScale) {
  const normSpd = normalScrollSpeed();
  const s = Math.max(1, stacks || 1);
  const basePeak = Math.max(3.5 * s, (6.0 * s) / Math.max(normSpd, 0.01));
  return basePeak * (peakScale || 1);
}

// Each pickup adds a 6s timer (or the combo override) and bumps stacks up to
// HYPERSPEED_MAX_STACKS. At max we refresh the soonest-expiring timer instead
// of growing the array. The whoosh restarts so the engine pitch can shift up.
function activateHyperspeed(durationOverride, peakScale) {
  const newTimer = durationOverride || HYPERSPEED_DURATION;
  if (hyperSpeedStacks < HYPERSPEED_MAX_STACKS()) {
    hyperSpeedStacks++;
    hyperSpeedTimers.push(newTimer);
    Sentry.addBreadcrumb({ category: 'hyperspeed', message: 'stacks: ' + hyperSpeedStacks, level: 'info' });
  } else {
    // At max: refresh the timer that would expire soonest so the player still
