    // Pair-combo selection weighted by active orb's specialty: combos that
    // include the orb's bias type get 2x weight so they spawn more often.
    const bias = getOrbBonus().bias;
    const weights = PAIR_COMBOS.map(c => (bias && (c[0] === bias || c[1] === bias)) ? 2 : 1);
    let total = 0;
    for (const w of weights) total += w;
    let pick = Math.random() * total;
    let idx = 0;
    for (let i = 0; i < weights.length; i++) {
      pick -= weights[i];
      if (pick <= 0) { idx = i; break; }
    }
    const combo = PAIR_COMBOS[idx];
    const gap = 60;
    const cx = 80 + Math.random() * (W - 160);
    const id = nextPairId++;
    const a = {
      type: combo[0], x: cx - gap/2, y, radius: 13,
      pulse: Math.random() * 6.28, collected: false, pairId: id, pairSibling: null,
    };
    const b = {
      type: combo[1], x: cx + gap/2, y, radius: 13,
      pulse: Math.random() * 6.28, collected: false, pairId: id, pairSibling: null,
    };
    a.pairSibling = b; b.pairSibling = a;
    powerups.push(a, b);
    return;
  }
  let type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  // Nova overload guard: don't drop a nova if any nova-flavored effect is
  // already running (in-flight rings or nova-based combo). Reroll to a
  // non-nova type so the spawn slot stays useful.
  if (type === 'nova') {
    const novaActive = novaRings.length > 0
      || activeCombos.nova_nova
      || activeCombos.nova_hyperspeed
      || activeCombos.nova_ghost
      || activeCombos.nova_shield;
    if (novaActive) {
      const alt = ['shield', 'ghost', 'hyperspeed'];
      type = alt[Math.floor(Math.random() * alt.length)];
    }
  }
  powerups.push({
    type,
    x: 60 + Math.random() * (W - 120),
    y,
    radius: 13,
    pulse: Math.random() * 6.28,
    collected: false,
  });
}

function trimParticles() {
  if (pickupParticles.length > PICKUP_PART_CAP) {
    pickupParticles.splice(0, pickupParticles.length - PICKUP_PART_CAP);
  }
  if (deathParticles.length > DEATH_PART_CAP) {
    deathParticles.splice(0, deathParticles.length - DEATH_PART_CAP);
  }
}

// pickupParticles and deathParticles: life originally decayed at ~0.93/frame
// (~0.01 at frame 65 ≈ 1080ms). Compute life as 1 - elapsed/maxLifeMs so the
// fade visibly runs at the same rate regardless of framerate. Keep vx/vy
// frame-based per the physics-stay-frame-based exemption.
const PICKUP_PART_LIFE_MS = 1080;
const DEATH_PART_LIFE_MS = 1080;
function emitPickupParticles(x, y, type) {
  const rgb = POWERUP_COLORS[type].rgb;
  const now = Date.now();
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 4.5 + 1.2;
    pushCapped(pickupParticles, {
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      startTime: now, maxLifeMs: PICKUP_PART_LIFE_MS,
      size: Math.random() * 2.4 + 0.9,
      rgb,
    }, PICKUP_PART_CAP);
  }
  trimParticles();
}

function emitDestroyBurst(x, y, rgb) {
  const now = Date.now();
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 3.5 + 0.8;
    pushCapped(pickupParticles, {
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      startTime: now, maxLifeMs: PICKUP_PART_LIFE_MS,
      size: Math.random() * 2.2 + 0.8,
      rgb,
    }, PICKUP_PART_CAP);
  }
  trimParticles();
}

// Spawn a distinct visual effect per destroy kind. Each entry lives in the
// unified destroyEffects array and is capped so simultaneous combo kills
// can't blow up the allocation. Directional barrier effects assume world-
// down travel (planets scroll down past the player).
function countEffectKind(k) {
  let n = 0;
  for (const e of destroyEffects) if (e.kind === k) n++;
  return n;
}

function pushEffect(e) {
  if (destroyEffects.length >= DESTROY_EFFECTS_CAP) destroyEffects.shift();
  destroyEffects.push(e);
}

// destroyEffects: maxLife values are in MILLISECONDS. Per-frame update in
// drawDestroyEffects computes e.age = Date.now() - e.startTime so the
// (1 - age/maxLife) and (maxR * age/maxLife) math keep working unchanged.
function emitDestroyEffects(body, kind) {
  const now = Date.now();
  if (kind === 'nova' || kind === 'supernova') {
    const isSuper = kind === 'supernova';
    const ringScale = isSuper ? 4 : 3;
    const flashR   = body.radius * (isSuper ? 2.2 : 1.5);
    const fragsWant = isSuper ? 12 + Math.floor(Math.random() * 3)
                               :  8 + Math.floor(Math.random() * 3);
    // Center flash — 6/8 frames → 100/133ms
    pushEffect({ kind: 'novaFlash', x: body.x, y: body.y, startTime: now, age: 0, maxLife: isSuper ? 133 : 100,
                 r: flashR, color: '255,240,200' });
    // Shockwave ring — 18/22 frames → 300/367ms
    pushEffect({ kind: 'novaShock', x: body.x, y: body.y, startTime: now, age: 0, maxLife: isSuper ? 367 : 300,
                 maxR: body.radius * ringScale, color: body.glowColor || 'rgba(255,160,90,1)' });
    // Fragments — capped at 15 total across all simultaneous nova kills. 30f → 500ms
    const have = countEffectKind('novaFrag');
    const fragsAdd = Math.max(0, Math.min(fragsWant, 15 - have));
    for (let i = 0; i < fragsAdd; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.8 + Math.random() * 2.6;
      pushEffect({
        kind: 'novaFrag', x: body.x, y: body.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        startTime: now, age: 0, maxLife: 500,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.35,
        size: 4 + Math.random() * 4,
        sides: 3 + Math.floor(Math.random() * 2),
        color: body.glowColor || 'rgba(255,180,120,1)',
      });
    }

  } else if (kind === 'shield') {
    // Scan lines: 4-6 cyan laser lines sweep horizontally in 0.2s. 12f → 200ms
    const dir = Math.random() < 0.5 ? 1 : -1;
    const lines = 4 + Math.floor(Math.random() * 3);
    for (let i = 0; i < lines; i++) {
      const laneY = (i / Math.max(1, lines - 1) - 0.5) * body.radius * 1.8;
      pushEffect({ kind: 'shieldScan', x: body.x, y: body.y + laneY,
                   dir, baseR: body.radius, startTime: now, age: 0, maxLife: 200 });
    }
    // Sparks: perpendicular to scan = vertical. Cap 20 per kill. 18f → 300ms
    const sparkCount = Math.min(20, 12 + Math.floor(Math.random() * 4));
    for (let i = 0; i < sparkCount; i++) {
      const vy = (Math.random() < 0.5 ? -1 : 1) * (1.0 + Math.random() * 2.2);
      const vx = (Math.random() - 0.5) * 0.8;
      pushEffect({
        kind: 'shieldSpark',
        x: body.x + (Math.random() - 0.5) * body.radius * 1.6,
        y: body.y + (Math.random() - 0.5) * body.radius * 1.6,
        vx, vy, startTime: now, age: 0, maxLife: 300,
        color: Math.random() < 0.5 ? '180,240,255' : '255,255,255',
      });
    }
    // Afterburn glow — 0.15s. 9f → 150ms
    pushEffect({ kind: 'shieldAfter', x: body.x, y: body.y, startTime: now, age: 0, maxLife: 150,
                 r: body.radius * 1.4 });

  } else if (kind === 'barrier') {
    const travel = Math.PI / 2; // world-down
    // Impact streak — 5f → 83ms
    pushEffect({ kind: 'barrierStreak', x: body.x, y: body.y, startTime: now, age: 0, maxLife: 83,
                 len: body.radius * 2, angle: travel });
    // Compression wave — 12f → 200ms
    pushEffect({ kind: 'barrierComp', x: body.x, y: body.y, startTime: now, age: 0, maxLife: 200,
                 maxR: body.radius * 3, angle: travel });
    // Fragments flying BACKWARD (upward) — cap 8 per kill. 22f → 367ms
    const fragCount = Math.min(8, 5 + Math.floor(Math.random() * 2));
    for (let i = 0; i < fragCount; i++) {
      const spread = (Math.random() - 0.5) * (Math.PI * 0.6);
      const a = -Math.PI / 2 + spread; // upward
      const sp = 2.0 + Math.random() * 2.0;
      pushEffect({
        kind: 'barrierFrag', x: body.x, y: body.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        startTime: now, age: 0, maxLife: 367,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.4,
        size: 3 + Math.random() * 3,
        sides: 3,
        color: '255,220,120',
      });
    }

  } else if (kind === 'ghost') {
    // Soft purple ripple — 24f → 400ms
    pushEffect({ kind: 'ghostRipple', x: body.x, y: body.y, startTime: now, age: 0, maxLife: 400,
                 maxR: body.radius * 2.8 });
    // Wisps drift upward — cap 8. 24f → 400ms
    const wispCount = Math.min(8, 4 + Math.floor(Math.random() * 2));
    for (let i = 0; i < wispCount; i++) {
      pushEffect({
        kind: 'ghostWisp',
        x: body.x + (Math.random() - 0.5) * body.radius * 0.8,
        y: body.y + (Math.random() - 0.5) * body.radius * 0.4,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -0.6 - Math.random() * 0.8,
        startTime: now, age: 0, maxLife: 400,
        size: 2.5 + Math.random() * 2,
      });
    }
  }
}

function drawDestroyEffects() {
  // age and maxLife are both in ms now; startTime is the Date.now() at spawn.
  const nowDe = Date.now();
  for (const e of destroyEffects) {
    if (e.startTime !== undefined) e.age = nowDe - e.startTime;
  }
  destroyEffects = destroyEffects.filter(e => e.age < e.maxLife);
  for (const e of destroyEffects) {
    const t = e.age / e.maxLife;

    if (e.kind === 'novaFlash') {
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = `rgba(${e.color},1)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.4 + t * 0.6), 0, 6.28); ctx.fill();

    } else if (e.kind === 'novaShock') {
      const r = e.maxR * t;
      ctx.globalAlpha = (1 - t) * 0.9;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, 6.28); ctx.stroke();

    } else if (e.kind === 'novaFrag') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.96;
      e.vy = e.vy * 0.96 + 0.1; // slight gravity
      e.angle += e.spin;
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = e.color;
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.angle);
      ctx.beginPath();
      for (let i = 0; i < e.sides; i++) {
        const a = (i / e.sides) * 6.28;
        const px = Math.cos(a) * e.size;
        const py = Math.sin(a) * e.size;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();

    } else if (e.kind === 'shieldScan') {
      const half = e.baseR * 1.2;
      const lineX = e.x + e.dir * (-half + t * 2 * half);
      ctx.globalAlpha = (1 - t) * 0.85;
      ctx.strokeStyle = 'rgba(180,240,255,1)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(lineX - e.dir * 8, e.y);
      ctx.lineTo(lineX, e.y);
      ctx.stroke();

    } else if (e.kind === 'shieldSpark') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.95; e.vy *= 0.95;
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = `rgba(${e.color},1)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, 1.4, 0, 6.28); ctx.fill();

    } else if (e.kind === 'shieldAfter') {
      const alpha = (1 - t) * 0.55;
      const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
      g.addColorStop(0, `rgba(180,240,255,${alpha})`);
      g.addColorStop(1, 'rgba(180,240,255,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 6.28); ctx.fill();

    } else if (e.kind === 'barrierStreak') {
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = 'rgba(255,240,180,1)';
      ctx.lineWidth = 4;
      const dx = Math.cos(e.angle) * e.len;
      const dy = Math.sin(e.angle) * e.len;
      ctx.beginPath();
      ctx.moveTo(e.x - dx * 0.2, e.y - dy * 0.2);
      ctx.lineTo(e.x + dx, e.y + dy);
      ctx.stroke();

    } else if (e.kind === 'barrierComp') {
      const r = e.maxR * t;
      ctx.globalAlpha = (1 - t) * 0.75;
      ctx.strokeStyle = 'rgba(255,220,100,1)';
      ctx.lineWidth = 2;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.angle);
      ctx.scale(0.55, 1);
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.stroke();
      ctx.restore();

    } else if (e.kind === 'barrierFrag') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.95;
      e.vy = e.vy * 0.95 + 0.1;
      e.angle += e.spin;
      ctx.globalAlpha = 1 - t;
      ctx.fillStyle = `rgba(${e.color},1)`;
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.angle);
      ctx.beginPath();
      for (let i = 0; i < e.sides; i++) {
        const a = (i / e.sides) * 6.28;
        const px = Math.cos(a) * e.size;
        const py = Math.sin(a) * e.size;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();

    } else if (e.kind === 'ghostRipple') {
      const r = e.maxR * t;
      ctx.globalAlpha = (1 - t) * 0.35;
      ctx.strokeStyle = 'rgba(210,140,255,1)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, 6.28); ctx.stroke();

    } else if (e.kind === 'ghostWisp') {
      e.x += e.vx; e.y += e.vy;
      e.vx *= 0.97; e.vy *= 0.98;
      ctx.globalAlpha = (1 - t) * 0.55;
      ctx.fillStyle = 'rgba(210,180,255,1)';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, 6.28); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function addDestroyPoints() {
  destroyStreak++;
  lastDestroyTime = Date.now();
  const streakForScore = Math.min(destroyStreak, getStreakCap());
  const pts = streakForScore * streakForScore;
  score += pts;
  runStats.totalDestroyed++;
  runStats.pointsFromDestroying += pts;
  if (destroyStreak > runStats.longestStreak) runStats.longestStreak = destroyStreak;
  document.getElementById('score').textContent = score;
  const sd = document.getElementById('streakDisplay');
  if (destroyStreak > 1) {
    sd.textContent = '\uD83D\uDD25 x' + destroyStreak;
    sd.classList.add('visible');
  }
}

// --- Combo helpers ---
// recentNovaFrames is the remaining ms during which a nova pickup can still
// combine with a subsequent pickup. (Name kept for churn-minimization; unit is ms.)
let recentNovaFrames = 0;
let recentNovaEndTime = 0;
let lastComboLabel = null; // which combo key is currently shown on the timer bar
// Pickup recency tracking — used by detectCombo to decide which active
// effect a new single pickup should combine with. Single pickups produce a
// 1-entry array; pair pickups produce a 2-entry array with the same
// timestamp, which triggers Rule 3 (random tie-break) on the next pickup.
let lastGainedEffects = [];
let lastGainedTimestamp = -1;

function comboKey(a, b) {
  const order = { nova: 0, hyperspeed: 1, ghost: 2, shield: 3 };
  const [x, y] = [a, b].sort((p, q) => order[p] - order[q]);
  const k = x + '_' + y;
  return COMBO_DEFS[k] ? k : null;
}

// Treat a nova burst as "active" for combo purposes while recentNovaFrames
// is still counting — matches the original detectCombo behaviour.
function effectActive(t) {
  return t === 'nova' ? recentNovaFrames > 0 : activeEffects[t] > 0;
}

function detectCombo(newType) {
  // RULE 1 - SAME TYPE WINS: if the new pickup matches any currently
  // active effect, combine with that matching effect.
  if (effectActive(newType)) {
    const k = comboKey(newType, newType);
    if (k) return k;
  }

  // Build candidate partners from the most-recent pickup event, filtered
  // to effects still currently active and different from newType.
  const partners = lastGainedEffects.filter(t => t !== newType && effectActive(t));

  if (partners.length === 1) {
    // RULE 2 - MOST RECENTLY GAINED: single unambiguous partner.
    const k = comboKey(newType, partners[0]);
    if (k) return k;
  } else if (partners.length >= 2) {
    // RULE 3 - RANDOM TIE BREAK: pair pickup left two equally-recent
    // effects; pick one at random.
    const pick = partners[Math.floor(Math.random() * partners.length)];
    const k = comboKey(newType, pick);
    if (k) return k;
  }

  return null;
}

// Bring all listed timed-effect components up to the longest one's remaining
// duration. Stops a combo's "shorter" half (e.g. shield at 60 frames when ghost
// is freshly picked up at 480) from expiring mid-combo. Only acts on effects
// that are actually active (>0); never reactivates a dead one.
function syncComboDurations(...effectKeys) {
  // All values here are in milliseconds — activeEffects.X is remaining ms.
  let max = 0;
  for (const k of effectKeys) {
    if (activeEffects[k] > max) max = activeEffects[k];
  }
  if (max <= 0) return;
  const now = Date.now();
  for (const k of effectKeys) {
    if (activeEffects[k] > 0 && activeEffects[k] < max) {
      activeEffects[k] = max;
      if (k === 'shield') shieldEndTime = now + max;
      else if (k === 'ghost') ghostEndTime = now + max;
    }
  }
  // Hyperspeed deceleration uses hyperspeedActiveDuration as the curve
  // denominator — bump it so the curve stays valid when we extend the timer.
  // Also extend the longest stack timer so the next update tick doesn't
  // immediately undo the sync by recomputing activeEffects.hyperspeed.
  if (effectKeys.includes('hyperspeed') && hyperspeedActiveDuration < max) {
    hyperspeedActiveDuration = max;
  }
  if (effectKeys.includes('hyperspeed') && hyperSpeedTimers.length > 0) {
    // hyperSpeedTimers entries are absolute end timestamps; "longest" = latest.
    let longestIdx = 0;
    for (let i = 1; i < hyperSpeedTimers.length; i++) {
      if (hyperSpeedTimers[i] > hyperSpeedTimers[longestIdx]) longestIdx = i;
    }
    const targetEnd = now + max;
    if (hyperSpeedTimers[longestIdx] < targetEnd) hyperSpeedTimers[longestIdx] = targetEnd;
  }
}

function activateCombo(key, x, y) {
  const def = COMBO_DEFS[key];
  if (!def) return;
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'combo', message: 'combo activated: ' + key, level: 'info' });
  // Guard: if the same combo is already active, refresh its timers without
  // re-running the activation body. Re-activating Warp Time or Pulsar while
  // already running would schedule a second stream of setTimeout-driven nova
  // spawns (the cause of the Android hyperspeed-combo crash at high scores).
  if (activeCombos[key]) {
    if (key === 'nova_hyperspeed') {
      // Refresh hyperspeed duration but leave warpNextNovaTime alone so the
      // auto-nova cadence continues uninterrupted.
      activateHyperspeed(HYPERSPEED_COMBO_DURATION);
    } else if (key === 'nova_shield') {
      // Refresh shield duration but leave pulsarNextNovaTime alone so the
      // auto-nova cadence continues uninterrupted.
      shieldEndTime = Date.now() + SHIELD_DURATION();
      activeEffects.shield = SHIELD_DURATION();
      shieldBroken = false;
    } else if (key === 'hyperspeed_ghost') {
      activateHyperspeed(HYPERSPEED_COMBO_DURATION, 2);
      // Don't downgrade ghost if Eternal Phantom's longer timer is running.
      if (activeEffects.ghost < HYPERSPEED_COMBO_DURATION) {
        ghostEndTime = Date.now() + HYPERSPEED_COMBO_DURATION;
        activeEffects.ghost = HYPERSPEED_COMBO_DURATION;
      }
      syncComboDurations('hyperspeed', 'ghost');
    } else if (key === 'hyperspeed_shield') {
      if (activeEffects.hyperspeed <= 0) activateHyperspeed();
      if (activeEffects.shield <= 0) { shieldEndTime = Date.now() + SHIELD_DURATION(); activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
      syncComboDurations('hyperspeed', 'shield');
    } else if (key === 'ghost_shield') {
      // Wraith refresh wasn't previously handled — make sure both halves
      // come up to whichever timer is longest so the combo doesn't die mid-effect.
      if (activeEffects.ghost <= 0) { ghostEndTime = Date.now() + GHOST_DURATION(); activeEffects.ghost = GHOST_DURATION(); }
      if (activeEffects.shield <= 0) { shieldEndTime = Date.now() + SHIELD_DURATION(); activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
      syncComboDurations('ghost', 'shield');
    } else if (key === 'ghost_ghost') {
      // Eternal Phantom refresh: always reset to the full 16s ghost duration
      // when a fresh ghost pickup arrives, never downgrade to the shorter
      // single-ghost timer.
      ghostEndTime = Date.now() + GHOST_ETERNAL_DURATION();
      activeEffects.ghost = GHOST_ETERNAL_DURATION();
    } else if (key === 'shield_shield') {
      // Fortress refresh: 4 hits on asteroid, 2 hits on other orbs; refresh
      // duration; don't let a stale timer race lose the fortress state.
      shieldEndTime = Date.now() + SHIELD_DURATION();
      activeEffects.shield = SHIELD_DURATION();
      shieldBroken = false;
      const fortressHits = activeOrb === 'asteroid' ? 4 : 2;
      shieldHits = Math.max(shieldHits, fortressHits);
      fortressShield = true;
    } else if (key === 'nova_ghost') {
      // Phantom Blast refresh: reset the damage aura and the ghost half so
      // neither expires mid-combo.
      ghostEndTime = Date.now() + GHOST_DURATION();
      activeEffects.ghost = GHOST_DURATION();
      phantomBlastEndTime = Date.now() + GHOST_DURATION();
    }
    // Eternal Phantom takes precedence over Spectral Rush for the label — its
    // ghost timer is longer and defines the dominant effect.
    lastComboLabel = (key === 'hyperspeed_ghost' && activeCombos.ghost_ghost) ? 'ghost_ghost' : key;
    screenShake = Math.max(screenShake, 6);
    return;
  }
  lastComboLabel = (key === 'hyperspeed_ghost' && activeCombos.ghost_ghost) ? 'ghost_ghost' : key;
  screenShake = Math.max(screenShake, 8);
  SFX.comboActivate(key);

  if (key === 'nova_nova') {
    // SUPERNOVA: 6 red/crimson waves at 400ms intervals, each larger
    for (let i = 0; i < 6; i++) {
      pendingNovaTimeouts.push(setTimeout(() => {
        if (state !== 'playing') return;
        pushCapped(novaRings, {
          x: player.x, y: player.y, radius: 0, life: 1, prevR: 0,
          radiusMult: 1 + i * 0.15,
          supernova: true,
          startTime: Date.now(),
        }, NOVA_RINGS_CAP);
        screenShake = Math.max(screenShake, 10 + i);
        SFX.pickup('nova');
      }, i * 400));
    }
    // 170 frames ≈ 2833ms
    activeCombos[key] = { def, endTime: Date.now() + 2833 };
  } else if (key === 'nova_hyperspeed') {
    // WARP TIME: 8s hyperspeed + auto full nova every 2s
    activateHyperspeed(HYPERSPEED_COMBO_DURATION);
    warpNextNovaTime = Date.now();
    activeCombos[key] = { def, deps: ['hyperspeed'] };
  } else if (key === 'nova_ghost') {
    // PHANTOM BLAST: 8s damage aura
    ghostEndTime = Date.now() + GHOST_DURATION();
    activeEffects.ghost = GHOST_DURATION();
    phantomBlastEndTime = Date.now() + GHOST_DURATION();
    activeCombos[key] = { def, deps: ['ghost'] };
  } else if (key === 'nova_shield') {
    // PULSAR: full shield + auto nova every 4s
    shieldEndTime = Date.now() + SHIELD_DURATION();
    activeEffects.shield = SHIELD_DURATION();
    shieldBroken = false;
    pulsarNextNovaTime = Date.now();
    activeCombos[key] = { def, deps: ['shield'] };
  } else if (key === 'hyperspeed_ghost') {
    // SPECTRAL RUSH: 8s, 2x spike, barrier fires during ghost.
    // If Eternal Phantom is running, its longer ghost timer wins — don't
    // collapse it to Spectral Rush's 8s.
    activateHyperspeed(HYPERSPEED_COMBO_DURATION, 2);
    if (activeEffects.ghost < HYPERSPEED_COMBO_DURATION) {
      ghostEndTime = Date.now() + HYPERSPEED_COMBO_DURATION;
      activeEffects.ghost = HYPERSPEED_COMBO_DURATION;
    }
    syncComboDurations('hyperspeed', 'ghost');
    activeCombos[key] = { def, deps: ['hyperspeed', 'ghost'] };
  } else if (key === 'hyperspeed_shield') {
    // JUGGERNAUT: barrier + shield + refresh shield on hyperspeed end
    if (activeEffects.hyperspeed <= 0) activateHyperspeed();
    if (activeEffects.shield <= 0) { shieldEndTime = Date.now() + SHIELD_DURATION(); activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
    syncComboDurations('hyperspeed', 'shield');
    juggernautPendingShieldRefresh = true;
    activeCombos[key] = { def, deps: ['hyperspeed'] };
  } else if (key === 'ghost_shield') {
    // WRAITH: during ghost destroy on contact; when ghost ends, shield absorbs 1 hit
    if (activeEffects.ghost <= 0) { ghostEndTime = Date.now() + GHOST_DURATION(); activeEffects.ghost = GHOST_DURATION(); }
    if (activeEffects.shield <= 0) { shieldEndTime = Date.now() + SHIELD_DURATION(); activeEffects.shield = SHIELD_DURATION(); shieldBroken = false; }
    syncComboDurations('ghost', 'shield');
    activeCombos[key] = { def, deps: ['ghost'] };
  } else if (key === 'ghost_ghost') {
    // ETERNAL PHANTOM: 16s ghost
    ghostEndTime = Date.now() + GHOST_ETERNAL_DURATION();
    activeEffects.ghost = GHOST_ETERNAL_DURATION();
    activeCombos[key] = { def, deps: ['ghost'] };
  } else if (key === 'shield_shield') {
    // FORTRESS SHIELD: 4 hits on asteroid orb, 2 hits on other orbs.
    shieldEndTime = Date.now() + SHIELD_DURATION();
    activeEffects.shield = SHIELD_DURATION();
    shieldBroken = false;
    shieldHits = activeOrb === 'asteroid' ? 4 : 2;
    fortressShield = true;
    activeCombos[key] = { def, deps: ['shield'] };
  }
}

function activatePair(a, b) {
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'powerup', message: 'picked up ' + a.type, level: 'info' });
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'powerup', message: 'picked up ' + b.type, level: 'info' });
  emitPickupParticles(a.x, a.y, a.type);
  emitPickupParticles(b.x, b.y, b.type);
  // Defer hyperspeed pickup sound until after activation so it picks up the
  // new stack count for its pitch shift.
  if (a.type !== 'hyperspeed') SFX.pickup(a.type);
  runStats.powerupsUsed += 2;
  const key = comboKey(a.type, b.type);
  if (key) {
    activateCombo(key, a.x, a.y);
  } else {
    // Fallback: activate both individually (e.g. hyperspeed+hyperspeed)
    rawActivate(a.type, a.x, a.y);
    rawActivate(b.type, b.x, b.y);
  }
  if (a.type === 'hyperspeed') SFX.pickup('hyperspeed', { stacks: hyperSpeedStacks });

  // Both effects were gained simultaneously — identical timestamp triggers
  // Rule 3 (random tie-break) on the next single pickup.
  lastGainedEffects = [a.type, b.type];
  lastGainedTimestamp = frame;
}

function rawActivate(type, x, y) {
  if (type === 'shield') {
    shieldEndTime = Date.now() + SHIELD_DURATION();
    activeEffects.shield = SHIELD_DURATION();
    shieldBroken = false;
    // Either/or increment — NOT additive. Exactly one branch runs.
    if (activeOrb === 'asteroid') {
      shieldHits = Math.min(4, shieldHits + 2);
    } else {
      shieldHits = Math.min(2, shieldHits + 1);
    }
  } else if (type === 'hyperspeed') {
    activateHyperspeed();
    if (activeOrb === 'nebula') activateHyperspeed();
  } else if (type === 'ghost') {
    ghostEndTime = Date.now() + GHOST_DURATION();
    activeEffects.ghost = GHOST_DURATION();
  } else if (type === 'nova') {
    fireTripleNova(player.x, player.y);
    // 90 frames @60fps = 1500ms — the window for combining with the next pickup.
    recentNovaEndTime = Date.now() + 1500;
    recentNovaFrames = 1500;
  }
}

function fireTripleNova(px, py) {
  pushCapped(novaRings, { x: px, y: py, radius: 0, life: 1, prevR: 0, startTime: Date.now() }, NOVA_RINGS_CAP);
  screenShake = Math.max(screenShake, 10);
  const waves = activeOrb === 'solar' ? 6 : 3;
  for (let i = 1; i < waves; i++) {
    const life = Math.max(0.4, 1 - i * 0.1);
    const shake = Math.max(3, 10 - i * 1.5);
    pendingNovaTimeouts.push(setTimeout(() => {
      if (state === 'playing') {
        pushCapped(novaRings, { x: player.x, y: player.y, radius: 0, life, prevR: 0, startTime: Date.now() }, NOVA_RINGS_CAP);
        screenShake = Math.max(screenShake, shake);
        SFX.pickup('nova');
      }
    }, i * 400));
  }
}

function clearPendingNovaTimeouts() {
  for (const id of pendingNovaTimeouts) clearTimeout(id);
  pendingNovaTimeouts = [];
}

// Spawn a single shield-EMP burst at (x, y). Expands to EMP_MAX_RADIUS;
// first planet it sweeps gets destroyed. Primary rings (isChain=false) spawn
// a secondary EMP at the victim's position; secondary rings (isChain=true)
// destroy without further chaining (max one level deep). Visual is an
// electric dome: expanding ring with lightning inside, sparks on the edge,
// center flash. Secondary rings are smaller (120px) and dimmer.
function spawnEmpRing(x, y, isChain) {
  // 4-6 lightning bolts originating at center and reaching the dome edge.
  // Each bolt has a fixed angle; its segment offsets are re-randomized during
  // draw to produce the flicker effect. Segment count is fixed per-bolt.
  const boltCount = 4 + Math.floor(Math.random() * 3);
  const bolts = [];
  for (let i = 0; i < boltCount; i++) {
    bolts.push({
      angle: (i / boltCount) * Math.PI * 2 + Math.random() * 0.4,
      segs: 5 + Math.floor(Math.random() * 2), // 5-6
    });
  }
  // 12-16 edge spark angles — sparks ride the ring circumference.
  const sparkCount = 12 + Math.floor(Math.random() * 5);
  const sparks = [];
  for (let i = 0; i < sparkCount; i++) {
    sparks.push({
      angle: (i / sparkCount) * Math.PI * 2 + Math.random() * 0.25,
      phase: Math.random() * 6.28,
    });
  }
  pushCapped(empRings, {
    x, y,
    radius: 0, prevR: 0,
    startTime: Date.now(),
    triggered: false, // only destroys one planet ever
    isChain: !!isChain,
    maxRadius: isChain ? 120 : EMP_MAX_RADIUS,
    opacity: isChain ? 0.6 : 1,
    bolts, sparks,
  }, EMP_RINGS_CAP);
}

// Recompute the peak speed multiplier for the current stack count. Stacks
// scale both the speed-relative cap (3.5 * stacks) and the absolute floor
// (6.0 * stacks). peakScale is an optional combo bonus (e.g. Spectral Rush
// passes 2 for double the effective speed).
function computeHyperspeedPeakMult(stacks, peakScale) {
  const normSpd = normalScrollSpeed();
  const s = Math.max(1, stacks || 1);
  const basePeak = Math.max(3.5 * s, (6.0 * s) / Math.max(normSpd, 0.01));
  return basePeak * (peakScale || 1);
}

// Each pickup adds a 6s timer (or the combo override, in ms) and bumps stacks
// up to HYPERSPEED_MAX_STACKS. At max we refresh the soonest-expiring timer
// instead of growing the array. The whoosh restarts so the engine pitch can
// shift up. hyperSpeedTimers stores absolute end timestamps (Date.now() + ms).
function activateHyperspeed(durationOverride, peakScale) {
  const durationMs = durationOverride || HYPERSPEED_DURATION_MS;
  const now = Date.now();
  const newEnd = now + durationMs;
  if (hyperSpeedStacks < HYPERSPEED_MAX_STACKS()) {
    hyperSpeedStacks++;
    hyperSpeedTimers.push(newEnd);
    if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'hyperspeed', message: 'stacks: ' + hyperSpeedStacks, level: 'info' });
  } else {
    // At max: refresh the timer that would expire soonest so the player still
    // feels the pickup as a duration extension.
    let minIdx = 0;
    for (let i = 1; i < hyperSpeedTimers.length; i++) {
      if (hyperSpeedTimers[i] < hyperSpeedTimers[minIdx]) minIdx = i;
    }
    if (newEnd > hyperSpeedTimers[minIdx]) hyperSpeedTimers[minIdx] = newEnd;
  }
  if (hyperSpeedStacks > peakHyperSpeedStacks) peakHyperSpeedStacks = hyperSpeedStacks;

  hyperspeedPeakMult = computeHyperspeedPeakMult(hyperSpeedStacks, peakScale);
  hyperspeedCurrentMult = hyperspeedPeakMult;
  hyperspeedTargetSpeed = normalScrollSpeed();
  // Deceleration curve denominator is the longest remaining duration (ms).
  const longestEnd = Math.max.apply(null, hyperSpeedTimers);
  hyperspeedActiveDuration = Math.max(1, longestEnd - now);
  activeEffects.hyperspeed = hyperspeedActiveDuration;

  // Restart the sustained whoosh at the new stack-scaled pitch.
  if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} }
  hyperspeedWhooshNodes = SFX.startHyperspeedWhoosh(hyperSpeedStacks);
}

function activatePowerup(type, x, y) {
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'powerup', message: 'picked up ' + type, level: 'info' });
  emitPickupParticles(x, y, type);
  // Hyperspeed pickup sound is played AFTER rawActivate so it can use the
  // new stack count for its pitch shift; everything else plays immediately.
  if (type !== 'hyperspeed') SFX.pickup(type);
  runStats.powerupsUsed++;

  // Detect combo BEFORE updating lastGainedEffects — the partner lookup
  // must see the previous pickup, not this one.
  const key = detectCombo(type);

  // The new pickup always activates its own individual effect timer, and
  // the combo (if any) stacks on top with a fresh activation.
  rawActivate(type, x, y);
  if (type === 'hyperspeed') SFX.pickup('hyperspeed', { stacks: hyperSpeedStacks });
  if (key) activateCombo(key, x, y);

  // Record this pickup as the most-recently-gained event.
  lastGainedEffects = [type];
  lastGainedTimestamp = frame;
}

// --- Run timer ---
// Wall-clock elapsed time (Date.now() - runStartTime). Frame-rate independent
// so the displayed MM:SS matches real seconds even during hitches.
// Progression escalates at fixed real-time thresholds (not scaled by diff).
let runStartTime = 0;
function elapsedRunSeconds() {
  return runStartTime ? (Date.now() - runStartTime) / 1000 : 0;
}
function formatRunTime(seconds) {
  const mm = Math.floor(seconds / 60);
  const ss = Math.floor(seconds % 60);
  return (mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss;
}
// Stage descriptor for the timer: tier (color), per-frame visual effects.
// tier 0 = white, 1 = orange, 2 = red.
function runTimerStage(s) {
  if (s < 120) return { tier: 0, blink: 0, shake: 0, glitch: 0, pulse: 0 };
  if (s < 180) return { tier: 1, blink: 0, shake: 0, glitch: 0, pulse: 0 };
  if (s < 240) return { tier: 2, blink: 10, shake: 3, glitch: 0, pulse: 0.3 };
  if (s < 300) return { tier: 2, blink: 7,  shake: 5, glitch: 0, pulse: 0.45 };
  if (s < 360) return { tier: 2, blink: 5,  shake: 7, glitch: 1, pulse: 0.6 };
  if (s < 420) return { tier: 2, blink: 3,  shake: 10, glitch: 2, pulse: 0.8 };
  return         { tier: 2, blink: 2, shake: 15, glitch: 3, pulse: 1.0 };
}
const RUN_TIMER_COLORS = [
  'rgba(255,255,255,0.92)',
  'rgba(255,180,80,0.95)',
  'rgba(255,60,60,0.95)',
];
// Randomly garble a fraction of non-space chars for the high-glitch tiers.
const GLITCH_CHARS = '!@#$%*░▒▓█▄▀■□◆◇░';
function glitchText(text, level) {
  if (!level) return text;
  const rate = level === 1 ? 0.12 : level === 2 ? 0.28 : 0.55;
  let out = '';
  for (const c of text) {
    if (c !== ' ' && Math.random() < rate) {
      out += GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
    } else out += c;
  }
  return out;
}
function updateRunTimerDisplay() {
  const el = document.getElementById('runTimer');
  if (!el) return;
  const s = elapsedRunSeconds();
  const stage = runTimerStage(s);
  const showBang = stage.tier >= 2;
  el.textContent = glitchText(formatRunTime(s) + (showBang ? ' !' : ''), stage.glitch);
  const color = RUN_TIMER_COLORS[stage.tier];
  el.style.color = color;
  el.style.textShadow = '0 0 12px ' + color;
  if (stage.blink > 0) {
    const blinkHigh = Math.floor(frame / stage.blink) % 2 === 0;
    const low = Math.max(0, 1 - stage.pulse);
    el.style.opacity = blinkHigh ? '1' : String(low);
    const shake = (Math.random() - 0.5) * stage.shake * 2;
    el.style.transform = `translateX(calc(-50% + ${shake.toFixed(2)}px))`;
  } else {
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%)';
  }
}

// --- Game state ---
function resetGame() {
  player = { x: W/2, y: H*0.72, vx: 0, vy: 0, angle: 0 };
  trail = []; deathParticles = [];
  lastSpawnZone = -1;
  initBodies();
  score = 0; frame = 0; planetsPassed = 0;
  closestBody = null;
  destroyStreak = 0;
  lastDestroyTime = 0;
  runStats = { totalPassed: 0, totalDestroyed: 0, pointsFromPassing: 0, pointsFromDestroying: 0, longestStreak: 0, powerupsUsed: 0 };
  document.getElementById('streakDisplay').classList.remove('visible');
  powerups = [];
  novaRings = []; screenShake = 0;
  empRings = [];
  pickupParticles = [];
  orbTrailParticles = [];
  planetRipples = [];
  destroyEffects = [];
  deathShards = [];
  crackFragments = [];
  playerPosHistory = [];
  playerInVoidRange = false;
  if (voidHumNodes) { try { voidHumNodes.stop(); } catch {} voidHumNodes = null; }
  burstCooldownEnd = 0;
  burstTriggered = false;
  resetApocalypse();
  deathFlashFrames = 0;
  if (pendingDeathBurstTimer) { clearTimeout(pendingDeathBurstTimer); pendingDeathBurstTimer = null; }
  clearPendingNovaTimeouts();
  activeEffects = { shield: 0, hyperspeed: 0, ghost: 0 };
  shieldEndTime = 0;
  ghostEndTime = 0;
  hyperspeedCurrentMult = 1; hyperspeedTargetSpeed = 0;
  hyperspeedPeakMult = 1; hyperspeedActiveDuration = HYPERSPEED_DURATION_MS;
  hyperSpeedStacks = 0;
  resetBgObjects();
  hyperSpeedTimers = [];
  peakHyperSpeedStacks = 0;
  if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} hyperspeedWhooshNodes = null; }
  shieldBroken = false;
  shieldHits = 0;
  fortressShield = false;
  activeCombos = {};
  lastComboLabel = null;
  recentNovaFrames = 0;
  recentNovaEndTime = 0;
  phantomBlastEndTime = 0;
  warpNextNovaTime = 0;
  pulsarNextNovaTime = 0;
  juggernautPendingShieldRefresh = false;
  lastGainedEffects = [];
  lastGainedTimestamp = -1;
  lastPowerupSpawn = 0;
  runStartTime = Date.now();
  graceEndTime = Date.now() + GRACE_DURATION_MS;
  // Phase-track state: clear any leftover voices from the previous run and
  // rewind so the first checkGameplayPhase() call sees phase 1 as current.
  // The start-button handler re-arms 'gameplay' after this, which now routes
  // to the phase-voice system.
  try { SFX.stopAllGameplayTracks(0.1); } catch {}
  currentGameplayTrack = 1;
  document.getElementById('score').textContent = '0';
  updateRunTimerDisplay();
  console.log('[reset] elapsedRunSeconds after reset:', elapsedRunSeconds());
}

// --- Physics: only closest body matters ---
function findClosest() {
  let best = null, bd = Infinity;
  for (const b of bodies) {
    const d = dist(player, b);
    if (d < bd) { bd = d; best = b; }
  }
  // Powerups participate as gravity objects
  for (const p of powerups) {
    if (p.collected) continue;
    const d = dist(player, p);
    if (d < bd) { bd = d; best = p; }
  }
  // Crack fragments are obstacles, not gravity sources — excluded from targeting.
  closestBody = best;
}

// Passive forces from body types that act on the player without needing
// input: screaming-planet surge and void-orb noise. Called once per frame
// just before applyForce so drag and position updates see the combined
// velocity change.
function applyEnvironmentForces() {
  let nearVoid = false;
  for (const b of bodies) {
    if (b.type === 'screaming' && b.screamSurgeFrames > 0) {
      const d = dist(player, b);
      if (d < b.radius * 4 && d > 0.5) {
        const nx = (b.x - player.x) / d;
        const ny = (b.y - player.y) / d;
        player.vx += nx * 0.15;
        player.vy += ny * 0.15;
      }
    } else if (b.type === 'void') {
      const dx = player.x - b.x, dy = player.y - b.y;
      const d = Math.hypot(dx, dy);
      if (d < b.radius * 5 && d > 0.5) {
        // Gentle repel away from the void, strongest at the center.
        const repelStrength = 0.25 * (1 - d / (b.radius * 5));
        player.vx += (dx / d) * repelStrength;
        player.vy += (dy / d) * repelStrength;
        nearVoid = true;
        b.voidRepellingPlayer = true;
      } else {
        b.voidRepellingPlayer = false;
      }
    }
  }
  playerInVoidRange = nearVoid;
  // Toggle the void hum based on proximity.
  if (nearVoid && !voidHumNodes) {
    voidHumNodes = SFX.startVoidHum();
  } else if (!nearVoid && voidHumNodes) {
    try { voidHumNodes.stop(); } catch {}
    voidHumNodes = null;
  }
}

function applyForce() {
  if (!closestBody) return;
  const dx = closestBody.x - player.x;
  const dy = closestBody.y - player.y;
  const d = Math.max(Math.hypot(dx, dy), closestBody.radius * 2.2);
  const nx = dx / d, ny = dy / d;
  // Influence tapers with distance so far-away pulls feel proportional
  const influence = Math.min(140 / d, 1.8);

  // Scale player responsiveness with current scroll speed so the controls
  // don't feel sluggish when the world is screaming past. NORMAL.startSpeed
  // (1.2) is the baseline — at that speed the multiplier is exactly 1.0 and
  // the feel is identical to the original tuning. EXTREME max (6.0) gives
  // ratio 5.0. The 0.4 factor keeps scaling sub-linear so it never goes
  // twitchy. Clamped at >=1 so slow-mo doesn't reduce baseline responsiveness.
  const speedRatio = Math.max(1, scrollSpeed() / DIFFICULTIES.NORMAL.startSpeed);
  const forceMult  = 1 + (speedRatio - 1) * 0.4;
  // Drag eases from 0.91 → 0.94 as speed ratio climbs from 1 → 5, letting
  // the player glide further per input at higher speeds.
  const dragCoef   = 0.91 + Math.min((speedRatio - 1) / 4, 1) * 0.03;

  const f = FORCE * influence * forceMult;

  if (leftDown)  { player.vx += nx*f; player.vy += ny*f; }
  if (rightDown) {
    // Dead zone fix: when planet is directly above and repel vector is nearly
    // vertical, nudge it horizontally based on actual relative position. Nudge
    // strength scales with scroll speed — faster world, less reaction time.
    let rnx = -nx, rny = -ny;
    if (closestBody.y < player.y && Math.abs(rnx) < 0.15) {
      const nudgeStrength = Math.min(
        0.45,
        0.15 + (scrollSpeed() / DIFFICULTIES.NORMAL.startSpeed) * 0.08
      );
      const side = player.x - closestBody.x;
      rnx = (side === 0 ? -1 : Math.sign(side)) * nudgeStrength;
      const mag = Math.hypot(rnx, rny);
      rnx /= mag; rny /= mag;
    }
    player.vx += rnx*f; player.vy += rny*f;
  }

  // Center-seeking vertical gravity: gently pulls the player toward the
  // vertical midline (H * 0.5) from either side. Skipped during hyperspeed
  // so the run-up is uninterrupted; the late landing pull below handles
  // re-centering at the end.
  let ay = 0;
  const inHyperspeed = activeEffects.hyperspeed > 0;
  if (!inHyperspeed) {
    if (player.y < H * 0.5) {
      ay += 0.015 * ((H * 0.5 - player.y) / (H * 0.5));
    } else {
      ay -= 0.015 * ((player.y - H * 0.5) / (H * 0.5));
    }
  }
  if (inHyperspeed && activeEffects.hyperspeed < 800) {
    // Stacked hyperspeed lands harder: scale pull by the peak stacks reached
    // this session. 1 stack = 1× (unchanged from pre-stacking), 4 stack = 4×.
    // Landing window is the final 800ms of the longest stack.
    const stackBoost = Math.max(1, peakHyperSpeedStacks);
    const pullStrength = Math.max(0.0004, (1 - activeEffects.hyperspeed / 800) * 0.002 * stackBoost);
    ay += (H * 0.72 - player.y) * pullStrength;
  }

  // Soft boundary forces — keep the player off the deadly edges. Skipped
  // while hyperspeed is active so the physics run completely clean.
  if (!inHyperspeed) {
    if (player.y > H * 0.85) {
      ay -= 0.035 * ((player.y - H * 0.85) / (H * 0.15));
    }
    if (player.y < H * 0.22) {
      ay += 0.06 * ((H * 0.22 - player.y) / (H * 0.22));
    }
  }
  player.vy += ay;

  player.vx *= dragCoef; player.vy *= dragCoef;
  if (isNaN(player.vx)) player.vx = 0;
  if (isNaN(player.vy)) player.vy = 0;
  const spd = Math.hypot(player.vx, player.vy);
  // EXTREME loosens the cap so players can actually outrun dense clusters
  const speedCap = difficulty === 'EXTREME' ? 5.5 : 4.5;
  if (spd > speedCap) { player.vx = player.vx/spd*speedCap; player.vy = player.vy/spd*speedCap; }

  player.x += player.vx; player.y += player.vy;
  player.angle = Math.atan2(player.vy, player.vx);
}

// Body-vs-player hit check. Encapsulates the per-type dynamic hitbox: toothed
// planets also check each rotating spike tip; tentacles check each extended
// tentacle line segment; pulsing hearts use a scaled radius.
function bodyHits(b, padding) {
  const pad = padding || 0;
  if (b.type === 'toothed') {
    if (dist(player, b) < b.radius + PLAYER_R + pad) return true;
    // 8 spikes rotating together. Each tip sits at toothAngle + i*(π/4)
    // extended by spikeLen * |sin(toothAngle + i*(π/4))|.
    for (let i = 0; i < 8; i++) {
      const a = b.toothAngle + i * (Math.PI / 4);
      const ext = b.spikeLen * Math.abs(Math.sin(a));
      const tipX = b.x + Math.cos(a) * (b.radius + ext);
      const tipY = b.y + Math.sin(a) * (b.radius + ext);
      if (Math.hypot(player.x - tipX, player.y - tipY) < PLAYER_R + 6) return true;
    }
    return false;
  }
  if (b.type === 'tentacle') {
    if (dist(player, b) < b.radius + PLAYER_R + pad) return true;
    const count = b.tentacleCount;
    for (let i = 0; i < count; i++) {
      const ext = tentacleExtension(b.tentaclePhases[i]);
      if (ext < 0.1) continue;
      const angle = (i / count) * Math.PI * 2;
      const tipX = b.x + Math.cos(angle) * (b.radius + b.radius * 1.2 * ext);
      const tipY = b.y + Math.sin(angle) * (b.radius + b.radius * 1.2 * ext);
      // Distance from player to the line segment (b.x,b.y → tipX,tipY)
      const d = pointSegmentDist(player.x, player.y, b.x, b.y, tipX, tipY);
      if (d < 8 + PLAYER_R - 2) return true;
    }
    return false;
  }
  if (b.type === 'heart') {
    const dynR = b.radius * (b.heartScale || 1);
    return dist(player, b) < dynR + PLAYER_R + pad;
  }
  return dist(player, b) < b.radius + PLAYER_R + pad;
}

// 0→1 extension curve for a tentacle cycle phase (0-3.5s):
//   0-2s extending, 2-2.5s fully extended, 2.5-3.5s retracting.
function tentacleExtension(phase) {
  if (phase < 2)       return phase / 2;
  if (phase < 2.5)     return 1;
  return Math.max(0, 1 - (phase - 2.5) / 1);
}

function pointSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - ax, py - ay);
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function checkCollisions() {
  if (Date.now() < graceEndTime) return false;
  // Borders are always lethal — shield/ghost only protect against bodies
  if (player.x < PLAYER_R+3 || player.x > W-PLAYER_R-3) return true;
  if (player.y > H+50 || player.y < -50) return true;

  // GHOST: pass through bodies, emit a shimmer ripple when clipping one.
  // WRAITH (ghost + shield active): destroy on contact during ghost.
  if (activeEffects.ghost > 0) {
    const wraith = activeEffects.shield > 0;
    for (let i = bodies.length - 1; i >= 0; i--) {
      const b = bodies[i];
      if (bodyHits(b, 0)) {
        if (wraith) {
          emitDestroyBurst(b.x, b.y, POWERUP_COLORS.ghost.rgb);
          emitDestroyEffects(b, 'ghost');
          addDestroyPoints();
          // Wraith eats the planet — use the file-backed shield destroy clip
          // so it feels like a destroy, not the soft ghost passthrough.
          SFX.planetDestroyed('shield');
          spawnEmpRing(b.x, b.y);
          bodies.splice(i, 1);
          continue;
        }
        if (!b._rippleCd || b._rippleCd <= 0) {
          // 0.92^frame decay: reaches 0.05 around frame 36 → ~600ms.
          pushCapped(planetRipples, { x: b.x, y: b.y, baseR: b.radius, expand: 0, life: 1, startTime: Date.now(), maxLifeMs: 600 }, PLANET_RIPPLE_CAP);
          b._rippleCd = 18;
          if (!b._ghostScored) { b._ghostScored = true; addDestroyPoints(); }
          SFX.planetDestroyed('ghost');
        }
      }
      if (b._rippleCd) b._rippleCd--;
    }
    return false;
  }

  // SHIELD: absorb hit(s). FORTRESS SHIELD has 2 hit points.
  if (activeEffects.shield > 0) {
    for (let i = 0; i < bodies.length; i++) {
      if (bodyHits(bodies[i], 0)) {
        emitDestroyBurst(bodies[i].x, bodies[i].y, POWERUP_COLORS.shield.rgb);
        emitDestroyEffects(bodies[i], 'shield');
        SFX.planetDestroyed('shield');
        addDestroyPoints();
        spawnEmpRing(bodies[i].x, bodies[i].y);
        bodies.splice(i, 1);
        shieldHits--;
        if (shieldHits <= 0) {
          shieldEndTime = 0;
          activeEffects.shield = 0;
          shieldBroken = true;
          fortressShield = false;
          shieldHits = 0;
        }
        break;
      }
    }
    // Shield also absorbs crack fragments — each fragment costs 1 hit, no
    // points, no streak, no combo contribution.
    if (activeEffects.shield > 0) {
      const shieldR = PLAYER_R * 3.6; // matches the visible shield aura radius
      for (let i = crackFragments.length - 1; i >= 0; i--) {
        const f = crackFragments[i];
        if (dist(player, f) < f.radius + shieldR) {
          // Half-size shield-scan visual: synthetic body with halved radius
          // so emitDestroyEffects scales everything down.
          emitDestroyEffects({ x: f.x, y: f.y, radius: f.radius * 0.5 }, 'shield');
          emitDestroyBurst(f.x, f.y, POWERUP_COLORS.shield.rgb);
          SFX.playSfxBuffer('shieldDestroy', 0.3);
          crackFragments.splice(i, 1);
          shieldHits--;
          if (shieldHits <= 0) {
            shieldEndTime = 0;
            activeEffects.shield = 0;
            shieldBroken = true;
            fortressShield = false;
            shieldHits = 0;
            break;
          }
        }
      }
    }
    return false;
  }

  for (const b of bodies)
    if (bodyHits(b, -3)) return true;
  // Crack fragments are lethal on contact as well.
  for (const f of crackFragments) {
    if (dist(player, f) < f.radius + PLAYER_R - 2) return true;
  }
  return false;
}

// Burst ability — per-orb effect. Called once when cooldown hits 0 and the
// player is holding both sides simultaneously.
function executeBurst() {
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'burst', message: 'burst: ' + activeOrb, level: 'info' });
  if (activeOrb === 'cyan') {
    const types = ['shield','nova','hyperspeed','ghost'];
    const type = types[Math.floor(Math.random() * types.length)];
    activatePowerup(type, player.x, player.y);
  } else if (activeOrb === 'cosmic') {
    // Eternal Phantom — ghost+ghost combo.
    activateCombo('ghost_ghost', player.x, player.y);
  } else if (activeOrb === 'solar') {
    // Supernova — nova+nova combo.
    activateCombo('nova_nova', player.x, player.y);
  } else if (activeOrb === 'nebula') {
    // Two hyperspeed stacks instantly.
    activateHyperspeed();
    activateHyperspeed();
    SFX.pickup('hyperspeed', { stacks: hyperSpeedStacks });
  } else if (activeOrb === 'asteroid') {
    // Fortress Shield — full 4-hit shield directly without routing through
    // the shield_shield combo (which would cap at 2 hits).
    shieldEndTime = Date.now() + SHIELD_DURATION_MS_ASTEROID;
    activeEffects.shield = SHIELD_DURATION_MS_ASTEROID;
    shieldHits = 4;
    shieldBroken = false;
    fortressShield = true;
    const def = COMBO_DEFS.shield_shield;
    activeCombos.shield_shield = { def, deps: ['shield'] };
    lastComboLabel = 'shield_shield';
  }
  screenShake = Math.max(screenShake, 6);
}

// Per-body animation + behavior state tick. Called each frame after the
// world-scroll pass; mutates body fields used by drawing and collision.
function updateBodyTypes(spd) {
  for (const b of bodies) {
    if (b.type === 'toothed') {
      b.toothAngle += 0.02;
      // Subtle grinding loop every 3s per on-screen toothed planet.
      const onScreen = b.y > -b.radius && b.y < H + b.radius;
      if (onScreen) {
        if (b.lastToothSound === undefined) b.lastToothSound = frame - 90;
        if (frame - b.lastToothSound > 180) {
          SFX.playSfxBuffer('toothed', 0.08);
          b.lastToothSound = frame;
        }
      }
    } else if (b.type === 'eye') {
      // Slow horizontal drift toward player + pupil tracking.
      b.x += (player.x - b.x) * 0.0008;
      b.eyePulse += 0.08;
      const dx = player.x - b.x, dy = player.y - b.y;
      const mag = Math.hypot(dx, dy) || 1;
      const maxOff = b.radius * 0.3;
      b.pupilDx = (dx / mag) * maxOff;
      b.pupilDy = (dy / mag) * maxOff;
    } else if (b.type === 'cracked') {
      b.nextEruptFrame--;
      if (b.eruptFlash > 0) b.eruptFlash--;
      if (b.nextEruptFrame <= 0) {
        const count = 2 + Math.floor(Math.random() * 2);
        // Pick a cone direction for this eruption; fragments stay within
        // ±45° of it rather than scattering 360° — more dodgeable.
        const coneCenter = Math.random() * Math.PI * 2;
        const coneHalf = Math.PI / 4;
        for (let i = 0; i < count; i++) {
          if (crackFragments.length >= CRACK_FRAGMENTS_CAP) crackFragments.shift();
          const ang = coneCenter + (Math.random() - 0.5) * 2 * coneHalf;
          const speed = 0.8 + Math.random() * 0.7; // 0.8–1.5
          crackFragments.push({
            x: b.x, y: b.y,
            vx: Math.cos(ang) * speed,
            vy: Math.sin(ang) * speed,
            radius: 4 + Math.random() * 2,
            // life/maxLife stay in frame-equivalent units (0..180) but now
            // decay from maxLifeMs of real time so 144hz doesn't eat them faster.
            life: 180, maxLife: 180,
            startTime: Date.now(), maxLifeMs: 3000,
            color: b.color,
            glow: b.glowColor,
            pulse: Math.random() * 6.28,
          });
        }
        b.nextEruptFrame = 180 + Math.floor(Math.random() * 60);
        b.eruptFlash = 10;
        SFX.playSfxBuffer('eruption', 0.3);
      }
    } else if (b.type === 'tentacle') {
      // Track whether any tentacle just wrapped from retract→extend (phase 0
      // start). Play a single throttled SFX per body when that happens.
      let extendTrigger = false;
      for (let i = 0; i < b.tentaclePhases.length; i++) {
        const before = b.tentaclePhases[i];
        b.tentaclePhases[i] += 1 / 60;
        if (b.tentaclePhases[i] >= 3.5) {
          b.tentaclePhases[i] -= 3.5;
          extendTrigger = true;
        }
      }
      if (extendTrigger) {
        if (b.lastTentacleSound === undefined || frame - b.lastTentacleSound > 60) {
          const onScreen = b.y > -b.radius && b.y < H + b.radius;
          if (onScreen) {
            SFX.playSfxBuffer('tentacle', 0.2);
            b.lastTentacleSound = frame;
          }
        }
      }
    } else if (b.type === 'screaming') {
      b.screamPhase += 1 / 60;
      if (b.screamPhase >= 6) b.screamPhase -= 6;
      // Cycle: 0-4s closed, 4-4.5s opening, 4.5-5.5s screaming, 5.5-6s closing.
      const p = b.screamPhase;
      const wasScreaming = b.screamActive;
      b.screamActive = (p >= 4.5 && p < 5.5);
      if (b.screamActive && !wasScreaming) {
        SFX.screamShriek();
        b.screamSurgeFrames = 48; // 0.8s @ 60fps
        // Fire a visible shockwave ripple emanating from the body.
        b.shockwaves.push({ age: 0, maxLife: 28 });
        // Contracting "suck" rings — 3 rings staggered so they drop in over
        // the 0.8s surge, each shrinking toward the planet center.
        if (!b.contractRings) b.contractRings = [];
        b.contractRings.push({ age: 0,   maxLife: 48 });
        b.contractRings.push({ age: -16, maxLife: 48 });
        b.contractRings.push({ age: -32, maxLife: 48 });
      }
      if (b.screamSurgeFrames > 0) b.screamSurgeFrames--;
      if (b.shockwaves.length) {
        for (const sw of b.shockwaves) sw.age++;
        b.shockwaves = b.shockwaves.filter(sw => sw.age < sw.maxLife);
      }
      if (b.contractRings && b.contractRings.length) {
        for (const cr of b.contractRings) cr.age++;
        b.contractRings = b.contractRings.filter(cr => cr.age < cr.maxLife);
      }
    } else if (b.type === 'void') {
      b.voidPulse += 0.03;
    } else if (b.type === 'heart') {
      const hz = 0.6 + scrollSpeed() * 0.025;
      b.heartPhase += hz * (1 / 60) * 2 * Math.PI;
      b.heartScale = 1 + 0.225 * (1 + Math.sin(b.heartPhase));
      // Irregular blood drips off the bottom — halved rate to match the
      // slower heartbeat pulse.
      if (Math.random() < 0.0125 && b.bloodDrops.length < 6) {
        b.bloodDrops.push({
          offX: (Math.random() - 0.5) * b.radius * 0.6,
          age: 0, maxAge: 60 + Math.floor(Math.random() * 30),
          size: 1.8 + Math.random() * 1.6,
        });
      }
      for (const d of b.bloodDrops) d.age++;
      b.bloodDrops = b.bloodDrops.filter(d => d.age < d.maxAge);
      // Heartbeat SFX throttled to at most once every 2 seconds per planet.
      if (b.lastHeartSound === undefined || frame - b.lastHeartSound > 120) {
        const onScreen = b.y > -b.radius && b.y < H + b.radius;
        if (onScreen) SFX.playSfxBuffer('heartbeat', 0.15);
        b.lastHeartSound = frame;
      }
    } else if (b.type === 'mirror') {
      // Move toward the player's position from 0.5s ago at 25% strength
      // (0.005 ≈ 0.02 * 0.25) — still visibly tracks without racing.
      const prevX = b.x;
      const idx = Math.min(playerPosHistory.length - 1, b.mirrorDelayFrames);
      const targetX = playerPosHistory[idx];
      if (targetX !== undefined) {
        b.x += (targetX - b.x) * 0.005;
      }
      const moved = Math.abs(b.x - prevX);
      if (moved > 2) {
        if (b.lastMirrorSound === undefined || frame - b.lastMirrorSound > 60) {
          const onScreen = b.y > -b.radius && b.y < H + b.radius;
          if (onScreen) {
            SFX.playSfxBuffer('mirror', 0.15);
            b.lastMirrorSound = frame;
          }
        }
      }
    } else if (b.type === 'skull') {
      // No rotation — face stays upright as the planet drifts down.
      if (b.skullEyeFlash > 0) b.skullEyeFlash--;
      b.nextSkullFlash--;
      if (b.nextSkullFlash <= 0) {
        b.skullEyeFlash = 30;
        b.nextSkullFlash = 60 + Math.floor(Math.random() * 240);
      }
    }
  }
}

function updateCrackFragments(spd) {
  const nowCf = Date.now();
  for (let i = crackFragments.length - 1; i >= 0; i--) {
    const f = crackFragments[i];
    f.x += f.vx;
    f.y += f.vy + spd;
    f.vx *= 0.985; f.vy *= 0.985;
    // Recompute life from real time so frag alpha/drawcode using f.life/f.maxLife
    // fades at the same real-world rate regardless of framerate.
    if (f.startTime !== undefined && f.maxLifeMs) {
      f.life = f.maxLife * Math.max(0, 1 - (nowCf - f.startTime) / f.maxLifeMs);
    } else {
      f.life--;
    }
    f.pulse += 0.15;
    if (f.life <= 0 || f.y > H + 50) crackFragments.splice(i, 1);
  }
}

// --- Update ---
function update() {
  if (state === 'apocalypse') { frame++; updateApocalypse(); return; }
  if (state !== 'playing') return;
  frame++;
  // Phase-based gameplay music crossfade — only during active play.
  checkGameplayPhase();
  const spd = scrollSpeed();
  const d = diff();

  // 10-minute mark: kick off the apocalypse sequence.
  if (elapsedRunSeconds() >= 600) { startApocalypse(); return; }

  // Burst trigger: also catches keyboard-held combos each frame.
  if (leftDown && rightDown) burstTriggered = true;
  const burstReady = Date.now() >= burstCooldownEnd;
  if (burstTriggered && burstReady) {
    executeBurst();
    burstCooldownEnd = Date.now() + BURST_COOLDOWN_MS;
  }
  burstTriggered = false;

  // Run timer: wall-clock driven. Normally refresh ~8x/sec; past 3 min the
  // danger-zone shake/blink/glitch needs per-frame updates.
  if (elapsedRunSeconds() >= 180 || (frame & 7) === 0) updateRunTimerDisplay();

  // Streak timeout: if no destroy in 5 seconds, drop the streak. Replaces
  // the old "passed-planet resets streak" rule so any aggressive playstyle
  // (shield, nova, hyperspeed, EMP) keeps the meter alive.
  if (destroyStreak > 0 && Date.now() - lastDestroyTime > 5000) {
    destroyStreak = 0;
    document.getElementById('streakDisplay').classList.remove('visible');
  }

  // Recompute active effect remaining-ms from absolute end timestamps.
  const nowMs = Date.now();
  activeEffects.shield = Math.max(0, shieldEndTime - nowMs);
  activeEffects.ghost  = Math.max(0, ghostEndTime  - nowMs);
  if (hyperSpeedStacks > 0) {
    // Expire any timers whose end-timestamp has passed; stacks follow length.
    let expired = 0;
    for (let i = hyperSpeedTimers.length - 1; i >= 0; i--) {
      if (hyperSpeedTimers[i] <= nowMs) {
        hyperSpeedTimers.splice(i, 1);
        expired++;
      }
    }
    if (expired > 0) {
      hyperSpeedStacks -= expired;
      if (hyperSpeedStacks < 0) hyperSpeedStacks = 0;
      if (hyperSpeedStacks > 0) {
        // Step down to the new (lower) peak and restart the whoosh at a
        // lower pitch. activeDuration follows the longest remaining timer
        // so the decay curve denominator stays valid.
        hyperspeedPeakMult = computeHyperspeedPeakMult(hyperSpeedStacks, 1);
        hyperspeedCurrentMult = Math.min(hyperspeedCurrentMult, hyperspeedPeakMult);
        const longestEnd0 = Math.max.apply(null, hyperSpeedTimers);
        hyperspeedActiveDuration = Math.max(1, longestEnd0 - nowMs);
        if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} }
        hyperspeedWhooshNodes = SFX.startHyperspeedWhoosh(hyperSpeedStacks);
      }
    }

    // Mirror activeEffects.hyperspeed to remaining-ms of the longest timer.
    activeEffects.hyperspeed = hyperSpeedTimers.length
      ? Math.max(0, Math.max.apply(null, hyperSpeedTimers) - nowMs)
      : 0;

    if (hyperSpeedStacks > 0) {
      // Decelerate from peakMult toward 1x over the longest timer's duration.
      const t_hs = 1 - (activeEffects.hyperspeed / hyperspeedActiveDuration);
      hyperspeedCurrentMult = hyperspeedPeakMult - (hyperspeedPeakMult - 1) * t_hs;
      if (hyperspeedCurrentMult < 1.05) hyperspeedCurrentMult = 1;
    } else {
      // Last stack expired: full landing complete.
      hyperspeedCurrentMult = 1;
      activeEffects.hyperspeed = 0;
      hyperSpeedTimers = [];
      peakHyperSpeedStacks = 0;
      if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.5); } catch {} hyperspeedWhooshNodes = null; }
      // JUGGERNAUT: refresh shield to a fresh 15s when hyperspeed ends
      if (juggernautPendingShieldRefresh) {
        shieldEndTime = Date.now() + SHIELD_DURATION();
        activeEffects.shield = SHIELD_DURATION();
        shieldBroken = false;
        juggernautPendingShieldRefresh = false;
      }
    }
  }
  recentNovaFrames = Math.max(0, recentNovaEndTime - Date.now());
  // PHANTOM BLAST aura ends when its end-time passes, even if ghost was extended
  if (activeCombos.nova_ghost && Date.now() >= phantomBlastEndTime) {
    delete activeCombos.nova_ghost;
    if (lastComboLabel === 'nova_ghost') lastComboLabel = null;
  }

  // Combo bookkeeping: expire when deps run out or endTime passes
  for (const k of Object.keys(activeCombos)) {
    const c = activeCombos[k];
    if (c.deps) {
      let alive = true;
      for (const dep of c.deps) {
        if (activeEffects[dep] <= 0) { alive = false; break; }
      }
      if (!alive) {
        delete activeCombos[k];
        if (lastComboLabel === k) lastComboLabel = null;
      }
    } else if (c.endTime !== undefined) {
      if (Date.now() >= c.endTime) {
        delete activeCombos[k];
        if (lastComboLabel === k) lastComboLabel = null;
      }
    }
  }

  // Warp Time: auto full triple nova every 3s during hyperspeed
  if (activeCombos.nova_hyperspeed && activeEffects.hyperspeed > 0) {
    if (Date.now() >= warpNextNovaTime) {
      fireTripleNova(player.x, player.y);
      warpNextNovaTime = Date.now() + 3000;
    }
  }
  // Pulsar: auto full triple nova every 6s during shield
  if (activeCombos.nova_shield && activeEffects.shield > 0) {
    if (Date.now() >= pulsarNextNovaTime) {
      fireTripleNova(player.x, player.y);
      pulsarNextNovaTime = Date.now() + 6000;
    }
  }
  // Phantom Blast: damage aura around player
  if (Date.now() < phantomBlastEndTime && activeEffects.ghost > 0) {
    const auraR = 120;
    const survivors = [];
    for (const b of bodies) {
      if (dist(player, b) < auraR + b.radius) {
        emitDestroyBurst(b.x, b.y, POWERUP_COLORS.nova.rgb);
        emitDestroyEffects(b, 'nova');
        addDestroyPoints();
        SFX.planetDestroyed('nova');
      } else survivors.push(b);
    }
    bodies = survivors;
  }

  // Track recent player x so mirror orbs can read it with a delay.
  playerPosHistory.unshift(player.x);
  if (playerPosHistory.length > PLAYER_POS_HISTORY_LEN) playerPosHistory.pop();

  for (const b of bodies) {
    b.y += spd;
    b.pulse += 0.038;
    if (!b.passed && b.y > H * 0.75) {
      b.passed = true;
      score++;
      planetsPassed++;
      runStats.totalPassed++;
      runStats.pointsFromPassing++;
      document.getElementById('score').textContent = score;
    }
  }
  updateBodyTypes(spd);
  updateCrackFragments(spd);
  bodies = bodies.filter(b => b.y < H + 80);
  const bodyCap = effectiveMaxBodies();
  while (bodies.length < bodyCap) {
    const topY = Math.min(...bodies.map(b => b.y));
    bodies.push(spawnBody(topY - BODY_SPACING - Math.random()*50));
  }

  // Powerup spawning: cooldown scales with frequency, max 2 visible at once.
  // After 4 minutes, frequency scales +15% per extra minute survived so the
  // powerup flow keeps up with the rising body density.
  const minutesOver = Math.max(0, Math.floor((elapsedRunSeconds() - 240) / 60));
  const effectivePowerupFrequency = d.powerupFrequency * (1 + minutesOver * 0.15);
  const spawnInterval = 220 / effectivePowerupFrequency;
  if (powerups.length < 2 && frame - lastPowerupSpawn > spawnInterval && Math.random() < 0.025) {
    spawnPowerup();
    lastPowerupSpawn = frame;
  }

  // Powerup scroll + pickup detection. Pickup radius boosted 10% over the
  // old literal 6px bumper so near-misses feel consistent with the visual.
  // Powerups scroll at a capped speed so at high game speeds they slow
  // relative to planets, giving more time to grab them.
  const powerupScrollSpeed = Math.min(spd, 2.5) * 0.8 + Math.max(0, spd - 2.5) * 0.3;
  for (const p of powerups) {
    p.y += powerupScrollSpeed;
    p.pulse += 0.11;
    if (!p.collected && dist(player, p) < (p.radius + PLAYER_R + 6) * 1.1) {
      if (p.pairSibling && !p.pairSibling.collected) {
        p.collected = true;
        p.pairSibling.collected = true;
        activatePair(p, p.pairSibling);
      } else {
        p.collected = true;
        activatePowerup(p.type, p.x, p.y);
      }
    }
  }
  // Pair tether pickup: if the player drifts onto the energy tether between
  // two paired powerups, count it as a pickup. Check the closest point on
  // the segment A→B; pickup triggers when within PLAYER_R * 2.5.
  for (const p of powerups) {
    if (p.collected) continue;
    const q = p.pairSibling;
    if (!q || q.collected) continue;
    const d = pointSegmentDist(player.x, player.y, p.x, p.y, q.x, q.y);
    if (d < PLAYER_R * 2.5) {
      p.collected = true;
      q.collected = true;
      activatePair(p, q);
    }
  }
  powerups = powerups.filter(p => !p.collected && p.y < H + 30);

  // Nova rings: expand at 420 px/s (= 7 px/frame * 60fps). Drop dead rings
  // immediately, then destroy bodies they sweep past. radius/prevR are kept
  // for the sweep-contact check below and for draw code that reads r.radius.
  if (novaRings.length) {
    const nowMs2 = Date.now();
    const live = [];
    for (const r of novaRings) {
      r.prevR = r.radius;
      r.radius = (nowMs2 - (r.startTime || nowMs2)) / 1000 * 420;
      const rm = r.radiusMult || 1;
      // Life decays at 0.9 per frame (= 0.9^60 per second ≈ 0.0018/s).
      // Track when decay started so life shrinks on real time, not frames.
      if (r.radius > 320 * rm) {
        if (r._decayStart === undefined) r._decayStart = nowMs2;
        const dtS = (nowMs2 - r._decayStart) / 1000;
        // life0 is the life at decay start; captured the first frame we cross.
        if (r._lifeAtDecay === undefined) r._lifeAtDecay = r.life;
        r.life = r._lifeAtDecay * Math.pow(0.9, dtS * 60);
      }
      if (r.life > 0.05 && r.radius < 400 * rm) live.push(r);
    }
    novaRings = live;
  }
  if (novaRings.length) {
    const survivors = [];
    for (const b of bodies) {
      let killed = false;
      for (const r of novaRings) {
        const dd = dist(r, b);
        const rm = r.radiusMult || 1;
        if (dd < r.radius * rm && dd >= (r.prevR * rm) - 6 && r.radius < 360 * rm) {
          killed = true;
          const color = r.supernova ? '255,90,80' : POWERUP_COLORS.nova.rgb;
          emitDestroyBurst(b.x, b.y, color);
          emitDestroyEffects(b, r.supernova ? 'supernova' : 'nova');
          addDestroyPoints();
          if (activeCombos.nova_nova) SFX.comboDestroySound('nova_nova');
          else SFX.planetDestroyed('nova');
          break;
        }
      }
      if (!killed) survivors.push(b);
    }
    bodies = survivors;
    // Crack fragments swept by nova rings die silently — no points / streak.
    for (let i = crackFragments.length - 1; i >= 0; i--) {
      const f = crackFragments[i];
      for (const r of novaRings) {
        const rm = r.radiusMult || 1;
        const dd = dist(r, f);
        if (dd < r.radius * rm && dd >= (r.prevR * rm) - 6 && r.radius < 360 * rm) {
          crackFragments.splice(i, 1);
          break;
        }
      }
    }
  }

  // Shield-EMP rings: expand at EMP_EXPAND_PX_PER_SEC. First planet each ring
  // touches gets destroyed (shield visual/sfx). Primary rings spawn a smaller
  // secondary EMP at the victim's position; secondary rings do NOT chain.
  // Keep rings alive through the 400ms dome window (+ small fade tail).
  if (empRings.length) {
    const nowMsE = Date.now();
    const live = [];
    for (const r of empRings) {
      r.prevR = r.radius;
      r.radius = (nowMsE - r.startTime) / 1000 * EMP_EXPAND_PX_PER_SEC;
      if (nowMsE - r.startTime < 420) live.push(r);
    }
    empRings = live;
    if (empRings.length) {
      const survivors = [];
      // Track positions where primary rings landed a kill so we can spawn
      // secondaries AFTER the body sweep completes (avoid mutating empRings
      // while iterating it).
      const secondarySpawns = [];
      for (const b of bodies) {
        let killed = false;
        for (const r of empRings) {
          if (r.triggered) continue;
          if (r.radius > r.maxRadius) continue;
          const dd = dist(r, b);
          if (dd < r.radius + b.radius && dd >= r.prevR - 6) {
            killed = true;
            r.triggered = true;
            r.victim = { x: b.x, y: b.y, expiry: nowMsE + 100 };
            emitDestroyBurst(b.x, b.y, POWERUP_COLORS.shield.rgb);
            emitDestroyEffects(b, 'shield');
            addDestroyPoints();
            SFX.planetDestroyed('shield');
            // Only primary rings chain — one level deep, no recursion.
            if (!r.isChain) secondarySpawns.push({ x: b.x, y: b.y });
            break;
          }
        }
        if (!killed) survivors.push(b);
      }
      bodies = survivors;
      for (const s of secondarySpawns) spawnEmpRing(s.x, s.y, true);
      // EMP rings also wipe out crack fragments they sweep over. No chain
      // EMP, no points, no streak — just clear the hazard.
      for (let i = crackFragments.length - 1; i >= 0; i--) {
        const f = crackFragments[i];
        for (const r of empRings) {
          if (r.radius > r.maxRadius) continue;
          const dd = dist(r, f);
          if (dd < r.radius + f.radius && dd >= r.prevR - 6) {
            crackFragments.splice(i, 1);
            break;
          }
        }
      }
    }
  }

  // Hyperspeed barrier: destroy planets touching the wedge in front of the player
  if (activeEffects.hyperspeed > 0 && hyperspeedCurrentMult > 1.05) {
    const barrierY = player.y - 60;
    const barrierHalfW = 60;
    const bSurvivors = [];
    for (const b of bodies) {
      // Check if body center is within barrier zone
      if (b.y < barrierY + b.radius + 20 && b.y > barrierY - 30 &&
          Math.abs(b.x - player.x) < barrierHalfW + b.radius) {
        emitDestroyBurst(b.x, b.y, POWERUP_COLORS.hyperspeed.rgb);
        emitDestroyEffects(b, 'barrier');
        addDestroyPoints();
        SFX.planetDestroyed('barrier');
      } else {
        bSurvivors.push(b);
      }
    }
    bodies = bSurvivors;
    // Fragments clipping the barrier wedge die silently (barrier sfx at lower
    // volume to avoid stacking with bigger body hits).
    let barrierAteFragment = false;
    for (let i = crackFragments.length - 1; i >= 0; i--) {
      const f = crackFragments[i];
      if (f.y < barrierY + f.radius + 20 && f.y > barrierY - 30 &&
          Math.abs(f.x - player.x) < barrierHalfW + f.radius) {
        crackFragments.splice(i, 1);
        barrierAteFragment = true;
      }
    }
    if (barrierAteFragment) SFX.playSfxBuffer('hyperspeedBarrier', 0.3);
  }

  // Planet ripples scroll with the world. expand/speed stays frame-based
  // (physics) but life is now real-time.
  const nowPr = Date.now();
  for (const r of planetRipples) {
    r.y += spd;
    r.expand += 1.6;
    if (r.startTime !== undefined && r.maxLifeMs) {
      r.life = Math.max(0, 1 - (nowPr - r.startTime) / r.maxLifeMs);
    } else {
      r.life *= 0.92;
    }
  }
  planetRipples = planetRipples.filter(r => r.life > 0.05);

  for (const s of bgStars) { s.y += s.spd * spd * 0.28; if (s.y > H) s.y = -2; }

  findClosest();
  applyEnvironmentForces();
  applyForce();

  // Throttled audio for held attract/repel input
  if (leftDown)  SFX.attract(frame);
  if (rightDown) SFX.repel(frame);

  emitOrbTrail();
  updateOrbTrailParticles();

  if (checkCollisions()) triggerDeath();
}

// --- Apocalypse sequence (10-minute sun-fall death) ---
// Four phases driven by wall-clock since apocalypseStart:
//   0-3s   Phase 1 — clearing: destroy all bodies, lerp player to center
//   3-8s   Phase 2 — rumble: low-end audio builds, screen shake 5→20, red tint fades in
//   8-28s  Phase 3 — sun descends from above to player position over 20s
//   28s+   Phase 4 — impact: small flash, white flash, hold, fade, triggerDeath()
let apocalypseStart = 0;
let apocalypseDeathFlag = false;
let apocalypseSun = null;             // { radius, y, progress }
let apocalypseImpactStart = 0;
let apocalypseImpactTriggered = false;
let apocalypseRumbleNodes = null;
let apocalypsePlayerStart = null;     // position at phase 1 entry for smooth lerp

function apocalypseElapsed() {
  return apocalypseStart ? (Date.now() - apocalypseStart) / 1000 : 0;
}

function startApocalypse() {
  if (state === 'apocalypse' || state === 'dead') return;
  if (typeof Sentry !== 'undefined') Sentry.addBreadcrumb({ category: 'apocalypse', message: 'sequence start', level: 'info' });
  state = 'apocalypse';
  apocalypseStart = Date.now();
  apocalypseImpactTriggered = false;
  apocalypseImpactStart = 0;
  apocalypseSun = null;
  apocalypsePlayerStart = { x: player.x, y: player.y };
  // Destroy all bodies with their destruction visual.
  for (const b of bodies) {
    emitDestroyBurst(b.x, b.y, b.glowColor || 'rgba(255,200,120,1)');
    emitDestroyEffects(b, 'nova');
  }
  bodies = [];
  powerups = [];
  // Fade gameplay music to silence over ~3s.
  SFX.playTrack(null, 3);
  leftDown = false;
  rightDown = false;
  pauseBtn.classList.remove('visible');
}

function updateApocalypse() {
  if (state !== 'apocalypse') return;
  const t = apocalypseElapsed();

  // Physics frozen — but we still smoothly lerp the player to center.
  if (t <= 3) {
    const k = Math.min(1, t / 3);
    const ease = k * k * (3 - 2 * k); // smoothstep
    player.x = apocalypsePlayerStart.x + (W / 2 - apocalypsePlayerStart.x) * ease;
    player.y = apocalypsePlayerStart.y + (H / 2 - apocalypsePlayerStart.y) * ease;
    player.vx = 0; player.vy = 0;
  } else {
    player.x = W / 2; player.y = H / 2; player.vx = 0; player.vy = 0;
  }
  // Keep the playfield cleared in case anything sneaks in.
  if (bodies.length) bodies = [];
  if (powerups.length) powerups = [];

  // Phase 2: rumble engages at t=3.
  if (t >= 3 && !apocalypseRumbleNodes) {
    apocalypseRumbleNodes = SFX.startApocalypseRumble();
  }

  // Screen shake schedule: 5→20 between 3-8s, then 20+ with sun progress.
  let shake = 0;
  if (t >= 3 && t < 8) {
    shake = 5 + (20 - 5) * ((t - 3) / 5);
  } else if (t >= 8) {
    const sp = Math.min(1, (t - 8) / 20);
    shake = 20 + 6 * sp;
  }
  if (shake > 0) screenShake = Math.max(screenShake, shake);

  // Rumble volume builds from 0.1 to ~0.5 over 8s (phone-friendly target),
  // then a slower swell. Tremolo on the 120hz primary applied each frame.
  if (apocalypseRumbleNodes) {
    let vol = 0.1;
    if (t < 8) vol = 0.1 + 0.4 * ((t - 3) / 5);
    else vol = Math.min(0.9, 0.5 + 0.3 * Math.min(1, (t - 8) / 20));
    apocalypseRumbleNodes.setVolume(vol);
    if (apocalypseRumbleNodes.tick) apocalypseRumbleNodes.tick();
  }

  // Phase 3: sun descends.
  if (t >= 8) {
    if (!apocalypseSun) {
      const sunR = W * 0.8;
      apocalypseSun = { radius: sunR, y: -sunR, progress: 0 };
    }
    const sunR = apocalypseSun.radius;
    const startY = -sunR;
    const targetY = H / 2; // player is pinned to center by now
    const sp = Math.min(1, (t - 8) / 20);
    apocalypseSun.y = startY + (targetY - startY) * sp;
    apocalypseSun.progress = sp;
  }

  // Phase 4: impact when the sun reaches the player.
  if (apocalypseSun && apocalypseSun.progress >= 1 && !apocalypseImpactTriggered) {
    apocalypseImpactTriggered = true;
    apocalypseImpactStart = Date.now();
    SFX.playApocalypseImpact();
  }

  if (apocalypseImpactTriggered) {
    const impactT = (Date.now() - apocalypseImpactStart) / 1000;
    if (impactT >= 1.2) {
      apocalypseDeathFlag = true;
      if (apocalypseRumbleNodes) {
        apocalypseRumbleNodes.stop();
        apocalypseRumbleNodes = null;
      }
      // Jump to normal death flow. triggerDeath picks up apocalypseDeathFlag.
      triggerDeath();
    }
  }
}

// The sun object itself: layered radial gradient core + corona rays + flares.
function drawApocalypseSun() {
  if (!apocalypseSun) return;
  const sun = apocalypseSun;
  const x = W / 2, y = sun.y, r = sun.radius;
  const now = Date.now();
  const tSec = apocalypseElapsed();

  ctx.save();

  // --- Outer glow: large soft radial extending 2x sun radius. Tints the
  // whole screen red/orange as the sun approaches.
  const glowR = r * 2;
  const outerGlow = ctx.createRadialGradient(x, y, r * 0.95, x, y, glowR);
  outerGlow.addColorStop(0,    'rgba(255,100,0,0.3)');
  outerGlow.addColorStop(0.55, 'rgba(255,50,0,0.1)');
  outerGlow.addColorStop(1,    'rgba(255,30,0,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath(); ctx.arc(x, y, glowR, 0, 6.28); ctx.fill();

  // --- Animated corona: 4 overlapping radial gradients pulsing at different
  // frequencies. Each gradient is offset slightly from center so the corona
  // looks organic rather than a perfect circle.
  const coronaLayers = [
    { ox: 0,       oy: 0,      freq: 0.002,  phase: 0,   scale: 1.00 },
    { ox: r * 0.04, oy: -r*0.03, freq: 0.0013, phase: 1.7, scale: 0.92 },
    { ox: -r*0.05, oy:  r*0.04, freq: 0.0025, phase: 3.4, scale: 0.85 },
    { ox:  r*0.02, oy:  r*0.05, freq: 0.0018, phase: 5.1, scale: 0.78 },
  ];
  ctx.globalCompositeOperation = 'lighter';
  for (const L of coronaLayers) {
    const pulse = Math.sin(now * L.freq + L.phase) * 20;
    const cr = r * (1.25 * L.scale) + pulse;
    const cx = x + L.ox, cy = y + L.oy;
    const grad = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, cr);
    grad.addColorStop(0,    'rgba(255,247,230,0.55)');
    grad.addColorStop(0.35, 'rgba(255,102,0,0.35)');
    grad.addColorStop(0.75, 'rgba(204,34,0,0.18)');
    grad.addColorStop(1,    'rgba(204,34,0,0)');
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, 6.28); ctx.fill();
  }
