    // feels the pickup as a duration extension.
    let minIdx = 0;
    for (let i = 1; i < hyperSpeedTimers.length; i++) {
      if (hyperSpeedTimers[i] < hyperSpeedTimers[minIdx]) minIdx = i;
    }
    if (newTimer > hyperSpeedTimers[minIdx]) hyperSpeedTimers[minIdx] = newTimer;
  }
  if (hyperSpeedStacks > peakHyperSpeedStacks) peakHyperSpeedStacks = hyperSpeedStacks;

  hyperspeedPeakMult = computeHyperspeedPeakMult(hyperSpeedStacks, peakScale);
  hyperspeedCurrentMult = hyperspeedPeakMult;
  hyperspeedTargetSpeed = normalScrollSpeed();
  hyperspeedActiveDuration = Math.max.apply(null, hyperSpeedTimers);
  activeEffects.hyperspeed = hyperspeedActiveDuration;

  // Restart the sustained whoosh at the new stack-scaled pitch.
  if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} }
  hyperspeedWhooshNodes = SFX.startHyperspeedWhoosh(hyperSpeedStacks);
}

function activatePowerup(type, x, y) {
  Sentry.addBreadcrumb({ category: 'powerup', message: 'picked up ' + type, level: 'info' });
  emitPickupParticles(x, y, type);
  // Hyperspeed pickup sound is played AFTER rawActivate so it can use the
  // new stack count for its pitch shift; everything else plays immediately.
  if (type !== 'hyperspeed') SFX.pickup(type);
  runStats.powerupsUsed++;

  // Detect combo BEFORE updating lastGainedEffects — the partner lookup
  // must see the previous pickup, not this one.
  const key = detectCombo(type);

  // The new pickup always activates its own individual effect timer, and
  // the combo (if any) stacks on top with a fresh activation.
  rawActivate(type, x, y);
  if (type === 'hyperspeed') SFX.pickup('hyperspeed', { stacks: hyperSpeedStacks });
  if (key) activateCombo(key, x, y);

  // Record this pickup as the most-recently-gained event.
  lastGainedEffects = [type];
  lastGainedTimestamp = frame;
}

// --- Run timer ---
// Wall-clock elapsed time (Date.now() - runStartTime). Frame-rate independent
// so the displayed MM:SS matches real seconds even during hitches.
// Color thresholds scale with difficulty — harder difficulties stay white
// longer because it takes more time to reach dangerous top speeds.
let runStartTime = 0;
const RUN_TIMER_THRESHOLDS = {
  NORMAL:  { orange: 120, red: 240 }, // 2min / 4min
  HARD:    { orange: 180, red: 360 }, // 3min / 6min
  EXTREME: { orange: 240, red: 480 }, // 4min / 8min
};
function elapsedRunSeconds() {
  return runStartTime ? (Date.now() - runStartTime) / 1000 : 0;
}
function formatRunTime(seconds) {
  const mm = Math.floor(seconds / 60);
  const ss = Math.floor(seconds % 60);
  return (mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss;
}
function runTimerColor(seconds) {
  const th = RUN_TIMER_THRESHOLDS[difficulty] || RUN_TIMER_THRESHOLDS.NORMAL;
  if (seconds < th.orange) {
    const t = seconds / th.orange;
    const r = 255, g = Math.round(255 - (255 - 180) * t), b = Math.round(255 - (255 - 80) * t);
    return `rgba(${r},${g},${b},0.92)`;
  } else if (seconds < th.red) {
    const t = (seconds - th.orange) / (th.red - th.orange);
    const r = 255, g = Math.round(180 - 180 * t), b = Math.round(80 - 80 * t);
    return `rgba(${r},${g},${b},0.95)`;
  }
  return 'rgba(255,60,60,0.95)';
}
function updateRunTimerDisplay() {
  const el = document.getElementById('runTimer');
  if (!el) return;
  const s = elapsedRunSeconds();
  const danger = s >= 300;
  el.textContent = formatRunTime(s) + (danger ? ' !' : '');
  const color = runTimerColor(s);
  el.style.color = color;
  el.style.textShadow = '0 0 12px ' + color;
  if (danger) {
    // Blink 0.7 ↔ 1.0 every 10 frames; shake ±3px on x each frame.
    const blinkHigh = Math.floor(frame / 10) % 2 === 0;
    el.style.opacity = blinkHigh ? '1' : '0.7';
    const shake = (Math.random() - 0.5) * 6; // ±3px
    el.style.transform = `translateX(calc(-50% + ${shake.toFixed(2)}px))`;
  } else {
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%)';
  }
}

// --- Game state ---
function resetGame() {
  player = { x: W/2, y: H*0.72, vx: 0, vy: 0, angle: 0 };
  trail = []; deathParticles = [];
  initBodies();
  score = 0; frame = 0; planetsPassed = 0;
  closestBody = null;
  destroyStreak = 0;
  runStats = { totalPassed: 0, totalDestroyed: 0, pointsFromPassing: 0, pointsFromDestroying: 0, longestStreak: 0, powerupsUsed: 0 };
  document.getElementById('streakDisplay').classList.remove('visible');
  powerups = [];
  novaRings = []; screenShake = 0;
  pickupParticles = [];
  orbTrailParticles = [];
  planetRipples = [];
  destroyEffects = [];
  deathShards = [];
  deathFlashFrames = 0;
  if (pendingDeathBurstTimer) { clearTimeout(pendingDeathBurstTimer); pendingDeathBurstTimer = null; }
  clearPendingNovaTimeouts();
  activeEffects = { shield: 0, hyperspeed: 0, ghost: 0 };
  hyperspeedCurrentMult = 1; hyperspeedTargetSpeed = 0;
  hyperspeedPeakMult = 1; hyperspeedActiveDuration = HYPERSPEED_DURATION;
  hyperSpeedStacks = 0;
  resetBgObjects();
  hyperSpeedTimers = [];
  peakHyperSpeedStacks = 0;
  if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} hyperspeedWhooshNodes = null; }
  shieldBroken = false;
  shieldHits = 1;
  fortressShield = false;
  activeCombos = {};
  lastComboLabel = null;
  recentNovaFrames = 0;
  phantomBlastFrames = 0;
  warpTimeNovaTimer = 0;
  pulsarNovaTimer = 0;
  juggernautPendingShieldRefresh = false;
  lastGainedEffects = [];
  lastGainedTimestamp = -1;
  lastPowerupSpawn = 0;
  runStartTime = Date.now();
  document.getElementById('score').textContent = '0';
  updateRunTimerDisplay();
}

// --- Physics: only closest body matters ---
function findClosest() {
  let best = null, bd = Infinity;
  for (const b of bodies) {
    const d = dist(player, b);
    if (d < bd) { bd = d; best = b; }
  }
  // Powerups participate as gravity objects
  for (const p of powerups) {
    if (p.collected) continue;
    const d = dist(player, p);
    if (d < bd) { bd = d; best = p; }
  }
  closestBody = best;
}

function applyForce() {
  if (!closestBody) return;
  const dx = closestBody.x - player.x;
  const dy = closestBody.y - player.y;
  const d = Math.max(Math.hypot(dx, dy), closestBody.radius * 2.2);
  const nx = dx / d, ny = dy / d;
  // Influence tapers with distance so far-away pulls feel proportional
  const influence = Math.min(140 / d, 1.8);

  // Scale player responsiveness with current scroll speed so the controls
  // don't feel sluggish when the world is screaming past. NORMAL.startSpeed
  // (1.2) is the baseline — at that speed the multiplier is exactly 1.0 and
  // the feel is identical to the original tuning. EXTREME max (6.0) gives
  // ratio 5.0. The 0.4 factor keeps scaling sub-linear so it never goes
  // twitchy. Clamped at >=1 so slow-mo doesn't reduce baseline responsiveness.
  const speedRatio = Math.max(1, scrollSpeed() / DIFFICULTIES.NORMAL.startSpeed);
  const forceMult  = 1 + (speedRatio - 1) * 0.4;
  // Drag eases from 0.91 → 0.94 as speed ratio climbs from 1 → 5, letting
  // the player glide further per input at higher speeds.
  const dragCoef   = 0.91 + Math.min((speedRatio - 1) / 4, 1) * 0.03;

  const f = FORCE * influence * forceMult;

  if (leftDown)  { player.vx += nx*f; player.vy += ny*f; }
  if (rightDown) {
    // Dead zone fix: when planet is directly above and repel vector is nearly
    // vertical, nudge it horizontally based on actual relative position. Nudge
    // strength scales with scroll speed — faster world, less reaction time.
    let rnx = -nx, rny = -ny;
    if (closestBody.y < player.y && Math.abs(rnx) < 0.15) {
      const nudgeStrength = Math.min(
        0.45,
        0.15 + (scrollSpeed() / DIFFICULTIES.NORMAL.startSpeed) * 0.08
      );
      const side = player.x - closestBody.x;
      rnx = (side === 0 ? -1 : Math.sign(side)) * nudgeStrength;
      const mag = Math.hypot(rnx, rny);
      rnx /= mag; rny /= mag;
    }
    player.vx += rnx*f; player.vy += rny*f;
  }

  // Very gentle upward bias so player doesn't just sink
  player.vy -= 0.016;

  // Soft vertical centering: pull the player back down when drifting off the
  // top. During the final 2s of hyperspeed, gently nudge toward the spawn
  // position so the player isn't dumped at the top edge when speed snaps back.
  let ay = 0;
  if (player.y < H * 0.2) {
    ay += 0.04 * ((H * 0.2 - player.y) / (H * 0.2));
  }
  if (activeEffects.hyperspeed > 0 && activeEffects.hyperspeed < 180) {
    // Stacked hyperspeed lands harder: scale pull by the peak stacks reached
    // this session. 1 stack = 1× (unchanged from pre-stacking), 4 stack = 4×.
    const stackBoost = Math.max(1, peakHyperSpeedStacks);
    const pullStrength = Math.max(0.0004, (1 - activeEffects.hyperspeed / 180) * 0.002 * stackBoost);
    ay += (H * 0.72 - player.y) * pullStrength;
  }
  player.vy += ay;

  player.vx *= dragCoef; player.vy *= dragCoef;
  if (isNaN(player.vx)) player.vx = 0;
  if (isNaN(player.vy)) player.vy = 0;
  const spd = Math.hypot(player.vx, player.vy);
  // EXTREME loosens the cap so players can actually outrun dense clusters
  const speedCap = difficulty === 'EXTREME' ? 5.5 : 4.5;
  if (spd > speedCap) { player.vx = player.vx/spd*speedCap; player.vy = player.vy/spd*speedCap; }

  player.x += player.vx; player.y += player.vy;
  player.angle = Math.atan2(player.vy, player.vx);
}

function checkCollisions() {
  if (frame < GRACE_FRAMES) return false;
  // Borders are always lethal — shield/ghost only protect against bodies
  if (player.x < PLAYER_R+3 || player.x > W-PLAYER_R-3) return true;
  if (player.y > H+50 || player.y < -50) return true;

  // GHOST: pass through bodies, emit a shimmer ripple when clipping one.
  // WRAITH (ghost + shield active): destroy on contact during ghost.
  if (activeEffects.ghost > 0) {
    const wraith = activeEffects.shield > 0;
    for (let i = bodies.length - 1; i >= 0; i--) {
      const b = bodies[i];
      if (dist(player, b) < b.radius + PLAYER_R) {
        if (wraith) {
          emitDestroyBurst(b.x, b.y, POWERUP_COLORS.ghost.rgb);
          emitDestroyEffects(b, 'ghost');
          addDestroyPoints();
          // Wraith eats the planet — use the file-backed shield destroy clip
          // so it feels like a destroy, not the soft ghost passthrough.
          SFX.planetDestroyed('shield');
          bodies.splice(i, 1);
          continue;
        }
        if (!b._rippleCd || b._rippleCd <= 0) {
          pushCapped(planetRipples, { x: b.x, y: b.y, baseR: b.radius, expand: 0, life: 1 }, PLANET_RIPPLE_CAP);
          b._rippleCd = 18;
          if (!b._ghostScored) { b._ghostScored = true; addDestroyPoints(); }
          SFX.planetDestroyed('ghost');
        }
      }
      if (b._rippleCd) b._rippleCd--;
    }
    return false;
  }

  // SHIELD: absorb hit(s). FORTRESS SHIELD has 2 hit points.
  if (activeEffects.shield > 0) {
    for (let i = 0; i < bodies.length; i++) {
      if (dist(player, bodies[i]) < bodies[i].radius + PLAYER_R) {
        emitDestroyBurst(bodies[i].x, bodies[i].y, POWERUP_COLORS.shield.rgb);
        emitDestroyEffects(bodies[i], 'shield');
        SFX.planetDestroyed('shield');
        addDestroyPoints();
        bodies.splice(i, 1);
        shieldHits--;
        if (shieldHits <= 0) {
          activeEffects.shield = 0;
          shieldBroken = true;
          fortressShield = false;
          shieldHits = 1;
        }
        break;
      }
    }
    return false;
  }

  for (const b of bodies)
    if (dist(player, b) < b.radius + PLAYER_R - 3) return true;
  return false;
}

// --- Update ---
function update() {
  if (state !== 'playing') return;
  frame++;
  const spd = scrollSpeed();
  const d = diff();

  // Run timer: wall-clock driven. Normally refresh ~8x/sec; past 5 min the
  // danger-zone shake/blink needs per-frame updates.
  if (elapsedRunSeconds() >= 300 || (frame & 7) === 0) updateRunTimerDisplay();

  // Decrement active effect timers
  if (activeEffects.shield > 0) activeEffects.shield--;
  if (hyperSpeedStacks > 0) {
    // Decrement every independent stack timer; remove any that hit zero.
    let expired = 0;
    for (let i = hyperSpeedTimers.length - 1; i >= 0; i--) {
      hyperSpeedTimers[i]--;
      if (hyperSpeedTimers[i] <= 0) {
        hyperSpeedTimers.splice(i, 1);
        expired++;
      }
    }
    if (expired > 0) {
      hyperSpeedStacks -= expired;
      if (hyperSpeedStacks < 0) hyperSpeedStacks = 0;
      if (hyperSpeedStacks > 0) {
        // Step down to the new (lower) peak and restart the whoosh at a
        // lower pitch. activeDuration follows the longest remaining timer
        // so the decay curve denominator stays valid.
        hyperspeedPeakMult = computeHyperspeedPeakMult(hyperSpeedStacks, 1);
        hyperspeedCurrentMult = Math.min(hyperspeedCurrentMult, hyperspeedPeakMult);
        hyperspeedActiveDuration = Math.max.apply(null, hyperSpeedTimers);
        if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} }
        hyperspeedWhooshNodes = SFX.startHyperspeedWhoosh(hyperSpeedStacks);
      }
    }

    // Mirror activeEffects.hyperspeed to the longest remaining timer so all
    // existing `activeEffects.hyperspeed > 0` checks elsewhere keep working.
    activeEffects.hyperspeed = hyperSpeedTimers.length ? Math.max.apply(null, hyperSpeedTimers) : 0;

    if (hyperSpeedStacks > 0) {
      // Decelerate from peakMult toward 1x over the longest timer's duration.
      const t_hs = 1 - (activeEffects.hyperspeed / hyperspeedActiveDuration);
      hyperspeedCurrentMult = hyperspeedPeakMult - (hyperspeedPeakMult - 1) * t_hs;
      if (hyperspeedCurrentMult < 1.05) hyperspeedCurrentMult = 1;
    } else {
      // Last stack expired: full landing complete.
      hyperspeedCurrentMult = 1;
      activeEffects.hyperspeed = 0;
      hyperSpeedTimers = [];
      peakHyperSpeedStacks = 0;
      if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.5); } catch {} hyperspeedWhooshNodes = null; }
      // JUGGERNAUT: refresh shield to a fresh 15s when hyperspeed ends
      if (juggernautPendingShieldRefresh) {
        activeEffects.shield = SHIELD_DURATION();
        shieldBroken = false;
        juggernautPendingShieldRefresh = false;
      }
    }
  }
  if (activeEffects.ghost  > 0) activeEffects.ghost--;
  if (phantomBlastFrames > 0) phantomBlastFrames--;
  if (recentNovaFrames > 0) recentNovaFrames--;
  // PHANTOM BLAST aura ends when its frames run out, even if ghost was extended
  if (activeCombos.nova_ghost && phantomBlastFrames <= 0) {
    delete activeCombos.nova_ghost;
    if (lastComboLabel === 'nova_ghost') lastComboLabel = null;
  }

  // Combo bookkeeping: expire when deps run out or frame counter hits zero
  for (const k of Object.keys(activeCombos)) {
    const c = activeCombos[k];
    if (c.deps) {
      let alive = true;
      for (const dep of c.deps) {
        if (activeEffects[dep] <= 0) { alive = false; break; }
      }
      if (!alive) {
        delete activeCombos[k];
        if (lastComboLabel === k) lastComboLabel = null;
      }
    } else if (c.framesLeft !== undefined) {
      c.framesLeft--;
      if (c.framesLeft <= 0) {
        delete activeCombos[k];
        if (lastComboLabel === k) lastComboLabel = null;
      }
    }
  }

  // Warp Time: auto full triple nova every 2s during hyperspeed
  if (activeCombos.nova_hyperspeed && activeEffects.hyperspeed > 0) {
    if (warpTimeNovaTimer <= 0) {
      fireTripleNova(player.x, player.y);
      warpTimeNovaTimer = 120;
    } else warpTimeNovaTimer--;
  }
  // Pulsar: auto full triple nova every 4s during shield
  if (activeCombos.nova_shield && activeEffects.shield > 0) {
    if (pulsarNovaTimer <= 0) {
      fireTripleNova(player.x, player.y);
      pulsarNovaTimer = 240;
    } else pulsarNovaTimer--;
  }
  // Phantom Blast: damage aura around player
  if (phantomBlastFrames > 0 && activeEffects.ghost > 0) {
    const auraR = 120;
    const survivors = [];
    for (const b of bodies) {
      if (dist(player, b) < auraR + b.radius) {
        emitDestroyBurst(b.x, b.y, POWERUP_COLORS.nova.rgb);
        emitDestroyEffects(b, 'nova');
        addDestroyPoints();
        SFX.planetDestroyed('nova');
      } else survivors.push(b);
    }
    bodies = survivors;
  }

  for (const b of bodies) {
    b.y += spd; b.pulse += 0.038;
    if (!b.passed && b.y > H * 0.75) {
      b.passed = true;
      score++;
      planetsPassed++;
      runStats.totalPassed++;
      runStats.pointsFromPassing++;
      // Passing a planet resets destroy streak
      destroyStreak = 0;
      document.getElementById('streakDisplay').classList.remove('visible');
      document.getElementById('score').textContent = score;
    }
  }
  bodies = bodies.filter(b => b.y < H + 80);
  const bodyCap = effectiveMaxBodies();
  while (bodies.length < bodyCap) {
    const topY = Math.min(...bodies.map(b => b.y));
    bodies.push(spawnBody(topY - BODY_SPACING - Math.random()*50));
  }

  // Powerup spawning: cooldown scales with frequency, max 2 visible at once
  const spawnInterval = 220 / d.powerupFrequency;
  if (powerups.length < 2 && frame - lastPowerupSpawn > spawnInterval && Math.random() < 0.025) {
    spawnPowerup();
    lastPowerupSpawn = frame;
  }

  // Powerup scroll + pickup detection
  for (const p of powerups) {
    p.y += spd;
    p.pulse += 0.11;
    if (!p.collected && dist(player, p) < p.radius + PLAYER_R + 6) {
      if (p.pairSibling && !p.pairSibling.collected) {
        p.collected = true;
        p.pairSibling.collected = true;
        activatePair(p, p.pairSibling);
      } else {
        p.collected = true;
        activatePowerup(p.type, p.x, p.y);
      }
    }
  }
  powerups = powerups.filter(p => !p.collected && p.y < H + 30);

  // Nova rings: expand, drop dead rings immediately, then destroy bodies they sweep past
  if (novaRings.length) {
    const live = [];
    for (const r of novaRings) {
      r.prevR = r.radius;
      r.radius += 7;
      const rm = r.radiusMult || 1;
      if (r.radius > 320 * rm) r.life *= 0.9;
      if (r.life > 0.05 && r.radius < 400 * rm) live.push(r);
    }
    novaRings = live;
  }
  if (novaRings.length) {
    const survivors = [];
    for (const b of bodies) {
      let killed = false;
      for (const r of novaRings) {
        const dd = dist(r, b);
        const rm = r.radiusMult || 1;
        if (dd < r.radius * rm && dd >= (r.prevR * rm) - 6 && r.radius < 360 * rm) {
          killed = true;
          const color = r.supernova ? '255,90,80' : POWERUP_COLORS.nova.rgb;
          emitDestroyBurst(b.x, b.y, color);
          emitDestroyEffects(b, r.supernova ? 'supernova' : 'nova');
          addDestroyPoints();
          if (activeCombos.nova_nova) SFX.comboDestroySound('nova_nova');
          else SFX.planetDestroyed('nova');
          break;
        }
      }
      if (!killed) survivors.push(b);
    }
    bodies = survivors;
  }

  // Hyperspeed barrier: destroy planets touching the wedge in front of the player
  if (activeEffects.hyperspeed > 0 && hyperspeedCurrentMult > 1.05) {
    const barrierY = player.y - 60;
    const barrierHalfW = 60;
    const bSurvivors = [];
    for (const b of bodies) {
      // Check if body center is within barrier zone
      if (b.y < barrierY + b.radius + 20 && b.y > barrierY - 30 &&
          Math.abs(b.x - player.x) < barrierHalfW + b.radius) {
        emitDestroyBurst(b.x, b.y, POWERUP_COLORS.hyperspeed.rgb);
        emitDestroyEffects(b, 'barrier');
        addDestroyPoints();
        SFX.planetDestroyed('barrier');
      } else {
        bSurvivors.push(b);
      }
    }
    bodies = bSurvivors;
  }

  // Planet ripples scroll with the world
  for (const r of planetRipples) {
    r.y += spd;
    r.expand += 1.6;
    r.life *= 0.92;
  }
  planetRipples = planetRipples.filter(r => r.life > 0.05);

  for (const s of bgStars) { s.y += s.spd * spd * 0.28; if (s.y > H) s.y = -2; }

  findClosest();
  applyForce();

  // Throttled audio for held attract/repel input
  if (leftDown)  SFX.attract(frame);
  if (rightDown) SFX.repel(frame);

  trail.push({ x: player.x, y: player.y });
  if (trail.length > 25) trail.shift();
  emitOrbTrail();
  updateOrbTrailParticles();

  if (checkCollisions()) triggerDeath();
}

function triggerDeath() {
  Sentry.addBreadcrumb({ category: 'death', message: 'died at score ' + score, level: 'info' });
  state = 'dead';
  if (typeof syncUpdateBanner === 'function') syncUpdateBanner();
  pauseBtn.classList.remove('visible');
  SFX.death();
  // Crossfade gameplay → results over 0.3s.
  SFX.playTrack('results', 0.3);
  clearPendingNovaTimeouts();

  // Time bonus: every 30s survived = score * 0.1 bonus, capped at 15 intervals.
  const elapsedAtDeath = elapsedRunSeconds();
  const survivedIntervals = Math.min(15, Math.floor(elapsedAtDeath / 30));
  const timeBonus = Math.floor(score * 0.1 * survivedIntervals);
  const baseScore = score;
  score += timeBonus;

  const scores = saveScore(score, difficulty);

  // Crystal earning: floor(final score * difficulty multiplier)
  const crystalMult = DIFFICULTIES[difficulty].crystalMult || 1;
  const crystalsEarned = Math.max(0, Math.floor(score * crystalMult));
  totalCrystals = Math.max(0, totalCrystals + crystalsEarned);
  saveCrystals();

  // Orb shatter: 6-8 irregular shards fly outward from the player position
  // before the existing particle burst fires. Each shard has a random
  // velocity, rotation speed, and a small cyan polygon shape.
  spawnDeathShards(player.x, player.y);
  // Freeze-frame: white flash for 1 frame at the player's location.
  deathFlashFrames = 1;

  // Particle burst comes after the shards have faded (~1.2s).
  if (pendingDeathBurstTimer) { clearTimeout(pendingDeathBurstTimer); }
  pendingDeathBurstTimer = setTimeout(() => {
    pendingDeathBurstTimer = null;
    // Bail out if the player already moved on (restart, menu, etc.)
    if (state !== 'dead') return;
    deathParticles = [];
    const deathCount = Math.min(50, DEATH_PART_CAP);
    for (let i = 0; i < deathCount; i++) {
      const a = Math.random()*Math.PI*2, s = Math.random()*3.5+0.8;
      pushCapped(deathParticles, { x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, size: Math.random()*2.5+0.8 }, DEATH_PART_CAP);
    }
  }, 1200);
  // Submit score online (fire and forget)
  const uname = getUsername();
  if (uname) submitScoreOnline(uname, score, difficulty);

  // Save run stats snapshot for the death screen
  const deathDifficulty = difficulty;
  const deathUsername = uname;
  const deathScore = score;
  const deathPlanetsPassed = planetsPassed;
  const deathStats = { ...runStats };
  let lbViewDifficulty = deathDifficulty;

  // Fetch global leaderboard for current difficulty
  const globalEl = document.getElementById('globalScores');
  function fetchAndRenderGlobal(diff) {
    globalEl.innerHTML = '<div class="gs-status">connecting...</div>';
    fetchLeaderboard(diff, (err, entries) => {
      if (err) {
        globalEl.innerHTML = '<div class="gs-status">unavailable</div>';
      } else if (entries.length === 0) {
        globalEl.innerHTML = '<div class="gs-status">no scores yet</div>';
      } else {
        globalEl.innerHTML = entries.map((e, i) => {
          const isSelf = deathUsername && e.username.toLowerCase() === deathUsername.toLowerCase();
          return `<div class="gs-row${isSelf ? ' self' : ''}"><span class="gs-rank">${e.rank || i+1}</span><span class="gs-name">${e.username}</span><span class="gs-val">${e.score}</span><span class="gs-diff ${e.difficulty || ''}">${e.difficulty || ''}</span></div>`;
        }).join('');
      }
    });
  }
  setTimeout(() => fetchAndRenderGlobal(deathDifficulty), 1000);

  function renderLocalScores(diff) {
    const hsel = document.getElementById('highscores');
    const allScores = getScores();
    console.log('[drift] renderLocalScores diff=' + diff, 'allScores:', JSON.stringify(allScores));
    const filtered = allScores.filter(s => s.difficulty === diff);
    if (filtered.length === 0) {
      hsel.innerHTML = '<div class="gs-status">no local scores</div>';
    } else {
      hsel.innerHTML = filtered.map((s,i) =>
        `<div class="hs-row"><span class="hs-rank">${i+1}</span><span class="hs-val">${s.score}</span><span class="hs-diff ${s.difficulty}">${s.difficulty}</span></div>`
      ).join('');
    }
  }

  // Store handlers so tab switching works
  window._deathLbHandlers = {
    fetchGlobal: fetchAndRenderGlobal,
    renderLocal: renderLocalScores,
    getDifficulty: () => lbViewDifficulty,
    setDifficulty: (d) => { lbViewDifficulty = d; },
  };

  setTimeout(() => {
    const overlay = document.getElementById('overlay');
    document.getElementById('deathScore').style.display = 'none';

    // Run summary
    const rs = document.getElementById('runSummary');
    const timeBonusRow = timeBonus > 0
      ? `<div class="rs-row" style="color:rgba(100,220,255,0.9);"><span class="rs-label" style="color:rgba(100,220,255,0.75);">TIME BONUS</span><span class="rs-val"></span><span class="rs-pts" style="color:rgba(100,220,255,0.9);">+${timeBonus} pts</span></div>`
      : '';
    rs.innerHTML = `
      <div class="rs-title">${deathScore}</div>
      <div class="rs-row"><span class="rs-label">PLANETS PASSED</span><span class="rs-val">${deathPlanetsPassed}</span><span class="rs-pts">${deathStats.pointsFromPassing} pts</span></div>
      <div class="rs-row"><span class="rs-label">PLANETS DESTROYED</span><span class="rs-val">${deathStats.totalDestroyed}</span><span class="rs-pts">${deathStats.pointsFromDestroying} pts</span></div>
      <div class="rs-row"><span class="rs-label">LONGEST STREAK</span><span class="rs-val">${deathStats.longestStreak}</span><span class="rs-pts"></span></div>
      <div class="rs-row"><span class="rs-label">POWERUPS USED</span><span class="rs-val">${deathStats.powerupsUsed}</span><span class="rs-pts"></span></div>
      ${timeBonusRow}
      <hr class="rs-sep">
      <div class="rs-total"><span>TOTAL</span><span>${deathScore} pts <span class="rs-diff ${deathDifficulty}">${deathDifficulty}</span></span></div>
      <div style="text-align:right; font-size:8px; letter-spacing:1px; color:rgba(255,255,255,0.35); padding-top:2px;">× ${crystalMult} difficulty multiplier</div>
    `;
    rs.style.display = 'block';

    // Crystal display: earned this run (gold) + running total
    const dc = document.getElementById('deathCrystals');
    const dct = document.getElementById('deathCrystalTotal');
    dc.textContent = '+ ' + formatCrystals(crystalsEarned) + ' 💎';
    dc.style.display = 'block';
    dct.textContent = '💎 TOTAL: ' + formatCrystals(totalCrystals);
    dct.style.display = 'block';

    // Hide orb browser on death screen, show SHOP button next to DRIFT AGAIN.
    document.getElementById('orbBrowser').style.display = 'none';
    document.getElementById('deathActions').style.display = 'flex';

    // Render local scores filtered by difficulty
    renderLocalScores(deathDifficulty);
    document.getElementById('highscores').style.display = 'block';

    // Show leaderboard tabs, default to local
    const lbTabs = document.getElementById('lbTabs');
    lbTabs.style.display = 'flex';
    lbTabs.querySelectorAll('.lb-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'local'));
    globalEl.style.display = 'none';

    // Show difficulty sub-tabs
    const diffTabs = document.getElementById('lbDiffTabs');
    diffTabs.style.display = 'flex';
    lbViewDifficulty = deathDifficulty;
    diffTabs.querySelectorAll('.lb-diff-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.diff === deathDifficulty);
    });

    document.getElementById('controlsHint').style.display = 'none';
    document.getElementById('startBtn').textContent = 'DRIFT AGAIN';
    overlay.classList.remove('hidden');
  }, 800);
}

// --- Draw ---
function renderNebulaOffscreen() {
  nebulaCtx.clearRect(0, 0, W, H);
  nebulaCtx.globalAlpha = 0.055;
  const t = frame * 0.0018;
  const layers = [
    ['rgba(70,30,160', 0,   2.1],
    ['rgba(15,70,170', 2.1, 1.7],
    ['rgba(140,30,70', 4.2, 2.3],
  ];
  for (const [c, o, f] of layers) {
    const nx2 = W*0.2 + Math.sin(t+o) * W*0.32;
    const ny2 = H*0.3 + Math.cos(t*f+o) * H*0.28;
    const ng = nebulaCtx.createRadialGradient(nx2, ny2, 0, nx2, ny2, W*0.48);
    ng.addColorStop(0, c + ',0.55)');
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    nebulaCtx.fillStyle = ng;
    nebulaCtx.fillRect(0, 0, W, H);
  }
  nebulaCtx.globalAlpha = 1;
}

// --- Dynamic background images ---
// Real space photos drift slowly down the screen as distant scenery. Each
// object is drawn into a circular mask with a dark radial vignette so it
// fades into the deep-space background. Spawning is paced by planetsPassed
// and alternates screen sides; no two consecutive spawns share an image.
const BG_IMAGE_KEYS = ['nebula', 'dyingStar', 'galaxy', 'supernova'];
const bgImages = {
  nebula:    new Image(),
  dyingStar: new Image(),
  galaxy:    new Image(),
  supernova: new Image(),
};
bgImages.nebula.src    = './assets/bg-nebula.jpg?v=' + Date.now();
bgImages.dyingStar.src = './assets/bg-dying-star.jpg?v=' + Date.now();
bgImages.galaxy.src    = './assets/bg-galaxy.jpg?v=' + Date.now();
bgImages.supernova.src = './assets/bg-supernova.jpg?v=' + Date.now();

let bgObjects = [];
let lastBgSpawnFrame = -99999;  // frame index of most recent spawn
let nextBgSpawnDelay = 45 * 60; // frames until the next scheduled spawn
let lastBgImageKey = null;      // prevents same image twice in a row
let nextBgSide = 'left';        // alternates 'left' / 'right'

function nextBgSpawnStep() {
  // 60-90 seconds between subsequent spawns at 60fps.
  return 3600 + Math.floor(Math.random() * 1801);
}

function resetBgObjects() {
  bgObjects = [];
  lastBgSpawnFrame = -99999;    // ensures first spawn triggers at 45s in
  nextBgSpawnDelay = 45 * 60;   // 2700 frames = 45s at 60fps
  lastBgImageKey = null;
  nextBgSide = Math.random() < 0.5 ? 'left' : 'right';
}
resetBgObjects();

function spawnBgObject() {
  const pool = BG_IMAGE_KEYS.filter(k => k !== lastBgImageKey);
  const key = pool[Math.floor(Math.random() * pool.length)];
  const x = nextBgSide === 'left'
    ? 40 + Math.random() * 100            // 40..140
    : (W - 140) + Math.random() * 100;    // W-140..W-40
  // Nebula and dying-star read better bigger; supernova/galaxy stay tighter
  // so their bright cores don't dominate the screen.
  const size = (key === 'nebula' || key === 'dyingStar')
    ? 280 + Math.random() * 120   // 280..400
    : 220 + Math.random() * 100;  // 220..320
  const opacity = 0.2 + Math.random() * 0.1;   // 0.2..0.3
  bgObjects.push({ key, x, y: -300, size, opacity, seed: Math.random() * 1e9 | 0 });
  lastBgImageKey = key;
  nextBgSide = nextBgSide === 'left' ? 'right' : 'left';
  lastBgSpawnFrame = frame;
  nextBgSpawnDelay = nextBgSpawnStep();
}

function maybeSpawnBgObject() {
  if (bgObjects.length >= 2) return;
  const sinceLast = frame - lastBgSpawnFrame;
  // Normal schedule: wait nextBgSpawnDelay frames since last spawn.
  const scheduledReady = sinceLast >= nextBgSpawnDelay;
  // Hyperspeed shortcut: counts as distance travelled — while stacks >= 3,
  // allow an extra spawn if it's been at least 30s since the last one.
  const hyperspeedReady = hyperSpeedStacks >= 3 && sinceLast >= 30 * 60;
  if (!scheduledReady && !hyperspeedReady) return;
  spawnBgObject();
}

function updateBgObjects() {
  if (state === 'playing') {
    maybeSpawnBgObject();
    const ds = scrollSpeed() * 0.12;
    for (const o of bgObjects) o.y += ds;
  }
  bgObjects = bgObjects.filter(o => o.y <= H + 300);
}

function drawBgObjects() {
  for (const o of bgObjects) {
    const img = bgImages[o.key];
    if (!img || !img.complete || img.naturalWidth === 0) continue;
    const r = o.size / 2;
    const left = o.x - r, top = o.y - r;
    ctx.save();
    // Draw the image semi-transparent with screen blend — black pixels
    // vanish, colored light glows into the space background.
    ctx.globalAlpha = o.opacity;
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(img, left, top, o.size, o.size);
    // Vignette painted at full alpha so the fully opaque ring completely
    // hides the square image boundary. The fill rect covers the whole image
    // square; the radial gradient's last stop (1.0 alpha) extends to the
    // corners via color-stop clamping, so nothing past the opaque ring
    // leaks through.
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    const clearStop  = o.key === 'galaxy' ? 0.08 : 0.25;
    const opaqueStop = o.key === 'galaxy' ? 0.85 : 0.90;
    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
    g.addColorStop(0,          'rgba(0,0,10,0)');
    g.addColorStop(clearStop,  'rgba(0,0,10,0)');
    g.addColorStop(opaqueStop, 'rgba(0,0,10,1)');
    g.addColorStop(1,          'rgba(0,0,10,1)');
    ctx.fillStyle = g;
    ctx.fillRect(left, top, o.size, o.size);
    ctx.restore();
  }
}

// Deterministic PRNG — used to keep per-object blob shapes and similar
// one-time randomizations stable across frames.
function seededRand(seed) {
  let s = (seed | 0) || 1;
  return () => {
    s = (s * 1664525 + 1013904223) | 0;
    return ((s >>> 0) % 100000) / 100000;
  };
}

function drawBg() {
  // Solid background (simplified from createLinearGradient)
  ctx.fillStyle = '#00000a';
  ctx.fillRect(0, 0, W, H);
  // Background space imagery drifts down behind everything.
  updateBgObjects();
  drawBgObjects();
  // Nebula: repaint to offscreen only every NEBULA_UPDATE_INTERVAL frames.
  // Negative delta = frame was reset (game restart), so repaint too.
  const nebDelta = frame - nebulaRenderedFrame;
  if (nebulaRenderedFrame < 0 || nebDelta < 0 || nebDelta >= NEBULA_UPDATE_INTERVAL) {
    renderNebulaOffscreen();
    nebulaRenderedFrame = frame;
  }
  ctx.drawImage(nebulaCanvas, 0, 0);
  // Stars animate on main canvas every frame
  for (const s of bgStars) {
    ctx.globalAlpha = (0.35+0.5*Math.sin(frame*0.05+s.phase));
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBodies() {
  for (const b of bodies) {
    const isTarget = b === closestBody && state === 'playing';
    const pulse = Math.sin(b.pulse)*0.3+0.7;
    const glowR = b.radius * (2.6+Math.sin(b.pulse)*0.35);

    // Glow: use cached gradient built at local origin (0,0) with max glow
    // radius. Arc radius still varies with pulse to preserve the breathing
    // look — the gradient just caps at the outer stop.
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.globalAlpha = 0.32 * pulse;
    ctx.fillStyle = b.cachedGlow;
    ctx.beginPath(); ctx.arc(0, 0, glowR, 0, 6.28); ctx.fill();
    ctx.restore();

    // Body
    ctx.globalAlpha=1;
    if (b.type==='blackhole') {
      // Flat-color accretion disk (simplified from radial gradient) — ellipse
      // scaled vertically for the disk silhouette.
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = 'rgba(170,70,255,1)';
      ctx.scale(1, 0.3);
      ctx.beginPath(); ctx.arc(b.x, b.y/0.3, b.radius*2.2, 0, 6.28); ctx.fill();
      ctx.restore();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,6.28); ctx.fill();
      ctx.strokeStyle='rgba(160,70,255,0.65)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.radius+1.5,0,6.28); ctx.stroke();
    } else {
      // Cached radial fill: gradient is pre-built in spawnBody at local origin,
      // so we translate to (b.x, b.y) and draw from (0,0).
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.fillStyle = b.cachedFill;
      ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, 6.28); ctx.fill();
      ctx.restore();
    }

    // Target indicator: bright ring + line to player when active
    if (isTarget) {
      const orbRgb = getOrbBonus().color;
      const lineColor = leftDown ? 'rgba(80,200,255,' : rightDown ? 'rgba(255,120,80,' : `rgba(${orbRgb},`;
      ctx.globalAlpha = 0.55 + 0.25*Math.sin(frame*0.18);
      ctx.strokeStyle = lineColor+'0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.radius+5+Math.sin(frame*0.18)*2,0,6.28); ctx.stroke();

      if (leftDown || rightDown) {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = lineColor+'0.8)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // Subtle rings always
    ctx.globalAlpha = 0.05+0.03*Math.sin(b.pulse*1.4);
    ctx.strokeStyle = b.type==='blackhole'?'rgba(160,70,255,1)':b.glowColor;
    ctx.lineWidth=1;
    [b.radius*2, b.radius*3.5].forEach(r=>{ ctx.beginPath(); ctx.arc(b.x,b.y,r,0,6.28); ctx.stroke(); });
    ctx.globalAlpha=1;
  }
}

// Orb-specific trail particles. Emitted each playing frame behind the player
// in the style of the active orb. Separate from the player-position `trail`
// array so we can draw upward-drifting wisps, falling rocks, etc.
let orbTrailParticles = [];
const ORB_TRAIL_CAP = 140;

function emitOrbTrail() {
  if (state !== 'playing') return;
  const orb = activeOrb;
  const px = player.x, py = player.y;
  if (orb === 'cosmic') {
    // Purple wisps drifting upward.
    if (Math.random() < 0.8) {
      pushCapped(orbTrailParticles, {
        kind: 'wisp',
        x: px + (Math.random() - 0.5) * 10, y: py + 4 + Math.random() * 4,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -1.4 - Math.random() * 1.2,
        life: 1, size: 2.5 + Math.random() * 2.5,
      }, ORB_TRAIL_CAP);
    }
  } else if (orb === 'solar') {
    // Orange/red fire particles: dense, flickering, drift slightly upward.
    if (Math.random() < 0.9) {
      pushCapped(orbTrailParticles, {
        kind: 'fire',
        x: px + (Math.random() - 0.5) * 12, y: py + 4 + Math.random() * 3,
        vx: (Math.random() - 0.5) * 0.8,
        vy: -0.4 - Math.random() * 1.5,
        life: 1, size: 3 + Math.random() * 3.5,
        hue: Math.random() < 0.35 ? '255,210,80' : (Math.random() < 0.5 ? '255,120,40' : '255,80,30'),
      }, ORB_TRAIL_CAP);
    }
  } else if (orb === 'nebula') {
    // Blue speed lines: short vertical streaks scrolling behind the player.
    if (Math.random() < 0.5) {
      pushCapped(orbTrailParticles, {
        kind: 'line',
        x: px + (Math.random() - 0.5) * 26, y: py + 6,
        vx: 0, vy: 4 + Math.random() * 3.5,
        life: 1, len: 14 + Math.random() * 14,
      }, ORB_TRAIL_CAP);
    }
  } else if (orb === 'asteroid') {
    // Grey rock fragments falling behind the player.
    if (Math.random() < 0.55) {
      pushCapped(orbTrailParticles, {
        kind: 'rock',
        x: px + (Math.random() - 0.5) * 10, y: py + 5,
        vx: (Math.random() - 0.5) * 1.5,
        vy: 0.8 + Math.random() * 1.8,
        life: 1, size: 2 + Math.random() * 2.5,
        angle: Math.random() * 6.28, spin: (Math.random() - 0.5) * 0.25,
      }, ORB_TRAIL_CAP);
    }
  }
  // cyan: no extra particles — the cyan position-trail below carries the look.
}

function updateOrbTrailParticles() {
  for (let i = orbTrailParticles.length - 1; i >= 0; i--) {
    const p = orbTrailParticles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.angle !== undefined) p.angle += p.spin;
    if (p.kind === 'fire') p.vy -= 0.04; // fire lifts faster over time
    p.life -= 0.025;
    if (p.life <= 0) orbTrailParticles.splice(i, 1);
  }
}

function drawOrbTrailParticles() {
  if (!orbTrailParticles.length) return;
  ctx.save();
  for (const p of orbTrailParticles) {
    const a = Math.max(0, p.life);
    ctx.globalAlpha = a * 0.8;
    if (p.kind === 'wisp') {
      ctx.fillStyle = `rgba(${activeOrbColor()},1)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.6 + 0.4 * a), 0, 6.28); ctx.fill();
    } else if (p.kind === 'fire') {
      ctx.fillStyle = `rgba(${p.hue},1)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.5 + 0.6 * a), 0, 6.28); ctx.fill();
    } else if (p.kind === 'line') {
      ctx.strokeStyle = `rgba(${activeOrbColor()},1)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x, p.y - p.len);
      ctx.stroke();
    } else if (p.kind === 'rock') {
      ctx.fillStyle = `rgba(${activeOrbColor()},1)`;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      const s = p.size;
      ctx.beginPath();
      ctx.moveTo(-s, -s * 0.4);
      ctx.lineTo(s * 0.6, -s);
      ctx.lineTo(s, s * 0.3);
      ctx.lineTo(-s * 0.3, s);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawTrail() {
  const ghosting = activeEffects.ghost > 0;
  const orbColor = activeOrbColor();
  // Orb-specific particles first (drawn below the cyan position trail).
  drawOrbTrailParticles();
  // Position trail: always drawn. Matches orb color (except during ghost,
  // which keeps the signature purple wisp so the state reads at a glance).
  for (let i=0; i<trail.length; i++) {
    const t=i/trail.length;
    ctx.globalAlpha = t * (ghosting ? 0.55 : 0.6);
    if (ghosting) {
      ctx.fillStyle = `hsl(${278 + t*12}, 75%, ${62 + t*12}%)`;
    } else {
      ctx.fillStyle = `rgba(${orbColor},1)`;
    }
    ctx.beginPath(); ctx.arc(trail[i].x,trail[i].y,t*4.5,0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPlayer() {
  const inGrace = frame < GRACE_FRAMES;
  const gf = inGrace ? Math.sin(frame*0.26)*0.5+0.5 : 1;
  const shielded = activeEffects.shield > 0;
  const ghosting = activeEffects.ghost  > 0;
  const eternal = !!activeCombos.ghost_ghost;
  const phantomBlast = phantomBlastFrames > 0 && ghosting;

  // Shield blink in last 1.5s of duration
  let shieldVis = 1;
  if (shielded && activeEffects.shield < SHIELD_BLINK_FRAMES) {
    shieldVis = (Math.floor(activeEffects.shield / 5) % 2) ? 1 : 0.25;
  }

  // ETERNAL PHANTOM uses 30% opacity instead of 50%
  const ghostAlpha = ghosting ? (eternal ? 0.3 : 0.5) : 1;

  ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);

  // Shield outer aura (drawn behind the player so it haloes around)
  if (shielded) {
    ctx.globalAlpha = 0.55 * shieldVis;
    const sg = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*4.2);
    sg.addColorStop(0,'rgba(120,230,255,0.55)');
    sg.addColorStop(0.55,'rgba(80,200,255,0.28)');
    sg.addColorStop(1,'rgba(80,200,255,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*4.2,0,6.28); ctx.fill();
    ctx.globalAlpha = 0.85 * shieldVis;
    ctx.strokeStyle = 'rgba(180,240,255,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*3.6,0,6.28); ctx.stroke();
    ctx.globalAlpha = 0.4 * shieldVis;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*4.0,0,6.28); ctx.stroke();
    // Extra inner concentric ring while multiple hits remain (fortress combo
    // or asteroid orb's multi-hit shield).
    if (shieldHits >= 2) {
      ctx.globalAlpha = 0.9 * shieldVis;
      ctx.strokeStyle = 'rgba(120,255,255,0.95)';
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(0,0,PLAYER_R*2.6,0,6.28); ctx.stroke();
    }
    if (shieldHits >= 3) {
      ctx.globalAlpha = 0.7 * shieldVis;
      ctx.strokeStyle = 'rgba(180,240,255,0.85)';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(0,0,PLAYER_R*3.0,0,6.28); ctx.stroke();
    }
  }
  // PHANTOM BLAST: red/orange damage aura around player
  if (phantomBlast) {
    const auraR = 120;
    const pulse = Math.sin(frame * 0.18) * 0.15 + 0.85;
    ctx.globalAlpha = 0.18 * pulse;
    const pg = ctx.createRadialGradient(0, 0, PLAYER_R, 0, 0, auraR);
    pg.addColorStop(0, 'rgba(255,140,60,0.55)');
    pg.addColorStop(0.6, 'rgba(255,80,40,0.18)');
    pg.addColorStop(1, 'rgba(255,60,20,0)');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(0,0,auraR,0,6.28); ctx.fill();
    ctx.globalAlpha = 0.55 * pulse;
    ctx.strokeStyle = 'rgba(255,120,50,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0,0,auraR,0,6.28); ctx.stroke();
  }

  // Ghost wispy aura: 3 concentric pulsing rings out of phase + soft purple halo
  if (ghosting) {
    const f1 = Math.sin(frame * 0.10)         * 0.5 + 0.5;
    const f2 = Math.sin(frame * 0.10 + 2.094) * 0.5 + 0.5; // +120deg
    const f3 = Math.sin(frame * 0.10 + 4.189) * 0.5 + 0.5; // +240deg

    // Soft purple gradient halo
    ctx.globalAlpha = 0.35;
    const gg = ctx.createRadialGradient(0, 0, PLAYER_R, 0, 0, PLAYER_R * 4.4);
    gg.addColorStop(0,   'rgba(190,110,240,0.5)');
    gg.addColorStop(0.5, 'rgba(170,90,220,0.22)');
    gg.addColorStop(1,   'rgba(170,90,220,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * 4.4, 0, 6.28); ctx.fill();

    // Inner ring
    ctx.globalAlpha = 0.55 + 0.3 * f1;
    ctx.strokeStyle = 'rgba(210,140,255,0.95)';
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * (2.0 + f1 * 0.45), 0, 6.28); ctx.stroke();

    // Middle ring
    ctx.globalAlpha = 0.4 + 0.25 * f2;
    ctx.strokeStyle = 'rgba(185,105,240,0.85)';
    ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * (3.0 + f2 * 0.55), 0, 6.28); ctx.stroke();

    // Outer ring
    ctx.globalAlpha = 0.28 + 0.2 * f3;
    ctx.strokeStyle = 'rgba(160,80,220,0.75)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R * (4.0 + f3 * 0.6), 0, 6.28); ctx.stroke();
  }

  if (inGrace) {
    ctx.globalAlpha = 0.28*gf*ghostAlpha;
    ctx.strokeStyle = '#4af'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*(2.4-gf*0.4),0,6.28); ctx.stroke();
  }

  // Stacked hyperspeed glow — added behind the regular cyan aura. Tint shifts
  // gold→orange→red as stacks climb; stack 4 layers a pulsing white core on
  // top so it visibly screams "danger".
  if (hyperSpeedStacks > 0 && hyperspeedCurrentMult > 1.05) {
    const tint = hyperStackTint(hyperSpeedStacks);
    const intensity = (hyperspeedCurrentMult - 1) / 2;
    ctx.globalAlpha = 0.55 * intensity * ghostAlpha;
    const hg = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*3.8);
    hg.addColorStop(0,   `rgba(${tint.r},${tint.g},${tint.b},0.75)`);
    hg.addColorStop(0.5, `rgba(${tint.r},${tint.g},${tint.b},0.25)`);
    hg.addColorStop(1,   `rgba(${tint.r},${tint.g},${tint.b},0)`);
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0,0,PLAYER_R*3.8,0,6.28); ctx.fill();
    if (tint.white) {
      const pulse = (Math.sin(frame * 0.3) + 1) * 0.5;
      ctx.globalAlpha = (0.45 + 0.45 * pulse) * intensity * ghostAlpha;
      const wg = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*1.9);
      wg.addColorStop(0, 'rgba(255,255,255,0.9)');
      wg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = wg;
      ctx.beginPath(); ctx.arc(0,0,PLAYER_R*1.9,0,6.28); ctx.fill();
    }
  }

  const orbColor = getOrbBonus().color;
  ctx.globalAlpha = (inGrace?gf:1) * ghostAlpha;
  const aura = ctx.createRadialGradient(0,0,0,0,0,PLAYER_R*2.8);
  aura.addColorStop(0,`rgba(${orbColor},0.38)`); aura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(0,0,PLAYER_R*2.8,0,6.28); ctx.fill();

  ctx.globalAlpha = ghostAlpha;
  const core = ctx.createRadialGradient(-1.5,-1.5,0,0,0,PLAYER_R);
  core.addColorStop(0,'#fff');
  core.addColorStop(0.4,`rgba(${orbColor},1)`);
  core.addColorStop(1,`rgba(${orbColor},0.45)`);
  ctx.fillStyle = core; ctx.beginPath(); ctx.arc(0,0,PLAYER_R,0,6.28); ctx.fill();

  const spd = Math.hypot(player.vx, player.vy);
  if (spd > 0.9) {
    ctx.globalAlpha = Math.min(spd/4,0.55) * ghostAlpha;
    ctx.strokeStyle = `rgba(${orbColor},0.85)`;
    ctx.lineWidth = 1.8; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-player.vx*2.8,-player.vy*2.8); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha = 1;
}

function drawPairTethers() {
  const drawn = new Set();
  for (const p of powerups) {
    if (!p.pairSibling || p.collected) continue;
    const key = Math.min(p.pairId, p.pairSibling.pairId) + '_' + Math.max(p.pairId, p.pairSibling.pairId);
    if (drawn.has(key)) continue;
    drawn.add(key);
    const q = p.pairSibling;
    if (q.collected) continue;
    const rgb1 = POWERUP_COLORS[p.type].rgb;
    const rgb2 = POWERUP_COLORS[q.type].rgb;
    // Mixed color by averaging
    const mix = rgb1.split(',').map((n, i) => Math.round((+n + +rgb2.split(',')[i]) / 2)).join(',');
    const pulse = Math.sin(frame * 0.18) * 0.3 + 0.7;
    const segments = 6;
    ctx.save();
    // Outer glow beam
    ctx.globalAlpha = 0.35 * pulse;
    ctx.strokeStyle = `rgba(${mix},0.9)`;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
    // Inner bright beam
    ctx.globalAlpha = 0.85 * pulse;
    ctx.strokeStyle = `rgba(${mix},1)`;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
    // Energy particles travelling along the beam
    for (let i = 0; i < segments; i++) {
      const t = ((frame * 0.02 + i / segments) % 1);
      const ex = p.x + (q.x - p.x) * t;
      const ey = p.y + (q.y - p.y) * t;
      ctx.globalAlpha = (1 - Math.abs(t - 0.5) * 2) * 0.9;
      ctx.fillStyle = `rgba(${mix},1)`;
      ctx.beginPath(); ctx.arc(ex, ey, 2.2, 0, 6.28); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function drawPowerups() {
  drawPairTethers();
  for (const p of powerups) {
    const pulse = Math.sin(p.pulse) * 0.35 + 0.65;
    const r = p.radius * (0.95 + Math.sin(p.pulse) * 0.18);
    const rgb = POWERUP_COLORS[p.type].rgb;

    // Outer pulsing halo
    ctx.globalAlpha = 0.55 * pulse;
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3.4);
    grd.addColorStop(0, `rgba(${rgb},0.65)`);
    grd.addColorStop(0.5, `rgba(${rgb},0.22)`);
    grd.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 3.4, 0, 6.28); ctx.fill();

    // Bright inner ring
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = `rgba(${rgb},0.9)`;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 1.55, 0, 6.28); ctx.stroke();

    // Icon
    ctx.globalAlpha = 1;
    ctx.fillStyle = `rgba(${rgb},1)`;
    ctx.strokeStyle = `rgba(${rgb},1)`;
    ctx.lineWidth = 1.8;

    if (p.type === 'shield') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - r);
      ctx.lineTo(p.x + r*0.78, p.y);
      ctx.lineTo(p.x, p.y + r);
      ctx.lineTo(p.x - r*0.78, p.y);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.28, 0, 6.28); ctx.fill();
    } else if (p.type === 'nova') {
      // Concentric burst rings
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.42, 0, 6.28); ctx.fill();
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.78, 0, 6.28); ctx.stroke();
      ctx.lineWidth = 1.1;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*1.12, 0, 6.28); ctx.stroke();
    } else if (p.type === 'hyperspeed') {
      // Lightning bolt / arrow pointing up
      ctx.beginPath();
      ctx.moveTo(p.x + r*0.15, p.y - r*0.95);
      ctx.lineTo(p.x - r*0.45, p.y + r*0.1);
      ctx.lineTo(p.x - r*0.05, p.y + r*0.1);
      ctx.lineTo(p.x - r*0.15, p.y + r*0.95);
      ctx.lineTo(p.x + r*0.45, p.y - r*0.1);
      ctx.lineTo(p.x + r*0.05, p.y - r*0.1);
      ctx.closePath(); ctx.fill();
    } else { // ghost
      // Wispy round head with three "feet" tails
      ctx.beginPath();
      ctx.arc(p.x, p.y - r*0.15, r*0.85, Math.PI, 0);
      ctx.lineTo(p.x + r*0.85, p.y + r*0.65);
      ctx.lineTo(p.x + r*0.5,  p.y + r*0.35);
      ctx.lineTo(p.x + r*0.15, p.y + r*0.65);
      ctx.lineTo(p.x - r*0.15, p.y + r*0.35);
      ctx.lineTo(p.x - r*0.5,  p.y + r*0.65);
      ctx.lineTo(p.x - r*0.85, p.y + r*0.35);
      ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x - r*0.28, p.y - r*0.2, r*0.13, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x + r*0.28, p.y - r*0.2, r*0.13, 0, 6.28); ctx.fill();
    }

    // Target indicator when powerup is closest body
    if (p === closestBody && state === 'playing') {
      const orbRgb = getOrbBonus().color;
      const lineColor = leftDown ? 'rgba(80,200,255,' : rightDown ? 'rgba(255,120,80,' : `rgba(${orbRgb},`;
      ctx.globalAlpha = 0.55 + 0.25*Math.sin(frame*0.18);
      ctx.strokeStyle = lineColor+'0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,r*1.55+5+Math.sin(frame*0.18)*2,0,6.28); ctx.stroke();
      if (leftDown || rightDown) {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = lineColor+'0.8)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(p.x,p.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.globalAlpha = 1;
  }
}

function drawNovaRings() {
  for (const r of novaRings) {
    const rm = r.radiusMult || 1;
    const drawR = r.radius * rm;
    const innerR = Math.max(0, drawR - 20);
    const sn = r.supernova;
    const innerCol = sn ? '255,80,80' : '255,160,60';
    const outerCol = sn ? '255,60,60' : '255,200,90';
    ctx.globalAlpha = r.life * 0.5;
    ctx.strokeStyle = `rgba(${innerCol},${r.life * 0.7})`;
    ctx.lineWidth = 10;
    ctx.beginPath(); ctx.arc(r.x, r.y, innerR, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = r.life * 0.85;
    ctx.strokeStyle = `rgba(${outerCol},${r.life})`;
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(r.x, r.y, drawR, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = r.life * 0.35;
    ctx.lineWidth = 18;
    ctx.beginPath(); ctx.arc(r.x, r.y, drawR, 0, 6.28); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPlanetRipples() {
  for (const r of planetRipples) {
    ctx.globalAlpha = r.life * 0.7;
    ctx.strokeStyle = `rgba(220,150,255,${r.life})`;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.baseR + r.expand, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = r.life * 0.35;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.baseR + r.expand * 1.6, 0, 6.28); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPickupParticles() {
  pickupParticles = pickupParticles.filter(p => p.life > 0.05);
  for (const p of pickupParticles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life *= 0.93;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `rgba(${p.rgb},1)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Powerup timer bar (DOM) ---
const powerupTimerEl = document.getElementById('powerupTimer');
const ptLabelEl = document.getElementById('ptLabel');
const ptFillEl = document.getElementById('ptFill');
const ptComboEl = document.getElementById('ptCombo');

function updatePowerupTimer() {
  // Priority: shield > ghost > hyperspeed (most game-relevant first)
  let label = null, remaining = 0, max = 0, fillColor = '';
  if (activeEffects.shield > 0) {
    label = 'SHIELD'; remaining = activeEffects.shield; max = SHIELD_DURATION();
    fillColor = 'rgba(120,230,255,0.95)';
  } else if (activeEffects.ghost > 0) {
    label = 'GHOST'; remaining = activeEffects.ghost;
    max = activeCombos.ghost_ghost ? GHOST_ETERNAL_DURATION : GHOST_DURATION();
    fillColor = 'rgba(200,120,255,0.95)';
  } else if (activeEffects.hyperspeed > 0) {
    label = 'HYPERSPEED'; remaining = activeEffects.hyperspeed;
    max = hyperspeedActiveDuration;
    fillColor = 'rgba(255,220,60,0.95)';
  }

  if (!label) {
    if (powerupTimerEl.classList.contains('visible'))
      powerupTimerEl.classList.remove('visible');
    if (ptComboEl.classList.contains('visible'))
      ptComboEl.classList.remove('visible');
    return;
  }

  const pct = Math.max(0, Math.min(1, remaining / max));
  if (!powerupTimerEl.classList.contains('visible'))
    powerupTimerEl.classList.add('visible');
  if (ptLabelEl.textContent !== label) ptLabelEl.textContent = label;
  ptFillEl.style.width = (pct * 100) + '%';
  ptFillEl.style.background = fillColor;
  ptFillEl.style.boxShadow = `0 0 8px ${fillColor}`;

  // Combo label as a second line — most recently activated combo
  let activeKey = lastComboLabel;
  if (activeKey && !activeCombos[activeKey]) activeKey = null;
  if (!activeKey) {
    const keys = Object.keys(activeCombos);
    if (keys.length) activeKey = keys[keys.length - 1];
  }
  if (activeKey) {
    const def = COMBO_DEFS[activeKey];
    const text = '\u26A1 ' + def.name;
    if (ptComboEl.textContent !== text) ptComboEl.textContent = text;
    ptComboEl.style.color = def.labelColor;
    if (!ptComboEl.classList.contains('visible'))
      ptComboEl.classList.add('visible');
  } else if (ptComboEl.classList.contains('visible')) {
    ptComboEl.classList.remove('visible');
  }
}

// Stack-aware tint for hyperspeed visuals (player glow + barrier).
// Stack 1 keeps the original gold; higher stacks shift orange→red, and stack
// 4 sets the `white` flag so renderers can pulse a white core/edge on top.
function hyperStackTint(stacks) {
  if (stacks >= 4) return { r: 255, g: 80,  b: 80,  edgeR: 255, edgeG: 200, edgeB: 200, white: true };
  if (stacks >= 3) return { r: 255, g: 60,  b: 60,  edgeR: 255, edgeG: 140, edgeB: 140 };
  if (stacks >= 2) return { r: 255, g: 140, b: 40,  edgeR: 255, edgeG: 200, edgeB: 100 };
  return                  { r: 255, g: 220, b: 60,  edgeR: 255, edgeG: 240, edgeB: 120 };
}

function drawHyperspeedBarrier() {
  if (activeEffects.hyperspeed <= 0 || hyperspeedCurrentMult <= 1.05) return;
  const intensity = (hyperspeedCurrentMult - 1) / 2; // 0..1
  const barrierY = player.y - 60;
  const halfW = 60;

  const tint = hyperStackTint(hyperSpeedStacks);
  let r = tint.r, g = tint.g, b = tint.b;
  // Stack 4: barrier pulses red ↔ white at ~5hz.
  if (tint.white) {
    const pulse = (Math.sin(frame * 0.3) + 1) * 0.5; // 0..1
    const w = pulse * 0.6;
    r = Math.round(r + (255 - r) * w);
    g = Math.round(g + (255 - g) * w);
    b = Math.round(b + (255 - b) * w);
  }
  const eR = tint.edgeR, eG = tint.edgeG, eB = tint.edgeB;

  // Glowing wedge/barrier shape
  ctx.save();
  ctx.globalAlpha = 0.6 * intensity;

  // Main barrier glow
  const grd = ctx.createLinearGradient(player.x, barrierY - 15, player.x, barrierY + 20);
  grd.addColorStop(0, `rgba(${r},${g},${b},0)`);
  grd.addColorStop(0.4, `rgba(${r},${g},${b},${0.7 * intensity})`);
  grd.addColorStop(1, `rgba(${r},${Math.round(g*0.82)},${Math.round(b*0.5)},0)`);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(player.x - halfW, barrierY + 15);
  ctx.quadraticCurveTo(player.x, barrierY - 18, player.x + halfW, barrierY + 15);
  ctx.quadraticCurveTo(player.x, barrierY + 5, player.x - halfW, barrierY + 15);
  ctx.fill();

  // Bright edge line
  ctx.globalAlpha = 0.85 * intensity;
  ctx.strokeStyle = `rgba(${eR},${eG},${eB},${0.9 * intensity})`;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(player.x - halfW, barrierY + 15);
  ctx.quadraticCurveTo(player.x, barrierY - 18, player.x + halfW, barrierY + 15);
  ctx.stroke();

  // Outer glow halo
  ctx.globalAlpha = 0.25 * intensity;
  const halo = ctx.createRadialGradient(player.x, barrierY, 0, player.x, barrierY, halfW * 1.5);
  halo.addColorStop(0, `rgba(${r},${g},${b},0.5)`);
  halo.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = halo;
  ctx.fillRect(player.x - halfW * 1.5, barrierY - halfW, halfW * 3, halfW * 2);

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawDeathParticles() {
  deathParticles=deathParticles.filter(p=>p.life>0.01);
  for (const p of deathParticles) {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; p.vy*=0.95; p.life*=0.93;
    ctx.globalAlpha=p.life; ctx.fillStyle=`hsl(${185+(1-p.life)*80},100%,72%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// Stacked hyperspeed banner — only shows for 2+ stacks. Drawn in canvas
// space so we don't have to retrofit DOM layout. Sits between the score
// (top ~24px) and the streak counter (top ~58px). Blink rate gets faster
// as stacks climb so 4× feels noticeably more frantic than 2×.
function drawHyperStackText() {
  if (hyperSpeedStacks < 2) return;
  const tint = hyperStackTint(hyperSpeedStacks);
  let blinkPeriod = 20;
  if (hyperSpeedStacks === 3) blinkPeriod = 15;
  else if (hyperSpeedStacks === 4) blinkPeriod = 10;
  // On the visible half of the blink cycle, fully draw; otherwise dim.
  const visible = Math.floor(frame / blinkPeriod) % 2 === 0;
  const alpha = visible ? 1 : 0.25;

  const label = hyperSpeedStacks + '× HYPERSPEED';
  ctx.save();
  ctx.font = '700 13px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.globalAlpha = alpha;
  // Glow
  ctx.shadowColor = `rgba(${tint.r},${tint.g},${tint.b},0.95)`;
  ctx.shadowBlur = 12;
  ctx.fillStyle = tint.white
    ? `rgba(255,${230 + Math.round(Math.sin(frame * 0.4) * 25)},${230 + Math.round(Math.sin(frame * 0.4) * 25)},1)`
    : `rgba(${tint.r},${tint.g},${tint.b},1)`;
  ctx.fillText(label, W / 2, 50);
  ctx.restore();
  ctx.globalAlpha = 1;
}

// Player death shatter — 6-8 irregular polygon shards spawned at the player
// position. Each shard tumbles outward, leaves a brief cyan trail, and fades
// over ~1.2s. The existing deathParticles burst fires after these are gone
// (scheduled by triggerDeath).
const SHARD_LIFE_FRAMES = 72;  // 1.2s @60fps
function spawnDeathShards(x, y) {
  deathShards = [];
  const count = 6 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1.6 + Math.random() * 2.4;
    // 3-4 vertices forming a small irregular polygon.
    const vCount = 3 + Math.floor(Math.random() * 2);
    const verts = [];
    const baseR = 5 + Math.random() * 7; // 5..12px
    for (let v = 0; v < vCount; v++) {
      const va = (v / vCount) * Math.PI * 2 + Math.random() * 0.6;
      const vr = baseR * (0.6 + Math.random() * 0.7);
      verts.push({ x: Math.cos(va) * vr, y: Math.sin(va) * vr });
    }
    deathShards.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.25,
      verts,
      life: 1,           // 1 → 0
      age: 0,
      trail: [],         // recent {x,y} positions for the brief cyan tail
    });
  }
}

function drawDeathShards() {
  // Render the 1-frame white player flash on top of the shards.
  if (deathFlashFrames > 0) {
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x, player.y, PLAYER_R * 2.4, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;
    deathFlashFrames--;
  }

  if (!deathShards.length) return;
  deathShards = deathShards.filter(s => s.age < SHARD_LIFE_FRAMES);
  for (const s of deathShards) {
    s.age++;
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.985; s.vy = s.vy * 0.985 + 0.04; // very slight drag + soft gravity
    s.rot += s.rotSpeed;
    s.life = 1 - (s.age / SHARD_LIFE_FRAMES);
    // Track last few positions for the trail.
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 6) s.trail.shift();

    // Cyan trail behind the shard.
    if (s.trail.length > 1) {
      ctx.globalAlpha = s.life * 0.4;
      ctx.strokeStyle = 'rgba(140,230,255,1)';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(s.trail[0].x, s.trail[0].y);
      for (let i = 1; i < s.trail.length; i++) ctx.lineTo(s.trail[i].x, s.trail[i].y);
      ctx.stroke();
    }

    // Polygon shard in cyan/white with a glow stroke.
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = s.life;
    ctx.fillStyle = 'rgba(220,250,255,1)';
    ctx.strokeStyle = 'rgba(120,220,255,1)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(s.verts[0].x, s.verts[0].y);
    for (let i = 1; i < s.verts.length; i++) ctx.lineTo(s.verts[i].x, s.verts[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function render() {
  ctx.save();
  // Screen shake
  if (screenShake > 0) {
    const intensity = screenShake * 0.6;
    const sx = (Math.random() - 0.5) * intensity * 2;
    const sy = (Math.random() - 0.5) * intensity * 2;
    ctx.translate(sx, sy);
    screenShake--;
  }
  drawBg();
  drawBodies();

  // Hyperspeed gold tint over the world
  if (activeEffects.hyperspeed > 0 && hyperspeedCurrentMult > 1.05) {
    const fade = Math.min(activeEffects.hyperspeed / 30, 1);
    ctx.globalAlpha = 0.12 * fade * ((hyperspeedCurrentMult - 1) / 2);
    ctx.fillStyle = 'rgba(255,220,60,1)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (state==='playing'||state==='dead'||state==='paused') {
    drawPowerups();
    drawNovaRings();
    drawPlanetRipples();
    drawTrail();
    if (state==='playing'||state==='paused') {
      drawHyperspeedBarrier();
      drawPlayer();
    }
    drawPickupParticles();
    drawDestroyEffects();
    drawDeathShards();
    drawDeathParticles();
    if (state==='playing') drawHyperStackText();
  }

  updatePowerupTimer();
  ctx.restore();
}

// Crash-resilient game loop for Android WebView. update() and render() are
// each guarded so a thrown error never tears down the rAF chain. update()
// failures fall back to the main menu (the game state is suspect after
// a partial update); render() failures just skip the frame.
let loopFrameCounter = 0;
function loop() {
  try {
    update();
  } catch (err) {
    console.error('[loop] update() threw, recovering to main menu', err);
    recordError('update', err);
    try { goToMainMenu(); } catch (e2) { console.error('[loop] goToMainMenu also threw', e2); }
  }
  try {
    render();
  } catch (err) {
    console.error('[loop] render() threw, skipping frame', err);
    recordError('render', err);
  }
  // Memory pressure watchdog: every 600 frames (~10s @60fps) check the total
  // particle / ring / ripple count and force-clear if it's blown past 150.
  // Stops intense combo chains from accumulating into an OOM crash.
  loopFrameCounter++;
  if (loopFrameCounter % 600 === 0) {
    const total = pickupParticles.length + deathParticles.length
                + novaRings.length + planetRipples.length
                + destroyEffects.length + deathShards.length
                + orbTrailParticles.length;
    if (total > 150) {
      console.warn('[loop] memory pressure: clearing', total, 'transient particles');
      pickupParticles = [];
      deathParticles = [];
      novaRings = [];
      planetRipples = [];
      destroyEffects = [];
      deathShards = [];
      orbTrailParticles = [];
    }
  }
  requestAnimationFrame(loop);
}

// --- Input ---
function readInput(e) {
  if (state!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  leftDown=false; rightDown=false;
  const pts=e.touches||[e];
  for (const t of pts) {
    const cx=(t.clientX-rect.left)*(W/rect.width);
    if (cx<W/2) leftDown=true; else rightDown=true;
  }
  e.preventDefault();
}
function clearInput(e) {
  leftDown=false; rightDown=false;
  if (e.touches) for (const t of e.touches) {
    const cx=(t.clientX-canvas.getBoundingClientRect().left)*(W/canvas.getBoundingClientRect().width);
    if (cx<W/2) leftDown=true; else rightDown=true;
  }
}
canvas.addEventListener('touchstart',readInput,{passive:false});
canvas.addEventListener('touchmove',readInput,{passive:false});
canvas.addEventListener('touchend',clearInput);
canvas.addEventListener('mousedown',readInput);
canvas.addEventListener('mousemove',e=>{ if(e.buttons) readInput(e); });
canvas.addEventListener('mouseup',clearInput);
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') leftDown=true; if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') rightDown=true; });
document.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') leftDown=false; if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') rightDown=false; });

const pauseBtn = document.getElementById('pauseBtn');
const pauseOverlay = document.getElementById('pauseOverlay');
const quitMsg = document.getElementById('quitMsg');

document.getElementById('startBtn').addEventListener('click', ()=>{
  // Defense in depth: ignore stray clicks unless we're actually on a menu screen
  if (state !== 'idle' && state !== 'dead') return;
  SFX.init();
  SFX.clickPrimary();
  // Death→play uses the shorter results→gameplay 0.3s crossfade per spec;
  // menu→play uses the 0.5s menu→gameplay crossfade.
  const fade = state === 'dead' ? 0.3 : 0.5;
  resetGame(); state='playing';
  SFX.playTrack('gameplay', fade);
  document.getElementById('overlay').classList.add('hidden');
  pauseBtn.classList.add('visible');
});

let runPauseStart = 0;
function pauseGame() {
  if (state !== 'playing') return;
  state = 'paused';
  leftDown = false; rightDown = false;
  SFX.pauseMusic();
  runPauseStart = Date.now();
  pauseBtn.classList.remove('visible');
  pauseOverlay.classList.add('visible');
}

function resumeGame() {
  if (state !== 'paused') return;
  state = 'playing';
  SFX.resumeMusic();
  // Shift runStartTime forward by the pause duration so elapsed stays real.
  if (runPauseStart && runStartTime) runStartTime += (Date.now() - runPauseStart);
  runPauseStart = 0;
  pauseOverlay.classList.remove('visible');
  quitMsg.style.display = 'none';
  pauseBtn.classList.add('visible');
}

function restartFromPause() {
  resetGame();
  state = 'playing';
  SFX.resumeMusic();
  pauseOverlay.classList.remove('visible');
  quitMsg.style.display = 'none';
  pauseBtn.classList.add('visible');
}

function goToMainMenu() {
  state = 'idle';
  leftDown = false; rightDown = false;
  powerups = [];
  novaRings = [];
  pickupParticles = [];
  orbTrailParticles = [];
  planetRipples = [];
  destroyEffects = [];
  deathShards = [];
  deathFlashFrames = 0;
  if (pendingDeathBurstTimer) { clearTimeout(pendingDeathBurstTimer); pendingDeathBurstTimer = null; }
  clearPendingNovaTimeouts();
  activeEffects = { shield: 0, hyperspeed: 0, ghost: 0 };
  hyperspeedCurrentMult = 1; hyperspeedTargetSpeed = 0;
  hyperspeedPeakMult = 1; hyperspeedActiveDuration = HYPERSPEED_DURATION;
  hyperSpeedStacks = 0;
  resetBgObjects();
  hyperSpeedTimers = [];
  peakHyperSpeedStacks = 0;
  if (hyperspeedWhooshNodes) { try { hyperspeedWhooshNodes.stop(0.1); } catch {} hyperspeedWhooshNodes = null; }
  shieldBroken = false;
  shieldHits = 1;
  fortressShield = false;
  activeCombos = {};
  lastComboLabel = null;
  recentNovaFrames = 0;
  phantomBlastFrames = 0;
  lastGainedEffects = [];
  lastGainedTimestamp = -1;
  // Crossfade whatever's playing back to the menu track over 0.5s.
  SFX.playTrack('menu', 0.5);
  pauseOverlay.classList.remove('visible');
  pauseBtn.classList.remove('visible');
  quitMsg.style.display = 'none';
  document.getElementById('deathScore').style.display = 'none';
  document.getElementById('runSummary').style.display = 'none';
  document.getElementById('highscores').style.display = 'none';
  document.getElementById('globalScores').style.display = 'none';
  document.getElementById('lbTabs').style.display = 'none';
  document.getElementById('lbDiffTabs').style.display = 'none';
  document.getElementById('controlsHint').style.display = '';
  document.getElementById('startBtn').textContent = 'ENTER THE VOID';
  document.getElementById('score').textContent = '0';
  document.getElementById('deathCrystals').style.display = 'none';
  document.getElementById('deathCrystalTotal').style.display = 'none';
  document.getElementById('deathActions').style.display = 'none';
  document.getElementById('orbBrowser').style.display = 'flex';
  runStartTime = 0; updateRunTimerDisplay();
  refreshOrbBrowser();
  document.getElementById('overlay').classList.remove('hidden');
  if (typeof syncUpdateBanner === 'function') syncUpdateBanner();
}

function quitGame() {
  // window.close() only works for windows opened via script — fall back to a hint
  window.close();
  setTimeout(()=>{ quitMsg.style.display = 'block'; }, 80);
}

pauseBtn.addEventListener('click', () => { SFX.clickSecondary(); pauseGame(); });
document.getElementById('resumeBtn').addEventListener('click', () => { SFX.clickPrimary(); resumeGame(); });
document.getElementById('restartBtn').addEventListener('click', () => { SFX.clickPrimary(); restartFromPause(); });
document.getElementById('changeNameBtn').addEventListener('click', () => { SFX.clickSecondary(); showUsernamePrompt(); });
document.getElementById('menuBtn').addEventListener('click', () => { SFX.clickSecondary(); goToMainMenu(); });
document.getElementById('quitBtn').addEventListener('click', () => { SFX.clickSecondary(); quitGame(); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (state === 'playing') pauseGame();
    else if (state === 'paused') resumeGame();
  }
});

// --- Crash resilience (Android WebView) ---
//
// Android WebView (especially on Samsung devices) is much less forgiving of
// uncaught errors and audio thread failures than desktop Chrome. The handlers
// below catch problems before they reach the WebView host and crash the app.

// Persist the last 5 errors to localStorage under 'drift_errors' so a tester
// can pull them back out after a crash.
function recordError(source, err) {
  try {
    const entry = {
      t: Date.now(),
      source,
      message: (err && err.message) || String(err),
      stack: (err && err.stack) || null,
    };
    let log = [];
    try { log = JSON.parse(localStorage.getItem('drift_errors') || '[]'); } catch {}
    if (!Array.isArray(log)) log = [];
    log.push(entry);
    if (log.length > 5) log = log.slice(-5);
    localStorage.setItem('drift_errors', JSON.stringify(log));
  } catch {}
}

window.addEventListener('error', e => {
  console.error('[window.error]', e.message, e.error);
  recordError('window.error', e.error || e.message);
  // Swallow — don't let it propagate to the WebView host.
  e.preventDefault();
});

window.addEventListener('unhandledrejection', e => {
  console.error('[unhandledrejection]', e.reason);
  recordError('unhandledrejection', e.reason);
  e.preventDefault();
});

// Visibilitychange: suspend AudioContext when backgrounded so Android doesn't
// kill the audio thread, then resume on return. Also pauses gameplay so the
// player isn't dropped into an active game on return.
document.addEventListener('visibilitychange', () => {
  try {
    if (document.hidden) {
      if (state === 'playing') pauseGame();
      SFX.suspendCtx();
    } else {
      SFX.resumeCtx();
    }
  } catch (err) {
    console.error('[visibilitychange] handler threw', err);
    recordError('visibilitychange', err);
  }
});

// Capacitor / Cordova back button: if mid-game pause instead of letting the
// WebView host close the app. On the main menu fall through to the default
// (which closes the app on Android).
document.addEventListener('backbutton', e => {
  try {
    if (state === 'playing') {
      e.preventDefault();
      pauseGame();
    } else if (state === 'paused') {
      e.preventDefault();
      resumeGame();
    }
    // On idle/dead screens, allow the host to close the app.
  } catch (err) {
    console.error('[backbutton] handler threw', err);
    recordError('backbutton', err);
  }
});

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state !== 'idle' && state !== 'dead') return;
    SFX.clickSecondary();
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    difficulty = btn.dataset.diff;
    Sentry.setTag('difficulty', difficulty);
  });
});

// --- Orb browser ---
// The orb preview panel on the main menu. Each orb is previewed via a small
// canvas that draws an animated orb (bobbing sin wave) with stylized trail
// particles in the orb's signature palette. Navigation cycles the 5 orbs;
// the action button is EQUIPPED / EQUIP / UNLOCK depending on state.
let orbBrowserIndex = ORB_ORDER.indexOf(activeOrb);
if (orbBrowserIndex < 0) orbBrowserIndex = 0;
const orbPreviewCanvas = document.getElementById('orbPreviewCanvas');
const orbPreviewCtx = orbPreviewCanvas.getContext('2d');
const orbPreviewParticles = {}; // key: orbId → array of trail particles

function ensureOrbParticles(key) {
  if (!orbPreviewParticles[key]) orbPreviewParticles[key] = [];
  return orbPreviewParticles[key];
}

function refreshOrbBrowser() {
  const key = ORB_ORDER[orbBrowserIndex];
  const def = ORB_DEFS[key];
  const locked = !unlockedOrbs.includes(key);
  const equipped = activeOrb === key;
  document.getElementById('orbName').textContent = def.name.toUpperCase();
  document.getElementById('orbDesc').textContent = def.desc;
  const preview = document.getElementById('orbPreview');
  preview.classList.toggle('locked', locked);

  // Dots
  const dotsEl = document.getElementById('orbDots');
  dotsEl.innerHTML = ORB_ORDER.map((_, i) =>
    `<div class="orb-dot${i === orbBrowserIndex ? ' active' : ''}"></div>`
  ).join('');

  // Action button
  const action = document.getElementById('orbAction');
  if (equipped) {
    action.innerHTML = '<button class="orb-btn equipped" disabled>EQUIPPED</button>';
  } else if (!locked) {
    action.innerHTML = '<button class="orb-btn" id="orbEquipBtn">EQUIP</button>';
    document.getElementById('orbEquipBtn').addEventListener('click', () => {
      SFX.clickPrimary();
      activeOrb = key;
      saveOrb();
      refreshOrbBrowser();
    });
  } else {
    action.innerHTML = `<button class="orb-btn unlock" id="orbUnlockBtn">UNLOCK — ${formatCrystals(def.cost)} 💎</button>`;
    document.getElementById('orbUnlockBtn').addEventListener('click', () => {
      SFX.clickSecondary();
      const btn = document.getElementById('orbUnlockBtn');
      if (totalCrystals < def.cost) {
        btn.classList.remove('flash-err');
        void btn.offsetWidth; // restart animation
        btn.classList.add('flash-err');
        const orig = btn.textContent;
        btn.textContent = 'NOT ENOUGH 💎';
        setTimeout(() => { btn.textContent = orig; }, 800);
        return;
      }
      totalCrystals = Math.max(0, totalCrystals - def.cost);
      unlockedOrbs.push(key);
      saveCrystals();
      saveUnlockedOrbs();
      activeOrb = key;
      saveOrb();
      refreshOrbBrowser();
    });
  }

  document.getElementById('orbCrystalBalance').textContent = '💎 ' + formatCrystals(totalCrystals);
}

function drawOrbPreview() {
  const cw = orbPreviewCanvas.width, ch = orbPreviewCanvas.height;
  orbPreviewCtx.clearRect(0, 0, cw, ch);
  const key = ORB_ORDER[orbBrowserIndex];
  const def = ORB_DEFS[key];
  const color = def.color;
  const t = performance.now() / 1000;
  // Bob sin wave, amplitude 16px in canvas (8px in CSS since backing is 2x), period 2s
  const bob = Math.sin(t * Math.PI) * 16;
  const cx = cw / 2, cy = ch / 2 + bob;

  // Trail particles
  const particles = ensureOrbParticles(key);
  if (Math.random() < 0.5) {
    if (def.trail === 'cosmic') {
      particles.push({ x: cx + (Math.random() - 0.5) * 30, y: cy + 10 + Math.random() * 15, vx: (Math.random() - 0.5) * 0.5, vy: -1.5 - Math.random(), life: 1, size: 3 + Math.random() * 3 });
    } else if (def.trail === 'solar') {
      particles.push({ x: cx + (Math.random() - 0.5) * 24, y: cy + 18, vx: (Math.random() - 0.5) * 1.2, vy: 1 + Math.random() * 1.5, life: 1, size: 3 + Math.random() * 3 });
    } else if (def.trail === 'nebula') {
      particles.push({ x: cx - 40 + Math.random() * 80, y: cy + (Math.random() - 0.5) * 40, vx: 0, vy: 4 + Math.random() * 3, life: 1, size: 2, lineLen: 18 + Math.random() * 20 });
    } else if (def.trail === 'asteroid') {
