      ctx.save();
      ctx.shadowColor = 'rgba(150,255,255,0.7)';
      ctx.shadowBlur = 6;
      ctx.lineWidth = 1.6;
      ctx.strokeStyle = `rgba(255,255,255,${0.9 * boltFade + 0.1})`;
      for (const b of r.bolts) {
        const tipR = outerR - 4;
        const dx = Math.cos(b.angle);
        const dy = Math.sin(b.angle);
        const perpX = -dy, perpY = dx;
        ctx.globalAlpha = boltFade;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        for (let i = 1; i < b.segs; i++) {
          const u = i / b.segs;
          const bx = dx * tipR * u;
          const by = dy * tipR * u;
          const off = (rng() - 0.5) * 30; // ±15px perpendicular
          ctx.lineTo(bx + perpX * off, by + perpY * off);
        }
        // Final segment snaps onto the dome edge.
        ctx.lineTo(dx * tipR, dy * tipR);
        ctx.stroke();
      }
      ctx.restore();
    }

    // 4) BRIGHT CENTER FLASH — implodes: 20px → 0 over first 0.2s.
    const flashT = Math.min(1, age / 200);
    if (flashT < 1) {
      const fk = 1 - flashT;
      const fr = 20 * fk;
      ctx.save();
      ctx.globalAlpha = fk;
      const flash = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(0.5, fr));
      flash.addColorStop(0, 'rgba(255,255,255,1)');
      flash.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = flash;
      ctx.beginPath(); ctx.arc(0, 0, Math.max(0.5, fr), 0, 6.28); ctx.fill();
      ctx.restore();
    }

    // 5) ELECTRIC SPARKS on the dome edge — ride the expanding ring,
    // flicker on/off every 2 frames, fade with the ring.
    if (r.sparks && fade > 0) {
      const flick = (frame & 2) ? 1 : 0.25;
      for (const s of r.sparks) {
        // Individual sparks get a phase-offset flicker so they're not uniform.
        const on = (((frame + (s.phase * 7 | 0)) / 2) | 0) & 1 ? 1 : 0.25;
        const a = on * flick;
        const sx = Math.cos(s.angle) * outerR;
        const sy = Math.sin(s.angle) * outerR;
        ctx.globalAlpha = fade * a;
        const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 5);
        sg.addColorStop(0, 'rgba(255,255,255,1)');
        sg.addColorStop(0.5, 'rgba(170,240,255,0.7)');
        sg.addColorStop(1, 'rgba(100,220,255,0)');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(sx, sy, 4, 0, 6.28); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,1)';
        ctx.beginPath(); ctx.arc(sx, sy, 2, 0, 6.28); ctx.fill();
      }
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawPickupParticles() {
  const nowPP = Date.now();
  for (const p of pickupParticles) {
    if (p.startTime !== undefined && p.maxLifeMs) {
      p.life = Math.max(0, 1 - (nowPP - p.startTime) / p.maxLifeMs);
    }
  }
  pickupParticles = pickupParticles.filter(p => p.life > 0.05);
  for (const p of pickupParticles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `rgba(${p.rgb},1)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Powerup timer bar (DOM) ---
const powerupTimerEl = document.getElementById('powerupTimer');
const ptLabelEl = document.getElementById('ptLabel');
const ptFillEl = document.getElementById('ptFill');
const ptComboEl = document.getElementById('ptCombo');
const burstFillEl = document.getElementById('burstFill');
const burstBarEl = document.getElementById('burstBar');

function updateBurstBar() {
  if (!burstBarEl || !burstFillEl) return;
  // Only visible in gameplay.
  const visible = (state === 'playing' || state === 'paused');
  burstBarEl.style.display = visible ? 'flex' : 'none';
  if (!visible) return;
  const ready = (burstCooldownEnd === 0) || (Date.now() >= burstCooldownEnd);
  const pct = ready
    ? 1
    : Math.max(0, Math.min(1, (Date.now() - (burstCooldownEnd - BURST_COOLDOWN_MS)) / BURST_COOLDOWN_MS));
  burstFillEl.style.width = (pct * 100) + '%';
  if (ready) {
    // Ready: bright gold/orange so it reads clearly against the grey cooldown
    // state regardless of the active orb (asteroid's orb color is near-grey).
    burstFillEl.style.background = '#ffaa00';
    burstFillEl.style.boxShadow = '0 0 10px rgba(255,170,0,0.85)';
  } else {
    burstFillEl.style.background = 'rgba(180,180,180,0.45)';
    burstFillEl.style.boxShadow = 'none';
  }
}

function updatePowerupTimer() {
  // Priority: shield > ghost > hyperspeed (most game-relevant first)
  let label = null, remaining = 0, max = 0, fillColor = '';
  if (activeEffects.shield > 0) {
    label = 'SHIELD'; remaining = activeEffects.shield; max = SHIELD_DURATION();
    fillColor = 'rgba(120,230,255,0.95)';
  } else if (activeEffects.ghost > 0) {
    label = 'GHOST'; remaining = activeEffects.ghost;
    max = activeCombos.ghost_ghost ? GHOST_ETERNAL_DURATION() : GHOST_DURATION();
    fillColor = 'rgba(200,120,255,0.95)';
  } else if (activeEffects.hyperspeed > 0) {
    label = 'HYPERSPEED'; remaining = activeEffects.hyperspeed;
    max = hyperspeedActiveDuration;
    fillColor = 'rgba(255,220,60,0.95)';
  }

  if (!label) {
    if (powerupTimerEl.classList.contains('visible'))
      powerupTimerEl.classList.remove('visible');
    if (ptComboEl.classList.contains('visible'))
      ptComboEl.classList.remove('visible');
    return;
  }

  const pct = Math.max(0, Math.min(1, remaining / max));
  if (!powerupTimerEl.classList.contains('visible'))
    powerupTimerEl.classList.add('visible');
  if (ptLabelEl.textContent !== label) ptLabelEl.textContent = label;
  ptFillEl.style.width = (pct * 100) + '%';
  ptFillEl.style.background = fillColor;
  ptFillEl.style.boxShadow = `0 0 8px ${fillColor}`;

  // Combo label as a second line — most recently activated combo
  let activeKey = lastComboLabel;
  if (activeKey && !activeCombos[activeKey]) activeKey = null;
  if (!activeKey) {
    const keys = Object.keys(activeCombos);
    if (keys.length) activeKey = keys[keys.length - 1];
  }
  if (activeKey) {
    const def = COMBO_DEFS[activeKey];
    const text = '\u26A1 ' + def.name;
    if (ptComboEl.textContent !== text) ptComboEl.textContent = text;
    ptComboEl.style.color = def.labelColor;
    if (!ptComboEl.classList.contains('visible'))
      ptComboEl.classList.add('visible');
  } else if (ptComboEl.classList.contains('visible')) {
    ptComboEl.classList.remove('visible');
  }
}

// Stack-aware tint for hyperspeed visuals (player glow + barrier).
// Stack 1 keeps the original gold; higher stacks shift orange→red, and stack
// 4 sets the `white` flag so renderers can pulse a white core/edge on top.
function hyperStackTint(stacks) {
  if (stacks >= 4) return { r: 255, g: 80,  b: 80,  edgeR: 255, edgeG: 200, edgeB: 200, white: true };
  if (stacks >= 3) return { r: 255, g: 60,  b: 60,  edgeR: 255, edgeG: 140, edgeB: 140 };
  if (stacks >= 2) return { r: 255, g: 140, b: 40,  edgeR: 255, edgeG: 200, edgeB: 100 };
  return                  { r: 255, g: 220, b: 60,  edgeR: 255, edgeG: 240, edgeB: 120 };
}

function drawHyperspeedBarrier() {
  if (activeEffects.hyperspeed <= 0 || hyperspeedCurrentMult <= 1.05) return;
  const intensity = (hyperspeedCurrentMult - 1) / 2; // 0..1
  const barrierY = player.y - 60;
  const halfW = 60;

  const tint = hyperStackTint(hyperSpeedStacks);
  let r = tint.r, g = tint.g, b = tint.b;
  // Stack 4: barrier pulses red ↔ white at ~5hz.
  if (tint.white) {
    const pulse = (Math.sin(frame * 0.3) + 1) * 0.5; // 0..1
    const w = pulse * 0.6;
    r = Math.round(r + (255 - r) * w);
    g = Math.round(g + (255 - g) * w);
    b = Math.round(b + (255 - b) * w);
  }
  const eR = tint.edgeR, eG = tint.edgeG, eB = tint.edgeB;

  // Glowing wedge/barrier shape
  ctx.save();
  ctx.globalAlpha = 0.6 * intensity;

  // Main barrier glow
  const grd = ctx.createLinearGradient(player.x, barrierY - 15, player.x, barrierY + 20);
  grd.addColorStop(0, `rgba(${r},${g},${b},0)`);
  grd.addColorStop(0.4, `rgba(${r},${g},${b},${0.7 * intensity})`);
  grd.addColorStop(1, `rgba(${r},${Math.round(g*0.82)},${Math.round(b*0.5)},0)`);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(player.x - halfW, barrierY + 15);
  ctx.quadraticCurveTo(player.x, barrierY - 18, player.x + halfW, barrierY + 15);
  ctx.quadraticCurveTo(player.x, barrierY + 5, player.x - halfW, barrierY + 15);
  ctx.fill();

  // Bright edge line
  ctx.globalAlpha = 0.85 * intensity;
  ctx.strokeStyle = `rgba(${eR},${eG},${eB},${0.9 * intensity})`;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(player.x - halfW, barrierY + 15);
  ctx.quadraticCurveTo(player.x, barrierY - 18, player.x + halfW, barrierY + 15);
  ctx.stroke();

  // Outer glow halo
  ctx.globalAlpha = 0.25 * intensity;
  const halo = ctx.createRadialGradient(player.x, barrierY, 0, player.x, barrierY, halfW * 1.5);
  halo.addColorStop(0, `rgba(${r},${g},${b},0.5)`);
  halo.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = halo;
  ctx.fillRect(player.x - halfW * 1.5, barrierY - halfW, halfW * 3, halfW * 2);

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawDeathParticles() {
  const nowDp = Date.now();
  for (const p of deathParticles) {
    if (p.startTime !== undefined && p.maxLifeMs) {
      p.life = Math.max(0, 1 - (nowDp - p.startTime) / p.maxLifeMs);
    }
  }
  deathParticles=deathParticles.filter(p=>p.life>0.01);
  for (const p of deathParticles) {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; p.vy*=0.95;
    ctx.globalAlpha=p.life; ctx.fillStyle=`hsl(${185+(1-p.life)*80},100%,72%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// Stacked hyperspeed banner — only shows for 2+ stacks. Drawn in canvas
// space so we don't have to retrofit DOM layout. Sits between the score
// (top ~24px) and the streak counter (top ~58px). Blink rate gets faster
// as stacks climb so 4× feels noticeably more frantic than 2×.
function drawHyperStackText() {
  if (hyperSpeedStacks < 2) return;
  const tint = hyperStackTint(hyperSpeedStacks);
  let blinkPeriod = 20;
  if (hyperSpeedStacks === 3) blinkPeriod = 15;
  else if (hyperSpeedStacks === 4) blinkPeriod = 10;
  // On the visible half of the blink cycle, fully draw; otherwise dim.
  const visible = Math.floor(frame / blinkPeriod) % 2 === 0;
  const alpha = visible ? 1 : 0.25;

  const label = hyperSpeedStacks + '× HYPERSPEED';
  ctx.save();
  ctx.font = '700 13px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.globalAlpha = alpha;
  // Glow
  ctx.shadowColor = `rgba(${tint.r},${tint.g},${tint.b},0.95)`;
  ctx.shadowBlur = 12;
  ctx.fillStyle = tint.white
    ? `rgba(255,${230 + Math.round(Math.sin(frame * 0.4) * 25)},${230 + Math.round(Math.sin(frame * 0.4) * 25)},1)`
    : `rgba(${tint.r},${tint.g},${tint.b},1)`;
  ctx.fillText(label, W / 2, 50);
  ctx.restore();
  ctx.globalAlpha = 1;
}

// Player death shatter — 6-8 irregular polygon shards spawned at the player
// position. Each shard tumbles outward, leaves a brief cyan trail, and fades
// over ~1.2s. The existing deathParticles burst fires after these are gone
// (scheduled by triggerDeath).
const SHARD_LIFE_MS = 1200;  // 1.2s real-time
function spawnDeathShards(x, y) {
  deathShards = [];
  const count = 6 + Math.floor(Math.random() * 3);
  const now = Date.now();
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1.6 + Math.random() * 2.4;
    // 3-4 vertices forming a small irregular polygon.
    const vCount = 3 + Math.floor(Math.random() * 2);
    const verts = [];
    const baseR = 5 + Math.random() * 7; // 5..12px
    for (let v = 0; v < vCount; v++) {
      const va = (v / vCount) * Math.PI * 2 + Math.random() * 0.6;
      const vr = baseR * (0.6 + Math.random() * 0.7);
      verts.push({ x: Math.cos(va) * vr, y: Math.sin(va) * vr });
    }
    deathShards.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.25,
      verts,
      life: 1,           // 1 → 0
      startTime: now, maxLifeMs: SHARD_LIFE_MS,
      age: 0,            // age in ms, updated each draw
      trail: [],         // recent {x,y} positions for the brief cyan tail
    });
  }
}

function drawDeathShards() {
  // Render the 1-frame white player flash on top of the shards. deathFlashFrames
  // stays frame-counted: it's a 1-frame flash, treating it as real-time would
  // either invisibly short-circuit or show for multiple frames at 144hz.
  if (deathFlashFrames > 0) {
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(player.x, player.y, PLAYER_R * 2.4, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;
    deathFlashFrames--;
  }

  if (!deathShards.length) return;
  const nowDs = Date.now();
  for (const s of deathShards) {
    if (s.startTime !== undefined) s.age = nowDs - s.startTime;
  }
  deathShards = deathShards.filter(s => s.age < s.maxLifeMs);
  for (const s of deathShards) {
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.985; s.vy = s.vy * 0.985 + 0.04; // very slight drag + soft gravity
    s.rot += s.rotSpeed;
    s.life = 1 - (s.age / s.maxLifeMs);
    // Track last few positions for the trail.
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 6) s.trail.shift();

    // Cyan trail behind the shard.
    if (s.trail.length > 1) {
      ctx.globalAlpha = s.life * 0.4;
      ctx.strokeStyle = 'rgba(140,230,255,1)';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(s.trail[0].x, s.trail[0].y);
      for (let i = 1; i < s.trail.length; i++) ctx.lineTo(s.trail[i].x, s.trail[i].y);
      ctx.stroke();
    }

    // Polygon shard in cyan/white with a glow stroke.
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = s.life;
    ctx.fillStyle = 'rgba(220,250,255,1)';
    ctx.strokeStyle = 'rgba(120,220,255,1)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(s.verts[0].x, s.verts[0].y);
    for (let i = 1; i < s.verts.length; i++) ctx.lineTo(s.verts[i].x, s.verts[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function render() {
  ctx.save();
  // Screen shake
  if (screenShake > 0) {
    const intensity = screenShake * 0.6;
    const sx = (Math.random() - 0.5) * intensity * 2;
    const sy = (Math.random() - 0.5) * intensity * 2;
    ctx.translate(sx, sy);
    screenShake--;
  }
  drawBg();
  drawBodies();
  drawCrackFragments();

  // Hyperspeed gold tint over the world
  if (activeEffects.hyperspeed > 0 && hyperspeedCurrentMult > 1.05) {
    const fade = Math.min(activeEffects.hyperspeed / 500, 1);
    ctx.globalAlpha = 0.12 * fade * ((hyperspeedCurrentMult - 1) / 2);
    ctx.fillStyle = 'rgba(255,220,60,1)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (state==='playing'||state==='dead'||state==='paused'||state==='apocalypse') {
    drawPowerups();
    drawNovaRings();
    drawEmpRings();
    drawPlanetRipples();
    drawTrail();
    if (state==='playing'||state==='paused'||state==='apocalypse') {
      drawHyperspeedBarrier();
      drawPlayer();
    }
    drawPickupParticles();
    drawDestroyEffects();
    drawDeathShards();
    drawDeathParticles();
    if (state==='playing') drawHyperStackText();
  }

  // Apocalypse visuals sit on top of the world (red tint, descending sun,
  // impact flashes). Drawn last so they layer over everything else.
  if (state === 'apocalypse') drawApocalypseOverlay();
  // After impact, triggerDeath flips state to 'dead'. Keep the post-impact
  // black curtain up until the death screen overlay covers the canvas — this
  // avoids the world suddenly re-appearing between fade-to-black and the DOM
  // overlay fading in.
  else if (state === 'dead' && apocalypseDeathFlag) {
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fillRect(0, 0, W, H);
  }

  updatePowerupTimer();
  updateBurstBar();
  ctx.restore();
}

// Crash-resilient game loop for Android WebView. update() and render() are
// each guarded so a thrown error never tears down the rAF chain. update()
// failures fall back to the main menu (the game state is suspect after
// a partial update); render() failures just skip the frame.
let loopFrameCounter = 0;
function loop() {
  try {
    update();
  } catch (err) {
    console.error('[loop] update() threw, recovering to main menu', err);
    recordError('update', err);
    try { goToMainMenu(); } catch (e2) { console.error('[loop] goToMainMenu also threw', e2); }
  }
  try {
    render();
  } catch (err) {
    console.error('[loop] render() threw, skipping frame', err);
    recordError('render', err);
  }
  // Memory pressure watchdog: every 600 frames (~10s @60fps) check the total
  // particle / ring / ripple count and force-clear if it's blown past 150.
  // Stops intense combo chains from accumulating into an OOM crash.
  loopFrameCounter++;
  if (loopFrameCounter % 600 === 0) {
    const total = pickupParticles.length + deathParticles.length
                + novaRings.length + planetRipples.length
                + destroyEffects.length + deathShards.length
                + orbTrailParticles.length + crackFragments.length;
    if (total > 180) {
      console.warn('[loop] memory pressure: clearing', total, 'transient particles');
      pickupParticles = [];
      deathParticles = [];
      novaRings = [];
      empRings = [];
      planetRipples = [];
      destroyEffects = [];
      deathShards = [];
      orbTrailParticles = [];
      crackFragments = [];
    }
  }
  requestAnimationFrame(loop);
}

// --- Input ---
function readInput(e) {
  if (state!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  leftDown=false; rightDown=false;
  const pts=e.touches||[e];
  for (const t of pts) {
    const cx=(t.clientX-rect.left)*(W/rect.width);
    if (cx<W/2) leftDown=true; else rightDown=true;
  }
  // Simultaneous press = burst gesture. update() gates on cooldown. Also
  // catches keyboard combos — update() polls leftDown/rightDown directly too.
  if (leftDown && rightDown) burstTriggered = true;
  e.preventDefault();
}
function clearInput(e) {
  leftDown=false; rightDown=false;
  if (e.touches) for (const t of e.touches) {
    const cx=(t.clientX-canvas.getBoundingClientRect().left)*(W/canvas.getBoundingClientRect().width);
    if (cx<W/2) leftDown=true; else rightDown=true;
  }
}
canvas.addEventListener('touchstart',readInput,{passive:false});
canvas.addEventListener('touchmove',readInput,{passive:false});
canvas.addEventListener('touchend',clearInput);
canvas.addEventListener('mousedown',readInput);
canvas.addEventListener('mousemove',e=>{ if(e.buttons) readInput(e); });
canvas.addEventListener('mouseup',clearInput);
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') leftDown=true; if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') rightDown=true; });
document.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') leftDown=false; if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') rightDown=false; });

const pauseBtn = document.getElementById('pauseBtn');
const pauseOverlay = document.getElementById('pauseOverlay');
const quitMsg = document.getElementById('quitMsg');

document.getElementById('startBtn').addEventListener('click', ()=>{
  // Defense in depth: ignore stray clicks unless we're actually on a menu screen
  if (state !== 'idle' && state !== 'dead') return;
  SFX.init();
  SFX.clickPrimary();
  // Death→play uses the shorter results→gameplay 0.3s crossfade per spec;
  // menu→play uses the 0.5s menu→gameplay crossfade.
  const fade = state === 'dead' ? 0.3 : 0.5;
  resetGame(); state='playing';
  SFX.playTrack('gameplay', fade);
  document.getElementById('overlay').classList.add('hidden');
  pauseBtn.classList.add('visible');
});

let runPauseStart = 0;
function pauseGame() {
  if (state !== 'playing') return;
  state = 'paused';
  leftDown = false; rightDown = false;
  SFX.pauseMusic();
  runPauseStart = Date.now();
  pauseBtn.classList.remove('visible');
  pauseOverlay.classList.add('visible');
}

function resumeGame() {
  if (state !== 'paused') return;
  state = 'playing';
  SFX.resumeMusic();
  // Shift runStartTime forward by the pause duration so elapsed stays real.
  // Also shift every real-time-driven effect end-timestamp by the same delta
  // so effects don't keep expiring through the pause.
  if (runPauseStart) {
    const pauseDelta = Date.now() - runPauseStart;
    if (runStartTime) runStartTime += pauseDelta;
    if (shieldEndTime) shieldEndTime += pauseDelta;
    if (ghostEndTime) ghostEndTime += pauseDelta;
    if (phantomBlastEndTime) phantomBlastEndTime += pauseDelta;
    if (pulsarNextNovaTime) pulsarNextNovaTime += pauseDelta;
    if (warpNextNovaTime) warpNextNovaTime += pauseDelta;
    if (graceEndTime) graceEndTime += pauseDelta;
    if (recentNovaEndTime) recentNovaEndTime += pauseDelta;
    if (burstCooldownEnd) burstCooldownEnd += pauseDelta;
    for (const c of Object.values(activeCombos)) {
      if (c && c.endTime !== undefined) c.endTime += pauseDelta;
    }
    for (let i = 0; i < hyperSpeedTimers.length; i++) {
      hyperSpeedTimers[i] += pauseDelta;
    }
    // Nova rings drive their radius from startTime — shift those too so an
    // in-flight ring doesn't suddenly jump forward on resume. Also shift the
    // decay-start timestamp if it has been set.
    for (const r of novaRings) {
      if (r.startTime !== undefined) r.startTime += pauseDelta;
      if (r._decayStart !== undefined) r._decayStart += pauseDelta;
    }
    for (const r of empRings) {
      if (r.startTime !== undefined) r.startTime += pauseDelta;
      if (r.victim && r.victim.expiry !== undefined) r.victim.expiry += pauseDelta;
    }
    // Particle arrays with startTime fields.
    const shiftStart = (arr) => {
      for (const p of arr) {
        if (p && p.startTime !== undefined) p.startTime += pauseDelta;
      }
    };
    shiftStart(pickupParticles);
    shiftStart(deathParticles);
    shiftStart(orbTrailParticles);
    shiftStart(planetRipples);
    shiftStart(destroyEffects);
    shiftStart(deathShards);
    shiftStart(crackFragments);
  }
  runPauseStart = 0;
  pauseOverlay.classList.remove('visible');
  quitMsg.style.display = 'none';
  pauseBtn.classList.add('visible');
}

function restartFromPause() {
  resetGame();
  state = 'playing';
  SFX.resumeMusic();
  pauseOverlay.classList.remove('visible');
  quitMsg.style.display = 'none';
  pauseBtn.classList.add('visible');
}

function goToMainMenu() {
  state = 'idle';

  clearPendingNovaTimeouts();
  activeEffects = { shield: 0, hyperspeed: 0, ghost: 0 };
  shieldEndTime = 0;
  ghostEndTime = 0;

  hyperSpeedStacks = 0;

  shieldBroken = false;

  // Stop any gameplay-phase voices and reset the tracker so the next run

  try { SFX.stopAllGameplayTracks(0.5); } catch {}
  currentGameplayTrack = 1;

  SFX.playTrack('menu', 0.5);
  pauseOverlay.classList.remove('visible');

  quitMsg.style.display = 'none';
  document.getElementById('deathScore').style.display = 'none';
  document.getElementById('runSummary').style.display = 'none';

  document.getElementById('globalScores').style.display = 'none';

  document.getElementById('deathActions').style.display = 'none';

  refreshOrbBrowser();
  document.getElementById('overlay').classList.remove('hidden');
  if (typeof syncUpdateBanner === 'function') syncUpdateBanner();
}

// --- Crash resilience (Android WebView) ---
//
// Android WebView (especially on Samsung devices) is much less forgiving of
// uncaught errors and audio thread failures than desktop Chrome. The handlers
// below catch problems before they reach the WebView host and crash the app.

// Persist the last 5 errors to localStorage under 'drift_errors' so a tester
// can pull them back out after a crash.
function recordError(source, err) {
  try {
    const entry = {
      t: Date.now(),
      source,
      message: (err && err.message) || String(err),
      stack: (err && err.stack) || null,
    };
    let log = [];
    try { log = JSON.parse(localStorage.getItem('drift_errors') || '[]'); } catch {}
    if (!Array.isArray(log)) log = [];
    log.push(entry);
    if (log.length > 5) log = log.slice(-5);
    localStorage.setItem('drift_errors', JSON.stringify(log));
  } catch {}
}

window.addEventListener('error', e => {
  console.error('[window.error]', e.message, e.error);
  recordError('window.error', e.error || e.message);
  // Swallow — don't let it propagate to the WebView host.
  e.preventDefault();
});

window.addEventListener('unhandledrejection', e => {
  console.error('[unhandledrejection]', e.reason);
  recordError('unhandledrejection', e.reason);
  e.preventDefault();
});

// Visibilitychange: suspend AudioContext when backgrounded so Android doesn't
// kill the audio thread, then resume on return. Also pauses gameplay so the
// player isn't dropped into an active game on return.
document.addEventListener('visibilitychange', () => {
  try {
    if (document.hidden) {
      if (state === 'playing') pauseGame();
      SFX.suspendCtx();
    } else {
      SFX.resumeCtx();
    }
  } catch (err) {
    console.error('[visibilitychange] handler threw', err);
    recordError('visibilitychange', err);
  }
});

// Capacitor / Cordova back button: if mid-game pause instead of letting the
// WebView host close the app. On the main menu fall through to the default
// (which closes the app on Android).
document.addEventListener('backbutton', e => {
  try {
    if (state === 'playing') {
      e.preventDefault();
      pauseGame();
    } else if (state === 'paused') {
      e.preventDefault();
      resumeGame();
    }
    // On idle/dead screens, allow the host to close the app.
  } catch (err) {
    console.error('[backbutton] handler threw', err);
    recordError('backbutton', err);
  }
});

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(btn => {

// --- Orb browser ---
// The orb preview panel on the main menu. Each orb is previewed via a small
// canvas that draws an animated orb (bobbing sin wave) with stylized trail
// particles in the orb's signature palette. Navigation cycles the 5 orbs;
// the action button is EQUIPPED / EQUIP / UNLOCK depending on state.
let orbBrowserIndex = ORB_ORDER.indexOf(activeOrb);
if (orbBrowserIndex < 0) orbBrowserIndex = 0;
const orbPreviewCanvas = document.getElementById('orbPreviewCanvas');
const orbPreviewCtx = orbPreviewCanvas.getContext('2d');
const orbPreviewParticles = {}; // key: orbId → array of trail particles

function ensureOrbParticles(key) {
  if (!orbPreviewParticles[key]) orbPreviewParticles[key] = [];
  return orbPreviewParticles[key];
}

function refreshOrbBrowser() {
  const key = ORB_ORDER[orbBrowserIndex];
  const def = ORB_DEFS[key];
  const locked = !unlockedOrbs.includes(key);
  const equipped = activeOrb === key;
  document.getElementById('orbName').textContent = def.name.toUpperCase();
  document.getElementById('orbDesc').textContent = def.desc;
  const preview = document.getElementById('orbPreview');
  preview.classList.toggle('locked', locked);

  // Dots
  const dotsEl = document.getElementById('orbDots');
  dotsEl.innerHTML = ORB_ORDER.map((_, i) =>
    `<div class="orb-dot${i === orbBrowserIndex ? ' active' : ''}"></div>`
  ).join('');

  // Action button
  const action = document.getElementById('orbAction');
  if (equipped) {
    action.innerHTML = '<button class="orb-btn equipped" disabled>EQUIPPED</button>';
  } else if (!locked) {
    action.innerHTML = '<button class="orb-btn" id="orbEquipBtn">EQUIP</button>';
    document.getElementById('orbEquipBtn').addEventListener('click', () => {
      SFX.clickPrimary();
      activeOrb = key;
      saveOrb();
      refreshOrbBrowser();
    });
  } else {
    action.innerHTML = `<button class="orb-btn unlock" id="orbUnlockBtn">UNLOCK — ${formatCrystals(def.cost)} 💎</button>`;
    document.getElementById('orbUnlockBtn').addEventListener('click', () => {
      SFX.clickSecondary();
      const btn = document.getElementById('orbUnlockBtn');
      if (totalCrystals < def.cost) {
        btn.classList.remove('flash-err');
        void btn.offsetWidth; // restart animation
        btn.classList.add('flash-err');
        const orig = btn.textContent;
        btn.textContent = 'NOT ENOUGH 💎';
        setTimeout(() => { btn.textContent = orig; }, 800);
        return;
      }
      totalCrystals = Math.max(0, totalCrystals - def.cost);
      unlockedOrbs.push(key);
      saveCrystals();
      saveUnlockedOrbs();
      activeOrb = key;
      saveOrb();
      refreshOrbBrowser();
    });
  }

  document.getElementById('orbCrystalBalance').textContent = '💎 ' + formatCrystals(totalCrystals);
}

function drawOrbPreview() {
  const cw = orbPreviewCanvas.width, ch = orbPreviewCanvas.height;
  orbPreviewCtx.clearRect(0, 0, cw, ch);
  const key = ORB_ORDER[orbBrowserIndex];
  const def = ORB_DEFS[key];
  const color = def.color;
  const t = performance.now() / 1000;
  // Bob sin wave, amplitude 16px in canvas (8px in CSS since backing is 2x), period 2s
  const bob = Math.sin(t * Math.PI) * 16;
  const cx = cw / 2, cy = ch / 2 + bob;

  // Trail particles
  const particles = ensureOrbParticles(key);
  if (Math.random() < 0.5) {
    if (def.trail === 'cosmic') {
      particles.push({ x: cx + (Math.random() - 0.5) * 30, y: cy + 10 + Math.random() * 15, vx: (Math.random() - 0.5) * 0.5, vy: -1.5 - Math.random(), life: 1, size: 3 + Math.random() * 3 });
    } else if (def.trail === 'solar') {
      particles.push({ x: cx + (Math.random() - 0.5) * 24, y: cy + 18, vx: (Math.random() - 0.5) * 1.2, vy: 1 + Math.random() * 1.5, life: 1, size: 3 + Math.random() * 3 });
    } else if (def.trail === 'nebula') {
      particles.push({ x: cx - 40 + Math.random() * 80, y: cy + (Math.random() - 0.5) * 40, vx: 0, vy: 4 + Math.random() * 3, life: 1, size: 2, lineLen: 18 + Math.random() * 20 });
    } else if (def.trail === 'asteroid') {
      particles.push({ x: cx + (Math.random() - 0.5) * 20, y: cy + 14, vx: (Math.random() - 0.5) * 2, vy: 1.5 + Math.random() * 2, life: 1, size: 2 + Math.random() * 3, angle: Math.random() * 6.28, spin: (Math.random() - 0.5) * 0.2 });
    } else {
      particles.push({ x: cx + (Math.random() - 0.5) * 10, y: cy + 10, vx: (Math.random() - 0.5) * 1.5, vy: 1 + Math.random() * 2, life: 1, size: 2 + Math.random() * 3 });
    }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.025;
    if (p.angle !== undefined) p.angle += p.spin;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 40) particles.splice(0, particles.length - 40);

  orbPreviewCtx.save();
  for (const p of particles) {
    orbPreviewCtx.globalAlpha = p.life * 0.75;
    if (def.trail === 'nebula') {
      orbPreviewCtx.strokeStyle = `rgba(${color},1)`;
      orbPreviewCtx.lineWidth = 2;
      orbPreviewCtx.beginPath();
      orbPreviewCtx.moveTo(p.x, p.y);
      orbPreviewCtx.lineTo(p.x, p.y - (p.lineLen || 20));
      orbPreviewCtx.stroke();
    } else if (def.trail === 'asteroid') {
      orbPreviewCtx.fillStyle = `rgba(${color},1)`;
      orbPreviewCtx.save();
      orbPreviewCtx.translate(p.x, p.y);
      orbPreviewCtx.rotate(p.angle || 0);
      const s = p.size;
      orbPreviewCtx.beginPath();
      orbPreviewCtx.moveTo(-s, -s * 0.4);
      orbPreviewCtx.lineTo(s * 0.6, -s);
      orbPreviewCtx.lineTo(s, s * 0.3);
      orbPreviewCtx.lineTo(-s * 0.3, s);
      orbPreviewCtx.closePath();
      orbPreviewCtx.fill();
      orbPreviewCtx.restore();
    } else {
      orbPreviewCtx.fillStyle = `rgba(${color},1)`;
      orbPreviewCtx.beginPath();
      orbPreviewCtx.arc(p.x, p.y, p.size, 0, 6.28);
      orbPreviewCtx.fill();
    }
  }
  orbPreviewCtx.restore();

  // Orb aura + core
  orbPreviewCtx.save();
  orbPreviewCtx.globalAlpha = 0.55;
  const aura = orbPreviewCtx.createRadialGradient(cx, cy, 0, cx, cy, 48);
  aura.addColorStop(0, `rgba(${color},0.75)`);
  aura.addColorStop(0.5, `rgba(${color},0.25)`);
  aura.addColorStop(1, `rgba(${color},0)`);
  orbPreviewCtx.fillStyle = aura;
  orbPreviewCtx.beginPath(); orbPreviewCtx.arc(cx, cy, 48, 0, 6.28); orbPreviewCtx.fill();

  orbPreviewCtx.globalAlpha = 1;
  const core = orbPreviewCtx.createRadialGradient(cx - 5, cy - 5, 0, cx, cy, 20);
  core.addColorStop(0, '#fff');
  core.addColorStop(0.5, `rgba(${color},1)`);
  core.addColorStop(1, `rgba(${color},0.3)`);
  orbPreviewCtx.fillStyle = core;
  orbPreviewCtx.beginPath(); orbPreviewCtx.arc(cx, cy, 20, 0, 6.28); orbPreviewCtx.fill();
  orbPreviewCtx.restore();
}

function orbPreviewLoop() {
  try { drawOrbPreview(); } catch {}
  requestAnimationFrame(orbPreviewLoop);
}
orbPreviewLoop();

document.getElementById('orbPrev').addEventListener('click', () => {
  SFX.clickSecondary();
  orbBrowserIndex = (orbBrowserIndex - 1 + ORB_ORDER.length) % ORB_ORDER.length;
  refreshOrbBrowser();
});
document.getElementById('orbNext').addEventListener('click', () => {
  SFX.clickSecondary();
  orbBrowserIndex = (orbBrowserIndex + 1) % ORB_ORDER.length;
  refreshOrbBrowser();
});
refreshOrbBrowser();

document.getElementById('shopBtn').addEventListener('click', () => {
  SFX.clickSecondary();
  goToMainMenu();
});

// --- Guide overlay ---
const guideOverlayEl = document.getElementById('guideOverlay');
const guideTitleEl   = document.getElementById('guideTitle');
const guideTextEl    = document.getElementById('guideText');
const guideCanvas    = document.getElementById('guideCanvas');
const guideCtx       = guideCanvas.getContext('2d');
const guideDotsEl    = document.getElementById('guideDots');
const guidePrevBtn   = document.getElementById('guidePrev');
const guideNextBtn   = document.getElementById('guideNext');
const guideCloseBtn  = document.getElementById('guideClose');

let guideOpen = false;
let guidePageIdx = 0;
let guideStartTs = 0;
let guideRafId = null;

const GUIDE_PAGES = [
  {
    title: 'CONTROLS',
    text: 'Tap LEFT to attract toward the nearest body. Tap RIGHT to repel away. Your orb always targets the CLOSEST object.',
    draw: drawGuideControls,
  },
  {
    title: 'SCORING',
    text: 'Pass planets = 1 pt each. Destroy planets = streak² pts (bigger streak = more points). Survive longer for a TIME BONUS at the end of your run.',
    draw: drawGuideScoring,
  },
  {
    title: 'BURST',
    text: 'Press BOTH sides at the same time to activate your BURST. Instantly grants a powerful powerup. 20 second cooldown. Each orb has a unique burst effect.',
    draw: drawGuideBurst,
  },
  {
    title: 'THE VOID AWAKENS',
    text: 'The longer you survive, the faster and more dangerous the void becomes. At 3 minutes: WARNING. At 4+ minutes: more planets spawn every minute. At 10 minutes… something comes for you.',
    draw: drawGuideTimer,
  },
  {
    title: 'ORBS',
    text: 'Unlock new orbs with 💎 Drift Crystals earned every run. Each orb changes your playstyle and gives a unique BURST ability. Find them in the SHOP on the main menu.',
    draw: drawGuideOrbs,
  },
];

function renderGuideDots() {
  guideDotsEl.innerHTML = GUIDE_PAGES
    .map((_, i) => `<div class="guide-dot${i === guidePageIdx ? ' active' : ''}"></div>`)
    .join('');
}

function refreshGuidePage() {
  const page = GUIDE_PAGES[guidePageIdx];
  guideTitleEl.textContent = page.title;
  guideTextEl.textContent  = page.text;
  guidePrevBtn.disabled = guidePageIdx === 0;
  guideNextBtn.disabled = guidePageIdx === GUIDE_PAGES.length - 1;
  renderGuideDots();
}

function guideLoop() {
  if (!guideOpen) return;
  const t = (performance.now() - guideStartTs) / 1000;
  guideCtx.clearRect(0, 0, guideCanvas.width, guideCanvas.height);
  const page = GUIDE_PAGES[guidePageIdx];
  try { page.draw(guideCtx, t); } catch {}
  guideRafId = requestAnimationFrame(guideLoop);
}

function openGuide() {
  guidePageIdx = 0;
  guideOpen = true;
  guideStartTs = performance.now();
  refreshGuidePage();
  guideOverlayEl.classList.remove('hidden');
  if (guideRafId) cancelAnimationFrame(guideRafId);
  guideRafId = requestAnimationFrame(guideLoop);
}

function closeGuide() {
  guideOpen = false;
  guideOverlayEl.classList.add('hidden');
  if (guideRafId) { cancelAnimationFrame(guideRafId); guideRafId = null; }
}

document.getElementById('guideBtn').addEventListener('click', () => {
  SFX.clickSecondary();
  openGuide();
});
guideCloseBtn.addEventListener('click', () => {
  SFX.clickSecondary();
  closeGuide();
});
document.getElementById('guideReturnBtn').addEventListener('click', () => {
  SFX.clickPrimary();
  closeGuide();
});
guidePrevBtn.addEventListener('click', () => {
  if (guidePageIdx > 0) {
    SFX.clickSecondary();
    guidePageIdx--;
    guideStartTs = performance.now();
    refreshGuidePage();
  }
});
guideNextBtn.addEventListener('click', () => {
  if (guidePageIdx < GUIDE_PAGES.length - 1) {
    SFX.clickSecondary();
    guidePageIdx++;
    guideStartTs = performance.now();
    refreshGuidePage();
  }
});
document.addEventListener('keydown', (e) => {
  if (!guideOpen) return;
  if (e.key === 'Escape') { closeGuide(); }
  else if (e.key === 'ArrowLeft' && guidePageIdx > 0) {
    guidePageIdx--; guideStartTs = performance.now(); refreshGuidePage();
  }
  else if (e.key === 'ArrowRight' && guidePageIdx < GUIDE_PAGES.length - 1) {
    guidePageIdx++; guideStartTs = performance.now(); refreshGuidePage();
  }
});

// --- Guide illustrations ---
function guideLabel(ctx, text, x, y, color, size) {
  ctx.save();
  ctx.font = `${size || 9}px "Space Mono", monospace`;
  ctx.fillStyle = color || 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.restore();
}

// Glowing circular phone button — dark fill, colored rim glow, small phone
// silhouette inside. pressPhase (0..1) pulses a bright press ring around it.
function guidePhoneBtn(ctx, x, y, rgb, pressPhase) {
  const r = 22;
  ctx.save();
  ctx.translate(x, y);
  // Outer aura glow.
  const aura = ctx.createRadialGradient(0, 0, r * 0.4, 0, 0, r + 14);
  aura.addColorStop(0, `rgba(${rgb},${0.45 + pressPhase * 0.35})`);
  aura.addColorStop(1, `rgba(${rgb},0)`);
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(0, 0, r + 14, 0, 6.28); ctx.fill();
  // Dark filled body.
  const body = ctx.createRadialGradient(-4, -4, 0, 0, 0, r);
  body.addColorStop(0, 'rgba(40,44,58,0.95)');
  body.addColorStop(1, 'rgba(10,12,20,0.95)');
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  // Rim ring.
  ctx.strokeStyle = `rgba(${rgb},${0.75 + pressPhase * 0.25})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.stroke();
  // Expanding press ring.
  if (pressPhase > 0) {
    ctx.globalAlpha = (1 - pressPhase) * 0.8;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0, 0, r + 4 + pressPhase * 8, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Phone silhouette inside.
  ctx.strokeStyle = `rgba(${rgb},0.95)`;
  ctx.fillStyle   = `rgba(${rgb},0.12)`;
  ctx.lineWidth = 1.3;
  ctx.beginPath();
  ctx.roundRect(-6, -10, 12, 20, 2);
  ctx.fill(); ctx.stroke();
  // Screen area.
  ctx.fillStyle = `rgba(${rgb},0.55)`;
  ctx.beginPath(); ctx.roundRect(-4.5, -8, 9, 13, 1); ctx.fill();
  // Home indicator dot.
  ctx.fillStyle = `rgba(${rgb},0.9)`;
  ctx.beginPath(); ctx.arc(0, 7, 0.9, 0, 6.28); ctx.fill();
  ctx.restore();
}

function drawGuideControls(ctx, t) {
  const W = 320, H = 200;
  // Player orb in center
  const px = W / 2, py = H / 2 + 6;
  // Planet top-right
  const bx = W * 0.72, by = H * 0.3;
  // Dashed line pulsing between player and planet
  const pulse = 0.5 + 0.5 * Math.sin(t * 2.4);
  ctx.save();
  ctx.strokeStyle = `rgba(120,220,255,${0.35 + 0.45 * pulse})`;
  ctx.lineWidth = 1.2;
  ctx.setLineDash([5, 4]);
  ctx.lineDashOffset = -t * 18;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(bx, by);
  ctx.stroke();
  ctx.restore();
  // Planet
  const pg = ctx.createRadialGradient(bx - 4, by - 4, 0, bx, by, 18);
  pg.addColorStop(0, '#f6efd6');
  pg.addColorStop(1, 'rgba(120,80,40,0.85)');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(bx, by, 18, 0, 6.28); ctx.fill();
  // Player orb
  const og = ctx.createRadialGradient(px - 3, py - 3, 0, px, py, 10);
  og.addColorStop(0, '#fff');
  og.addColorStop(1, 'rgba(100,220,255,0.6)');
  ctx.fillStyle = og;
  ctx.beginPath(); ctx.arc(px, py, 10, 0, 6.28); ctx.fill();
  // Label midway on line
  const mx = (px + bx) / 2, my = (py + by) / 2;
  guideLabel(ctx, 'NEAREST BODY', mx, my - 10, 'rgba(180,230,255,0.8)', 8);

  // Left phone button — ATTRACT (cyan), presses out of phase with repel.
  const aPress = Math.max(0, Math.sin(t * 2.4));
  guidePhoneBtn(ctx, 40, H / 2 + 28, '120,220,255', aPress);
  guideLabel(ctx, 'ATTRACT', 40, H / 2 + 62, 'rgba(120,220,255,0.9)', 9);

  // Right phone button — REPEL (pink), presses opposite phase.
  const rPress = Math.max(0, Math.sin(t * 2.4 + Math.PI));
  guidePhoneBtn(ctx, W - 40, H / 2 + 28, '255,140,180', rPress);
  guideLabel(ctx, 'REPEL', W - 40, H / 2 + 62, 'rgba(255,140,180,0.9)', 9);
}

function drawGuideScoring(ctx, t) {
  const W = 320, H = 200;
  // Top planet passing — +1 rising
  const topX = 90, topY = 60;
  ctx.save();
  const tg = ctx.createRadialGradient(topX - 4, topY - 4, 0, topX, topY, 16);
  tg.addColorStop(0, '#e8d9a0'); tg.addColorStop(1, 'rgba(140,100,60,0.8)');
  ctx.fillStyle = tg;
  ctx.beginPath(); ctx.arc(topX, topY, 14, 0, 6.28); ctx.fill();
  ctx.restore();
  const rise = (t * 30) % 60;
  guideLabel(ctx, '+1', topX + 24, topY - 8 - rise, `rgba(180,230,255,${1 - rise / 60})`, 11);
  guideLabel(ctx, 'PASS', topX - 32, topY, 'rgba(180,230,255,0.6)', 8);

  // Middle: destroyed planet with ring + "+9"
  const mx = 90, my = 130;
  const ringPulse = (t * 0.9) % 1;
  ctx.save();
  ctx.strokeStyle = `rgba(255,140,80,${(1 - ringPulse) * 0.8})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(mx, my, 14 + ringPulse * 20, 0, 6.28); ctx.stroke();
  ctx.restore();
  // shattered planet
  ctx.save();
  ctx.fillStyle = 'rgba(255,120,60,0.85)';
  for (let i = 0; i < 5; i++) {
    const a = i * 1.25 + t * 0.5;
    const r = 5 + Math.sin(i) * 2;
    ctx.beginPath(); ctx.arc(mx + Math.cos(a) * r, my + Math.sin(a) * r, 2.2, 0, 6.28); ctx.fill();
  }
  ctx.restore();
  const rise2 = (t * 30) % 60;
  guideLabel(ctx, '+9', mx + 24, my - 8 - rise2, `rgba(255,200,120,${1 - rise2 / 60})`, 12);
  guideLabel(ctx, 'DESTROY', mx - 32, my, 'rgba(255,200,120,0.7)', 8);
  // Streak pill
  guideLabel(ctx, '🔥 × 3', mx + 6, my + 28, 'rgba(255,180,80,0.95)', 11);
  guideLabel(ctx, 'streak² = 9', mx + 6, my + 44, 'rgba(255,200,120,0.55)', 8);

  // Right: timer + bonus
  const tx = 240, ty = 70;
  ctx.save();
  ctx.strokeStyle = 'rgba(180,220,255,0.55)';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.roundRect(tx - 32, ty - 12, 64, 24, 4); ctx.stroke();
  ctx.restore();
  const mins = Math.floor(t * 5) % 10;
  const secs = Math.floor(t * 30) % 60;
  const timeStr = `0${mins}:${secs < 10 ? '0' : ''}${secs}`;
  guideLabel(ctx, timeStr, tx, ty, 'rgba(255,255,255,0.9)', 12);
  guideLabel(ctx, 'TIME BONUS', tx, ty + 28, 'rgba(180,220,255,0.7)', 8);
  const bonusPulse = 0.5 + 0.5 * Math.sin(t * 2);
  guideLabel(ctx, '+ pts', tx, ty + 44, `rgba(100,220,255,${0.6 + bonusPulse * 0.35})`, 10);
}

function drawGuideBurst(ctx, t) {
  const W = 320, H = 200;
  // Both phone buttons press simultaneously to trigger the burst.
  const press = Math.max(0, Math.sin(t * 2.2));
  guidePhoneBtn(ctx, 40, 78, '120,220,255', press);
  guidePhoneBtn(ctx, W - 40, 78, '120,220,255', press);
  guideLabel(ctx, 'LEFT',  40,    116, 'rgba(255,255,255,0.7)', 9);
  guideLabel(ctx, 'RIGHT', W - 40, 116, 'rgba(255,255,255,0.7)', 9);

  // Burst activation moment — player orb in the center with an expanding
  // burst flash ring and a lightning-bolt powerup rising above it.
  const orbX = W / 2, orbY = 95;
  // Burst flash cycle: 0..1 over ~1.2s.
  const burst = (t * 0.85) % 1;
  // Expanding ring.
  ctx.save();
  ctx.strokeStyle = `rgba(120,220,255,${(1 - burst) * 0.85})`;
  ctx.lineWidth = 2.2 * (1 - burst) + 0.6;
  ctx.beginPath(); ctx.arc(orbX, orbY, 10 + burst * 34, 0, 6.28); ctx.stroke();
  // Bright flash halo at moment of burst.
  if (burst < 0.25) {
    ctx.globalAlpha = (1 - burst / 0.25) * 0.55;
    const flash = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, 40);
    flash.addColorStop(0, 'rgba(255,255,255,0.9)');
    flash.addColorStop(1, 'rgba(120,220,255,0)');
    ctx.fillStyle = flash;
    ctx.beginPath(); ctx.arc(orbX, orbY, 40, 0, 6.28); ctx.fill();
  }
  ctx.restore();
  // Player orb.
  ctx.save();
  const og = ctx.createRadialGradient(orbX - 3, orbY - 3, 0, orbX, orbY, 11);
  og.addColorStop(0, '#fff');
  og.addColorStop(1, 'rgba(100,220,255,0.55)');
  ctx.fillStyle = og;
  ctx.beginPath(); ctx.arc(orbX, orbY, 10, 0, 6.28); ctx.fill();
  ctx.restore();

  // Lightning-bolt powerup rising above the orb, fading as it climbs.
  const riseY = orbY - 22 - burst * 22;
  ctx.save();
  ctx.globalAlpha = 1 - burst;
  ctx.translate(orbX, riseY);
  const bolt = [
    [ -3, -9 ], [  2, -2 ], [ -1, -1 ],
    [  3,  9 ], [ -2,  2 ], [  1,  1 ],
  ];
  ctx.beginPath();
  bolt.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
  ctx.closePath();
  const bg = ctx.createLinearGradient(0, -9, 0, 9);
  bg.addColorStop(0, '#fff');
  bg.addColorStop(1, 'rgba(120,220,255,0.85)');
  ctx.fillStyle = bg;
  ctx.shadowColor = 'rgba(120,220,255,0.9)';
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();

  // Clean burst bar centered below (no stray arrow).
  const bx = W / 2 - 70, by = 158, bw = 140, bh = 6;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(bx, by, bw, bh);
  const fill = 0.85 + 0.15 * Math.sin(t * 3);
  ctx.fillStyle = `rgba(125,232,255,${0.9 * fill})`;
  ctx.shadowColor = 'rgba(120,220,255,0.8)';
  ctx.shadowBlur = 8;
  ctx.fillRect(bx, by, bw, bh);
  ctx.restore();
  guideLabel(ctx, 'BURST — 20s cooldown', W / 2, by - 8, 'rgba(180,220,255,0.85)', 9);
}

function drawGuideTimer(ctx, t) {
  const W = 320, H = 200;
  // Timer progression: white → orange → red-blinking
  const stages = [
    { label: '01:00', color: 'rgba(220,230,255,0.9)', x: 55 },
    { label: '02:30', color: 'rgba(255,170,80,0.95)', x: 130 },
    { label: '03:00 !', color: 'rgba(255,80,80,0.95)', x: 225, blink: true },
  ];
  for (const s of stages) {
    ctx.save();
    let a = 1;
    if (s.blink) a = 0.45 + 0.55 * Math.abs(Math.sin(t * 5));
    ctx.globalAlpha = a;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(s.x - 30, 28, 60, 22, 4); ctx.stroke();
    guideLabel(ctx, s.label, s.x, 39, s.color, 11);
    ctx.restore();
  }
  // Arrows connecting stages
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(88, 39); ctx.lineTo(100, 39); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(160, 39); ctx.lineTo(195, 39); ctx.stroke();
  ctx.restore();

  // Growing cluster of tiny planets under 02:30 & 03:00
  const planetCount = 3 + Math.floor(3 + 2 * Math.sin(t));
  ctx.save();
  for (let i = 0; i < planetCount; i++) {
    const u = i / Math.max(1, planetCount - 1);
    const px = 80 + u * 180;
    const py = 85 + Math.sin(t * 0.8 + i * 0.9) * 4;
    const r = 3 + (i % 3);
    ctx.fillStyle = i < planetCount / 2 ? 'rgba(255,200,120,0.75)' : 'rgba(255,120,100,0.85)';
    ctx.beginPath(); ctx.arc(px, py, r, 0, 6.28); ctx.fill();
  }
  ctx.restore();
  guideLabel(ctx, 'more planets', W / 2, 108, 'rgba(255,200,120,0.65)', 8);

  // Sun illustration at bottom with 10:00 warning
  const sunX = W / 2, sunY = 158;
  const sunPulse = 0.5 + 0.5 * Math.sin(t * 1.3);
  ctx.save();
  const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 30);
  sg.addColorStop(0, '#ffe08c');
  sg.addColorStop(0.5, `rgba(255,140,60,${0.85 + sunPulse * 0.15})`);
  sg.addColorStop(1, 'rgba(200,50,20,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(sunX, sunY, 26 + sunPulse * 3, 0, 6.28); ctx.fill();
  ctx.restore();
  // flares
  ctx.save();
  ctx.strokeStyle = `rgba(255,160,80,${0.6 + sunPulse * 0.3})`;
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + t * 0.4;
    const r1 = 18 + sunPulse * 2;
    const r2 = 28 + Math.sin(t * 2 + i) * 3;
    ctx.beginPath();
    ctx.moveTo(sunX + Math.cos(a) * r1, sunY + Math.sin(a) * r1);
    ctx.lineTo(sunX + Math.cos(a) * r2, sunY + Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();
  guideLabel(ctx, '⚠ 10:00', sunX + 54, sunY, 'rgba(255,200,80,0.95)', 10);
}

function drawGuideOrbs(ctx, t) {
  const W = 320, H = 200;
  // 5 orbs in a row with orb colors
  const orbs = [
    { name: 'DRIFTER',  rgb: '125,232,255', unlocked: true  },
    { name: 'PHANTOM',  rgb: '192,132,252', unlocked: false },
    { name: 'INFERNO',  rgb: '251,146,60',  unlocked: false },
    { name: 'WARP',     rgb: '96,165,250',  unlocked: false },
    { name: 'FORTRESS', rgb: '168,162,158', unlocked: false },
  ];
  const gap = W / (orbs.length + 1);
  const cy = 90;
  orbs.forEach((o, i) => {
    const cx = gap * (i + 1);
    const pulse = 0.5 + 0.5 * Math.sin(t * 1.5 + i * 0.8);
    ctx.save();
    const g = ctx.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, 22);
    g.addColorStop(0, '#fff');
    g.addColorStop(0.5, `rgba(${o.rgb},${0.8 + pulse * 0.2})`);
    g.addColorStop(1, `rgba(${o.rgb},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 20, 0, 6.28); ctx.fill();
    // core
    ctx.fillStyle = `rgba(${o.rgb},1)`;
    ctx.beginPath(); ctx.arc(cx, cy, 9, 0, 6.28); ctx.fill();
    ctx.restore();
    // Crystal icon for locked
    if (!o.unlocked) {
      guideLabel(ctx, '💎', cx, cy + 26, 'rgba(255,255,255,0.85)', 12);
    }
  });

  // Arrow pointing down to SHOP
  const arrowY = 146;
  const arrowX = W / 2;
  const arrowPulse = 0.5 + 0.5 * Math.sin(t * 2);
  ctx.save();
  ctx.strokeStyle = `rgba(255,220,120,${0.5 + arrowPulse * 0.4})`;
  ctx.fillStyle = ctx.strokeStyle;
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(arrowX, arrowY - 8); ctx.lineTo(arrowX, arrowY + 8); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(arrowX, arrowY + 10);
  ctx.lineTo(arrowX - 4, arrowY + 4);
  ctx.lineTo(arrowX + 4, arrowY + 4);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // SHOP pill
  ctx.save();
  ctx.strokeStyle = 'rgba(255,200,60,0.7)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(W / 2 - 34, 160, 68, 22, 4); ctx.stroke();
  ctx.restore();
  guideLabel(ctx, 'SHOP', W / 2, 171, 'rgba(255,220,120,0.95)', 11);
}

// Settings overlay (replaces the old mute button)
const settingsBtn     = document.getElementById('settingsBtn');
const settingsOverlay = document.getElementById('settingsOverlay');
const pauseSettingsBtn = document.getElementById('pauseSettingsBtn');
const settingsCloseBtn = document.getElementById('settingsCloseBtn');

// Reflect current SFX/music state onto the toggle buttons.
function refreshSettingsUI() {
  const musicOn = SFX.isMusicEnabled();
  const sfxOn   = SFX.isSfxEnabled();
  settingsOverlay.querySelectorAll('.settings-toggle').forEach(group => {
    const setting = group.dataset.setting;
    const on = setting === 'music' ? musicOn : sfxOn;
    group.querySelectorAll('.toggle-opt').forEach(btn => {
      const want = btn.dataset.val === 'on';
      btn.classList.toggle('active', want === on);
    });
  });
}

function openSettings() {
  SFX.init();
  refreshSettingsUI();
  settingsOverlay.classList.add('visible');
}
function closeSettings() {
  settingsOverlay.classList.remove('visible');
}

settingsBtn.addEventListener('click', () => { SFX.clickSecondary(); openSettings(); });
pauseSettingsBtn.addEventListener('click', () => { SFX.clickSecondary(); openSettings(); });
settingsCloseBtn.addEventListener('click', () => { SFX.clickSecondary(); closeSettings(); });

settingsOverlay.addEventListener('click', e => {
  const btn = e.target.closest('.toggle-opt');
  if (!btn) return;
  const group = btn.closest('.settings-toggle');
  const setting = group.dataset.setting;
  const on = btn.dataset.val === 'on';
  SFX.init();
  SFX.clickSecondary();
  if (setting === 'music') SFX.setMusicEnabled(on);
  else if (setting === 'sfx') SFX.setSfxEnabled(on);
  refreshSettingsUI();
});

refreshSettingsUI();

// --- Play In-App Update ---
// Only runs on Android via the @capawesome/capacitor-app-update plugin.
// Flexible update: downloads in the background, installs when the player
// returns to the store or taps a follow-up CTA — never force-closes mid-game.
let updateCheckStarted = false;
async function checkPlayStoreUpdate() {
  if (updateCheckStarted) return;
  updateCheckStarted = true;
  const Cap = window.Capacitor;
  const AppUpdate = Cap && Cap.Plugins && Cap.Plugins.AppUpdate;
  if (!AppUpdate || !Cap.isNativePlatform || !Cap.isNativePlatform()) return;
  try {
    const info = await AppUpdate.getAppUpdateInfo();
    // 2 === UPDATE_AVAILABLE in AppUpdateAvailability enum.
    if (info && info.updateAvailability === 2 && info.flexibleUpdateAllowed) {
      await AppUpdate.startFlexibleUpdate();
      AppUpdate.addListener('onFlexibleUpdateStateChange', async state => {
        // 11 === DOWNLOADED in FlexibleUpdateInstallStatus.
        if (state && state.installStatus === 11) {
          try { await AppUpdate.completeFlexibleUpdate(); } catch {}
        }
      });
    }
  } catch (err) {
    console.warn('[update] check failed', err);
  }
}
if (state === 'idle') checkPlayStoreUpdate();

// Initialize the audio context on the very first user gesture so the
// browser autoplay policy is satisfied even if the player taps the canvas
// before clicking ENTER THE VOID.
function _firstAudioGesture() {
  SFX.init();
  document.removeEventListener('pointerdown', _firstAudioGesture, true);
  document.removeEventListener('touchstart',  _firstAudioGesture, true);
  document.removeEventListener('keydown',     _firstAudioGesture, true);
}
document.addEventListener('pointerdown', _firstAudioGesture, true);
document.addEventListener('touchstart',  _firstAudioGesture, true);
document.addEventListener('keydown',     _firstAudioGesture, true);

// --- Leaderboard tab switching ---
function isLocalTabActive() {
  const active = document.querySelector('.lb-tab.active');
  return active && active.dataset.tab === 'local';
}

document.getElementById('lbTabs').addEventListener('click', e => {
  const tab = e.target.closest('.lb-tab');
  if (!tab) return;
  SFX.clickSecondary();
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const isLocal = tab.dataset.tab === 'local';
  document.getElementById('highscores').style.display = isLocal ? 'block' : 'none';
  document.getElementById('globalScores').style.display = isLocal ? 'none' : 'block';
  // Re-render for current difficulty selection
  if (window._deathLbHandlers) {
    const diff = window._deathLbHandlers.getDifficulty();
    if (isLocal) window._deathLbHandlers.renderLocal(diff);
    else window._deathLbHandlers.fetchGlobal(diff);
  }
});

document.getElementById('lbDiffTabs').addEventListener('click', e => {
  const tab = e.target.closest('.lb-diff-tab');
  if (!tab || !window._deathLbHandlers) return;
  SFX.clickSecondary();
  const diff = tab.dataset.diff;
  document.querySelectorAll('.lb-diff-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  window._deathLbHandlers.setDifficulty(diff);
  // Re-render whichever tab is active
  if (isLocalTabActive()) {
    window._deathLbHandlers.renderLocal(diff);
  } else {
    window._deathLbHandlers.fetchGlobal(diff);
  }
});

// --- Username prompt ---
const usernameOverlay = document.getElementById('usernameOverlay');
const usernameInput = document.getElementById('usernameInput');
const usernameConfirm = document.getElementById('usernameConfirm');
let usernameCallback = null;

function showUsernamePrompt(onDone) {
  usernameCallback = onDone || null;
  usernameInput.value = getUsername();
  usernameConfirm.disabled = !usernameInput.value.length;
  usernameOverlay.classList.add('visible');
  usernameInput.focus();
}

usernameInput.addEventListener('input', () => {
  usernameInput.value = usernameInput.value.replace(/[^a-zA-Z0-9]/g, '');
  usernameConfirm.disabled = !usernameInput.value.length;
});

usernameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && usernameInput.value.length > 0) confirmUsername();
});

function confirmUsername() {
  const name = usernameInput.value.trim();
  if (!name) return;
  setUsername(name);
  usernameOverlay.classList.remove('visible');
  if (usernameCallback) usernameCallback();
  usernameCallback = null;
}

usernameConfirm.addEventListener('click', () => { SFX.clickPrimary(); confirmUsername(); });

// Show username prompt on first launch, then start
if (!getUsername()) {
  showUsernamePrompt();
}

// Bootstrap menu music on the user's first interaction. Browsers won't let
// us start audio before a gesture, so we wait for the first pointer or key
// event, then fire the menu track if we're still on the main menu.
function bootstrapMenuMusic() {
  document.removeEventListener('pointerdown', bootstrapMenuMusic);
  document.removeEventListener('keydown', bootstrapMenuMusic);
  document.removeEventListener('touchstart', bootstrapMenuMusic);
  try {
    SFX.init();
    if (state === 'idle') SFX.playTrack('menu', 0.5);
  } catch (err) {
    console.error('[bootstrapMenuMusic] failed', err);
  }
}
document.addEventListener('pointerdown', bootstrapMenuMusic);
document.addEventListener('keydown', bootstrapMenuMusic);
document.addEventListener('touchstart', bootstrapMenuMusic);

initBgStars(); initBodies(); loop();
</script>
