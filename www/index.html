<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DRIFT</title>
<script src="https://browser.sentry-cdn.com/7.99.0/bundle.min.js" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #00000a;
  }
  body {
    font-family: 'Orbitron', monospace;
  }

  #gameWrapper {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
  }

  @media (max-width: 380px) {
    .title-word { font-size: 52px; }
    #startBtn { font-size: 10px; }
    .diff-btn { font-size: 8px; }
    .controls-hint { font-size: 9px; }
    .subtitle { font-size: 8px; }
  }

  canvas {
    display: block;
    border-radius: 4px;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #score {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.9);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100,200,255,0.8);
  }

  #runTimer {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.8);
    text-shadow: 0 0 12px rgba(255,255,255,0.4);
    pointer-events: none;
  }

  #powerupTimer {
    position: absolute;
    top: 104px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    pointer-events: none;
  }
  #powerupTimer.visible { display: flex; }
  .pt-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
  .pt-bar {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .pt-fill {
    height: 100%;
    width: 100%;
    border-radius: 2px;
  }
  .pt-combo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-shadow: 0 0 8px currentColor;
    margin-top: 2px;
    display: none;
  }

  /* Burst bar — sits below the powerup timer. Same bar style; label is a
     smaller uppercase "BURST". */
  #burstBar {
    position: absolute;
    top: 146px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    pointer-events: none;
  }
  .burst-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }
  .burst-bar-outer {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .burst-bar-fill {
    height: 100%;
    width: 100%;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
    transition: background 0.2s;
  }
  .pt-combo.visible { display: block; }

  #hintLeft, #hintRight {
    position: absolute;
    bottom: 80px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  #hintLeft { left: 20px; }
  #hintRight { right: 20px; }

  #highscores {
    display: none;
    margin-bottom: 16px;
    width: 220px;
    max-height: 180px;
    overflow-y: auto;
  }
  .hs-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
  }
  .hs-row:first-child { color: rgba(100,200,255,0.9); }
  .hs-rank { color: rgba(255,255,255,0.25); margin-right: 12px; }
  .hs-val { flex: 1; text-align: right; margin-right: 10px; }
  .hs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
    min-width: 48px;
    text-align: right;
  }
  .hs-diff.HARD { color: rgba(255,180,80,0.7); }
  .hs-diff.EXTREME { color: rgba(255,90,120,0.85); }

  #difficultySelect {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }

  #orbBrowser {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 26px;
    position: relative;
    width: 300px;
  }
  #orbCrystalBalance {
    position: absolute;
    top: -18px;
    right: 0;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(255,210,90,0.95);
    text-shadow: 0 0 10px rgba(255,200,60,0.45);
  }
  .orb-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .orb-arrow {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.55);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .orb-arrow:hover {
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.45);
  }
  #orbPreview {
    width: 120px;
    height: 120px;
    background: rgba(0,0,15,0.55);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  #orbPreview.locked::after {
    content: '🔒';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    color: rgba(255,255,255,0.65);
    text-shadow: 0 0 12px rgba(0,0,0,0.8);
  }
  #orbPreviewCanvas {
    width: 120px;
    height: 120px;
    display: block;
  }
  #orbPreview.locked #orbPreviewCanvas { opacity: 0.5; }
  #orbName {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.92);
    margin-top: 10px;
    text-transform: uppercase;
  }
  #orbDesc {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-align: center;
    max-width: 260px;
    line-height: 1.4;
  }
  #orbDots {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .orb-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .orb-dot.active { background: rgba(100,220,255,0.95); box-shadow: 0 0 6px rgba(100,200,255,0.6); }
  #orbAction {
    margin-top: 10px;
    min-height: 34px;
  }
  .orb-btn {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,220,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    padding: 9px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .orb-btn:hover { background: rgba(100,200,255,0.12); box-shadow: 0 0 16px rgba(100,200,255,0.25); }
  .orb-btn.equipped {
    border-color: rgba(100,200,255,0.5);
    color: rgba(100,220,255,0.7);
    cursor: default;
    background: rgba(100,200,255,0.06);
  }
  .orb-btn.unlock {
    border-color: rgba(255,200,60,0.75);
    color: rgba(255,220,120,0.95);
    text-shadow: 0 0 8px rgba(255,200,60,0.35);
  }
  .orb-btn.unlock:hover { background: rgba(255,200,60,0.12); box-shadow: 0 0 18px rgba(255,200,60,0.3); }
  .orb-btn.flash-err {
    animation: orbFlashErr 0.6s ease;
  }
  @keyframes orbFlashErr {
    0%,100% { color: rgba(255,220,120,0.95); border-color: rgba(255,200,60,0.75); }
    50% { color: rgba(255,120,120,1); border-color: rgba(255,100,100,1); }
  }

  #deathCrystals {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    color: rgba(255,220,120,0.95);
    text-shadow: 0 0 12px rgba(255,200,60,0.4);
    margin-bottom: 4px;
    display: none;
  }
  #deathCrystalTotal {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,210,90,0.75);
    margin-bottom: 10px;
    display: none;
  }
  #deathActions {
    display: none;
    gap: 10px;
    margin-top: 10px;
  }
  #shopBtn {
    background: transparent;
    border: 1px solid rgba(255,200,60,0.6);
    color: rgba(255,220,120,0.95);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #shopBtn:hover { background: rgba(255,200,60,0.12); box-shadow: 0 0 22px rgba(255,200,60,0.3); }
  .diff-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.45);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .diff-btn:hover {
    color: rgba(255,255,255,0.8);
    border-color: rgba(255,255,255,0.4);
  }
  .diff-btn.selected {
    border-color: rgba(100,200,255,0.9);
    color: rgba(100,220,255,1);
    background: rgba(100,200,255,0.08);
    box-shadow: 0 0 14px rgba(100,200,255,0.25);
  }
  .diff-btn.selected[data-diff="HARD"] {
    border-color: rgba(255,180,80,0.9);
    color: rgba(255,200,100,1);
    background: rgba(255,180,80,0.08);
    box-shadow: 0 0 14px rgba(255,180,80,0.25);
  }
  .diff-btn.selected[data-diff="EXTREME"] {
    border-color: rgba(255,90,120,0.95);
    color: rgba(255,120,150,1);
    background: rgba(255,90,120,0.1);
    box-shadow: 0 0 16px rgba(255,90,120,0.3);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.88);
    backdrop-filter: blur(8px);
    border-radius: 4px;
    transition: opacity 0.6s;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.6s, visibility 0s 0.6s;
  }

  .title-word {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 16px;
    background: linear-gradient(135deg, #4af, #a4f, #4af);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 3s ease infinite;
    margin-bottom: 6px;
  }

  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 48px;
    text-transform: uppercase;
  }

  .controls-hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 2;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .controls-hint span {
    color: rgba(100,200,255,0.9);
  }

  #startBtn {
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,200,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    padding: 14px 36px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #startBtn:hover {
    background: rgba(100,200,255,0.1);
    border-color: rgba(100,200,255,0.9);
    box-shadow: 0 0 30px rgba(100,200,255,0.3);
  }

  #guideBtn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.7);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    padding: 10px 36px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  #guideBtn:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.6);
    color: rgba(255,255,255,0.95);
  }

  #guideOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,5,0.92);
    backdrop-filter: blur(8px);
    z-index: 50;
    transition: opacity 0.25s;
  }
  #guideOverlay.hidden {
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.25s, visibility 0s 0.25s;
  }
  #guideClose {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.7);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #guideClose:hover {
    background: rgba(255,80,80,0.12);
    border-color: rgba(255,120,120,0.85);
    color: rgba(255,200,200,0.95);
  }
  .guide-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px;
    max-width: 360px;
  }
  .guide-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #4af, #a4f, #4af);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 3s ease infinite;
    text-align: center;
    text-transform: uppercase;
  }
  #guideCanvas {
    width: 320px;
    height: 200px;
    background: rgba(0,0,20,0.5);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    display: block;
  }
  .guide-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: rgba(255,255,255,0.7);
    text-align: center;
    max-width: 320px;
    letter-spacing: 0.5px;
  }
  .guide-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 4px;
  }
  .guide-arrow {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.55);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .guide-arrow:hover:not(:disabled) {
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.45);
  }
  .guide-arrow:disabled {
    opacity: 0.3;
    cursor: default;
  }
  .guide-dots {
    display: flex;
    gap: 6px;
  }
  .guide-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .guide-dot.active {
    background: rgba(100,220,255,0.95);
    box-shadow: 0 0 6px rgba(100,200,255,0.6);
  }
  #guideReturnBtn {
    margin-top: 14px;
    background: transparent;
    border: 1px solid rgba(100,200,255,0.5);
    color: rgba(100,200,255,0.9);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    padding: 14px 36px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #guideReturnBtn:hover {
    background: rgba(100,200,255,0.1);
    border-color: rgba(100,200,255,0.9);
    box-shadow: 0 0 30px rgba(100,200,255,0.3);
  }

  #streakDisplay {
    position: absolute;
    top: 84px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(255,200,80,0.9);
    text-shadow: 0 0 10px rgba(255,180,60,0.5);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  #streakDisplay.visible { opacity: 1; }

  #runSummary {
    display: none;
    width: 260px;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }
  .rs-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.85);
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 16px rgba(100,200,255,0.5);
  }
  .rs-row {
    display: flex;
    padding: 1px 0;
  }
  .rs-label { color: rgba(255,255,255,0.4); flex: 1; }
  .rs-val { color: rgba(255,255,255,0.7); width: 30px; text-align: right; }
  .rs-pts { color: rgba(255,255,255,0.35); font-size: 8px; text-align: right; width: 48px; }
  .rs-sep {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 4px 0;
  }
  .rs-total {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    letter-spacing: 2px;
  }
  .rs-total .rs-diff {
    font-size: 8px;
    letter-spacing: 1px;
    margin-left: 6px;
  }
  .rs-diff.NORMAL { color: rgba(100,200,255,0.8); }
  .rs-diff.HARD { color: rgba(255,180,80,0.8); }
  .rs-diff.EXTREME { color: rgba(255,90,120,0.85); }

  .lb-diff-tabs {
    display: none;
    gap: 0;
    width: 220px;
    margin-bottom: 4px;
  }
  .lb-diff-tab {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.3);
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    padding: 3px 0;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .lb-diff-tab:first-child { border-radius: 2px 0 0 2px; }
  .lb-diff-tab:last-child { border-radius: 0 2px 2px 0; border-left: none; }
  .lb-diff-tab:not(:first-child):not(:last-child) { border-left: none; }
  .lb-diff-tab.active[data-diff="NORMAL"] {
    color: rgba(100,200,255,0.9);
    border-color: rgba(100,200,255,0.4);
    background: rgba(100,200,255,0.06);
  }
  .lb-diff-tab.active[data-diff="HARD"] {
    color: rgba(255,200,100,0.9);
    border-color: rgba(255,180,80,0.4);
    background: rgba(255,180,80,0.06);
  }
  .lb-diff-tab.active[data-diff="EXTREME"] {
    color: rgba(255,120,150,0.9);
    border-color: rgba(255,90,120,0.4);
    background: rgba(255,90,120,0.06);
  }

  #deathScore {
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
    display: none;
  }

  #pauseBtn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,10,0.35);
    border: 1px solid rgba(100,200,255,0.25);
    border-radius: 4px;
    color: rgba(100,200,255,0.6);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
  }

  #settingsBtn {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 36px;
    height: 36px;
    background: rgba(0,0,10,0.35);

// --- Audio (procedural Web Audio synthesis) ---
// Self-contained module. All sounds synthesized on demand. Errors are
// swallowed so audio failures never crash gameplay. Init lazily on the
// first user gesture so we don't trip the autoplay policy.
//
// Signal graph:
//   (per-sfx node chains) ──▶ sfxGain  ─┐
//                                       ├─▶ masterGain ──▶ destination
//   (music layer chains)  ──▶ musicGain ┘
//
// sfxGain and musicGain are toggled independently by the settings overlay.
const SFX = (function() {
  let ctx = null;
  let masterGain = null, musicGain = null, sfxGain = null;
  let initialized = false;

  // Persisted settings: music and SFX enabled toggles.
  let musicEnabled = true, sfxEnabled = true;
  try {
    const m = localStorage.getItem('drift_music_enabled');
    if (m !== null) musicEnabled = m !== '0' && m !== 'false';
    const s = localStorage.getItem('drift_sfx_enabled');
    if (s !== null) sfxEnabled = s !== '0' && s !== 'false';
  } catch {}

  const MUSIC_GAIN_VALUE = 0.4;
  const SFX_GAIN_VALUE   = 1.0;

  // Throttle trackers use ctx.currentTime (audio-clock seconds), NOT game
  // frame numbers — frame counters reset on game restart, which would make
  // `frame - lastFrame` negative and silently disable the throttle.
  let lastAttract = -100, lastRepel = -100;
  const ATTRACT_THROTTLE = 0.13;
  const REPEL_THROTTLE   = 0.13;

  // --- Music state (per-state file playback) ---
  // Three tracks: menu / gameplay / results. Each is fetched + decoded
  // lazily on first play and cached. The seamless 2-second loop crossfade
  // and track-switch crossfades share the same source-pair machinery.
  const MUSIC_TRACKS = ['menu', 'gameplay', 'results', 'gameplay2', 'gameplay3', 'gameplay4'];
  const musicBuffers = { menu: null, gameplay: null, results: null, gameplay2: null, gameplay3: null, gameplay4: null };
  const musicLoading = { menu: null, gameplay: null, results: null, gameplay2: null, gameplay3: null, gameplay4: null };
  // Phase-based gameplay music: each phase has its own track with independent
  // source/gain chains so crossfades can ramp them against each other without
  // fighting the shared musicGain.
  const GAMEPLAY_PHASE_TRACKS = { 1: 'gameplay', 2: 'gameplay2', 3: 'gameplay3', 4: 'gameplay4' };
  const GAMEPLAY_PHASE_CROSSFADE = 3.0; // seconds for phase-change crossfade
  // Active gameplay-phase voices keyed by track name; each entry tracks its
  // own source, gain, and loop timer so they can be stopped independently.
  const gameplayVoices = {};

  // Destruction SFX files — shield/nova/barrier play decoded AudioBuffers
  // instead of procedural synths. Files loaded lazily on first touch, cached
  // here after decode. ghost keeps its synthesized sound.
  const SFX_BUFFER_URLS = {
    shieldDestroy:     './assets/SFX/SHIELD DESTROY.mp3',
    novaDestroy:       './assets/SFX/NOVA DESTROY.mp3',
    hyperspeedBarrier: './assets/SFX/HYPERSPEED BARRIER.mp3',
    scream:            './assets/SFX/SCREAM.mp3',
    toothed:           './assets/SFX/TOOTHED.mp3',
    eruption:          './assets/SFX/ERUPTION.mp3',
    tentacle:          './assets/SFX/TENTACLE.mp3',
    heartbeat:         './assets/SFX/HEARTBEAT.mp3',
    mirror:            './assets/SFX/MIRROR.mp3',
  };
  const sfxBuffers = { shieldDestroy: null, novaDestroy: null, hyperspeedBarrier: null, scream: null, toothed: null, eruption: null, tentacle: null, heartbeat: null, mirror: null };
  const sfxLoading = { shieldDestroy: null, novaDestroy: null, hyperspeedBarrier: null, scream: null, toothed: null, eruption: null, tentacle: null, heartbeat: null, mirror: null };
  let currentTrackName = null;       // null = no track playing
  let currentMusicSource = null;     // active AudioBufferSourceNode
  let currentMusicSourceGain = null; // per-source gain (used for crossfades)
  let crossfadeTimer = null;         // setTimeout handle for the next loop crossfade
  const MUSIC_CROSSFADE = 2.0;       // seconds of overlap at the loop point
  const PAUSE_DUCK_LEVEL = 0.2;      // pause "ducks" music to 20% of normal

  function init() {
    if (initialized) return;
    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;
      ctx = new Ctor();

      masterGain = ctx.createGain();
      masterGain.gain.value = 1;
      masterGain.connect(ctx.destination);

      musicGain = ctx.createGain();
      musicGain.gain.value = musicEnabled ? MUSIC_GAIN_VALUE : 0;
      musicGain.connect(masterGain);

      sfxGain = ctx.createGain();
      sfxGain.gain.value = sfxEnabled ? SFX_GAIN_VALUE : 0;
      sfxGain.connect(masterGain);

      initialized = true;
      // Kick off decode of the destruction SFX so the first planet kill
      // isn't delayed by fetch/decode. Failures are logged; playback
      // silently no-ops until a buffer is available.
      preloadSfxBuffers();
    } catch {}
  }

  // Aggressively try to bring the AudioContext into the running state.
  // Handles 'suspended' (Chrome autoplay) and 'interrupted' (iOS).
  function ensureRunning() {
    // Android WebView occasionally closes the AudioContext out from under us
    // when the app is backgrounded, leaving us with a permanently broken ctx.
    // Detect that and rebuild from scratch instead of leaving audio dead.
    if (initialized && ctx && ctx.state === 'closed') {
      initialized = false;
      ctx = null;
      masterGain = musicGain = sfxGain = null;
      // Drop the cached music source/timer so the fresh context can re-arm.
      if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
      currentMusicSource = null;
      currentMusicSourceGain = null;
      currentTrackName = null;
      // Gameplay-phase voices are tied to the dead context too; drop them
      // so the next phase tick re-arms against the fresh context.
      for (const k of Object.keys(gameplayVoices)) {
        const v = gameplayVoices[k];
        if (v && v.loopTimer) { clearTimeout(v.loopTimer); }
        delete gameplayVoices[k];
      }
      // Decoded buffers are tied to the dead AudioContext — invalidate them
      // so the next playTrack() refetches against the new context.
      for (const k of MUSIC_TRACKS) {
        musicBuffers[k] = null;
        musicLoading[k] = null;
      }
      for (const k of Object.keys(SFX_BUFFER_URLS)) {
        sfxBuffers[k] = null;
        sfxLoading[k] = null;
      }
    }
    if (!initialized) init();
    if (!ctx) return false;
    if (ctx.state !== 'running') {
      try { ctx.resume(); } catch {}
    }
    return true;
  }

  // Suspend/resume the AudioContext itself — used by the visibilitychange
  // handler so Android doesn't kill the audio thread while the app is
  // backgrounded. These are no-ops if the context isn't built yet.
  function suspendCtx() {
    if (!ctx) return;
    try { ctx.suspend(); } catch {}
  }
  function resumeCtx() {
    if (!ctx) return;
    try { ctx.resume(); } catch {}
  }

  function safeSfx(fn) {
    if (!sfxEnabled) return;
    if (!ensureRunning()) return;
    try { fn(ctx.currentTime); } catch {}
  }

  // When a node ends, disconnect it and any related nodes so orphan
  // branches don't accumulate during long sessions.
  function killOnEnd(node, ...others) {
    if (!node) return;
    node.onended = () => {
      try { node.disconnect(); } catch {}
      for (const n of others) { try { n.disconnect(); } catch {} }
      node.onended = null;
    };
  }

  function resetThrottles() {
    lastAttract = -100;
    lastRepel = -100;
  }

  // --- Settings API ---
  function setMusicEnabled(on) {
    musicEnabled = !!on;
    try { localStorage.setItem('drift_music_enabled', on ? '1' : '0'); } catch {}
    // Bug fix: never restart playback here. Just adjust musicGain to whatever
    // the current target should be — which respects the pause duck so toggling
    // music off→on while paused returns to the ducked level, not full volume.
    setMusicGainTarget(currentMusicGainTarget(), 0.08);
  }
  function setSfxEnabled(on) {
    sfxEnabled = !!on;
    try { localStorage.setItem('drift_sfx_enabled', on ? '1' : '0'); } catch {}
    if (sfxGain && ctx) {
      try {
        const t = ctx.currentTime;
        sfxGain.gain.cancelScheduledValues(t);
        sfxGain.gain.setValueAtTime(sfxGain.gain.value, t);
        sfxGain.gain.linearRampToValueAtTime(on ? SFX_GAIN_VALUE : 0, t + 0.05);
      } catch {}
    }
  }
  function isMusicEnabled() { return musicEnabled; }
  function isSfxEnabled()   { return sfxEnabled; }

  // Tiny noise buffer factory
  function noiseBuffer(durationSec, shape) {
    const len = Math.max(1, Math.floor(ctx.sampleRate * durationSec));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const env = shape ? shape(i / len) : 1;
      data[i] = (Math.random() * 2 - 1) * env;
    }
    return buf;
  }

  // ---- one-shot sound effects ----
  //
  // Helpers below keep the per-cue functions short. Every node ends up wired
  // through sfxGain so the SFX toggle mutes everything uniformly, and every
  // schedule call ends in killOnEnd to stop nodes accumulating.

  // Single staccato note — used for chiptune jingles and combo fanfares.
  function chipNote(freq, start, dur, vol, type) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, g);
  }

  // Frequency-swept single oscillator — used for booms, zaps, drops.
  function chipSweep(type, fStart, fEnd, start, dur, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(fStart, start);
    o.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, g);
  }

  // Reusable tanh waveshaper for chiptune-explosion crunch. `amount` in the
  // 200-400 range effectively hard-clips the signal, turning a clean square
  // into a growly, distorted crunch.
  function makeDistortion(amount) {
    const ws = ctx.createWaveShaper();
    const n = 256;
    const curve = new Float32Array(n);
    const k = amount || 0;
    for (let i = 0; i < n; i++) {
      const x = (i * 2 / n) - 1;
      curve[i] = Math.tanh(k * x);
    }
    ws.curve = curve;
    ws.oversample = '2x';
    return ws;
  }

  // chipSweep routed through a waveshaper — the distorted version used for
  // the crunchy square-wave layers in planetDestroyed.
  function crunchSweep(type, fStart, fEnd, start, dur, vol, amount) {
    const o = ctx.createOscillator();
    const ws = makeDistortion(amount);
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(fStart, start);
    o.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.connect(ws); ws.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + dur + 0.02);
    killOnEnd(o, ws, g);
  }

  // Frequency-swept filtered noise — used for the "eerie high end" sweep
  // in the ghost destroy and similar effects.
  function sweepNoise(start, dur, filterType, fStart, fEnd, q, vol) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, x => 1 - x);
    const f = ctx.createBiquadFilter();
    f.type = filterType;
    if (typeof q === 'number') f.Q.value = q;
    f.frequency.setValueAtTime(fStart, start);
    f.frequency.exponentialRampToValueAtTime(Math.max(0.0001, fEnd), start + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Bandpass noise burst — explosions and crunches.
  function noiseBurst(start, dur, centerHz, q, vol, fadeShape) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, fadeShape || (x => 1 - x));
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = centerHz;
    f.Q.value = q;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Highpass shimmer — bright noise tail for jingles.
  function shimmer(start, dur, vol, hp) {
    const n = ctx.createBufferSource();
    n.buffer = noiseBuffer(dur + 0.02, x => 1 - x);
    const f = ctx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = hp;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    n.connect(f); f.connect(g); g.connect(sfxGain);
    n.start(start); n.stop(start + dur + 0.04);
    killOnEnd(n, f, g);
  }

  // Slow-attack sine voice with long decay — ghost dimensional tone.
  function ghostVoice(freq, start, attack, decay, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + attack);
    g.gain.exponentialRampToValueAtTime(0.001, start + decay);
    o.connect(g); g.connect(sfxGain);
    o.start(start); o.stop(start + decay + 0.05);
    killOnEnd(o, g);
  }

  // Supernova/combo kill — plays the shared NOVA DESTROY clip at 0.85,
  // scaled by vScale so combos can punch harder (e.g. nova_nova at 1.3).
  function novaBoom(_t, vScale) {
    playSfxBuffer('novaDestroy', Math.min(1, 0.65 * (vScale || 1)));
  }

  function attract(_frame) {
    safeSfx(t => {
      // Throttled at ~8 frames @ 60fps via ATTRACT_THROTTLE (0.13s).
      if (t - lastAttract < ATTRACT_THROTTLE) return;
      lastAttract = t;
      // Short low pulse — sine 110hz, 0.06s, soft attack. Subtle gravity hum.
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 110;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.07, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o.connect(g); g.connect(sfxGain);
      o.start(t); o.stop(t + 0.08);
      killOnEnd(o, g);
    });
  }

  function repel(_frame) {
    safeSfx(t => {
      // Throttled at ~8 frames @ 60fps via REPEL_THROTTLE (0.13s).
      if (t - lastRepel < REPEL_THROTTLE) return;
      lastRepel = t;
      // Sharp zap — square 440→220hz, 0.08s, snappy push.
      chipSweep('square', 440, 220, t, 0.08, 0.12);
    });
  }

  function pickup(type, opts) {
    safeSfx(t => {
      if (type === 'shield') {
        // Classic SNES power-up jingle: ascending C5-E5-G5-C6 squares,
        // each 0.07s staccato, then a high-frequency shimmer burst.
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => chipNote(freq, t + i * 0.07, 0.07, 0.35, 'square'));
        shimmer(t + notes.length * 0.07, 0.1, 0.18, 6000);

      } else if (type === 'nova') {
        // Deep retro BOOM — square sub 60→30hz drop 0.2s, then a rising
        // noise sweep 100→3000hz over 0.3s. Charging up a massive weapon.
        chipSweep('square', 60, 30, t, 0.2, 0.4);
        const sweepStart = t + 0.05;
        const n = ctx.createBufferSource();
        n.buffer = noiseBuffer(0.32, x => 1 - x * 0.5);
        const f = ctx.createBiquadFilter();
        f.type = 'bandpass';
        f.Q.value = 1.5;
        f.frequency.setValueAtTime(100, sweepStart);
        f.frequency.exponentialRampToValueAtTime(3000, sweepStart + 0.3);
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0, sweepStart);
        ng.gain.linearRampToValueAtTime(0.28, sweepStart + 0.03);
        ng.gain.exponentialRampToValueAtTime(0.001, sweepStart + 0.3);
        n.connect(f); f.connect(ng); ng.connect(sfxGain);
        n.start(sweepStart); n.stop(sweepStart + 0.34);
        killOnEnd(n, f, ng);

      } else if (type === 'hyperspeed') {
        // Rapid ascending arpeggio A3-C4-E4-A4-C5-E5-A5, each 0.04s,
        // square. ENGAGING WARP DRIVE. (Sustained engine tone is owned
        // separately by startHyperspeedWhoosh.)
        // opts.stacks pitch-shifts the arpeggio so each additional stack
        // sounds slightly higher (1.0/1.2/1.4/1.6 for stacks 1/2/3/4).
        const stacks = (opts && opts.stacks) || 1;
        const pitchMult = 1 + 0.2 * (Math.max(1, stacks) - 1);
        const arp = [220.00, 261.63, 329.63, 440.00, 523.25, 659.25, 880.00];
        arp.forEach((freq, i) => chipNote(freq * pitchMult, t + i * 0.04, 0.05, 0.3, 'square'));

      } else if (type === 'ghost') {
        // Eerie descending tritone C5→F#4 on sines with slow attack and a
        // long dreamy decay, plus three echoes 80ms apart, each 40% of the
        // previous voice's volume. Phasing into another dimension.
        const notes = [523.25, 369.99]; // C5, F#4
        let vol = 0.25;
        for (let i = 0; i < 4; i++) {
          const start = t + i * 0.08;
          notes.forEach(freq => ghostVoice(freq, start, 0.15, 1.0, vol));
          vol *= 0.4;
        }
      }
    });
  }

  function planetDestroyed(kind) {
    if (kind === 'shield') {
      playSfxBuffer('shieldDestroy', 0.7);
    } else if (kind === 'nova') {
      playSfxBuffer('novaDestroy', 0.45);
    } else if (kind === 'barrier') {
      playSfxBuffer('hyperspeedBarrier', 0.65);
    } else if (kind === 'ghost') {
      // Soft ethereal passthrough — not a destroy. Sine whomp 180→60hz 0.2s
      // plus a brief sine shimmer 2000→800hz 0.08s. Volume 0.15 so it sits
      // well below the crunchy destroy SFX.
      safeSfx(t => {
        chipSweep('sine', 180, 60, t, 0.2, 0.15);
        chipSweep('sine', 2000, 800, t, 0.08, 0.15);
      });
    }
  }

  // Combo activate — every combo distinct, all at vol ~0.4.
  // Wired by activateCombo() in the game loop, keys must match COMBO_DEFS.
  function comboActivate(key) {
    safeSfx(t => {
      switch (key) {
        case 'nova_nova': {
          // SUPERNOVA: ascending C5-E5-G5-C6 fanfare + noise explosion.
          const fanfare = [523.25, 659.25, 783.99, 1046.50];
          fanfare.forEach((freq, i) => chipNote(freq, t + i * 0.06, 0.07, 0.4, 'square'));
          const expStart = t + fanfare.length * 0.06;
          noiseBurst(expStart, 0.3, 500, 1.0, 0.4, x => Math.pow(1 - x, 1.0));
          chipSweep('square', 80, 30, expStart, 0.3, 0.35);
          break;
        }
        case 'nova_hyperspeed': {
          // WARP TIME: rapid arpeggio up then down, A4-E5-A5-E5-A4.
          const arp = [440.00, 659.25, 880.00, 659.25, 440.00];
          arp.forEach((freq, i) => chipNote(freq, t + i * 0.05, 0.06, 0.4, 'square'));
          break;
        }
        case 'nova_ghost': {
          // PHANTOM BLAST: deep bass drop 60→30hz + eerie shimmer 3000→800hz.
          chipSweep('square', 60, 30, t, 0.3, 0.4);
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(3000, t);
          o.frequency.exponentialRampToValueAtTime(800, t + 0.3);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.18, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o.connect(g); g.connect(sfxGain);
          o.start(t); o.stop(t + 0.32);
          killOnEnd(o, g);
          break;
        }
        case 'nova_shield': {
          // PULSAR: rhythmic triple pulse C5-C5-C6 with 0.05s gaps.
          chipNote(523.25, t,        0.08, 0.4, 'square');
          chipNote(523.25, t + 0.13, 0.08, 0.4, 'square');
          chipNote(1046.50, t + 0.26, 0.08, 0.4, 'square');
          break;
        }
        case 'hyperspeed_ghost': {
          // SPECTRAL RUSH: ghost tritone + speed arpeggio layered.
          const ghostNotes = [523.25, 369.99];
          ghostNotes.forEach(freq => ghostVoice(freq, t, 0.1, 0.7, 0.28));
          const arp = [220.00, 261.63, 329.63, 440.00, 523.25, 659.25, 880.00];
          arp.forEach((freq, i) => chipNote(freq, t + i * 0.04, 0.05, 0.32, 'square'));
          break;
        }
        case 'hyperspeed_shield': {
          // JUGGERNAUT: heavy 80→40hz BOOM + shield jingle layered.
          chipSweep('square', 80, 40, t, 0.4, 0.4);
          const jingle = [523.25, 659.25, 783.99, 1046.50];
          jingle.forEach((freq, i) => chipNote(freq, t + i * 0.07, 0.07, 0.35, 'square'));
          break;
        }
        case 'ghost_shield': {
          // WRAITH: ghost descending tritone + shield shimmer noise.
          ghostVoice(523.25, t, 0.12, 0.8, 0.32);
          ghostVoice(369.99, t, 0.12, 0.8, 0.32);
          shimmer(t, 0.2, 0.25, 6000);
          break;
        }
        case 'ghost_ghost': {
          // ETERNAL PHANTOM: ghost sound 2x slower, an octave deeper, with
          // five echoing layers each 50% quieter than the previous.
          const notes = [261.63, 185.00]; // C4, F#3 — one octave down
          let vol = 0.4;
          for (let i = 0; i < 5; i++) {
            const start = t + i * 0.16;
            notes.forEach(freq => ghostVoice(freq, start, 0.3, 2.0, vol));
            vol *= 0.5;
          }
          break;
        }
        case 'shield_shield': {
          // FORTRESS SHIELD: shield jingle played twice in rapid succession.
          const jingle = [523.25, 659.25, 783.99, 1046.50];
          for (let pass = 0; pass < 2; pass++) {
            const passStart = t + pass * 0.32;
            jingle.forEach((freq, i) => chipNote(freq, passStart + i * 0.07, 0.07, 0.4, 'square'));
          }
          shimmer(t + 0.64, 0.12, 0.25, 6000);
          break;
        }
      }
    });
  }

  // Per-combo planet destruction sound — used in place of the regular
  // planetDestroyed() variant when a combo wants a beefier kill cue.
  // Currently only Supernova (nova_nova) overrides; everything else falls
  // back to the normal nova boom.
  function comboDestroySound(key) {
    safeSfx(t => {
      if (key === 'nova_nova') {
        // Same 4-layer nova boom, every layer 30% louder.
        novaBoom(t, 1.3);
      } else {
        novaBoom(t, 1);
      }
    });
  }

  // Sustained hyperspeed tone — separate from the pickup whoosh. Low
  // rumbling engine: 80hz sine fundamental + 160hz sine 2nd harmonic at
  // 0.4x, both through a lowpass (cutoff ~200hz, Q=2) modulated by a
  // 0.3hz LFO sweeping between 120 and 280hz for movement. Capped at
  // 0.08. Hard-stop (no fade) when hyperspeed ends.
  //
  // `stacks` (1..4) shifts the base pitch up 15% per additional stack so the
  // engine sounds more aggressive at higher stack counts. Stack 1 keeps the
  // original 80hz so existing single-pickup behavior is unchanged.
  function startHyperspeedWhoosh(stacks) {
    if (!ensureRunning()) return null;
    if (!sfxEnabled) return null;
    try {
      const t = ctx.currentTime;
      const stackLevel = Math.max(1, stacks || 1);
      const baseFreq = 80 * (1 + 0.15 * (stackLevel - 1));

      const f = ctx.createBiquadFilter();
      f.type = 'lowpass';
      // Track the base pitch so the LFO window stays centered relative to it.
      f.frequency.value = baseFreq * 2.5;
      f.Q.value = 2;

      // LFO sweeps cutoff ±80hz around the base.
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.type = 'sine';
      lfo.frequency.value = 0.3;
      lfoGain.gain.value  = 80;
      lfo.connect(lfoGain); lfoGain.connect(f.frequency);

      // Fundamental at the stack-scaled base.
      const o1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.type = 'sine'; o1.frequency.value = baseFreq;
      g1.gain.value = 1;
      o1.connect(g1); g1.connect(f);

      // 2nd harmonic at 0.4x
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine'; o2.frequency.value = baseFreq * 2;
      g2.gain.value = 0.4;
      o2.connect(g2); g2.connect(f);

      // Master envelope for the sustained voice, capped at 0.08.
      const out = ctx.createGain();
      out.gain.setValueAtTime(0, t);
      out.gain.linearRampToValueAtTime(0.08, t + 0.12);
      f.connect(out); out.connect(sfxGain);

      o1.start(t); o2.start(t); lfo.start(t);
      return {
        stop() {
          try {
            const now = ctx.currentTime;
            out.gain.cancelScheduledValues(now);
            out.gain.setValueAtTime(0, now);
            o1.stop(now); o2.stop(now); lfo.stop(now);
            killOnEnd(o1, o2, lfo, lfoGain, g1, g2, f, out);
          } catch {}
        }
      };
    } catch {}
    return null;
  }

  // Deep sustained rumble for the 10-minute apocalypse sequence. Two sine
  // layers at 35hz (fundamental) + 70hz (2nd harmonic @ 0.3x). Caller controls
  // the master amplitude via setVolume so we can smoothly build the dread.
  function startApocalypseRumble() {
    if (!ensureRunning()) return null;
    if (!sfxEnabled) return null;
    try {
      const t = ctx.currentTime;
      // Primary 120hz — phone speakers can actually reproduce this. Tremolo
      // applied per-frame via setVolume's "level" arg.
      const o1 = ctx.createOscillator();
      o1.type = 'sine'; o1.frequency.value = 120;
      const g1 = ctx.createGain(); g1.gain.value = 1;
      o1.connect(g1);

      // Secondary harmonic at 180hz, 0.3x the primary.
      const o2 = ctx.createOscillator();
      o2.type = 'sine'; o2.frequency.value = 180;
      const g2 = ctx.createGain(); g2.gain.value = 0.3;
      o2.connect(g2);

      // Third low layer at 80hz — bottom of what most phone speakers handle.
      const o3 = ctx.createOscillator();
      o3.type = 'sine'; o3.frequency.value = 80;
      const g3 = ctx.createGain(); g3.gain.value = 0.2;
      o3.connect(g3);

      const master = ctx.createGain();
      master.gain.setValueAtTime(0, t);
      master.gain.linearRampToValueAtTime(0.1, t + 0.2);
      g1.connect(master); g2.connect(master); g3.connect(master);
      master.connect(sfxGain);

      o1.start(t); o2.start(t); o3.start(t);
      // Track the "intended" base volume from setVolume so per-frame tremolo
      // can modulate around it without fighting the linear ramps.
      let baseVol = 0.1;
      return {
        setVolume(v) {
          try {
            baseVol = Math.max(0, v);
            const now = ctx.currentTime;
            master.gain.cancelScheduledValues(now);
            master.gain.setValueAtTime(master.gain.value, now);
            master.gain.linearRampToValueAtTime(baseVol, now + 0.2);
          } catch {}
        },
        // Called each frame to apply tremolo on the 120hz primary so the
        // rumble has a pulsing feel even without true sub-bass. Multiplies
        // the primary's gain by (1 + 0.3 * sin(now * 0.008)).
        tick() {
          try {
            const tremolo = 1 + 0.3 * Math.sin(Date.now() * 0.008);
            g1.gain.setValueAtTime(Math.max(0, tremolo), ctx.currentTime);
          } catch {}
        },
        stop() {
          try {
            const now = ctx.currentTime;
            master.gain.cancelScheduledValues(now);
            master.gain.setValueAtTime(master.gain.value, now);
            master.gain.linearRampToValueAtTime(0, now + 0.3);
            o1.stop(now + 0.35); o2.stop(now + 0.35); o3.stop(now + 0.35);
            killOnEnd(o1, o2, o3, g1, g2, g3, master);
          } catch {}
        },
      };
    } catch {}
    return null;
  }

  // Final impact: bass sweep 150→40hz over 0.8s + a full-volume white noise
  // burst. Sweep raised from the original 60→10hz so phone speakers can
  // actually reproduce the impact. Wired through sfxGain so the SFX toggle
  // silences it.
  function playApocalypseImpact() {
    safeSfx(t => {
      // Bass sweep.
      chipSweep('sine', 150, 40, t, 0.8, 0.9);
      // Noise burst.
      const n = ctx.createBufferSource();
      n.buffer = noiseBuffer(0.5, x => Math.pow(1 - x, 0.6));
      const f = ctx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 0.5;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.9, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      n.connect(f); f.connect(g); g.connect(sfxGain);
      n.start(t); n.stop(t + 0.52);
      killOnEnd(n, f, g);
    });
  }

  // Low-frequency hum for the void orb. Sustained 60hz sine at low volume;
  // caller calls stop() when leaving the proximity range.
  function startVoidHum() {
    if (!ensureRunning()) return null;
    if (!sfxEnabled) return null;
    try {
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      o.type = 'sine'; o.frequency.value = 60;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.25);
      o.connect(g); g.connect(sfxGain);
      o.start(t);
      return {
        stop() {
          try {
            const now = ctx.currentTime;
            g.gain.cancelScheduledValues(now);
            g.gain.setValueAtTime(g.gain.value, now);
            g.gain.linearRampToValueAtTime(0, now + 0.25);
            o.stop(now + 0.3);
            killOnEnd(o, g);
          } catch {}
        },
      };
    } catch {}
    return null;
  }

  // Screaming planet cue: prefer the SCREAM.mp3 clip if loaded, else fall
  // back to the synthesized 800→200hz sweep so the game still works offline
  // or before the asset finishes decoding.
  function screamShriek() {
    if (sfxBuffers.scream) {
      playSfxBuffer('scream', 0.2);
      return;
    }
    // Kick off a background load so subsequent cues can use the file.
    if (!sfxLoading.scream) loadSfxBuffer('scream').catch(() => {});
    safeSfx(t => {
      chipSweep('sine', 800, 200, t, 0.3, 0.2);
    });
  }

  function death() {
    safeSfx(t => {
      // Iconic chromatic descent: C5-B4-Bb4-A4-Ab4-G4-F#4-F4-E4-Eb4-D4-C4,
      // each note 0.08s on a square wave. Followed by a low 80hz sine
      // rumble that fades out over 0.5s.
      const notes = [
        523.25, 493.88, 466.16, 440.00, 415.30, 392.00,
        369.99, 349.23, 329.63, 311.13, 293.66, 261.63,
      ];
      notes.forEach((freq, i) => chipNote(freq, t + i * 0.08, 0.085, 0.45, 'square'));

      const rumbleStart = t + notes.length * 0.08;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.value = 80;
      g.gain.setValueAtTime(0, rumbleStart);
      g.gain.linearRampToValueAtTime(0.4, rumbleStart + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, rumbleStart + 0.5);
      o.connect(g); g.connect(sfxGain);
      o.start(rumbleStart); o.stop(rumbleStart + 0.55);
      killOnEnd(o, g);
    });
  }

  // ---- Background music: per-state file playback with crossfades ----
  //
  // playTrack(name, fade) is the single entry point — it crossfades from the
  // currently playing track (if any) into the named one over `fade` seconds.
  // Each track also self-loops via a 2-second crossfade scheduled by
  // armCrossfade() so loop points are inaudible. Pause "ducks" the music to
  // PAUSE_DUCK_LEVEL of normal volume rather than stopping playback so the
  // game returns instantly with no fade-in lag.

  function loadMusicBuffer(name) {
    if (musicBuffers[name]) return Promise.resolve(musicBuffers[name]);
    if (musicLoading[name]) return musicLoading[name];
    if (!ctx) return Promise.reject(new Error('no audio context'));
    // Paths are relative to index.html — resolves to <base>/assets/<name>.mp3.
    const url = './assets/' + name + '.mp3';
    console.log('[music] fetching', url);
    musicLoading[name] = fetch(url)
      .then(r => {
        if (!r.ok) throw new Error(name + '.mp3 fetch failed: ' + r.status);
        return r.arrayBuffer();
      })
      .then(ab => new Promise((resolve, reject) => {
        // Callback form for Safari compatibility.
        ctx.decodeAudioData(ab, resolve, reject);
      }))
      .then(buf => {
        musicBuffers[name] = buf;
        console.log('[music] loaded', url, 'duration=' + buf.duration.toFixed(2) + 's');
        return buf;
      })
      .catch(err => {
        musicLoading[name] = null;
        console.error('[music] load failed', url, err);
        throw err;
      });
    return musicLoading[name];
  }

  // Same pattern as loadMusicBuffer, for the destruction SFX files.
  function loadSfxBuffer(key) {
    if (sfxBuffers[key]) return Promise.resolve(sfxBuffers[key]);
    if (sfxLoading[key]) return sfxLoading[key];
    if (!ctx) return Promise.reject(new Error('no audio context'));
    const url = SFX_BUFFER_URLS[key];
    if (!url) return Promise.reject(new Error('unknown sfx ' + key));
    console.log('[sfx] fetching', url);
    sfxLoading[key] = fetch(url)
      .then(r => {
        if (!r.ok) throw new Error(key + ' fetch failed: ' + r.status);
        return r.arrayBuffer();
      })
      .then(ab => new Promise((resolve, reject) => {
        ctx.decodeAudioData(ab, resolve, reject);
      }))
      .then(buf => {
        sfxBuffers[key] = buf;
        console.log('[sfx] loaded', url, 'duration=' + buf.duration.toFixed(2) + 's');
        return buf;
      })
      .catch(err => {
        sfxLoading[key] = null;
        console.error('[sfx] load failed', url, err);
        throw err;
      });
    return sfxLoading[key];
  }

  function preloadSfxBuffers() {
    for (const k of Object.keys(SFX_BUFFER_URLS)) {
      loadSfxBuffer(k).catch(() => {});
    }
  }

  // One-shot: play a decoded SFX buffer at `volume` through sfxGain. If the
  // buffer isn't ready yet, kick off the load so the next hit is instant and
  // silently skip this one — destroys are frequent enough that dropping one
  // is better than introducing decode-jitter latency.
  function playSfxBuffer(key, volume) {
    if (!sfxEnabled) return;
    if (!ensureRunning()) return;
    const buf = sfxBuffers[key];
    if (!buf) {
      loadSfxBuffer(key).catch(() => {});
      return;
    }
    try {
      const src = ctx.createBufferSource();
      const g = ctx.createGain();
      src.buffer = buf;
      g.gain.value = volume;
      src.connect(g); g.connect(sfxGain);
      src.start(0);
      killOnEnd(src, g);
    } catch {}
  }

  // What musicGain should be at right now — accounts for the music toggle
  // and the pause duck. `state` lives in the outer game scope; this closure
  // resolves it lazily, so toggling mid-pause uses the ducked target.
  function currentMusicGainTarget() {
    if (!musicEnabled) return 0;
    if (typeof state !== 'undefined' && state === 'paused') {
      return MUSIC_GAIN_VALUE * PAUSE_DUCK_LEVEL;
    }
    return MUSIC_GAIN_VALUE;
  }

  function setMusicGainTarget(target, ramp) {
    if (!musicGain || !ctx) return;
    try {
      const t = ctx.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(target, t + (ramp || 0.3));
    } catch {}
  }

  // Build, connect, and start a buffer source with an optional fade-in ramp
  // on its per-source gain. Returns the (src, gain, startTime) triple, or
  // null if the context refused to start.
  function startBufferSource(buffer, fadeIn) {
    if (!ctx || !buffer || !musicGain) return null;
    const t = ctx.currentTime;
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const g = ctx.createGain();
    if (fadeIn > 0) {
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(1, t + fadeIn);
    } else {
      g.gain.setValueAtTime(1, t);
    }
    src.connect(g); g.connect(musicGain);
    try { src.start(t); } catch { return null; }
    return { src: src, gain: g, startTime: t };
  }

  // Fade the currently active source to silence over `fadeOut` seconds and
  // schedule a stop just past the fade. Clears the source pointers; callers
  // should set new ones afterwards if they're starting a fresh source.
  function fadeOutCurrentSource(fadeOut) {
    if (!ctx) return;
    const t = ctx.currentTime;
    const oldSrc = currentMusicSource;
    const oldGain = currentMusicSourceGain;
    if (oldGain) {
      try {
        oldGain.gain.cancelScheduledValues(t);
        oldGain.gain.setValueAtTime(oldGain.gain.value, t);
        oldGain.gain.linearRampToValueAtTime(0, t + fadeOut);
      } catch {}
    }
    if (oldSrc) {
      try { oldSrc.stop(t + fadeOut + 0.05); } catch {}
      killOnEnd(oldSrc, oldGain);
    }
    currentMusicSource = null;
    currentMusicSourceGain = null;
  }

  // Schedule the next seamless-loop crossfade for the active track. Fires
  // MUSIC_CROSSFADE seconds before the buffer ends.
  function armCrossfade(sourceStartTime, buffer) {
    if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
    if (!buffer || !ctx) return;
    const fireAt = sourceStartTime + buffer.duration - MUSIC_CROSSFADE;
    const delayMs = Math.max(0, (fireAt - ctx.currentTime) * 1000);
    crossfadeTimer = setTimeout(() => {
      crossfadeTimer = null;
      if (!currentTrackName) return;
      doLoopCrossfade();
    }, delayMs);
  }

  function doLoopCrossfade() {
    const buf = musicBuffers[currentTrackName];
    if (!buf || !ctx) return;
    fadeOutCurrentSource(MUSIC_CROSSFADE);
    const started = startBufferSource(buf, MUSIC_CROSSFADE);
    if (!started) return;
    currentMusicSource = started.src;
    currentMusicSourceGain = started.gain;
    armCrossfade(started.startTime, buf);
  }

  // ---- Phase-based gameplay tracks ----
  //
  // Each of gameplay, gameplay2, gameplay3, gameplay4 runs as a standalone
  // "voice": its own BufferSource + per-voice GainNode chained into musicGain,
  // with a per-voice setTimeout that re-schedules the next gapless loop. This
  // keeps each phase track independent so phase changes can crossfade two
  // voices against each other without touching the shared musicGain ramp.

  // Start a fresh loop iteration of a named voice at `targetGain` (ramped in
  // over fadeIn seconds if >0). Re-arms its own loop timer MUSIC_CROSSFADE
  // seconds before the buffer ends.
  function startGameplayVoiceLoop(name, targetGain, fadeIn) {
    if (!ctx || !musicGain) return;
    const buf = musicBuffers[name];
    if (!buf) return;
    const t = ctx.currentTime;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    if (fadeIn > 0) {
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(targetGain, t + fadeIn);
    } else {
      g.gain.setValueAtTime(targetGain, t);
    }
    src.connect(g); g.connect(musicGain);
    try { src.start(t); } catch { return; }
    // Tear down any previous voice record for this name.
    const prev = gameplayVoices[name];
    if (prev && prev.loopTimer) { clearTimeout(prev.loopTimer); }
    const voice = { name, src, gain: g, startTime: t, buffer: buf, targetGain, loopTimer: null };
    gameplayVoices[name] = voice;
    // Schedule the next loop iteration — a little overlap via MUSIC_CROSSFADE
    // keeps the loop point inaudible.
    const fireAt = t + buf.duration - MUSIC_CROSSFADE;
    const delayMs = Math.max(0, (fireAt - ctx.currentTime) * 1000);
    voice.loopTimer = setTimeout(() => {
      // Only loop if this voice is still the current record (otherwise we've
      // been replaced/stopped).
      if (gameplayVoices[name] !== voice) return;
      // Fade current iteration out and start a new one overlapping for the
      // seamless handoff. Use the voice's live targetGain in case a phase
      // crossfade or pause-duck has adjusted it.
      const now = ctx.currentTime;
      const liveTarget = voice.targetGain;
      try {
        voice.gain.gain.cancelScheduledValues(now);
        voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
        voice.gain.gain.linearRampToValueAtTime(0, now + MUSIC_CROSSFADE);
      } catch {}
      try { voice.src.stop(now + MUSIC_CROSSFADE + 0.05); } catch {}
      killOnEnd(voice.src, voice.gain);
      startGameplayVoiceLoop(name, liveTarget, MUSIC_CROSSFADE);
    }, delayMs);
  }

  // Immediately ramp a voice to 0 and stop it. Safe to call on a missing voice.
  function stopGameplayVoice(name, fadeOut) {
    const voice = gameplayVoices[name];
    if (!voice) return;
    if (voice.loopTimer) { clearTimeout(voice.loopTimer); voice.loopTimer = null; }
    delete gameplayVoices[name];
    if (!ctx) return;
    const t = ctx.currentTime;
    const fade = fadeOut == null ? 0.05 : fadeOut;
    try {
      voice.gain.gain.cancelScheduledValues(t);
      voice.gain.gain.setValueAtTime(voice.gain.gain.value, t);
      voice.gain.gain.linearRampToValueAtTime(0, t + fade);
    } catch {}
    try { voice.src.stop(t + fade + 0.05); } catch {}
    killOnEnd(voice.src, voice.gain);
  }

  // Public: stop every gameplay-phase voice — called on resetGame and
  // goToMainMenu so nothing lingers into the next state.
  function stopAllGameplayTracks(fadeOut) {
    for (const k of Object.keys(gameplayVoices)) {
      stopGameplayVoice(k, fadeOut);
    }
  }

  // Public: start the track for a given phase (1-4) with a fade-in. Cancels
  // any single-track source that playTrack() had armed, since the gameplay
  // tracks now drive themselves through the voice system.
  function startGameplayPhaseTrack(phase, fade) {
    if (!ensureRunning()) return;
    const name = GAMEPLAY_PHASE_TRACKS[phase] || GAMEPLAY_PHASE_TRACKS[1];
    const fadeDur = fade == null ? 0.5 : fade;
    // Make sure the shared musicGain envelope is at the correct target before
    // voices start so fades come through at full level.
    setMusicGainTarget(currentMusicGainTarget(), 0.05);
    // Fade out the legacy single-track source if it's still running (e.g.
    // coming from the menu track), then hand off to the phase-voice system.
    // Always clear any pending loop-crossfade timer so the old single-track
    // loop can't re-arm itself mid-handoff.
    if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
    if (currentMusicSource) {
      fadeOutCurrentSource(fadeDur);
    }
    // If some other gameplay voice is already running (shouldn't happen but
    // defensive), fade it out.
    for (const k of Object.keys(gameplayVoices)) {
      if (k !== name) stopGameplayVoice(k, fadeDur);
    }
    currentTrackName = name;
    const target = 1;
    loadMusicBuffer(name)
      .then(() => {
        // If we were preempted (e.g. user went back to menu), bail.
        if (currentTrackName !== name) return;
        // If already playing, just nudge the gain back to target in case we
        // had been ducked.
        const existing = gameplayVoices[name];
        if (existing) {
          const t = ctx.currentTime;
          existing.targetGain = target;
          try {
            existing.gain.gain.cancelScheduledValues(t);
            existing.gain.gain.setValueAtTime(existing.gain.gain.value, t);
            existing.gain.gain.linearRampToValueAtTime(target, t + 0.2);
          } catch {}
          return;
        }
        startGameplayVoiceLoop(name, target, fadeDur);
      })
      .catch(() => {});
  }

  // Public: crossfade from phase `fromPhase` track to phase `toPhase` track
  // over GAMEPLAY_PHASE_CROSSFADE seconds using linearRampToValueAtTime on
  // each voice's gain node.
  function crossfadeGameplayPhase(fromPhase, toPhase) {
    if (!ensureRunning()) return;
    const fromName = GAMEPLAY_PHASE_TRACKS[fromPhase];
    const toName   = GAMEPLAY_PHASE_TRACKS[toPhase];
    if (!toName) return;
    const fade = GAMEPLAY_PHASE_CROSSFADE;
    // Ramp outgoing voice to 0 and free it after the fade. Covers both the
    // tracked fromPhase voice and any stragglers from even earlier phases.
    for (const k of Object.keys(gameplayVoices)) {
      if (k !== toName) stopGameplayVoice(k, fade);
    }
    currentTrackName = toName;
    setMusicGainTarget(currentMusicGainTarget(), 0.05);
    loadMusicBuffer(toName)
      .then(() => {
        if (currentTrackName !== toName) return;
        startGameplayVoiceLoop(toName, 1, fade);
      })
      .catch(() => {});
  }

  // Pause-duck / resume-restore the currently active gameplay voice. Mirrors
  // the single-track pause behaviour (which only adjusts musicGain). For the
  // phase-voice system we additionally ramp the active voice's per-voice gain
  // to keep behaviour identical to the single-track path.
  function pauseGameplayActiveVoice() {
    if (!ctx) return;
    const t = ctx.currentTime;
    for (const k of Object.keys(gameplayVoices)) {
      const v = gameplayVoices[k];
      try {
        v.gain.gain.cancelScheduledValues(t);
        v.gain.gain.setValueAtTime(v.gain.gain.value, t);
        v.gain.gain.linearRampToValueAtTime(PAUSE_DUCK_LEVEL, t + 0.3);
      } catch {}
    }
  }
  function resumeGameplayActiveVoice() {
    if (!ctx) return;
    const t = ctx.currentTime;
    for (const k of Object.keys(gameplayVoices)) {
      const v = gameplayVoices[k];
      try {
        v.gain.gain.cancelScheduledValues(t);
        v.gain.gain.setValueAtTime(v.gain.gain.value, t);
        v.gain.gain.linearRampToValueAtTime(v.targetGain || 1, t + 0.3);
      } catch {}
    }
  }

  // Public: switch to a named track ('menu' | 'gameplay' | 'results') with
  // a `fade` second crossfade. Pass null/'' to stop music entirely.
  function playTrack(name, fade) {
    const fadeDur = (fade == null) ? 0.5 : fade;

    // Stop request — fade out whatever's playing and forget the track.
    if (!name) {
      currentTrackName = null;
      if (crossfadeTimer) { clearTimeout(crossfadeTimer); crossfadeTimer = null; }
      fadeOutCurrentSource(fadeDur);
      // Gameplay-phase voices are separate — stop them too so a null
      // playTrack() actually silences everything.
      stopAllGameplayTracks(fadeDur);
      return;
    }

    if (!ensureRunning()) return;
    resetThrottles();

    // 'gameplay' is the phase-track entry point — route through the
    // phase-voice system so the active phase track gets its own voice/loop
    // and crossfades between phases happen on per-voice gains.
    if (name === 'gameplay') {
      startGameplayPhaseTrack(1, fadeDur);
      return;
    }

    // Non-gameplay request: make sure all gameplay-phase voices are stopped
    // so menu/results music can play cleanly.
    stopAllGameplayTracks(fadeDur);

    // Already on this track — just make sure musicGain matches the current
    // target (e.g. unducking from pause). Never restart the source.
    if (currentTrackName === name && currentMusicSource) {
      setMusicGainTarget(currentMusicGainTarget(), 0.2);
      return;
    }

    currentTrackName = name;
    // Restore musicGain to the right target before starting the new source.
    setMusicGainTarget(currentMusicGainTarget(), 0.05);

    loadMusicBuffer(name)
      .then(buf => {
        // Bail if the user navigated away mid-load.
        if (currentTrackName !== name) return;
        fadeOutCurrentSource(fadeDur);
        const started = startBufferSource(buf, fadeDur);
        if (!started) return;
        currentMusicSource = started.src;
        currentMusicSourceGain = started.gain;
        armCrossfade(started.startTime, buf);
      })
      .catch(() => {});
  }

  // Pause and resume "duck" musicGain rather than stopping the source so
  // gameplay returns instantly when the player hits resume. The shared
  // musicGain ramp handles the single-track path; pauseGameplayActiveVoice
  // mirrors the same duck on each phase-voice's per-voice gain.
  function pauseMusic() {
    setMusicGainTarget(musicEnabled ? MUSIC_GAIN_VALUE * PAUSE_DUCK_LEVEL : 0, 0.3);
    pauseGameplayActiveVoice();
  }
  function resumeMusic() {
    setMusicGainTarget(currentMusicGainTarget(), 0.3);
    resumeGameplayActiveVoice();
  }

  // ---- UI button click sounds ----
  // Two retro variants, both wired through sfxGain so they're muted by the
  // SFX toggle. clickPrimary is the bright confirm/start sound; clickSecondary
  // is the smaller toggle/navigate sound.
  function clickPrimary() {
    safeSfx(t => { chipNote(523.25, t, 0.04, 0.2, 'square'); });   // C5
  }
  function clickSecondary() {
    safeSfx(t => { chipNote(392.00, t, 0.03, 0.15, 'square'); });  // G4
  }

  return {
    init, attract, repel, pickup, planetDestroyed, death,
    comboActivate, comboDestroySound, startHyperspeedWhoosh,
    startApocalypseRumble, playApocalypseImpact, screamShriek, startVoidHum,
    playSfxBuffer,
    playTrack, pauseMusic, resumeMusic,
    crossfadeGameplayPhase, stopAllGameplayTracks,
    clickPrimary, clickSecondary,
    setMusicEnabled, setSfxEnabled, isMusicEnabled, isSfxEnabled,
    suspendCtx, resumeCtx,
  };
})();

// --- Highscores (localStorage, top 5) ---
// Schema: [{ score: number, difficulty: 'NORMAL'|'HARD'|'EXTREME' }, ...]
// Old schema (numbers) is migrated transparently.
function getScores() {
  try {
    const raw = JSON.parse(localStorage.getItem('drift_scores') || '[]');
    return raw.map(s => typeof s === 'number' ? { score: s, difficulty: 'NORMAL' } : s);
  } catch { return []; }
}
function saveScore(s, d) {
  const scores = getScores();
  scores.push({ score: s, difficulty: d });
  // Keep top 5 per difficulty (not 5 total) so one difficulty can't push out another
  const byDiff = {};
  for (const sc of scores) {
    (byDiff[sc.difficulty] = byDiff[sc.difficulty] || []).push(sc);
  }
  const kept = [];
  for (const arr of Object.values(byDiff)) {
    arr.sort((a,b) => b.score - a.score);
    kept.push(...arr.slice(0, 5));
  }
  kept.sort((a,b) => b.score - a.score);
  localStorage.setItem('drift_scores', JSON.stringify(kept));
  console.log('[drift] saved scores:', JSON.stringify(kept));
  return kept;
}

const API_URL = 'https://s3dtdgsg29.execute-api.eu-west-1.amazonaws.com';

function getUsername() {
  try { return localStorage.getItem('drift_username') || ''; } catch { return ''; }
}

function setUsername(name) {
  try { localStorage.setItem('drift_username', name); } catch {}
  if (typeof Sentry !== 'undefined') Sentry.setUser({ username: localStorage.getItem('drift_username') });
}

function submitScoreOnline(username, s, d) {
  try {
    fetch(API_URL + '/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, score: s, difficulty: d }),
    }).catch(() => {});
  } catch {}
}

function fetchLeaderboard(d, callback) {
  fetch(API_URL + '/leaderboard?difficulty=' + encodeURIComponent(d))
    .then(r => r.json())
    .then(data => callback(null, data.leaderboard || []))
    .catch(() => callback('unavailable', []));
}

function normalScrollSpeed() {
  const d = diff();
  // Ramp is wall-clock based — frame count drifts under hitches, but players
  // should feel a consistent "it's been 5 minutes, top speed" regardless of
  // framerate. elapsedRunSeconds() returns 0 before resetGame is called.
  const t = Math.min(elapsedRunSeconds() / d.speedCapScore, 1);
  return d.startSpeed + (d.maxSpeed - d.startSpeed) * t;
}

function scrollSpeed() {
  let s = normalScrollSpeed();
  if (activeEffects.hyperspeed > 0) s *= hyperspeedCurrentMult;
  return s;
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// --- Background stars ---
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 160; i++)
    bgStars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+0.2, phase: Math.random()*6.28, spd: Math.random()*0.3+0.08 });
}

// --- Bodies ---
// New planet types introduced from phase 2 onward. Shared between the spawn
// pools, the 80% scroll multiplier, and future gameplay tuning.
const NEW_BODY_TYPES = new Set([
  'toothed','eye','cracked','tentacle','screaming','void','heart','mirror','skull',
]);

// Phase-based spawn pools. Each phase weights planets toward its signature
// aesthetic; early ticks keep the classic set, late ticks push full horror.
const PHASE_POOLS = {
  1: ['star','star','planet','blackhole'],
  2: ['star','planet','blackhole','toothed','eye','cracked','toothed','eye'],
  3: ['toothed','eye','cracked','tentacle','screaming','void','tentacle','screaming'],
  4: ['tentacle','screaming','void','heart','mirror','skull','heart','mirror'],
};
function phaseForElapsed(es) {
  return es < 180 ? 1 : es < 300 ? 2 : es < 480 ? 3 : 4;
}

// Phase-based gameplay music: currentGameplayTrack mirrors whichever phase's
// track is currently playing. update() calls checkGameplayPhase() each frame
// while state === 'playing'; when the live phase diverges from the tracked
// one, we fire a 3-second crossfade on the SFX module.
let currentGameplayTrack = 1;
function checkGameplayPhase() {
  const phase = phaseForElapsed(elapsedRunSeconds());
  if (phase === currentGameplayTrack) return;
  const prev = currentGameplayTrack;
  currentGameplayTrack = phase;
  try { SFX.crossfadeGameplayPhase(prev, phase); } catch {}
}

function spawnBody(yBase) {
  const pool = PHASE_POOLS[phaseForElapsed(elapsedRunSeconds())];
  const type = pool[Math.floor(Math.random() * pool.length)];
  let radius, color, glowColor;

  // Base sizing + palette per type. Custom-drawn types still carry color/glow
  // so the glow gradient and target indicator have something to work with.
  if (type === 'star') {
    radius = 13 + Math.random() * 9;
    const hue = Math.random() < 0.5 ? 42 : 200;
    color = `hsl(${hue},100%,80%)`; glowColor = `hsl(${hue},100%,65%)`;
  } else if (type === 'planet') {
    radius = 17 + Math.random() * 13;
    const hue = 100 + Math.random() * 220;
    color = `hsl(${hue},55%,50%)`; glowColor = `hsl(${hue},80%,58%)`;
  } else if (type === 'blackhole') {
    radius = 11 + Math.random() * 7;
    color = '#080808'; glowColor = 'rgba(170,70,255,0.9)';
  } else if (type === 'toothed') {
    radius = 16 + Math.random() * 10;
    color = '#8b0000'; glowColor = 'rgba(220,30,30,0.9)';
  } else if (type === 'eye') {
    radius = 18 + Math.random() * 8;
    color = '#f6efd6'; glowColor = 'rgba(255,220,160,0.7)';
  } else if (type === 'cracked') {
    radius = 17 + Math.random() * 10;
    color = '#5a2b16'; glowColor = 'rgba(255,120,40,0.85)';
  } else if (type === 'tentacle') {
    radius = 16 + Math.random() * 8;
    color = '#4a0080'; glowColor = 'rgba(140,40,200,0.85)';
  } else if (type === 'screaming') {
    radius = 17 + Math.random() * 9;
    color = '#4a4040'; glowColor = 'rgba(80,20,20,0.3)';
  } else if (type === 'void') {
    radius = 14 + Math.random() * 7;
    color = '#000'; glowColor = 'rgba(180,240,255,0.6)';
  } else if (type === 'heart') {
    radius = 17 + Math.random() * 8;
    color = '#cc0000'; glowColor = 'rgba(255,40,40,0.85)';
  } else if (type === 'mirror') {
    radius = 14 + Math.random() * 6;
    color = '#222'; glowColor = 'rgba(255,255,255,0.5)';
  } else if (type === 'skull') {
    // Spec: radius * 1.3 compared to normal planets of same type.
    radius = (17 + Math.random() * 10) * 1.3;
    color = '#0d0d0d'; glowColor = 'rgba(200,200,200,0.6)';
  } else {
    radius = 16; color = '#888'; glowColor = 'rgba(255,255,255,0.5)';
  }

  // Pick a horizontal zone different from the previous spawn so consecutive
  // bodies spread across the screen instead of stacking. Within the zone,
  // x is uniform from body.radius to W-body.radius (no margin).
  let zone;
  if (lastSpawnZone < 0) {
    zone = Math.floor(Math.random() * 3);
  } else {
    const choices = [0, 1, 2].filter(z => z !== lastSpawnZone);
    zone = choices[Math.floor(Math.random() * choices.length)];
  }
  lastSpawnZone = zone;
  const zoneStart = zone * (W / 3);
  const zoneEnd   = (zone + 1) * (W / 3);
  const xMin = Math.max(radius, zoneStart);
  const xMax = Math.min(W - radius, zoneEnd);
  const x = xMin >= xMax ? (xMin + xMax) * 0.5 : xMin + Math.random() * (xMax - xMin);

  // Pre-build gradients at local origin (0,0). drawBodies translates by
  // (b.x, b.y). Cached gradients avoid per-frame createRadialGradient calls,
  // which are expensive on mobile GPUs.
  const maxGlowR = radius * 2.95;
  const cachedGlow = ctx.createRadialGradient(0, 0, radius * 0.4, 0, 0, maxGlowR);
  cachedGlow.addColorStop(0, glowColor);
  cachedGlow.addColorStop(1, 'rgba(0,0,0,0)');

  // Only the "classic" star/planet types use the cached radial fill — custom
  // drawers build their own look.
  let cachedFill = null;
  if (type === 'star' || type === 'planet') {
    cachedFill = ctx.createRadialGradient(-radius*0.28, -radius*0.28, 0, 0, 0, radius);
    cachedFill.addColorStop(0, '#fff');
    cachedFill.addColorStop(0.3, color);
    cachedFill.addColorStop(1, 'rgba(0,0,0,0.5)');
  }

  const body = {
    x, y: yBase, radius, type, color, glowColor,
    passed: false, pulse: Math.random()*6.28,
    cachedFill, cachedGlow, cachedMaxGlowR: maxGlowR,
  };

  // Type-specific animation state.
  if (type === 'toothed') {
    body.toothAngle = Math.random() * 6.28;
    body.spikeLen = radius * 0.6;
    body.innerSpikeLen = radius * 0.32;
  } else if (type === 'eye') {
    body.pupilDx = 0; body.pupilDy = 0;
    body.eyePulse = Math.random() * 6.28;
    body.veinSeed = Math.floor(Math.random() * 1e6);
  } else if (type === 'cracked') {
    body.nextEruptFrame = 180 + Math.floor(Math.random() * 60); // 3-4s
    body.eruptFlash = 0;
    body.crackSeed = Math.floor(Math.random() * 1e6);
  } else if (type === 'tentacle') {
    body.tentacleCount = 6;
    body.tentaclePhases = [];
    for (let i = 0; i < 6; i++) body.tentaclePhases.push(Math.random() * 3.5);
    body.tentacleSeed = Math.floor(Math.random() * 1e6);
  } else if (type === 'screaming') {
    body.screamPhase = Math.random() * 6; // offset within 6s cycle
    body.screamActive = false;
    body.screamSurgeFrames = 0;
    body.screamSeed = Math.floor(Math.random() * 1e6);
    body.shockwaves = [];
    body.contractRings = [];
  } else if (type === 'void') {
    body.voidPulse = Math.random() * 6.28;
  } else if (type === 'heart') {
    body.heartScale = 1;
    body.heartPhase = Math.random() * 6.28;
    body.bloodDrip = 0;
    body.heartSeed = Math.floor(Math.random() * 1e6);
    body.bloodDrops = []; // {offX, age, maxAge, size}
  } else if (type === 'mirror') {
    body.mirrorVx = 0;
    body.mirrorDelayFrames = 30; // 0.5s @ 60fps
    body.mirrorSeed = Math.floor(Math.random() * 1e6);
  } else if (type === 'skull') {
    body.skullRotation = 0;
    body.skullEyeFlash = 0;
    body.nextSkullFlash = 60 + Math.floor(Math.random() * 240);
    body.skullSeed = Math.floor(Math.random() * 1e6);
    // Pick planet palette once per skull — greens/browns/blues for the upper half.
    const palettes = [
      { top: '#3a6b38', mid: '#5a8a3c', low: '#6d5a30' }, // earthy green
      { top: '#3050a0', mid: '#5080c0', low: '#8a7040' }, // ocean + desert
      { top: '#6d4a20', mid: '#a87438', low: '#8c6a3a' }, // rust
      { top: '#2d5078', mid: '#4278a0', low: '#6d8aa0' }, // blue-grey
    ];
    body.skullPalette = palettes[Math.floor(Math.random() * palettes.length)];
  }

  return body;
}

// After 4 minutes, +1 body per minute of survival, capped per difficulty so
// the late-game density bump comes from more bodies filling the H/4 grid
// rather than runaway counts.
function effectiveMaxBodies() {
  const d = diff();
  const ramped = d.maxBodies + Math.max(0, Math.floor((elapsedRunSeconds() - 240) / 60));
  return Math.min(ramped, d.maxBodiesCap);
}

function initBodies() {
  bodies = [];
  const max = effectiveMaxBodies();
  for (let i = 0; i < max; i++)
    bodies.push(spawnBody(H * 0.05 - i * BODY_SPACING));
}

// --- Powerup helpers ---
const PAIR_COMBOS = [
  ['nova','nova'], ['nova','hyperspeed'], ['nova','ghost'], ['nova','shield'],
  ['hyperspeed','ghost'], ['hyperspeed','shield'],
  ['ghost','shield'], ['ghost','ghost'], ['shield','shield'],
];
let nextPairId = 1;

function spawnPowerup() {
  const topBodyY = bodies.length ? Math.min(...bodies.map(b => b.y)) : -100;
  const y = Math.min(-30, topBodyY - 60 - Math.random() * 80);
  // 1 in 5 spawns is a tethered pair
  if (Math.random() < 0.2) {
