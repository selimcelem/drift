<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drift — Nova Blast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; width: 1080px; height: 1920px; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1080" height="1920"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1080, H = 1920;

// Background
ctx.fillStyle = '#00000a';
ctx.fillRect(0, 0, W, H);

// Nebula
function nebula(cx, cy, r, color, alpha) {
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = alpha;
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}
nebula(W*0.3, H*0.35, W*0.55, 'rgba(70,30,160,0.55)', 0.055);
nebula(W*0.7, H*0.55, W*0.45, 'rgba(15,70,170,0.55)', 0.055);
ctx.globalAlpha = 1;

// Stars
for (let i = 0; i < 300; i++) {
  ctx.globalAlpha = Math.random() * 0.5 + 0.2;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(Math.random()*W, Math.random()*H, Math.random()*2+0.3, 0, 6.28);
  ctx.fill();
}
ctx.globalAlpha = 1;

// Some surviving bodies (far from blast center)
function drawStar(x, y, radius) {
  const g = ctx.createRadialGradient(x, y, radius*0.4, x, y, radius*2.6);
  g.addColorStop(0, 'rgba(255,220,80,0.5)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, radius*2.6, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  const bg = ctx.createRadialGradient(x-radius*0.28, y-radius*0.28, 0, x, y, radius);
  bg.addColorStop(0, '#fff');
  bg.addColorStop(0.3, '#ffe066');
  bg.addColorStop(1, 'rgba(180,130,0,0.5)');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(x, y, radius, 0, 6.28); ctx.fill();
}

function drawPlanet(x, y, radius, hue) {
  const g = ctx.createRadialGradient(x, y, radius*0.4, x, y, radius*2.6);
  g.addColorStop(0, `hsla(${hue},80%,58%,0.4)`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, radius*2.6, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  const bg = ctx.createRadialGradient(x-radius*0.28, y-radius*0.28, 0, x, y, radius);
  bg.addColorStop(0, '#fff');
  bg.addColorStop(0.3, `hsl(${hue},55%,50%)`);
  bg.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(x, y, radius, 0, 6.28); ctx.fill();
}

// Far-away bodies that survived
drawStar(150, 250, 35);
drawPlanet(900, 1600, 50, 180);
drawStar(200, 1750, 28);

// Player position (center of blast)
const px = 520, py = 950;

// Nova rings — triple blast, each at different expansion stage
function drawNovaRing(cx, cy, radius, life) {
  const innerR = Math.max(0, radius - 50);
  // Inner trailing ring
  ctx.globalAlpha = life * 0.5;
  ctx.strokeStyle = `rgba(255,160,60,${life * 0.7})`;
  ctx.lineWidth = 25;
  ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, 6.28); ctx.stroke();
  // Main outer ring
  ctx.globalAlpha = life * 0.85;
  ctx.strokeStyle = `rgba(255,200,90,${life})`;
  ctx.lineWidth = 15;
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 6.28); ctx.stroke();
  ctx.globalAlpha = life * 0.35;
  ctx.lineWidth = 45;
  ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 6.28); ctx.stroke();
}

// Ring 1 — largest, most expanded
drawNovaRing(px, py, 650, 0.35);
// Ring 2 — medium
drawNovaRing(px, py, 400, 0.6);
// Ring 3 — smallest, freshest
drawNovaRing(px, py, 180, 0.9);

ctx.globalAlpha = 1;

// Orange particle bursts where planets were destroyed
function drawDestroyParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = Math.random() * 55 + 10;
    const px2 = x + Math.cos(a) * d;
    const py2 = y + Math.sin(a) * d;
    const size = Math.random() * 5 + 2;
    const life = Math.random() * 0.6 + 0.3;
    ctx.globalAlpha = life;
    ctx.fillStyle = `rgba(255,180,80,1)`;
    ctx.beginPath(); ctx.arc(px2, py2, size * life, 0, 6.28); ctx.fill();
  }
}

// Destroyed body locations
drawDestroyParticles(350, 700, 20);
drawDestroyParticles(720, 820, 18);
drawDestroyParticles(280, 1100, 22);
drawDestroyParticles(750, 1200, 16);
drawDestroyParticles(600, 550, 15);

ctx.globalAlpha = 1;

// Player trail
const trail = [];
for (let i = 0; i < 25; i++) {
  trail.push({ x: px + Math.sin(i*0.2)*15, y: py + i*16 });
}
for (let i = 0; i < trail.length; i++) {
  const t = 1 - i/trail.length;
  ctx.globalAlpha = t * 0.6;
  ctx.fillStyle = `hsl(${185+t*55},100%,78%)`;
  ctx.beginPath(); ctx.arc(trail[i].x, trail[i].y, t*11, 0, 6.28); ctx.fill();
}
ctx.globalAlpha = 1;

// Player glow
const pg = ctx.createRadialGradient(px, py, 0, px, py, 42);
pg.addColorStop(0, 'rgba(100,220,255,0.38)');
pg.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = pg;
ctx.beginPath(); ctx.arc(px, py, 42, 0, 6.28); ctx.fill();

// Player core
const pc = ctx.createRadialGradient(px-3, py-3, 0, px, py, 15);
pc.addColorStop(0, '#fff');
pc.addColorStop(0.4, '#7de8ff');
pc.addColorStop(1, 'rgba(30,110,190,0.5)');
ctx.fillStyle = pc;
ctx.beginPath(); ctx.arc(px, py, 15, 0, 6.28); ctx.fill();

// Score HUD
ctx.textAlign = 'center';
ctx.font = '700 72px Orbitron, monospace';
ctx.letterSpacing = '10px';
ctx.fillStyle = 'rgba(255,255,255,0.9)';
ctx.shadowColor = 'rgba(100,200,255,0.8)';
ctx.shadowBlur = 30;
ctx.fillText('203', W/2+5, 80);
ctx.shadowBlur = 0;

// Powerup timer bar area
ctx.font = '400 20px "Space Mono", monospace';
ctx.letterSpacing = '6px';
ctx.fillStyle = 'rgba(255,255,255,0.7)';
// (nova has no timer bar — it's instant — but we can skip this)

// Hint text
ctx.font = '400 24px "Space Mono", monospace';
ctx.letterSpacing = '5px';
ctx.fillStyle = 'rgba(255,255,255,0.35)';
ctx.textAlign = 'left';
ctx.fillText('\u25C0 ATTRACT', 50, H - 160);
ctx.textAlign = 'right';
ctx.fillText('REPEL \u25B6', W - 50, H - 160);
</script>
</body>
</html>
